name: CG+ ZyC Gaming Kernel (Mi14 8Gen3 Optimized)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZYC CLANG Çekimi (Gizli Tünel)
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd
          
          echo "🔥 ZyCromerZ Clang Linki Çekiliyor..."
          CLANG_LINK=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          echo "İndirilecek Link: $CLANG_LINK"
          
          curl -L -o clang.tar.gz "$CLANG_LINK"
          
          echo "Arşiv Çıkarılıyor..."
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc
          rm -f clang.tar.gz

      - name: 2. Kaynakları Çek (Yeni Staging Dalı)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: 3. SADECE VortexSU Kurulumu
        run: |
          cd common
          curl -LSs "https://raw.githubusercontent.com/Kingfinik98/VortexSU/refs/heads/main/kernel/setup.sh" | bash -s main

      - name: 4. Wi-Fi, BBRv3 ve Asya Yamaları
        run: |
          cd common
          curl -fLSs https://github.com/OnePlus-12-Development/android_kernel_qcom_sm8650/commit/3e0cb08.patch > wifi.patch || true
          if [ -s wifi.patch ] && grep -q "diff" wifi.patch; then
            patch -p1 --forward < wifi.patch || true
          fi
          patch -p1 --fuzz=3 < $GITHUB_WORKSPACE/patches/bbrv3.patch || true
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' security/Kconfig || true

      - name: 5. SUSFS Master Formülü
        run: |
          cd common
          git clone --depth=1 -q https://gitlab.com/simonpunk/susfs4ksu -b gki-android14-6.1 ../susfs
          cp -R ../susfs/kernel_patches/fs/* ./fs/
          cp -R ../susfs/kernel_patches/include/* ./include/
          patch -p1 --forward < ../susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true
          
          git clone https://github.com/Kingfinik98/build-vortex.git ../build-vortex
          patch -p1 --forward < ../build-vortex/kernel-patches/susfs/fs_proc_base.c-fix-k6.1.patch || true
          
          cat << 'EOF' > .ns_inject_tmp
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT
          #include <linux/susfs_def.h>
          extern bool susfs_is_current_ksu_domain(void);
          extern bool susfs_is_current_zygote_domain(void);
          extern bool susfs_is_boot_completed_triggered;
          extern bool susfs_is_sdcard_android_data_decrypted;
          static DEFINE_IDA(susfs_mnt_id_ida);
          static DEFINE_IDA(susfs_mnt_group_ida);
          #define CL_COPY_MNT_NS BIT(25)
          #endif
          EOF
          sed -i '/#include "internal.h"/r .ns_inject_tmp' ./fs/namespace.c || true
          rm -f .ns_inject_tmp
          sed -i '/#include <linux\/susfs_def.h>/i #ifndef __GENKSYMS__' fs/statfs.c
          sed -i '/#include <linux\/susfs_def.h>/a #endif' fs/statfs.c

      - name: 6. Gaming Kernel Config (8 Gen 3 Ultra Performance)
        run: |
          cd common
          CONFIG_FILE="arch/arm64/configs/gki_defconfig"
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 GAMING CMDLINE - Snapdragon 8 Gen 3 Optimized
          # ═══════════════════════════════════════════════════════════════
          # - console=ttynull: Disable serial console (saves CPU cycles)
          # - stack_depot_disable=on: Disable stack depot (reduces memory overhead)
          # - cgroup_disable=pressure: Disable PSI (saves CPU cycles in gaming)
          # - kasan.stacktrace=off: Disable KASAN stacktrace (pure performance)
          # - kvm-arm.mode=protected: Secure KVM mode
          # - lpm_levels.sleep_disabled=1: GAMING MODE - Disable deep sleep for instant response
          # - msm_rtb.filter=0x237: Qualcomm debug filter optimized
          # - service_locator.enable=1: Enable Qualcomm service locator
          # - androidboot.usbcontroller=a600000.dwc3: USB3 controller for accessories
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_CMDLINE "console=ttynull stack_depot_disable=on cgroup_disable=pressure kasan.page_alloc.sample=10 kasan.stacktrace=off kvm-arm.mode=protected bootconfig ioremap_guard lpm_levels.sleep_disabled=1 msm_rtb.filter=0x237 service_locator.enable=1 androidboot.usbcontroller=a600000.dwc3 loop.max_loop=64"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CMDLINE_EXTEND
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 TIMER FREQUENCY - Gaming Sweet Spot
          # ═══════════════════════════════════════════════════════════════
          # HZ_300 = Optimal for 60/120/144Hz gaming displays
          # - Better than HZ_250 for 120Hz+ screens
          # - More efficient than HZ_1000 (wastes CPU cycles)
          # - Perfect balance between latency and power
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_100
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_250
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HZ_300
          ./scripts/config --file $CONFIG_FILE --set-val CONFIG_HZ 300
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_1000
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 PREEMPTION MODEL - Ultra Low Latency
          # ═══════════════════════════════════════════════════════════════
          # Full Preemption = Instant task switching for gaming
          # - Eliminates micro-stutters during intense scenes
          # - GPU/CPU synchronization is smoother
          # - Touch response is immediate
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_NONE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_VOLUNTARY
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT_BUILD
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT_COUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPTION
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT_RCU
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 TICK MODEL - Adaptive for Gaming
          # ═══════════════════════════════════════════════════════════════
          # NO_HZ_IDLE = Stops ticks when CPU is idle
          # - Saves power during menu screens
          # - Full tick rate maintained during gameplay
          # - Better than NO_HZ_FULL which can cause latency spikes
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_PERIODIC
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NO_HZ
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NO_HZ_COMMON
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NO_HZ_IDLE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_NO_HZ_FULL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CONTEXT_TRACKING
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TICK_CPU_ACCOUNTING
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 CPU FREQUENCY GOVERNOR - Snapdragon 8 Gen 3 Specific
          # ═══════════════════════════════════════════════════════════════
          # WALT (Window Assisted Load Tracking) = Qualcomm's gaming governor
          # - Designed specifically for Snapdragon SoCs
          # - Faster frequency ramp-up than schedutil
          # - Understands big.LITTLE/DynamIQ architecture
          # - Perfect for 1 Prime + 3 Performance + 4 Efficiency core layout
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_WALT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_SCHEDUTIL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_PERFORMANCE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_POWERSAVE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_USERSPACE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_ONDEMAND
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_CPU_FREQ_GOV_CONSERVATIVE
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_CPU_FREQ_DEFAULT_GOV "walt"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_DEFAULT_GOV_WALT
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 CPU IDLE - Gaming Optimized Deep Sleep Behavior
          # ═══════════════════════════════════════════════════════════════
          # MENU governor = Best for interactive/gaming workloads
          # - Predicts idle duration better for burst workloads
          # - Faster exit from idle states
          # - TEO (Timer Events Oriented) is for servers, not gaming
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_IDLE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_IDLE_GOV_MENU
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_CPU_IDLE_GOV_TEO
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM_PSCI_CPUIDLE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM_CPUIDLE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DT_IDLE_STATES
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 SCHEDULER OPTIMIZATIONS - DynamIQ Aware
          # ═══════════════════════════════════════════════════════════════
          # SCHED_MC (Multi-Core) = Pack tasks on same cluster when possible
          # SCHED_CLUSTER = Aware of 8 Gen 3's cluster topology
          # UCLAMP = Utilization clamping for QoS (games can request high perf)
          # ENERGY_MODEL = EAS for intelligent power-performance decisions
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_MC
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_CLUSTER
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_SMT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_UCLAMP_TASK
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_UCLAMP_TASK_GROUP
          ./scripts/config --file $CONFIG_FILE --set-val CONFIG_UCLAMP_BUCKETS_COUNT 5
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ENERGY_MODEL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_WALT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_TUNE
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 THERMAL MANAGEMENT - Gaming Thermals
          # ═══════════════════════════════════════════════════════════════
          # STEP_WISE = Gradual throttling (no sudden FPS drops)
          # POWER_ALLOCATOR = IPA for intelligent thermal budgeting
          # - Distributes thermal budget between CPU/GPU
          # - Maintains higher sustained performance
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_THERMAL_GOV_FAIR_SHARE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_GOV_STEP_WISE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_GOV_POWER_ALLOCATOR
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_GOV_USER_SPACE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_DEFAULT_GOV_STEP_WISE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_EMULATION
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_THERMAL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEVFREQ_THERMAL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_TSENS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_SPMI_TEMP_ALARM
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 GPU & GRAPHICS SUPPORT - Adreno 750 Optimization
          # ═══════════════════════════════════════════════════════════════
          # DRM and GPU subsystem for gaming graphics
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM_MSM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM_MSM_GPU_STATE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM_MSM_REGISTER_LOGGING
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEVFREQ_GOV_SIMPLE_ONDEMAND
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEVFREQ_GOV_PERFORMANCE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEVFREQ_GOV_POWERSAVE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEVFREQ_GOV_USERSPACE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEVFREQ_GOV_PASSIVE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PM_DEVFREQ
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_KGSL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SYNC_FILE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SW_SYNC
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 MEMORY MANAGEMENT - Gaming RAM Optimization
          # ═══════════════════════════════════════════════════════════════
          # Gaming needs fast memory allocation, not memory saving
          # SLUB = Fast slab allocator
          # COMPACTION = Reduces memory fragmentation for large game textures
          # No ZRAM/ZSWAP = Direct RAM access is faster for gaming
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SLUB
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SLUB_CPU_PARTIAL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_COMPACTION
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TRANSPARENT_HUGEPAGE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TRANSPARENT_HUGEPAGE_ALWAYS
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_TRANSPARENT_HUGEPAGE_MADVISE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PROCESS_RECLAIM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_MEMCG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_MEMCG_SWAP
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_NUMA_BALANCING
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_VM_EVENT_COUNTERS
          ./scripts/config --file $CONFIG_FILE --set-val CONFIG_VM_MAX_READAHEAD 512
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 I/O SCHEDULER - Storage Latency Reduction
          # ═══════════════════════════════════════════════════════════════
          # BFQ = Best for interactive/gaming (low latency)
          # NONE/MQ-DEADLINE = Good for NVMe (Mi14 has UFS 4.0)
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_MQ_IOSCHED_DEADLINE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_MQ_IOSCHED_KYBER
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IOSCHED_BFQ
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_IOSCHED "bfq"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_BFQ_GROUP_IOSCHED
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_BLK_CGROUP_IOLATENCY
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_BLK_WBT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_BLK_WBT_MQ
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 NETWORKING - Low Latency Gaming Network
          # ═══════════════════════════════════════════════════════════════
          # BBR = Google's congestion control (best for gaming)
          # FQ_CODEL = Fair queuing with controlled delay
          # TCP optimizations for online gaming
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_CUBIC
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_WESTWOOD
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_FQ_CODEL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_FQ
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_PRIO
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_NET_SCH "fq_codel"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_LOW_LATENCY
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP_NF_TARGET_TTL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP6_NF_TARGET_HL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP6_NF_MATCH_HL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NETFILTER_XT_TARGET_TCPMSS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_WIREGUARD
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_IPGRE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_IPGRE_DEMUX
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_UDP_TUNNEL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_XFRM_USER
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_INET_ESP
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_INET6_ESP
          
          # Wi-Fi Gaming Optimizations
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CFG80211
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_MAC80211
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_WLAN
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_WIRELESS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_RFKILL
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 INPUT SUBSYSTEM - Touch & Controller Latency
          # ═══════════════════════════════════════════════════════════════
          # Essential for touch response and game controllers
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_INPUT_EVDEV
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_INPUT_TOUCHSCREEN
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_INPUT_JOYSTICK
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_INPUT_MISC
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_INPUT_UINPUT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HID_GENERIC
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HID_PLAYSTATION
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HID_MICROSOFT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HID_SONY
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_USB_HID
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 KPROBES & KERNELSU REQUIREMENTS
          # ═══════════════════════════════════════════════════════════════
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KPROBES
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HAVE_KPROBES
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KPROBE_EVENTS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_FPROBE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KALLSYMS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KALLSYMS_ALL
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 LTO & COMPILER OPTIMIZATIONS
          # ═══════════════════════════════════════════════════════════════
          # LTO_CLANG_THIN = Good balance of optimization and compile time
          # Aggressive optimizations for performance
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LTO_CLANG_FULL
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LTO_NONE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARCH_SUPPORTS_LTO_CLANG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARCH_SUPPORTS_LTO_CLANG_THIN
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_CC_OPTIMIZE_FOR_SIZE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LD_OPTIMIZATION
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_OPTIMIZE_INLINING
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 DISABLE DEBUG (Pure Performance)
          # ═══════════════════════════════════════════════════════════════
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_REDUCED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_COMPRESSED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_SPLIT
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF4
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF5
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_KERNEL
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_PREEMPT
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_MUTEXES
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_SPINLOCK
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_ATOMIC_SLEEP
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PROVE_LOCKING
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCK_STAT
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_LOCK_ALLOC
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_RT_MUTEXES
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_WW_MUTEX_SLOWPATH
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_RWSEMS
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_SLUB_DEBUG
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_FTRACE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_FUNCTION_TRACER
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_SCHED_DEBUG
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_SCHEDSTATS
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_TIMER_STATS
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_BUGVERBOSE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_KASAN
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_UBSAN
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_KCSAN
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_KFENCE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_FAULT_INJECTION
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_MEMORY_INIT
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_PER_CPU_MAPS
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_SOFTLOCKUP_DETECTOR
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HARDLOCKUP_DETECTOR
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DETECT_HUNG_TASK
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_WQ_WATCHDOG
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 ARM64 ARCHITECTURE SPECIFIC (8 Gen 3)
          # ═══════════════════════════════════════════════════════════════
          # Snapdragon 8 Gen 3 = Cortex-X4 + A720 + A520
          # Enable all ARMv9 features
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM64
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM64_ERRATUM_SPECULATIVE_UNPRIV_LOAD
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM64_ERRATUM_2054223
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM64_ERRATUM_2067961
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM64_4K_PAGES
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM64_VA_BITS_48
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM64_HW_AFDBM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM64_PAN
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM64_UAO
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM64_PSEUDO_NMI
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM64_RAS_EXTN
