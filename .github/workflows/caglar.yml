name: MI14 Stock Like WiFi Patch Test

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      WIFI_PATCH_URL: "https://github.com/OnePlus-12-Development/android_kernel_qcom_sm8650/commit/3e0cb08.patch"
      CLANG_URL: "https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache ZyC Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/clang-zyc
          key: zyc-clang-22.0.0git-20250928-release

      - name: Install packages
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd zip patch pahole ca-certificates

      - name: Download ZyC Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          cd "$GITHUB_WORKSPACE/clang-zyc"
          echo "Downloading ${CLANG_URL}"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          tar -xzf clang.tar.gz --strip-components=1
          rm -f clang.tar.gz
          test -x "$GITHUB_WORKSPACE/clang-zyc/bin/clang"

      - name: Show Clang version
        run: |
          "$GITHUB_WORKSPACE/clang-zyc/bin/clang" --version
          "$GITHUB_WORKSPACE/clang-zyc/bin/ld.lld" --version || true

      - name: Clone sources
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging \
            https://github.com/ramabondanp/android_kernel_common-6.1.git \
            --depth=1 common

      - name: Apply WiFi patch only
        run: |
          cd common
          curl -fLSs "${WIFI_PATCH_URL}" -o wifi.patch
          test -s wifi.patch || { echo "HATA: WiFi patch boş indi"; exit 1; }

          echo "Patch preview:"
          head -40 wifi.patch || true

          patch --dry-run -p1 < wifi.patch
          patch -p1 < wifi.patch

      - name: Configure kernel
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          CONFIG_FILE="arch/arm64/configs/gki_defconfig"

          ./scripts/config --file "$CONFIG_FILE" \
            --set-str CONFIG_CMDLINE "console=ttynull stack_depot_disable=on cgroup_disable=pressure kasan.page_alloc.sample=10 kasan.stacktrace=off kvm-arm.mode=protected bootconfig ioremap_guard"
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_CMDLINE_EXTEND

          ./scripts/config --file "$CONFIG_FILE" --set-str CONFIG_LOCALVERSION "-StockLike-WiFiPatch"
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_LOCALVERSION_AUTO

          sed -i 's/check_defconfig//' build.config.gki || true

      - name: Build kernel
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          sed -i 's/^PHONY += all/  /g' Makefile || true
          touch .scmversion
          ulimit -n 65535 || true

          printf '%s\n' '#!/bin/sh' 'exit 0' > scripts/check-local-export
          chmod +x scripts/check-local-export

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            gki_defconfig

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            olddefconfig

          echo "=== CONFIG CHECK ==="
          grep -E "CONFIG_LTO|CONFIG_DEBUG_INFO|CONFIG_DEBUG_INFO_BTF|CONFIG_MODVERSIONS|CONFIG_TRIM_UNUSED_KSYMS|CONFIG_MODULE_ALLOW_BTF_MISMATCH|CONFIG_CMDLINE" out/.config || true

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            Image || { echo "BUILD FAILED"; exit 1; }

          test -f out/arch/arm64/boot/Image || { echo "HATA: Image oluşmadı"; exit 1; }

          echo "BOOTHASH=StockLikeWiFiPatch-$(date +%s%N | cut -c1-10)" >> "$GITHUB_ENV"

      - name: Pack AnyKernel3
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=MI14 Stock Like WiFi Patch Test/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh
          cp ../common/out/arch/arm64/boot/Image .
          zip -r ../MI14-StockLike-WiFiPatch-Test.zip ./*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MI14-StockLike-WiFiPatch-Test
          path: |
            MI14-StockLike-WiFiPatch-Test.zip
            common/out/arch/arm64/boot/Image
          if-no-files-found: error

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "MI14 Stock Like WiFi Patch Test"
          files: "MI14-StockLike-WiFiPatch-Test.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
