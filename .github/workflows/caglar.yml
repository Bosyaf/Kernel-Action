name: LavajCN Houji (Xiaomi 14) Orijinal Kaynak Derlemesi

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 1. Alanı Hazırla
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: 2. Adamın İstediği GCC'ler ve Bizim ZyC Clang 22
        run: |
          set -euo pipefail
          sudo apt update -qq
          
          # Adamın scriptinde kurduğu çapraz derleyiciler (GCC)
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu libc6-dev-arm64-cross
          
          # Bizim standart paketler
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils rsync unzip dwarves bc cpio wget

          # Adam CLANG komutu vermiş ama indirmemiş! Biz ZyC Clang ile eksiği tamamlıyoruz.
          mkdir -p "$GITHUB_WORKSPACE/clang"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          echo "ZyC Clang indiriliyor..."
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang"

      - name: 3. Kaynakları ve AnyKernel3 Çek
        run: |
          set -euo pipefail
          # Paketleme için AnyKernel3
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          
          # Çinlinin Xiaomi 14 / 14 Pro (Houji/Shennong) Reposu
          git clone https://github.com/lavajCN/kernel_xiaomi_houji-shennong-spec.git --depth=1 common

      - name: 4. Kernel Derleme (Adamın Eksikleri Tamamlandı)
        run: |
          set -euo pipefail
          cd common
          
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          
          # Adamın unuttuğu şema çıkarma (Defconfig) işlemi
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="clang" gki_defconfig

          # Adamın yarım bıraktığı derleme komutunun düzeltilmiş, sağlam hali
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CC=clang \
            LD=ld.lld \
            HOSTLD=ld.lld \
            Image

          echo "BOOTHASH=Houji-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: 5. AnyKernel3 (TWRP/KernelSU İçin Flaşlanabilir Paket)
        run: |
          set -euo pipefail
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=LavajCN Houji Orijinal Kernel/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh

          SRC_IMG="../common/out/arch/arm64/boot/Image"
          
          if [ -f "$SRC_IMG" ]; then
            cp "$SRC_IMG" .
            echo "Motor (Image) AnyKernel'e kopyalandı."
          else
            echo "HATA: Image dosyası bulunamadı, derleme patlak!"
            exit 1
          fi

          zip -r "../Houji-Shennong-Kernel.zip" ./*

      - name: 6. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "LavajCN Orijinal Kernel (Xiaomi 14/14 Pro)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
