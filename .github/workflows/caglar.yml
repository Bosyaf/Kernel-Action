name: PGO Training Kernel - Honest Check

on:
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "pgo"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 16384
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Setup Build Tools
        run: |
          sudo apt update && sudo apt install -y \
            git curl wget bc bison flex libssl-dev libelf-dev \
            cpio kmod xz-utils file python3 zstd zip unzip grep

      - name: Download Yuki Clang
        run: |
          URL="https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20251211.tar.zst"
          mkdir -p "$GITHUB_WORKSPACE/llvm"
          curl -LSso clang.tar.zst "$URL"
          tar --zstd -xf clang.tar.zst -C "$GITHUB_WORKSPACE/llvm"
          rm -f clang.tar.zst
          
          LLVM_DIR=$(find "$GITHUB_WORKSPACE/llvm" -type f -name clang | grep '/bin/clang$' | head -n1 | xargs dirname)
          echo "LLVM_DIR=$LLVM_DIR" >> $GITHUB_ENV
          echo "$LLVM_DIR" >> $GITHUB_PATH
          clang --version

      - name: Get Kernel Source
        run: |
          git clone -b android14-6.1-staging --depth=1 \
            https://github.com/ramabondanp/android_kernel_common-6.1.git kernel

      - name: CLONE AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git

      # ============================================================================
      # KRITIK ADIM: PGO DESTEĞİ KONTROLÜ
      # ============================================================================
      - name: 🔍 PGO Desteği Kontrolü (DERLEME ÖNCESİ)
        id: pgo_check
        run: |
          cd kernel
          export PATH="${{ env.LLVM_DIR }}:$PATH"
          
          echo "╔══════════════════════════════════════════════╗"
          echo "║     PGO DESTEĞİ MANTIĞA GÖRE KONTROL         ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          
          # 1. Defconfig oluştur (KASAN'a dokunma)
          make O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            gki_defconfig > /dev/null 2>&1
          
          # 2. Source kodunda PGO seçeneği var mı?
          HAS_CONFIG_OPTION=$(grep -r "CONFIG_PGO_CLANG" scripts/kconfig/Kconfig* 2>/dev/null | wc -l)
          
          echo "📋 Kontrol Sonuçları:"
          echo "───────────────────────────────────────"
          
          if [ "$HAS_CONFIG_OPTION" -gt 0 ]; then
            echo "✅ CONFIG_PGO_CLANG seçeneği Kconfig'de VAR"
            HAS_KCONFIG=1
          else
            echo "❌ CONFIG_PGO_CLANG seçeneği Kconfig'de BULUNMADI"
            HAS_KCONFIG=0
          fi
          
          # 3. Derlenmiş config'de aktif mi?
          sleep 2
          CONFIG_STATUS=$(grep "CONFIG_PGO_CLANG" out/.config || echo "")
          echo ""
          echo "📄 out/.config içeriğinde:"
          echo "$CONFIG_STATUS"
          echo ""
          
          # 4. Son karar
          if [ "$HAS_KCONFIG" -eq 1 ]; then
            echo "✅ SONUÇ: Bu kernel kaynağı PGO destekliyor!"
            echo "   Derlemeye devam ediliyor..."
            echo "PGO_SUPPORTED=true" >> $GITHUB_OUTPUT
          else
            echo ""
            echo "╔══════════════════════════════════════════════╗"
            echo "║           ⚠️  UYARI! DUR!                    ║"
            echo "║                                              ║"
            echo "║  Bu kernel kaynağı PGO desteği SAĞLAMIYOR.  ║"
            echo "║  Aşağıdakilerden biri yapılmalı:             ║"
            echo "║                                              ║"
            echo "║  1. Kconfig dosyalarına PGO seçeneği eklemen ║"
            echo "║  2. Başka bir kernel source kullanman       ║"
            echo "║  3. GKI kaynaklarında vendor defconfig'i    ║"
            echo "║     PGO için özelleştirmen                  ║"
            echo "║                                              ║"
            echo "║  Örnek düzeltme:                            ║"
            echo "║  -------------------                        ║"
            echo "║  scripts/kconfig/Kconfig.arm64 veya         ║"
            echo "║  arch/arm64/configs/gki_defconfig içine:    ║"
            echo "║                                             ║"
            echo "║  config PGO_CLANG                           ║"
            echo "║      bool \"Clang PGO profiling\"            ║"
            echo "║      depends on CC_IS_CLANG                ║"
            echo "║      default n                             ║"
            echo "╚══════════════════════════════════════════════╝"
            echo ""
            echo "PGO_SUPPORTED=false" >> $GITHUB_OUTPUT
            exit 0
          fi

      - name: PGO Ayarlarını Uygula (Eğer Destek Var İse)
        if: steps.pgo_check.outputs.PGO_SUPPORTED == 'true'
        run: |
          cd kernel
          export PATH="${{ env.LLVM_DIR }}:$PATH"
          
          echo "🔧 PGO ayarları uygulanıyor..."
          
          # Seçenek varsa sed ile aç
          if grep -q "CONFIG_PGO_CLANG" out/.config; then
            sed -i 's/# CONFIG_PGO_CLANG is not set/CONFIG_PGO_CLANG=y/' out/.config
            sed -i 's/CONFIG_PGO_CLANG=.*/CONFIG_PGO_CLANG=y/' out/.config
          fi
          
          # Debug FS açık olsun
          sed -i 's/# CONFIG_DEBUG_FS is not set/CONFIG_DEBUG_FS=y/' out/.config
          sed -i 's/CONFIG_DEBUG_FS=.*/CONFIG_DEBUG_FS=y/' out/.config
          
          # İsim
          scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-PGO-TRAIN"
          
          # Kaydet
          make O=out ARCH=arm64 LLVM=1 olddefconfig > /dev/null 2>&1
          
          # Doğrulama
          if grep -q "CONFIG_PGO_CLANG=y" out/.config; then
            echo "✅ PGO başarıyla aktif edildi!"
          else
            echo "❌ PGO aktif edilemedi - son durum:"
            grep "CONFIG_PGO_CLANG" out/.config || echo "(yok)"
          fi

      - name: Kernel Derle (Sadece PGO Destekliyse)
        if: steps.pgo_check.outputs.PGO_SUPPORTED == 'true'
        run: |
          cd kernel
          export PATH="${{ env.LLVM_DIR }}:$PATH"
          
          echo "🚀 Derleme başlıyor..."
          
          make -j$(nproc) O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld HOSTAR=llvm-ar \
            Image modules 2>&1 | tee compile.log
            
          [ -f out/arch/arm64/boot/Image ] || { echo "❌ Image yok!"; tail compile.log; exit 1; }
          echo "✅ Derleme başarılı!"

      - name: AnyKernel3 Hazırla
        if: steps.pgo_check.outputs.PGO_SUPPORTED == 'true'
        run: |
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/kernel.string=.*/kernel.string=PGO Training by Caglar/' anykernel.sh
          zip -r9 ../PGO-Training-Kernel.zip ./* -x '.git*'
          echo "ZIP_NAME=PGO-Training-Kernel.zip" >> $GITHUB_ENV

      - name: GitHub Release
        if: steps.pgo_check.outputs.PGO_SUPPORTED == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pgo-${{ github.run_number }}
          files: PGO-Training-Kernel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: PGO Desteği Yok Durumu
        if: steps.pgo_check.outputs.PGO_SUPPORTED == 'false'
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║      🛑 BUILD DURDURULDU                     ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "Bu kernel kaynağı PGO desteği sağlamıyor."
          echo "Aşağıdaki adımlardan birini uygula:"
          echo ""
          echo "1️⃣ ÇÖZEM: Yeni bir kernel source kullan"
          echo "   - Pixel GKI kaynakları genelde daha iyi destekler"
          echo "   - Samsung Exynos kaynaklarında da olabilir"
          echo ""
          echo "2️⃣ ÇÖZEM: Mevcut source'a PGO seçeneği ekle"
          echo "   scripts/kconfig/Kconfig.* dosyasına şu satırı ekle:"
          echo ""
          echo "   config PGO_CLANG"
          echo "       bool \"Enable Clang PGO profiling\""
          echo "       depends on CC_IS_CLANG"
          echo "       default n"
          echo ""
          echo "   Veya Linux ana kaynaklardan al:"
          echo "   https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git/tree/scripts/kconfig/Kconfig.llvm"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "💬 Bu script şimdi durdu çünkü boşa cihazda"
          echo "   boot denemenizi engellemek istemiyorum."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Build durumu: SKIPPED (destek yok)"
          exit 1
