name: Yuki Toolchain Feature Check

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  check-yuki-toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Paketleri Kur
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            curl wget xz-utils zstd tar findutils coreutils

      - name: Yuki Clang İndir ve Aç
        run: |
          echo "🔥 Yuki Clang + BOLT indiriliyor..."
          YUKI_URL="https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst"

          mkdir -p $GITHUB_WORKSPACE/clang-yuki
          curl -fL "$YUKI_URL" -o yuki-clang.tar.zst || { echo "❌ Yuki indirilemedi"; exit 1; }

          echo "📦 Arşiv açılıyor..."
          tar --use-compress-program=unzstd -xf yuki-clang.tar.zst -C $GITHUB_WORKSPACE/clang-yuki || { echo "❌ Yuki arşivi açılamadı"; exit 1; }
          rm -f yuki-clang.tar.zst

      - name: Yuki Tree Scan
        run: |
          echo "=== Yuki directory scan (top) ==="
          find $GITHUB_WORKSPACE/clang-yuki -maxdepth 4 -type d | sort | head -300 || true

          echo
          echo "=== Yuki file scan (clang/prof/bolt/opt) ==="
          find $GITHUB_WORKSPACE/clang-yuki -maxdepth 6 -type f | grep -E '/clang$|/clang\+\+$|/llvm-prof|/llvm-bolt|/merge-fdata|/opt$' | sort || true

      - name: Yuki Toolchain Feature Check
        run: |
          YUKI_CLANG="$(find $GITHUB_WORKSPACE/clang-yuki -type f -name clang | grep -v 'aarch64-linux-gnu/bin/clang' | head -n 1)"

          if [ -z "$YUKI_CLANG" ]; then
            echo "❌ Yuki ana clang bulunamadı"
            echo "=== Full fallback scan ==="
            find $GITHUB_WORKSPACE/clang-yuki -maxdepth 8 -type f | sort | head -500
            exit 1
          fi

          YUKI_BIN="$(dirname "$YUKI_CLANG")"

          echo "=== Yuki clang path ==="
          echo "$YUKI_CLANG"

          echo
          echo "=== Yuki bin path ==="
          echo "$YUKI_BIN"

          echo
          echo "=== Yuki Toolchain binaries ==="
          ls "$YUKI_BIN" | grep -E 'clang$|clang\+\+$|llvm-prof|llvm-bolt|merge-fdata|opt$' || true

          echo
          echo "=== Yuki Version checks ==="
          "$YUKI_BIN/clang" --version || true
          "$YUKI_BIN/llvm-profdata" --version || true
          "$YUKI_BIN/llvm-profgen" --version || true
          "$YUKI_BIN/llvm-bolt" --version || true
          "$YUKI_BIN/merge-fdata" --version || true
          "$YUKI_BIN/opt" --version || true
