name: Build Kernel - Xiaomi 14 (houji)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - defconfig
          - gki_defconfig
      ccache:
        description: 'Enable CCache'
        required: false
        default: 'true'
        type: boolean
      extra_args:
        description: 'Extra Make Arguments'
        required: false
        default: ''
  push:
    branches:
      - 'houji-shennong-u-oss'
      - 'houji-shennong-spec'
    tags:
      - 'houji-6.1-*'
  pull_request:
    branches:
      - 'houji-shennong-u-oss'
      - 'houji-shennong-spec'

env:
  TZ: Asia/Shanghai
  KERNEL_REPO: lavajCN/kernel_xiaomi_houji-shennong-spec
  DEVICE_NAME: Xiaomi 14 (houji)
  ARCH: arm64
  CROSS_COMPILE: aarch64-linux-gnu-
  CLANG_TRIPLE: aarch64-linux-gnu-

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip build]') }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare environment
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          echo "=== Environment Info ==="
          echo "Kernel: ${{ env.KERNEL_REPO }}"
          echo "Device: ${{ env.DEVICE_NAME }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Build Type: ${{ inputs.build_type || 'auto' }}"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential bc rsync libncurses-dev flex bison \
            libssl-dev libelf-dev dwarves zstd lz4 python3 python3-pip \
            ccache \
            clang gcc \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Setup CCache
        if: inputs.ccache != false
        run: |
          echo "=== CCache Setup ==="
          ccache -M 10G
          ccache -z
          echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV

      - name: Setup Clang
        run: |
          which clang && clang --version || echo "Using GCC"
          which aarch64-linux-gnu-gcc && aarch64-linux-gnu-gcc --version || echo "GCC cross compiler ready"

      - name: Generate build info
        id: build_info
        run: |
          TIMESTAMP=$(date +"%Y%m%d-%H%M")
          COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${github.ref_name}"
          else
            TAG_NAME="build-${TIMESTAMP}-${COMMIT_SHA}"
          fi
          
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          
          echo "=== Build Info ==="
          echo "Tag: ${TAG_NAME}"
          echo "Timestamp: ${TIMESTAMP}"
          echo "Commit: ${COMMIT_SHA}"

      - name: Build kernel
        run: |
          set -e
          echo "=== Starting Kernel Build ==="
          
          # Determine build target
          BUILD_TARGET="${{ inputs.build_type || 'defconfig' }}"
          
          # Clean previous builds
          make clean 2>/dev/null || true
          make mrproper 2>/dev/null || true
          
          # Copy existing defconfig as base
          if [ -f arch/arm64/configs/defconfig ]; then
            cp arch/arm64/configs/defconfig .config
          fi
          
          echo "=== Building with $BUILD_TARGET ==="
          
          if [ "$BUILD_TARGET" == "gki_defconfig" ]; then
            make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          elif [ "$BUILD_TARGET" == "defconfig" ]; then
            make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          else
            # Auto: use existing .config or defconfig
            if [ ! -f .config ]; then
              make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
            fi
          fi
          
          # Build kernel image
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            KCFLAGS="-mno-android" \
            ${{ inputs.extra_args }} \
            2>&1 | tee build.log
          
          echo "=== Build Completed ==="

      - name: Check build output
        run: |
          echo "=== Checking Build Output ==="
          
          if [ -f arch/arm64/boot/Image ]; then
            echo "✓ Image created: $(ls -lh arch/arm64/boot/Image)"
          else
            echo "✗ Image not found!"
            cat build.log | tail -100
            exit 1
          fi
          
          if [ -f vmlinux ]; then
            echo "✓ Vmlinux created: $(ls -lh vmlinux)"
          fi

      - name: Setup artifacts directory
        run: |
          mkdir -p artifact
          
          # Copy Image
          cp arch/arm64/boot/Image artifact/
          
          # Create DTBs if exist
          if [ -d arch/arm64/boot/dts ]; then
            find arch/arm64/boot/dts -name "*.dtb" -exec cp {} artifact/ \;
          fi
          
          # Create boot.img header (placeholder)
          cat > artifact/boot.img.info << EOF
          Kernel Build Info
          =================
          Device: ${{ env.DEVICE_NAME }}
          Tag: ${{ steps.build_info.outputs.tag }}
          Timestamp: ${{ steps.build_info.outputs.timestamp }}
          Commit: ${{ steps.build_info.outputs.sha }}
          Architecture: ${{ env.ARCH }}
          Compiler: $(gcc --version | head -1)
          EOF
          
          echo "=== Artifacts ==="
          ls -lh artifact/

      - name: Generate tarball
        run: |
          cd artifact
          tar -cvzf kernel-${{ steps.build_info.outputs.tag }}.tar.gz *
          echo "=== Tarball Created ==="
          ls -lh *.tar.gz
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ steps.build_info.outputs.tag }}
          path: |
            artifact/Image
            artifact/*.dtb
            artifact/boot.img.info
            artifact/*.tar.gz
            build.log
          retention-days: 7

      - name: Show CCache stats
        if: inputs.ccache != false
        run: |
          echo "=== CCache Statistics ==="
          ccache -s

      - name: Create Release
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.build_info.outputs.tag }}
          name: "Kernel Build ${{ steps.build_info.outputs.tag }}"
          body: |
            ## Build Information
            - **Device:** ${{ env.DEVICE_NAME }}
            - **Timestamp:** ${{ steps.build_info.outputs.timestamp }}
            - **Commit:** ${{ steps.build_info.outputs.sha }}
            - **Architecture:** ${{ env.ARCH }}
            
            ## Included Files
            - Image (kernel binary)
            - Device Tree Blobs (.dtb)
            - Full tarball for flashing
          files: |
            artifact/Image
            artifact/*.tar.gz
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Tag (for auto builds)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag ${{ steps.build_info.outputs.tag }}
          git push origin ${{ steps.build_info.outputs.tag }} || echo "Tag might already exist"

  build-modules:
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc rsync libncurses-dev flex bison \
            libssl-dev libelf-dev dwarves zstd lz4 python3 python3-pip \
            clang gcc gcc-aarch64-linux-gnu

      - name: Build modules
        run: |
          set -e
          echo "=== Building Kernel Modules ==="
          
          # Load existing config
          cp arch/arm64/configs/defconfig .config 2>/dev/null || true
          
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            modules 2>&1 | tee modules.log
          
          echo "=== Modules Build Completed ==="

      - name: Package modules
        run: |
          mkdir -p artifact/modules
          find . -name "*.ko" -exec cp {} artifact/modules/ \;
          tar -cvzf artifact/modules.tar.gz -C artifact modules/
          echo "=== Modules Packaged ==="
          ls -lh artifact/modules.tar.gz

      - name: Upload modules artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules-${{ needs.build.outputs.tag }}
          path: |
            artifact/modules/
            artifact/modules.tar.gz
          retention-days: 7

  debug:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.extra_args != '' }}
    
    steps:
      - name: Debug info
        run: |
          echo "Extra arguments: ${{ inputs.extra_args }}"
          echo "Build type: ${{ inputs.build_type }}"
