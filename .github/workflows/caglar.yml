name: Build Xiaomi Houji/Shennong Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    env:
      REPO_URL: https://github.com/lavajCN/kernel_xiaomi_houji-shennong-spec.git
      REPO_DIR: kernel
      OUT_DIR: out
      GOOGLE_CLANG_REV: r530567

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget python3 python3-pip python-is-python3 \
            openjdk-17-jdk \
            build-essential bc bison flex cpio rsync kmod \
            libssl-dev libelf-dev dwarves lz4 zstd zip unzip \
            ca-certificates xz-utils jq file \
            device-tree-compiler perl sed make

      - name: Install Bazelisk
        run: |
          wget -O bazelisk https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x bazelisk
          sudo mv bazelisk /usr/local/bin/bazel
          bazel version

      - name: Clone source
        run: |
          git clone --depth=1 $REPO_URL $REPO_DIR
          cd $REPO_DIR
          echo "Last commit:"
          git log --oneline -1
          echo
          echo "Relevant files:"
          ls -lah | grep -E 'build_with_bazel|build.config|bazel|BUILD|WORKSPACE|houji|shennong|pineapple' || true

      - name: Download Google Clang
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchain/google-clang
          cd $GITHUB_WORKSPACE/toolchain/google-clang

          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${GOOGLE_CLANG_REV}.tar.gz"
          echo "Downloading $CLANG_URL"
          curl -L "$CLANG_URL" | tar -xz

          test -f bin/clang
          ./bin/clang --version
          ./bin/ld.lld --version || true

      - name: Export LLVM tools
        run: |
          echo "$GITHUB_WORKSPACE/toolchain/google-clang/bin" >> $GITHUB_PATH
          {
            echo "CC=clang"
            echo "CXX=clang++"
            echo "LD=ld.lld"
            echo "AR=llvm-ar"
            echo "NM=llvm-nm"
            echo "OBJCOPY=llvm-objcopy"
            echo "OBJDUMP=llvm-objdump"
            echo "STRIP=llvm-strip"
            echo "READELF=llvm-readelf"
            echo "LLVM=1"
            echo "LLVM_IAS=1"
          } >> $GITHUB_ENV

      - name: Inspect build script help
        run: |
          cd $REPO_DIR
          echo "===== build_with_bazel.py --help ====="
          python3 build_with_bazel.py --help || true
          echo
          echo "===== grep argparse hints ====="
          grep -nE "add_argument|target|variant|BUILD_CONFIG|build_rule" build_with_bazel.py | sed -n '1,200p' || true
          echo
          echo "===== root bzl/config files ====="
          ls -1 | grep -E 'houji|shennong|pineapple|build.config' | sed -n '1,200p' || true

      - name: Build kernel
        run: |
          cd $REPO_DIR
          mkdir -p $OUT_DIR
          export PATH="$GITHUB_WORKSPACE/toolchain/google-clang/bin:$PATH"
          export CC=clang
          export CXX=clang++
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export READELF=llvm-readelf
          export LLVM=1
          export LLVM_IAS=1

          set -x

          echo "Trying: houji user"
          python3 build_with_bazel.py -t houji user -o $OUT_DIR \
          || { echo "houji user failed"; false; }

      - name: Fallback build - houji userdebug
        if: failure()
        run: |
          cd $REPO_DIR
          export PATH="$GITHUB_WORKSPACE/toolchain/google-clang/bin:$PATH"
          set -x
          python3 build_with_bazel.py -t houji userdebug -o $OUT_DIR

      - name: Fallback build - shennong user
        if: failure()
        run: |
          cd $REPO_DIR
          export PATH="$GITHUB_WORKSPACE/toolchain/google-clang/bin:$PATH"
          set -x
          python3 build_with_bazel.py -t shennong user -o $OUT_DIR

      - name: Fallback build - shennong userdebug
        if: failure()
        run: |
          cd $REPO_DIR
          export PATH="$GITHUB_WORKSPACE/toolchain/google-clang/bin:$PATH"
          set -x
          python3 build_with_bazel.py -t shennong userdebug -o $OUT_DIR

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          cd $REPO_DIR

          echo "==== Find generated files ===="
          find . -type f \( \
            -name "Image" -o \
            -name "Image.gz" -o \
            -name "Image.lz4" -o \
            -name "Image.*" -o \
            -name "dtbo.img" -o \
            -name "boot.img" -o \
            -name "vendor_boot.img" -o \
            -name "*.dtb" -o \
            -name "*.ko" -o \
            -name "vmlinux" -o \
            -name "System.map" -o \
            -name "*.zip" -o \
            -name "*.tar.gz" \
          \) | tee $GITHUB_WORKSPACE/found_files.txt

          while IFS= read -r file; do
            [ -n "$file" ] && cp --parents "$file" $GITHUB_WORKSPACE/artifacts/ || true
          done < $GITHUB_WORKSPACE/found_files.txt

          echo "==== Artifact tree ===="
          find $GITHUB_WORKSPACE/artifacts -type f | sed -n '1,400p' || true

      - name: Pack outputs
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          ZIP_NAME="houji-kernel-build-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "$ZIP_NAME" artifacts found_files.txt || true
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          ls -lh "$ZIP_NAME" || true

      - name: Upload packed build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ github.workspace }}/${{ env.ZIP_NAME }}
          if-no-files-found: warn

      - name: Upload raw artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: houji-kernel-raw-artifacts
          path: ${{ github.workspace }}/artifacts
          if-no-files-found: warn
