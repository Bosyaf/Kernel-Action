name: SamI Peridot (Ustanın Özel Defconfig'i + Clang r547379)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Alanı Genişlet (Maximize Space)
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Kendi Deponu Çek (Defconfig İçin)
        uses: actions/checkout@v4

      - name: 1. Paketler ve Google Clang r547379 Kurulumu
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd

          echo "🚀 Google Clang r547379 ana merkezden çekiliyor..."
          mkdir -p $GITHUB_WORKSPACE/clang-google
          cd $GITHUB_WORKSPACE/clang-google
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz
          
          # Clang yolunu sisteme tanıtıyoruz
          echo "$GITHUB_WORKSPACE/clang-google/bin" >> $GITHUB_PATH

      - name: 2. SamI Kaynağını Çek
        run: |
          git clone https://github.com/shyamaldasandhi/SamI_Peridot_Kernel.git --depth=1 common
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3

      - name: 3. Ustanın Özel Defconfig'ini Motora Tak
        run: |
          cd common
          echo "🔥 Senin yüklediğin peridot_defconfig.txt motor bloğuna kaynatılıyor..."
          # Senin depoya yüklediğin dosyayı alıp, kaynağın içine asıl isimle yapıştırıyoruz
          cp $GITHUB_WORKSPACE/peridot_defconfig.txt arch/arm64/configs/peridot_defconfig
          
          # Versiyon ismini mühürleyelim
          ./scripts/config --file arch/arm64/configs/peridot_defconfig --set-str CONFIG_LOCALVERSION "-SamI-UstaIsi"

      - name: 4. Kernel Derleme (Google Clang r547379)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-google/bin:$PATH"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/clang-google/lib64:$LD_LIBRARY_PATH"
          
          # Önce senin defconfig'i hazırla
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump STRIP=llvm-strip \
            peridot_defconfig
          
          echo "------ Ana Derleme Başlıyor ------"
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump STRIP=llvm-strip \
            Image

      - name: 5. AnyKernel3 (Saf Paketleme)
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=SamI Peridot UstaIsi/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          
          # Derlenen Image dosyasını alıyoruz
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../SamI-Peridot-UstaIsi.zip" ./*

      - name: 6. GitHub Releases'e Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: SamI-Usta-${{ github.run_id }}
          name: "SamI Peridot (Clang r547379 + Özel Defconfig)"
          files: "SamI-Peridot-UstaIsi.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
