name: CG+ Gaming Kernel - LavaJ QGKI Spec

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      DEVICE: "houji"
      KERNEL_NAME: "CG+GamingKernel-LavaJ-QGKI"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: 🔧 Maximize & Clean Build Space
        run: |
          echo "🧹 Cleaning system..."
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/.ghcup
          sudo apt-get clean
          sudo apt-get autoclean
          sudo apt-get autoremove -y
          
          echo "📊 Disk space after cleanup:"
          df -h /

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update -qq || true
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential clang curl flex git \
            libelf-dev libssl-dev lz4 python3 rsync \
            zip unzip cpio wget llvm lld \
            gcc-aarch64-linux-gnu zstd make 2>&1 | grep -v "^Reading\|^Building"

      - name: 🔥 Setup ZyCromerZ Clang
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          
          echo "⬇️ Fetching Clang link..."
          CLANG_URL=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          
          echo "📥 Downloading Clang..."
          curl -L "$CLANG_URL" --output clang.tar.gz
          
          echo "📂 Extracting..."
          tar -xf clang.tar.gz
          rm -f clang.tar.gz
          
          echo "✅ Clang ready"
          $HOME/clang/bin/clang --version

      - name: 📱 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: lavajCN/kernel_xiaomi_houji-shennong-spec
          path: kernel
          fetch-depth: 1

      - name: 🔍 Find Correct Defconfig
        id: defconfig
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "🔍 Searching for device defconfig..."
          
          echo "Available configs:"
          find arch/arm64/configs -type f | head -20
          
          # Priority order for Houji/Shennong
          if [ -f "arch/arm64/configs/vendor/kalama-qgki_defconfig" ]; then
            DEFCONFIG="vendor/kalama-qgki_defconfig"
            echo "✅ Found: vendor/kalama-qgki_defconfig"
          elif [ -f "arch/arm64/configs/kalama-qgki_defconfig" ]; then
            DEFCONFIG="kalama-qgki_defconfig"
            echo "✅ Found: kalama-qgki_defconfig"
          elif [ -f "arch/arm64/configs/vendor/houji_defconfig" ]; then
            DEFCONFIG="vendor/houji_defconfig"
            echo "✅ Found: vendor/houji_defconfig"
          elif [ -f "arch/arm64/configs/houji_defconfig" ]; then
            DEFCONFIG="houji_defconfig"
            echo "✅ Found: houji_defconfig"
          elif [ -f "arch/arm64/configs/vendor/kalama_defconfig" ]; then
            DEFCONFIG="vendor/kalama_defconfig"
            echo "✅ Found: vendor/kalama_defconfig"
          elif [ -f "arch/arm64/configs/kalama_defconfig" ]; then
            DEFCONFIG="kalama_defconfig"
            echo "✅ Found: kalama_defconfig"
          else
            echo "❌ No suitable defconfig found!"
            exit 1
          fi
          
          echo "defconfig=$DEFCONFIG" >> $GITHUB_OUTPUT

      - name: ⚙️ Configure Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          DEFCONFIG="${{ steps.defconfig.outputs.defconfig }}"
          
          echo "🔧 Configuring with: $DEFCONFIG"
          
          scripts/config --file arch/arm64/configs/$DEFCONFIG \
            --set-str CONFIG_LOCALVERSION "-CG++-LavaJ-QGKI" \
            --disable CONFIG_LOCALVERSION_AUTO
          
          echo "✅ Config ready"

      - name: 🏗️ Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          export PATH="$HOME/clang/bin:$PATH"
          export KBUILD_BUILD_USER="${KBUILD_BUILD_USER}"
          export KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}"
          
          DEFCONFIG="${{ steps.defconfig.outputs.defconfig }}"
          
          echo "🔨 Building kernel with $DEFCONFIG..."
          echo "Clang:"
          clang --version
          
          make ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            O=out $DEFCONFIG
          
          make ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            O=out -j$(nproc --all) 2>&1 | tail -50
          
          # Find kernel Image
          KERNEL_IMG=$(find out -name "Image" -type f | head -n1)
          
          if [ -z "$KERNEL_IMG" ]; then
            echo "❌ Build failed - Image not found"
            find out -name "Image*" 2>/dev/null || true
            exit 1
          fi
          
          echo "✅ Build success"
          ls -lh "$KERNEL_IMG"
          
          mkdir -p $HOME/kernel_out
          cp "$KERNEL_IMG" $HOME/kernel_out/Image

      - name: 📦 Setup AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          path: AnyKernel3

      - name: 📝 Configure AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          
          cat > anykernel.sh << 'EOF'
          properties() { '
          kernel.string=CG+ Gaming Kernel LavaJ QGKI by caglar @ guvenc
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=houji
          device.name2=shennong
          device.name3=2311DRN6C
          device.name4=23116PN5BC
          supported.versions=14-16
          '; }
          . tools/ak3-core.sh
          dump_boot
          write_boot
          EOF
          
          cp $HOME/kernel_out/Image ./
          echo "✅ AnyKernel3 ready"

      - name: 📦 Create ZIP
        id: zip
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          
          DATE=$(date +%Y%m%d-%H%M)
          ZIP="${KERNEL_NAME}-${DATE}.zip"
          
          zip -r9 "$ZIP" * -x .git README.md *placeholder .gitignore
          
          echo "✅ ZIP: $ZIP"
          ls -lh "$ZIP"
          
          echo "file=$ZIP" >> $GITHUB_OUTPUT
          echo "path=$(pwd)/$ZIP" >> $GITHUB_OUTPUT

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.file }}
          path: ${{ steps.zip.outputs.path }}

      - name: 🎉 Summary
        run: |
          echo "### ✅ Build Success - QGKI Kernel" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Kernel:** CG+ Gaming Kernel (LavaJ QGKI)" >> $GITHUB_STEP_SUMMARY
          echo "**Device:** Xiaomi Mi 14 (houji/shennong)" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** lavajCN/kernel_xiaomi_houji-shennong-spec" >> $GITHUB_STEP_SUMMARY
          echo "**Defconfig:** \`${{ steps.defconfig.outputs.defconfig }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`${{ steps.zip.outputs.file }}\`" >> $GITHUB_STEP_SUMMARY
