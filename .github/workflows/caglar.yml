name: CG+ Gaming Kernel - LavaJ Android14 GKI + KSU

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      DEVICE: "houji"
      KERNEL_NAME: "CG+GamingKernel-LavaJ-GKI-KSU"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: 🔧 Maximize & Clean Build Space
        run: |
          echo "🧹 Cleaning system..."
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/.ghcup
          sudo apt-get clean
          sudo apt-get autoclean
          sudo apt-get autoremove -y
          
          echo "📊 Disk space:"
          df -h /

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update -qq || true
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential curl flex git \
            libelf-dev libssl-dev lz4 python3 rsync \
            zip unzip cpio wget zstd gzip xz-utils \
            make gcc-aarch64-linux-gnu ca-certificates 2>&1 | grep -v "^Reading\|^Building"

      - name: 🔥 Setup Neutron Clang
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          
          echo "⬇️ Downloading Neutron Clang 10032024..."
          
          CLANG_URL="https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/10032024/neutron-clang-10032024.tar.zst"
          
          echo "📥 URL: $CLANG_URL"
          curl -L --progress-bar "$CLANG_URL" --output neutron-clang.tar.zst
          
          if [ ! -f "neutron-clang.tar.zst" ]; then
            echo "❌ Download failed!"
            exit 1
          fi
          
          echo "📊 File info:"
          ls -lh neutron-clang.tar.zst
          
          echo "📂 Extracting zstd compressed archive..."
          tar -xf neutron-clang.tar.zst
          
          if [ $? -ne 0 ]; then
            echo "❌ Extraction failed!"
            echo "Trying alternative method..."
            zstd -d neutron-clang.tar.zst -o neutron-clang.tar
            tar -xf neutron-clang.tar
          fi
          
          echo "🧹 Cleaning..."
          rm -f neutron-clang.tar.zst neutron-clang.tar
          
          echo "📂 Extracted structure:"
          ls -la | head -20
          
          # Find clang binary
          if [ ! -f "clang/bin/clang" ] && [ -f "bin/clang" ]; then
            echo "Reorganizing extracted files..."
            mkdir -p temp_clang
            mv * temp_clang/ 2>/dev/null || true
            mv temp_clang clang || true
          fi
          
          if [ ! -d "clang/bin" ]; then
            echo "❌ Clang binary directory not found!"
            find . -name "clang" -type f 2>/dev/null | head -5
            exit 1
          fi
          
          echo "✅ Neutron Clang extracted successfully"
          echo "Clang Version:"
          ./clang/bin/clang --version

      - name: 📱 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: lavajCN/android_kernel_xiaomi_sm8650
          ref: android14-6.1-v
          path: kernel
          fetch-depth: 1

      - name: 🧹 Clean Kernel Source
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "🧹 Cleaning kernel source..."
          rm -rf out
          make ARCH=arm64 mrproper || true
          
          echo "✅ Kernel source cleaned"

      - name: 🔐 Install KernelSU
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "📥 Installing KernelSU..."
          
          mkdir -p drivers/ksu/kernel
          git clone --depth=1 https://github.com/tiann/KernelSU.git ksu_temp
          cp -r ksu_temp/kernel/* drivers/ksu/kernel/
          rm -rf ksu_temp
          
          echo "✅ KernelSU installed"
          ls -la drivers/ksu/kernel/ | head -5

      - name: ⚙️ Configure Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "🔧 Configuring kernel..."
          
          scripts/config --file arch/arm64/configs/gki_defconfig \
            --set-str CONFIG_LOCALVERSION "-CG++-Neutron-KSU" \
            --disable CONFIG_LOCALVERSION_AUTO \
            --enable CONFIG_KSU
          
          echo "✅ Kernel configuration done"

      - name: 🏗️ Build Kernel with Neutron Clang
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          export PATH="$HOME/clang/clang/bin:$PATH"
          export KBUILD_BUILD_USER="${KBUILD_BUILD_USER}"
          export KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}"
          
          echo "🔨 Building kernel with Neutron Clang..."
          echo ""
          echo "Clang Version:"
          clang --version
          echo ""
          
          # Verify tools
          echo "Checking tools..."
          which clang
          which ld.lld
          which llvm-ar
          echo ""
          
          # Configure
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Step 1: Loading defconfig..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          make ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            O=out gki_defconfig
          
          if [ $? -ne 0 ]; then
            echo "❌ Defconfig loading failed!"
            exit 1
          fi
          
          # Build
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Step 2: Building kernel (30-60 minutes)..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          make ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            O=out \
            -j$(nproc --all)
          
          BUILD_STATUS=$?
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build failed with status $BUILD_STATUS"
            exit 1
          fi
          
          # Verify
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Step 3: Verifying build output..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "❌ Kernel Image not found!"
            echo "Build output structure:"
            find out -type f -name "*Image*" 2>/dev/null || echo "No Image files found"
            exit 1
          fi
          
          echo "✅ Kernel Image found!"
          ls -lh out/arch/arm64/boot/Image
          
          # Stage kernel
          mkdir -p $HOME/kernel_out
          cp out/arch/arm64/boot/Image $HOME/kernel_out/
          echo "✅ Kernel staged successfully"

      - name: 📦 Setup AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          path: AnyKernel3

      - name: 📝 Configure AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          
          cat > anykernel.sh << 'EOF'
          # AnyKernel3 Ramdisk Mod Script
          # CG+ Gaming Kernel with Neutron Clang
          
          properties() { '
          kernel.string=CG+ Gaming Kernel (Neutron Clang) + KSU by caglar @ guvenc
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=houji
          device.name2=shennong
          device.name3=2311DRN6C
          device.name4=23116PN5BC
          supported.versions=14-16
          supported.patchlevels=
          '; }
          
          ## AnyKernel methods
          . tools/ak3-core.sh
          
          ## Boot install
          dump_boot
          write_boot
          EOF
          
          cp $HOME/kernel_out/Image ./
          echo "✅ AnyKernel3 configured"
          ls -lh Image

      - name: 📦 Create Flashable ZIP
        id: zip
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          
          DATE=$(date +%Y%m%d-%H%M)
          ZIP="${KERNEL_NAME}-Neutron-${DATE}.zip"
          
          echo "📦 Creating flashable ZIP: $ZIP"
          zip -r9 "$ZIP" * -x .git README.md *placeholder .gitignore .gitattributes
          
          if [ ! -f "$ZIP" ]; then
            echo "❌ ZIP creation failed!"
            exit 1
          fi
          
          echo "✅ ZIP created successfully"
          ls -lh "$ZIP"
          
          echo "file=$ZIP" >> $GITHUB_OUTPUT
          echo "path=$(pwd)/$ZIP" >> $GITHUB_OUTPUT

      - name: 📤 Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.file }}
          path: ${{ steps.zip.outputs.path }}
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          echo "### ✅ Build Completed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Kernel Name:** CG+ Gaming Kernel" >> $GITHUB_STEP_SUMMARY
          echo "**Device:** Xiaomi Mi 14 (houji)" >> $GITHUB_STEP_SUMMARY
          echo "**Compiler:** Neutron Clang 10032024 (Latest)" >> $GITHUB_STEP_SUMMARY
          echo "**Kernel Version:** Linux 6.1 (GKI)" >> $GITHUB_STEP_SUMMARY
          echo "**Root Method:** KernelSU ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** lavajCN/android_kernel_xiaomi_sm8650" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** android14-6.1-v" >> $GITHUB_STEP_SUMMARY
          echo "**Builder:** caglar@guvenc" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Flashable File:** \`${{ steps.zip.outputs.file }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Installation Guide:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Download ZIP from Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. Boot into TWRP Recovery" >> $GITHUB_STEP_SUMMARY
          echo "3. Flash the ZIP file" >> $GITHUB_STEP_SUMMARY
          echo "4. Reboot to system" >> $GITHUB_STEP_SUMMARY
          echo "5. Verify root with KernelSU manager app" >> $GITHUB_STEP_SUMMARY
