name: CG+ Orijinal Houji (shennong-u-oss) Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Alanı Hazırla
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048

      - name: Gerekli Paketleri Kur ve ZyC Clang 22 İndir
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils rsync unzip dwarves bc cpio wget llvm
          
          mkdir -p $GITHUB_WORKSPACE/clang
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang

      - name: XİAOMİ ORİJİNAL KAYNAĞI ÇEK (MiCode - shennong-u-oss)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          
          # İşte asıl fabrika burası: Xiaomi'nin Houji ve Shennong için yayınladığı saf kod!
          git clone --depth=1 -b shennong-u-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git common

      - name: SukiSU Ultra Kurulumu
        run: |
          cd common
          echo ">>> SukiSU Ultra Çekiliyor..."
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main

      - name: SUSFS Master Formülü (Hatasız)
        run: |
          cd common
          git clone --depth=1 -q https://gitlab.com/simonpunk/susfs4ksu -b gki-android14-6.1 ../susfs
          
          cp -R ../susfs/kernel_patches/fs/* ./fs/
          cp -R ../susfs/kernel_patches/include/* ./include/
          patch -p1 --forward < ../susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true
          
          cat << 'EOF' > .ns_inject_tmp
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT
          #include <linux/susfs_def.h>
          extern bool susfs_is_current_ksu_domain(void);
          extern bool susfs_is_current_zygote_domain(void);
          extern bool susfs_is_boot_completed_triggered;
          extern bool susfs_is_sdcard_android_data_decrypted;
          static DEFINE_IDA(susfs_mnt_id_ida);
          static DEFINE_IDA(susfs_mnt_group_ida);
          #define CL_COPY_MNT_NS BIT(25)
          #endif
          EOF
          sed -i '/#include "internal.h"/r .ns_inject_tmp' ./fs/namespace.c
          rm -f .ns_inject_tmp
          
          sed -i '/#include <linux\/susfs_def.h>/i #ifndef __GENKSYMS__' fs/statfs.c
          sed -i '/#include <linux\/susfs_def.h>/a #endif' fs/statfs.c

      - name: Kernel Config (Orijinal Fabrika Beyni)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          mkdir -p out
          
          # Xiaomi 14 Orijinal Config dosyasını bul ve uygula
          if [ -f "arch/arm64/configs/vendor/houji_GKI.config" ]; then
            make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="clang" vendor/houji_GKI.config
            echo ">>> Xiaomi Houji Orijinal Config Uygulandı <<<"
          else
            make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="clang" gki_defconfig
            echo ">>> Standart GKI Config Uygulandı <<<"
          fi
          
          # --- SUSFS ve KSU Zırhlarını Config'e Ekle ---
          ./scripts/config --file out/.config --enable CONFIG_KSU_SUSFS
          ./scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          
          # --- SELINUX HATASI ÇÖZÜMÜ ---
          ./scripts/config --file out/.config --enable CONFIG_SECURITY_SELINUX
          ./scripts/config --file out/.config --set-val CONFIG_SECURITY_SELINUX_SID2STR_CACHE_SIZE 256
          ./scripts/config --file out/.config --set-val CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS 9
          
          # --- İsim Damgası ---
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-CG+-MiCode"
          ./scripts/config --file out/.config --disable CONFIG_LOCALVERSION_AUTO
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="clang" olddefconfig

      - name: Kernel Derleme (Orijinal Motor - Sürücü Uyumlu)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          sed -i 's/^PHONY += all/  /g' Makefile || true
          touch .scmversion
          
          KCFLAGS="-Wno-default-const-init-var-unsafe -Wno-error"
          
          # Sadece Image (Çekirdek) derliyoruz, modülleri Xiaomi halledecek
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" \
            LD=ld.lld \
            HOSTLD=ld.lld \
            KCFLAGS="$KCFLAGS" \
            Image
            
          echo "BOOTHASH=CG+-MiCode-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: AnyKernel3 (Paketleme)
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Orijinal Houji MiCode/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../CG+-Houji-MiCode-Orijinal.zip" ./*

      - name: Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Houji Orijinal MiCode Source"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
