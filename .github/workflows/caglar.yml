name: Build Xiaomi Mi 14 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: lavajCN/kernel_xiaomi_houji-shennong-spec
          ref: houji-shennong-u-oss
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential bc rsync libncurses-dev flex bison \
            libssl-dev libelf-dev dwarves zstd lz4 python3 \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu libc6-dev-arm64-cross \
            zip unzip

      - name: Install Neutron Clang
        run: |
          mkdir -p clang
          cd clang
          wget https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/10032024/neutron-clang-10032024.tar.zst
          tar -I zstd -xf neutron-clang-10032024.tar.zst
          rm neutron-clang-10032024.tar.zst
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Build Kernel
        run: |
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          make -j$(nproc --all) ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1 \
            Image dtbo.img dtb.img 2>&1 | tee build.log

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp arch/arm64/boot/Image AnyKernel3/
          cp arch/arm64/boot/dtbo.img AnyKernel3/ 2>/dev/null || true
          cp arch/arm64/boot/dtb.img AnyKernel3/ 2>/dev/null || true
          cd AnyKernel3
          DATE=$(date +%Y%m%d)
          zip -r9 ../HyperOS-Kernel-houji-${DATE}.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-houji-${{ github.run_number }}
          path: "*.zip"
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Ozeti" >> $GITHUB_STEP_SUMMARY
          echo "- Source: https://github.com/lavajCN/kernel_xiaomi_houji-shennong-spec" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: houji-shennong-u-oss" >> $GITHUB_STEP_SUMMARY
          echo "- Clang: https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/10032024/neutron-clang-10032024.tar.zst" >> $GITHUB_STEP_SUMMARY
          echo "- Device: Xiaomi Mi 14 (houji/shennong)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Error Log
        if: failure()
        run: |
          echo "## Hata" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
