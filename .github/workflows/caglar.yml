name: Build Android Perf Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-perf:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          temp-reserve-mb: 1024
          swap-size-gb: 4

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Packages
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            git curl wget python3 build-essential flex bison \
            libelf-dev libssl-dev libcap-dev libcapstone-dev \
            libbabeltrace-dev libdw-dev libunwind-dev \
            pkg-config zlib1g-dev libperl-dev binutils-dev \
            libslang2-dev liblzma-dev libnuma-dev \
            make gcc g++ clang lld llvm \
            gcc-aarch64-linux-gnu

      - name: Clone Kernel Source
        run: |
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: Try Build Host Perf
        run: |
          cd common/tools/perf
          make -j"$(nproc)" \
            CC=clang \
            LD=ld.lld \
            NO_LIBPYTHON=1 \
            NO_JEVENTS=1 \
            NO_LIBBPF=1 \
            NO_AUXTRACE=1 \
            NO_SDT=1 \
            perf V=1 || true

          echo "=== Host perf check ==="
          file perf || true
          ldd perf || true
          ls -lah perf || true

      - name: Try Build AArch64 Perf
        run: |
          cd common/tools/perf
          make clean || true

          make -j"$(nproc)" \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=aarch64-linux-gnu-gcc \
            LD=aarch64-linux-gnu-ld \
            NO_LIBPYTHON=1 \
            NO_JEVENTS=1 \
            NO_LIBBPF=1 \
            NO_AUXTRACE=1 \
            NO_SDT=1 \
            LDFLAGS="-static" \
            perf V=1 || true

          echo "=== AArch64 perf check ==="
          file perf || true
          aarch64-linux-gnu-readelf -h perf || true
          ls -lah perf || true

      - name: Collect Outputs
        run: |
          mkdir -p out
          [ -f common/tools/perf/perf ] && cp common/tools/perf/perf out/perf || true
          file out/perf || true
          ls -lah out || true

      - name: Upload Perf Artifact
        uses: actions/upload-artifact@v4
        with:
          name: perf-binary
          path: out/*
          if-no-files-found: warn

      - name: Release Perf Binary
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          tag_name: perf-bin-${{ github.run_id }}
          name: "perf binary build"
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
