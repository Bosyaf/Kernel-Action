name: PGO Training Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "pgo"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 16384
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Setup Build Tools
        run: |
          sudo apt update && sudo apt install -y \
            git curl wget bc bison flex libssl-dev libelf-dev \
            cpio kmod xz-utils file python3 zstd zip unzip

      - name: Download Yuki Clang
        run: |
          URL="https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20251211.tar.zst"
          mkdir -p "$GITHUB_WORKSPACE/llvm"
          
          echo "⬇️ Clang indiriliyor..."
          curl -LSso /tmp/clang.tar.zst "$URL"
          
          echo "📦 Arşiv açılıyor..."
          tar --zstd -xf /tmp/clang.tar.zst -C "$GITHUB_WORKSPACE/llvm"
          rm -f /tmp/clang.tar.zst
          
          echo "🔍 Toolchain yapısı:"
          ls -la "$GITHUB_WORKSPACE/llvm/"
          
          # Clang binary'si doğrudan llvm/bin/ içinde olsun (Yuki'nin standart yapısı)
          if [ -x "$GITHUB_WORKSPACE/llvm/bin/clang" ]; then
            LLVM_DIR="$GITHUB_WORKSPACE/llvm/bin"
          elif [ -x "$GITHUB_WORKSPACE/llvm/llvm/bin/clang" ]; then
            LLVM_DIR="$GITHUB_WORKSPACE/llvm/llvm/bin"
          else
            echo "❌ clang bulunamadı!"
            find "$GITHUB_WORKSPACE/llvm" -name clang -type f 2>/dev/null
            exit 1
          fi
          
          echo "LLVM_DIR=$LLVM_DIR" >> $GITHUB_ENV
          echo "$LLVM_DIR" >> $GITHUB_PATH
          
          echo ""
          echo "✅ Clang hazır:"
          clang --version

      - name: Get Kernel Source
        run: |
          git clone -b android14-6.1-staging --depth=1 \
            https://github.com/ramabondanp/android_kernel_common-6.1.git kernel

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git

      - name: Configure PGO
        run: |
          cd kernel
          export PATH="${{ env.LLVM_DIR }}:$PATH"
          
          echo "⚙️ gki_defconfig oluşturuluyor..."
          make O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            gki_defconfig > /dev/null 2>&1
          
          echo "🔧 PGO ayarları ekleniyor..."
          # .config'in sonuna satır ekle (en güvenli yöntem)
          echo "# PGO by Caglar" >> out/.config
          echo "CONFIG_PGO_CLANG=y" >> out/.config
          echo "CONFIG_DEBUG_FS=y" >> out/.config
          echo "CONFIG_LTO_CLANG_THIN=y" >> out/.config
          
          # Çakışan varsa sil
          sed -i '/^# CONFIG_PGO_CLANG is not set$/d' out/.config
          sed -i '/^CONFIG_CFI_CLANG=/d' out/.config
          
          # İsim
          scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-PGO-TRAIN"
          
          # Kaydet
          make O=out ARCH=arm64 LLVM=1 olddefconfig > /dev/null 2>&1
          
          echo ""
          echo "📊 Kontrol:"
          grep "^CONFIG_PGO_CLANG" out/.config
          grep "^CONFIG_DEBUG_FS" out/.config
          
          if ! grep -q "^CONFIG_PGO_CLANG=y" out/.config; then
            echo "❌ PGO aktif değil!"
            exit 1
          fi
          echo "✅ PGO aktif!"

      - name: Build Kernel
        run: |
          cd kernel
          export PATH="${{ env.LLVM_DIR }}:$PATH"
          
          echo "🚀 Derleme başlıyor ($(nproc) çekirdek)..."
          
          make -j$(nproc) O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld HOSTAR=llvm-ar \
            Image modules 2>&1 | tee compile.log
            
          [ -f out/arch/arm64/boot/Image ] || { echo "❌ Image yok!"; tail -50 compile.log; exit 1; }
          echo "✅ Tamamlandı!"

      - name: Package
        run: |
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/kernel.string=.*/kernel.string=PGO Training by Caglar/' anykernel.sh
          zip -r9 ../PGO-Training-Kernel.zip ./* -x '.git*'
          echo "ZIP_NAME=PGO-Training-Kernel.zip" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pgo-${{ github.run_number }}
          files: PGO-Training-Kernel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success
        if: success()
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║   ✅ PGO TRAINING KERNEL HAZIR       ║"
          echo "╚══════════════════════════════════════╝"
          echo ""
          echo "📦 ZIP: ${{ env.ZIP_NAME }}"
          echo ""
          echo "📱 PROFİL TOPLAMA:"
          echo "1. Flash → Boot"
          echo "2. su"
          echo "3. cat /sys/kernel/debug/pgo/profraw > /sdcard/pgo.profraw"
          echo "4. 30 dk ağır kullan (oyun/kamera)"
          echo "5. profraw dosyasını 2. aşamada kullan"
          echo ""
