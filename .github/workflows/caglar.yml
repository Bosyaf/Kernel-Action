name: caglar++ Total Ultimate V3 (Saf Full LTO)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Alanı Hazırla
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048

      - name: 0. Kaynakları Çek
        uses: actions/checkout@v4

      - name: 1. Gerekli Paketleri Kur ve ZyC Clang 22 İndir
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils rsync unzip dwarves bc cpio wget
          
          mkdir -p $GITHUB_WORKSPACE/clang
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang

      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: 3. VortexSU ve Yamalar (BBRv3 ve Ekstralar İPTAL)
        run: |
          cd common
          curl -LSs "https://raw.githubusercontent.com/Kingfinik98/VortexSU/refs/heads/main/kernel/setup.sh" | bash -s main
          
          # SUSFS Entegrasyonu Korundu
          git clone --depth=1 -q https://gitlab.com/simonpunk/susfs4ksu -b gki-android14-6.1 ../susfs
          cp -R ../susfs/kernel_patches/fs/* ./fs/
          cp -R ../susfs/kernel_patches/include/* ./include/
          patch -p1 --forward < ../susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true

      - name: 4. Full Kernel Config (Saf Full LTO & No Debug)
        run: |
          cd common
          CONFIG_FILE="arch/arm64/configs/gki_defconfig"
          
          # --- 300 HZ & FULL PREEMPT ---
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HZ_300
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT
          
          # --- FULL LTO AKTİVASYONU ---
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG_FULL
          
          # --- PROFESYONEL DEBUG TEMİZLİĞİ (RAM KURTARICI) ---
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_REDUCED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_COMPRESSED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_SPLIT
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF4
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF5
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_BTF
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEBUG_INFO_NONE

          # --- DİĞER PERFORMANS AYARLARI ---
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_WALT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-CG+"
          
          sed -i 's/check_defconfig//' build.config.gki || true

      - name: 5. OOM Koruması (10GB Workspace Swap Kalkanı)
        run: |
          SWAP_PATH="$GITHUB_WORKSPACE/swapfile"
          sudo fallocate -l 10G $SWAP_PATH || sudo dd if=/dev/zero of=$SWAP_PATH bs=1M count=10240
          sudo chmod 600 $SWAP_PATH
          sudo mkswap $SWAP_PATH
          sudo swapon $SWAP_PATH
          free -h

      - name: 6. Kernel Derleme (SAF FULL LTO)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          touch .scmversion
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="clang" gki_defconfig
          
          # Polly, PGO, BOLT çıkarıldı. Sadece O2 serinliği ve Full LTO saf gücü kaldı.
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" \
            LD=ld.lld \
            HOSTLD=ld.lld \
            KBUILD_LDFLAGS="--threads=1" \
            KCFLAGS="-O2 -funroll-loops -march=armv9-a+crypto -fno-semantic-interposition -fno-stack-protector" \
            Image
          
          echo "BOOTHASH=CG+-FULL-$(date +%s)" >> $GITHUB_ENV

      - name: 7. Paketleme
        run: |
          cd ./AnyKernel3
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../CG+-Saf-FullLTO-V3.zip" ./*

      - name: 8. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Saf Full LTO Makinesi"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
