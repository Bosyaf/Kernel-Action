name: PGO 1. Aşama (Training Kernel)

on:
  workflow_dispatch:

jobs:
  build-pgo-training:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 10240
          temp-reserve-mb: 2048
          swap-size-gb: 16
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. ZyC Clang İndir
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            git curl build-essential bc bison flex libssl-dev libelf-dev \
            cpio kmod wget xz-utils file tree python3
          
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc
          rm -f clang.tar.gz
          
          CLANG_BIN_PATH=$(find $GITHUB_WORKSPACE/clang-zyc -type d -name "bin" | head -n 1)
          echo "CLANG_BIN_PATH=$CLANG_BIN_PATH" >> $GITHUB_ENV
          $CLANG_BIN_PATH/clang --version

      - name: 2. Kernel Source İndir
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: 3. PGO Training Config
        run: |
          cd common
          make ARCH=arm64 gki_defconfig
          
          # SADECE PGO için kritik ayarlar
          scripts/config --file .config \
            --enable CONFIG_PGO_CLANG \
            --enable CONFIG_DEBUG_FS \
            --disable CONFIG_CFI_CLANG \
            --disable CONFIG_LTO_CLANG_FULL \
            --enable CONFIG_LTO_CLANG_THIN \
            --set-str CONFIG_LOCALVERSION "-PGO-TRAIN"
          
          make ARCH=arm64 olddefconfig
          
          # Doğrulama
          echo "=== PGO CONFIG DURUMU ==="
          grep "CONFIG_PGO_CLANG" .config
          grep "CONFIG_CFI_CLANG" .config
          grep "CONFIG_LTO_CLANG" .config
          grep "CONFIG_DEBUG_FS" .config
          grep "CONFIG_BTF" .config || echo "BTF yok"
          
          # PGO aktif mi?
          grep -q "CONFIG_PGO_CLANG=y" .config || { echo "❌ PGO aktif değil!"; exit 1; }
          echo "✅ PGO Training config hazır"

      - name: 4. Kernel Derle
        run: |
          cd common
          export PATH="${{ env.CLANG_BIN_PATH }}:$PATH"
          
          make -j$(nproc --all) O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            Image modules || { echo "❌ Derleme hatası!"; exit 1; }
          
          echo "✅ Derleme başarılı"
          ls -lh out/arch/arm64/boot/Image

      - name: 5. AnyKernel3 Hazırla
        run: |
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          zip -r9 "../PGO-Training-$(date +%Y%m%d-%H%M).zip" ./*
          cd ..
          ls -lh PGO-Training-*.zip

      - name: 6. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pgo-train-${{ github.run_number }}
          name: "🔬 PGO Training #${{ github.run_number }}"
          body: |
            ## PGO TRAINING KERNEL
            
            ### 📱 Nasıl Kullanılır:
            1. Flash yap, boot et
            2. 30-60 dakika yoğun kullan (oyun, kamera, benchmark)
            3. Root shell'de:
            ```bash
            su
            cat /sys/kernel/debug/pgo/profraw > /sdcard/pgo-profile.profraw
            ```
            4. Dosyayı PC'ye aktar
            
            ### ⚙️ Ayarlar:
            - ✅ PGO_CLANG: Aktif
            - ✅ DEBUG_FS: Aktif  
            - ❌ CFI: Kapalı
            - ✅ LTO_THIN: Aktif
            - ℹ️ KASAN/BTF: Defconfig ayarı (değiştirilmedi)
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
