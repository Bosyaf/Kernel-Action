name: CG+ Full LTO CFI Permissive

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          temp-reserve-mb: 512
          swap-size-gb: 64

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages + Google Clang r584948
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd zip

          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/mirror-goog-main-llvm-toolchain-source/clang-r584948.tar.gz"
          curl -fL "$CLANG_URL" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang"
          rm -f clang.tar.gz

      - name: Extreme Memory Setup
        run: |
          # zram 20GB
          sudo modprobe zram num_devices=1 2>/dev/null || true
          if [ -e /sys/block/zram0/disksize ]; then
            sudo swapoff /dev/zram0 2>/dev/null || true
            echo 1 | sudo tee /sys/block/zram0/reset >/dev/null 2>&1 || true
            echo lz4 | sudo tee /sys/block/zram0/comp_algorithm >/dev/null 2>&1 || true
            echo 20G | sudo tee /sys/block/zram0/disksize >/dev/null
            sudo mkswap /dev/zram0
            sudo swapon -p 100 /dev/zram0
          fi

          # Agresif bellek
          sudo sysctl -w vm.overcommit_memory=1
          sudo sysctl -w vm.overcommit_ratio=200
          sudo sysctl -w vm.swappiness=200
          sudo sysctl -w vm.vfs_cache_pressure=500
          sudo sysctl -w vm.dirty_ratio=3
          sudo sysctl -w vm.dirty_background_ratio=1
          sudo sysctl -w vm.max_map_count=2097152
          sudo sysctl -w vm.page-cluster=0

          echo "📊 Bellek:"
          free -h
          echo "📊 Swap:"
          swapon --show

      - name: Clone sources
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: Setup VortexSU
        run: |
          cd common
          curl -LSs "https://raw.githubusercontent.com/Kingfinik98/VortexSU/refs/heads/main/kernel/setup.sh" | bash -s main

      - name: Configure
        run: |
          cd common

          find . -path './out' -prune -o -name 'Kconfig*' -print | xargs sed -i '/select KCFI/d' 2>/dev/null || true
          find . -path './out' -prune -o -name 'Kconfig*' -print | xargs sed -i '/select ARCH_USES_CFI_TRAPS/d' 2>/dev/null || true

          C="arch/arm64/configs/gki_defconfig"

          ./scripts/config --file $C --set-str CONFIG_CMDLINE "console=ttynull stack_depot_disable=on cgroup_disable=pressure kasan.page_alloc.sample=10 kasan.stacktrace=off kvm-arm.mode=protected bootconfig ioremap_guard kpti=0 swiotlb=noforce kernel.panic_on_rcu_stall=1 rcupdate.rcu_expedited=1 cpufreq.default_governor=performance sysctl.kernel.sched_pelt_multiplier=4 kasan=off slub_debug=-"
          ./scripts/config --file $C --enable CONFIG_CMDLINE_EXTEND

          ./scripts/config --file $C --enable CONFIG_NO_HZ
          ./scripts/config --file $C --disable CONFIG_HZ_100
          ./scripts/config --file $C --enable CONFIG_HZ_250
          ./scripts/config --file $C --disable CONFIG_HZ_300
          ./scripts/config --file $C --disable CONFIG_PREEMPT_NONE
          ./scripts/config --file $C --enable CONFIG_PREEMPT
          ./scripts/config --file $C --enable CONFIG_PREEMPT_BUILD
          ./scripts/config --file $C --enable CONFIG_SCHED_MC

          ./scripts/config --file $C --enable CONFIG_SLUB
          ./scripts/config --file $C --enable CONFIG_SLUB_DEBUG
          ./scripts/config --file $C --disable CONFIG_SLUB_DEBUG_ON
          ./scripts/config --file $C --enable CONFIG_SLAB_FREELIST_RANDOM
          ./scripts/config --file $C --enable CONFIG_SLAB_FREELIST_HARDENED
          ./scripts/config --file $C --enable CONFIG_CMA
          ./scripts/config --file $C --enable CONFIG_DMA_CMA

          ./scripts/config --file $C --enable CONFIG_INIT_STACK_ALL_ZERO
          ./scripts/config --file $C --enable CONFIG_INIT_ON_ALLOC_DEFAULT_ON
          ./scripts/config --file $C --enable CONFIG_SECURITY_SELINUX
          ./scripts/config --file $C --enable CONFIG_DEFAULT_SECURITY_SELINUX

          ./scripts/config --file $C --enable CONFIG_EXT4_FS
          ./scripts/config --file $C --enable CONFIG_F2FS_FS
          ./scripts/config --file $C --enable CONFIG_EROFS_FS
          ./scripts/config --file $C --enable CONFIG_OVERLAY_FS

          ./scripts/config --file $C --enable CONFIG_KPROBES
          ./scripts/config --file $C --enable CONFIG_KPROBE_EVENTS

          # FULL LTO
          ./scripts/config --file $C --disable CONFIG_LTO_NONE
          ./scripts/config --file $C --disable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file $C --enable CONFIG_LTO_CLANG
          ./scripts/config --file $C --enable CONFIG_LTO_CLANG_FULL
          ./scripts/config --file $C --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE

          # CFI PERMISSIVE
          ./scripts/config --file $C --enable CONFIG_CFI_CLANG
          ./scripts/config --file $C --enable CONFIG_CFI_PERMISSIVE
          ./scripts/config --file $C --disable CONFIG_KCFI
          ./scripts/config --file $C --disable CONFIG_SHADOW_CALL_STACK

          # KMI
          ./scripts/config --file $C --enable CONFIG_UNUSED_SYMBOLS
          ./scripts/config --file $C --disable CONFIG_TRIM_UNUSED_KSYMS
          ./scripts/config --file $C --disable CONFIG_MODVERSIONS
          ./scripts/config --file $C --enable CONFIG_MODULE_FORCE_LOAD

          # Debug kapat
          ./scripts/config --file $C --disable CONFIG_DEBUG_INFO

          ./scripts/config --file $C --set-str CONFIG_LOCALVERSION "-FullLTO-CFI-Perm"
          ./scripts/config --file $C --disable CONFIG_LOCALVERSION_AUTO
          sed -i 's/check_defconfig//' build.config.gki || true

      - name: Build
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"

          sed -i 's/^PHONY += all/  /g' Makefile || true
          touch .scmversion

          echo "CFLAGS_module.o += -fno-lto" >> kernel/Makefile

          cat << 'EOF' > scripts/check-local-export
          #!/bin/sh
          exit 0
          EOF
          chmod +x scripts/check-local-export

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            gki_defconfig

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            olddefconfig

          echo "=== CONFIG ==="
          grep -E "LTO_CLANG_FULL|CFI_PERMISSIVE|KCFI" out/.config

          sync && echo 3 | sudo tee /proc/sys/vm/drop_caches >/dev/null
          free -h

          # -j1: CFI RAM ihtiyacı yüksek
          make -j1 O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            KCFLAGS="-O2 -march=armv9.2-a+crypto+crc -Wno-constant-logical-operand" \
            LDFLAGS_vmlinux="--export-dynamic" \
            Image || { echo "❌ FAIL"; free -h; exit 1; }

          echo "BOOTHASH=FullLTO-CFI-Perm-$(date +%s)" >> $GITHUB_ENV

      - name: Pack
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Full LTO CFI Permissive/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji' anykernel.sh
          cp ../common/out/arch/arm64/boot/Image .
          zip -r ../CG-FullLTO-CFI-Perm.zip ./*

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Full LTO CFI Permissive"
          files: "CG-FullLTO-CFI-Perm.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
