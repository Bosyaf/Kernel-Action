name: caglar++ Total Ultimate V4 (MiCode & Google Clang - No KSU)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Alanı Hazırla (Bazel Çok Yer İster)
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048

      - name: 0. Gerekli Paketleri Kur ve Bazel (Bazelisk) Ayarla
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils rsync unzip dwarves bc cpio wget
          
          echo ">>> Bazel (Bazelisk) Kuruluyor..."
          wget -q https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x bazelisk-linux-amd64
          sudo mv bazelisk-linux-amd64 /usr/local/bin/bazel
          bazel --version

      - name: 1. Orijinal Google AOSP Clang İndir (r547379)
        run: |
          echo ">>> Resmi Google AOSP Clang r547379 çekiliyor..."
          mkdir -p $GITHUB_WORKSPACE/clang
          cd $GITHUB_WORKSPACE/clang
          git init
          git remote add origin https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86
          git config core.sparseCheckout true
          echo "clang-r547379/" >> .git/info/sparse-checkout
          git pull origin main --depth=1

      - name: 2. Resmi MiCode Kaynaklarını Çek (Shennong / Houji)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          # Resmi Xiaomi Açık Kaynak Reposu (common klasörüne çıkarılır)
          git clone https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b shennong-u-oss --depth=1 common

      - name: 3. Hata Fixleri (BPF & KVM)
        run: |
          cd common
          # Kaynak kod derleme hatalarını baştan eziyoruz
          sed -i -E 's/u64_to_user_ptr\(([^)]+)\)/u64_to_user_ptr((__u64)(\1))/g' kernel/bpf/syscall.c || true
          sed -i 's/u64 clidr;/u64 clidr = 0;/g' arch/arm64/kvm/sys_regs.c || true

      - name: 4. BBG Zırhı (Anti-Brick)
        run: |
          cd common
          echo ">>> BBG Zırhı Enjekte Ediliyor..."
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' security/Kconfig || true

      - name: 5. Nokta Atışı Config Mermileri (Senin Verdiğin Yollar)
        run: |
          cd common
          
          # Enjekte edilecek mermiler
          cat << 'EOF' > custom_configs.txt
          # CG+ Asya Zırhı & Performans (ThinLTO)
          CONFIG_HZ_300=y
          CONFIG_PREEMPT=y
          CONFIG_PREEMPT_BUILD=y
          CONFIG_LTO_CLANG_THIN=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_DEFAULT_TCP_CONG="bbr"
          CONFIG_NET_SCH_CAKE=y
          CONFIG_DEFAULT_NET_SCH="cake"
          CONFIG_WIREGUARD=y
          CONFIG_BBG=y
          # Çöpleri Temizle
          # CONFIG_PGO_CLANG is not set
          # CONFIG_DEBUG_INFO_REDUCED is not set
          # CONFIG_DEBUG_INFO_COMPRESSED is not set
          EOF
          
          echo ">>> Doğrudan senin verdiğin adreslere enjeksiyon yapılıyor..."
          cat custom_configs.txt >> arch/arm64/configs/gki_defconfig
          cat custom_configs.txt >> arch/arm64/configs/vendor/houji_GKI.config
          cat custom_configs.txt >> arch/arm64/configs/vendor/pineapple_GKI.config
          cat custom_configs.txt >> arch/arm64/configs/vendor/houji_consolidate.config
          echo ">>> Config enjeksiyonu TAMAM!"

      - name: 6. BAZEL / KLEAF Derlemeyi Başlat (Ana Operasyon)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/clang-r547379/bin:$PATH"
          export LLVM=1
          
          echo ">>> Python Bazel Builder Tetikleniyor (Hedef: houji gki)..."
          # Eksik parametre hatası çözüldü (TARGET ve VARIANT)
          python3 build_with_bazel.py -t houji gki || python3 build_with_bazel.py -t houji user
          
          echo "BOOTHASH=CG+-Houji-Bazel-$(date +%s)" >> $GITHUB_ENV

      - name: 7. Image Dosyasını Bul ve Paketle (Arama-Kurtarma)
        run: |
          cd common
          IMAGE_PATH=$(find out/ bazel-bin/ -name "Image" -type f | head -n 1)
          
          if [ -z "$IMAGE_PATH" ]; then
            echo "HATA: Image dosyası bulunamadı! Bazel derlemeyi tamamlayamamış."
            exit 1
          fi
          
          echo ">>> Image bulundu: $IMAGE_PATH"
          cp "$IMAGE_PATH" ../AnyKernel3/
          
          cd ../AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Houji MiCode (No KSU)/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          zip -r "../CG+-Houji-Ultimate-V4-NoKSU.zip" ./*

      - name: 8. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Houji V4 (Resmi MiCode - No KSU)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
