name: caglar++ Total Ultimate V4 (Deepongi Source & Mi 14)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU varyantı seçin'
        required: true
        default: 'next'
        type: choice
        options:
          - next
          - tiann
          - kowsu
          - resukisu

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Alanı Hazırla
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048

      - name: 0. Gerekli Paketleri Kur ve Profesyonel Toolchain Hazırla
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils rsync unzip dwarves bc cpio wget
          
          mkdir -p $GITHUB_WORKSPACE/toolchain
          
          # Clang 23 & ARM GNU 15.2 (Deepongi standartlarına uygun en güncel ZyC sürümü)
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/toolchain

      - name: 1. Deepongi GKI Kaynağını Çek (Google Official)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          # Deepongi'nin kullandığı resmi Google GKI 6.1 dalı
          git clone --depth=1 --branch=android14-6.1-2026-03 https://android.googlesource.com/kernel/common common

      - name: 2. KernelSU Varyant Enjeksiyonu
        run: |
          cd common
          case "${{ github.event.inputs.ksu_variant }}" in
            "tiann") KSU_REPO="tiann/KernelSU"; KSU_BRANCH="main" ;;
            "kowsu") KSU_REPO="KOWX712/KernelSU"; KSU_BRANCH="master" ;;
            "resukisu") KSU_REPO="ReSukiSU/ReSukiSU"; KSU_BRANCH="main" ;;
            "next") KSU_REPO="KernelSU-Next/KernelSU-Next"; KSU_BRANCH="dev" ;;
          esac
          
          git clone --depth=1 --branch=$KSU_BRANCH https://github.com/$KSU_REPO.git drivers/kernelsu
          echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: 3. Deepongi Profesyonel Fixler & ABI Bypass
        run: |
          cd common
          # GKI ABI Koruma Sınırlarını Kaldır
          rm -f android/abi_gki_protected_exports_* || true
          
          # CLIDR uninitialized fix (Deepongi Patch)
          curl -LSs "https://raw.githubusercontent.com/infectedmushi/kernel_patches/main/fix-clidr-uninitialized.patch" | patch -p1 || true
          
          # libbpf.c tip dönüşüm fix
          sed -i 's/next_path = strchr(s, '"'"':'"'"');/next_path = (char *)strchr(s, '"'"':'"'"');/' tools/lib/bpf/libbpf.c
          
          # Dirty version temizliği
          sed -i '/# Check for uncommitted changes\./,/fi/d' ./scripts/setlocalversion

      - name: 4. SuSFS Master (GKI 6.1 Uyumlu)
        run: |
          cd common
          git clone --depth=1 -q https://gitlab.com/simonpunk/susfs4ksu -b gki-android14-6.1 ../susfs
          cp ../susfs/kernel_patches/fs/susfs.c fs/
          cp ../susfs/kernel_patches/include/linux/susfs.h include/linux/
          cp ../susfs/kernel_patches/include/linux/susfs_def.h include/linux/
          
          patch -p1 --forward < ../susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true
          
          cd drivers/kernelsu
          patch -p1 --forward < ../../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || true

      - name: 5. Mi 14 & Deepongi Karma Config
        run: |
          cd common
          CONFIG_FILE="arch/arm64/configs/gki_defconfig"
          
          # Deepongi'den gelen 48-bit VA ve Net optimizasyonları + Senin Mi 14 ayarların
          cat << 'EOF' >> $CONFIG_FILE
          CONFIG_ARM64_VA_BITS=48
          CONFIG_HZ_300=y
          CONFIG_PREEMPT=y
          CONFIG_LTO_CLANG_THIN=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_NET_SCH_CAKE=y
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_LOCALVERSION="-CG+"
          EOF
          
          sed -i 's/check_defconfig//' build.config.gki || true

      - name: 6. Build (O3 + Polly + Unroll)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          
          make O=out gki_defconfig
          
          # Deepongi Flags + Polly Turbo
          make -j$(nproc --all) O=out \
            KCFLAGS="-O3 -funroll-loops -march=armv9-a+crypto -mllvm -polly -mllvm -polly-ast-use-context -fno-stack-protector" \
            Image
          
          echo "BOOTHASH=CG+-GKI-$(date +%s)" >> $GITHUB_ENV

      - name: 7. Paketleme
        run: |
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Death Machine v4 (GKI Source)/' anykernel.sh
          zip -r "../CG+-Mi14-GKI-V4.zip" ./*

      - name: 8. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Mi14 V4 (Deepongi Source Edition)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
