name: CG+ ZyC PGO Debug Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  pgo-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd

          echo "🔥 ZyC Clang 22 indiriliyor"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"

          curl -fLSs "$CLANG_URL" -o clang.tar.gz || { echo "❌ Clang indirilemedi"; exit 1; }

          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc
          rm -f clang.tar.gz

          echo "🔍 llvm-profgen kontrol:"
          $GITHUB_WORKSPACE/clang-zyc/bin/llvm-profgen --version || true

      - name: 1.5 perf Aracı Kontrol
        run: |
          if command -v perf >/dev/null 2>&1; then
            echo "✅ perf zaten mevcut"
            perf --version || true
            exit 0
          fi

          echo "⚠️ perf sistemde yok, kurulmaya çalışılıyor..."
          sudo apt update -qq
          sudo apt install -y linux-tools-common linux-tools-generic || true

          if command -v perf >/dev/null 2>&1; then
            echo "✅ perf kuruldu"
            perf --version || true
            exit 0
          fi

          echo "❌ perf aracı bulunamadı"
          exit 1

      - name: 2. PGO Assetlerini İndir
        run: |
          mkdir -p $GITHUB_WORKSPACE/pgo
          cd $GITHUB_WORKSPACE/pgo

          echo "📥 perf.tar.xz indiriliyor..."
          curl -fL "https://github.com/Bosyaf/Kernel-Action/releases/download/pgo-assets-v1/perf.tar.xz" -o perf.tar.xz

          echo "📥 vmlinux.tar.xz indiriliyor..."
          curl -fL "https://github.com/Bosyaf/Kernel-Action/releases/download/pgo-assets-v1/vmlinux.tar.xz" -o vmlinux.tar.xz

          echo "📦 Arşivler açılıyor..."
          tar -xJf perf.tar.xz
          tar -xJf vmlinux.tar.xz

          echo "📁 PGO klasör içeriği:"
          ls -lah
          echo "📊 Boyutlar:"
          du -sh ./*

      - name: 3. perf.script Üret ve Debugla
        run: |
          cd $GITHUB_WORKSPACE/pgo
          mkdir -p out

          echo "🔍 perf kontrol"
          command -v perf
          perf --version || true

          echo "🔍 perf.data aranıyor..."
          PERF_DATA="$(find . -type f -path '*/sdcard/perf.data' | head -n 1)"
          if [ -z "$PERF_DATA" ]; then
            PERF_DATA="$(find . -type f -name 'perf.data' | head -n 1)"
          fi

          if [ -z "$PERF_DATA" ]; then
            echo "❌ perf.data bulunamadı"
            find . -maxdepth 5 -type f | sort | head -200
            exit 1
          fi

          echo "✅ perf.data bulundu: $PERF_DATA"

          if [ ! -f vmlinux ]; then
            echo "❌ vmlinux bulunamadı"
            find . -maxdepth 3 -type f | sort | head -200
            exit 1
          fi

          echo "✅ vmlinux bulundu"

          echo "📝 perf.script üretiliyor..."
          perf script -i "$PERF_DATA" > perf.script || { echo "❌ perf script üretilemedi"; exit 1; }

          echo "📏 perf.script boyutu:"
          ls -lh perf.script
          du -sh perf.script || true

          echo "===== perf.script first 100 lines ====="
          head -100 perf.script || true

          echo "===== perf.script first 300 non-empty lines ====="
          grep -n . perf.script | head -300 || true

      - name: 4. llvm-profgen Denemesi
        run: |
          cd $GITHUB_WORKSPACE/pgo
          mkdir -p out

          LLVM_PROFGEN="$GITHUB_WORKSPACE/clang-zyc/bin/llvm-profgen"
          if [ ! -x "$LLVM_PROFGEN" ]; then
            LLVM_PROFGEN="$(command -v llvm-profgen || true)"
          fi

          if [ -z "$LLVM_PROFGEN" ]; then
            echo "❌ llvm-profgen bulunamadı"
            exit 1
          fi

          echo "🔍 llvm-profgen:"
          "$LLVM_PROFGEN" --version || true

          echo "🧠 kernel.prof üretiliyor..."
          set +e
          "$LLVM_PROFGEN" \
            --perfscript=perf.script \
            --binary=vmlinux \
            --output=out/kernel.prof > out/llvm-profgen.stdout 2> out/llvm-profgen.stderr
          RET=$?
          set -e

          echo "llvm-profgen exit code: $RET"

          echo "===== llvm-profgen stdout ====="
          cat out/llvm-profgen.stdout || true

          echo "===== llvm-profgen stderr ====="
          cat out/llvm-profgen.stderr || true

          if [ -f out/kernel.prof ]; then
            echo "✅ kernel.prof oluştu"
            ls -lah out/kernel.prof
            du -sh out/kernel.prof || true
          else
            echo "⚠️ kernel.prof oluşmadı"
          fi

          exit 0

      - name: 5. Debug Dosyalarını Upload Et
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pgo-debug-artifacts
          path: |
            ${{ github.workspace }}/pgo/perf.script
            ${{ github.workspace }}/pgo/out/llvm-profgen.stdout
            ${{ github.workspace }}/pgo/out/llvm-profgen.stderr
            ${{ github.workspace }}/pgo/out/kernel.prof
          if-no-files-found: warn
