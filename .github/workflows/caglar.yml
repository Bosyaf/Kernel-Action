name: PGO 1. Asama (Training Kernel)

on:
  workflow_dispatch:

jobs:
  build-pgo-training:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 10240
          temp-reserve-mb: 2048
          swap-size-gb: 16
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. ZyC Clang İndir
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            git curl build-essential bc bison flex libssl-dev libelf-dev \
            cpio kmod wget xz-utils file tree
          
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc
          rm -f clang.tar.gz
          
          CLANG_BIN_PATH=$(find $GITHUB_WORKSPACE/clang-zyc -type d -name "bin" | head -n 1)
          echo "CLANG_BIN_PATH=$CLANG_BIN_PATH" >> $GITHUB_ENV
          $CLANG_BIN_PATH/clang --version

      - name: 2. Kernel Source İndir
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: 3. PGO Training İçin Config Ayarları
        run: |
          cd common
          # Ana defconfig'i oluştur
          make ARCH=arm64 gki_defconfig
          
          # PGO Profilleme için KRİTİK ayarlar
          scripts/config --file .config \
            --enable CONFIG_PGO_CLANG \
            --enable CONFIG_DEBUG_FS \
            --disable CONFIG_CFI_CLANG \
            --disable CONFIG_LTO_CLANG_FULL \
            --enable CONFIG_LTO_CLANG_THIN \
            --set-str CONFIG_LOCALVERSION "-PGO-TRAINING"
          
          # Ayarları doğrula ve kaydet
          make ARCH=arm64 olddefconfig

      - name: 4. PGO Training Kernel Derleme
        run: |
          cd common
          export PATH="${{ env.CLANG_BIN_PATH }}:$PATH"
          
          # Kernel PGO veri toplama modunda derleniyor
          make -j$(nproc --all) O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            KCFLAGS="-O2 -march=armv9-a+crypto+sha3" \
            Image || { echo "❌ Derleme HATASI! Loglara bak."; exit 1; }

      - name: 5. AnyKernel3 Zip Hazırlama
        run: |
          if [ -f common/out/arch/arm64/boot/Image ]; then
            cp common/out/arch/arm64/boot/Image AnyKernel3/
            cd AnyKernel3
            sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
            zip -r9 "../PGO-Training-Kernel.zip" ./*
          else
            echo "❌ Image dosyası bulunamadı, paketleme iptal!"
            exit 1
          fi

      - name: 6. GitHub Release'e Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pgo-training-${{ github.run_number }}
          name: "PGO Training Build"
          body: |
            ⚠️ **DİKKAT:** Bu kernel günlük kullanım için değil, PGO profil verisi toplamak içindir!
            1. Cihaza flashlayın.
            2. Ağır oyunlar/uygulamalar açıp test edin.
            3. `/sys/kernel/debug/pgo/profraw` dosyasını PC'ye/GitHub'a alın.
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
