name: CG+ ZyC PGO Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZYC CLANG Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd

          echo "🔥 ZyC Clang 22 indiriliyor"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"

          curl -fLSs "$CLANG_URL" -o clang.tar.gz || { echo "❌ Clang indirilemedi"; exit 1; }

          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc
          rm -f clang.tar.gz

          echo "🔍 llvm-profgen kontrol:"
          $GITHUB_WORKSPACE/clang-zyc/bin/llvm-profgen --version || true

      - name: 1.5 perf Aracı Kontrol
        run: |
          if command -v perf >/dev/null 2>&1; then
            echo "✅ perf zaten mevcut"
            perf --version || true
            exit 0
          fi

          echo "⚠️ perf sistemde yok, kurulmaya çalışılıyor..."
          sudo apt update -qq
          sudo apt install -y linux-tools-common linux-tools-generic || true

          if command -v perf >/dev/null 2>&1; then
            echo "✅ perf kuruldu"
            perf --version || true
            exit 0
          fi

          echo "❌ perf aracı bulunamadı"
          exit 1

      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: 3. PGO Assetlerini İndir
        run: |
          mkdir -p $GITHUB_WORKSPACE/pgo
          cd $GITHUB_WORKSPACE/pgo

          echo "📥 perf.tar.xz indiriliyor..."
          curl -fL "https://github.com/Bosyaf/Kernel-Action/releases/download/pgo-assets-v1/perf.tar.xz" -o perf.tar.xz

          echo "📥 vmlinux.tar.xz indiriliyor..."
          curl -fL "https://github.com/Bosyaf/Kernel-Action/releases/download/pgo-assets-v1/vmlinux.tar.xz" -o vmlinux.tar.xz

          echo "📦 Arşivler açılıyor..."
          tar -xJf perf.tar.xz
          tar -xJf vmlinux.tar.xz

          echo "📁 PGO klasör içeriği:"
          ls -lah
          echo "📊 Boyutlar:"
          du -sh ./*

      - name: 4. PGO Profile Üret
        run: |
          cd $GITHUB_WORKSPACE/pgo
          mkdir -p out

          echo "🔍 perf kontrol"
          command -v perf
          perf --version || true

          LLVM_PROFGEN="$GITHUB_WORKSPACE/clang-zyc/bin/llvm-profgen"
          if [ ! -x "$LLVM_PROFGEN" ]; then
            LLVM_PROFGEN="$(command -v llvm-profgen || true)"
          fi

          if [ -z "$LLVM_PROFGEN" ]; then
            echo "❌ llvm-profgen bulunamadı"
            exit 1
          fi

          echo "📝 perf.script üretiliyor..."
          perf script -i perf.data > perf.script || { echo "❌ perf script üretilemedi"; exit 1; }

          echo "🧠 kernel.prof üretiliyor..."
          "$LLVM_PROFGEN" \
            --perfscript=perf.script \
            --binary=vmlinux \
            --output=out/kernel.prof || { echo "❌ kernel.prof üretilemedi"; exit 1; }

          echo "✅ kernel.prof oluştu"
          ls -lah out
          du -sh out/*

      - name: 5. Kernel Config
        run: |
          cd common
          CONFIG_FILE="arch/arm64/configs/gki_defconfig"

          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-C-G++-PGO"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCALVERSION_AUTO
          sed -i 's/check_defconfig//' build.config.gki || true

      - name: 6. Kernel Derleme (PGO)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          sed -i 's/^PHONY += all/  /g' Makefile || true
          touch .scmversion

          cat << 'EOF' > scripts/check-local-export
          #!/bin/sh
          exit 0
          EOF
          chmod +x scripts/check-local-export

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            gki_defconfig

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            olddefconfig

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 -fno-stack-protector -fomit-frame-pointer -fno-unwind-tables -Wno-constant-logical-operand -fprofile-sample-use=$GITHUB_WORKSPACE/pgo/out/kernel.prof" \
            Image || { echo "❌ PGO Derleme HATASI!"; exit 1; }

          echo "BOOTHASH=PGO-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: 7. AnyKernel3 Paketleme
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ ZyC PGO Kernel/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh

          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../CG-ZyC-PGO.zip" ./*

      - name: 8. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ ZyC PGO Kernel"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
