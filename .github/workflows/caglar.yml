name: CG+ Gaming Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      DEVICE: "houji"
      KERNEL_NAME: "CG+GamingKernel"

    steps:
      - name: 🔧 Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 10240
          temp-reserve-mb: 2048
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates clang cmake curl \
            flex git gnupg gperf imagemagick lib32ncurses5-dev \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses5 \
            libncurses5-dev libsdl1.2-dev libssl-dev libxml2 \
            libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev libelf-dev pkg-config python3 \
            python3-pip wget unzip cpio kmod llvm lld gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi libarchive-tools zstd dwarves

      - name: 🔥 Setup ZyCromerZ Clang
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          
          echo "⬇️ Fetching latest Clang link..."
          CLANG_URL=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          
          echo "📥 Downloading Clang: $CLANG_URL"
          wget -q --show-progress "$CLANG_URL" -O clang.tar.gz
          
          echo "📂 Extracting Clang..."
          tar -xzf clang.tar.gz
          rm -f clang.tar.gz
          
          echo "✅ Clang setup completed"
          ls -la

      - name: 📱 Clone Kernel Source
        run: |
          cd $HOME
          echo "🔽 Cloning Xiaomi Mi 14 kernel source..."
          git clone --depth=1 https://github.com/mvaisakh/xiaomi14 -b kplatform kernel
          cd kernel
          echo "✅ Source cloned successfully"
          ls -la

      - name: 🛡️ Setup VortexSU
        run: |
          cd $HOME/kernel
          echo "🔽 Installing VortexSU..."
          curl -LSs "https://raw.githubusercontent.com/Kingfinik98/VortexSU/refs/heads/main/kernel/setup.sh" | bash -s main
          echo "✅ VortexSU installed"

      - name: 📡 Apply Wi-Fi Patch
        continue-on-error: true
        run: |
          cd $HOME/kernel
          echo "📥 Downloading Wi-Fi patch..."
          curl -fLSs https://github.com/OnePlus-12-Development/android_kernel_qcom_sm8650/commit/3e0cb08.patch > wifi.patch
          
          if [ -s wifi.patch ] && grep -q "diff" wifi.patch; then
            echo "🔧 Applying Wi-Fi patch..."
            git apply --check wifi.patch && git apply wifi.patch || patch -p1 < wifi.patch || true
            echo "✅ Wi-Fi patch applied (or skipped if incompatible)"
          else
            echo "⚠️ Wi-Fi patch download failed or empty, skipping..."
          fi

      - name: 🔐 Setup SUSFS
        run: |
          cd $HOME/kernel
          
          echo "🔽 Cloning SUSFS..."
          git clone --depth=1 -q https://gitlab.com/simonpunk/susfs4ksu -b gki-android14-6.1 $HOME/susfs
          
          echo "📋 Copying SUSFS files..."
          cp -rf $HOME/susfs/kernel_patches/fs/* ./fs/ 2>/dev/null || true
          cp -rf $HOME/susfs/kernel_patches/include/* ./include/ 2>/dev/null || true
          
          echo "🔧 Applying SUSFS main patch..."
          patch -p1 --forward < $HOME/susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true
          
          echo "🔽 Cloning build-vortex for additional patches..."
          git clone --depth=1 https://github.com/Kingfinik98/build-vortex.git $HOME/build-vortex
          
          echo "🔧 Applying proc_base patch..."
          patch -p1 --forward < $HOME/build-vortex/kernel-patches/susfs/fs_proc_base.c-fix-k6.1.patch || true
          
          echo "💉 Injecting namespace code..."
          cat << 'NSEOF' > /tmp/ns_inject.h
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT
          #include <linux/susfs_def.h>
          extern bool susfs_is_current_ksu_domain(void);
          extern bool susfs_is_current_zygote_domain(void);
          extern bool susfs_is_boot_completed_triggered;
          extern bool susfs_is_sdcard_android_data_decrypted;
          static DEFINE_IDA(susfs_mnt_id_ida);
          static DEFINE_IDA(susfs_mnt_group_ida);
          #define CL_COPY_MNT_NS BIT(25)
          #endif
          NSEOF
          
          sed -i '/#include "internal.h"/r /tmp/ns_inject.h' ./fs/namespace.c || true
          
          echo "🔧 Fixing statfs.c genksyms..."
          sed -i '/#include <linux\/susfs_def.h>/i #ifndef __GENKSYMS__' fs/statfs.c 2>/dev/null || true
          sed -i '/#include <linux\/susfs_def.h>/a #endif' fs/statfs.c 2>/dev/null || true
          
          echo "✅ SUSFS setup completed"

      - name: ⚙️ Configure Kernel
        run: |
          cd $HOME/kernel
          
          echo "🔧 Configuring kernel options..."
          
          # SUSFS Features
          scripts/config --file arch/arm64/configs/gki_defconfig \
            --enable CONFIG_KSU_SUSFS \
            --enable CONFIG_KSU_SUSFS_SUS_PATH \
            --enable CONFIG_KSU_SUSFS_SUS_MOUNT \
            --enable CONFIG_KSU_SUSFS_SUS_KSTAT \
            --enable CONFIG_KSU_SUSFS_SUS_OVERLAYFS \
            --enable CONFIG_KSU_SUSFS_TRY_UMOUNT \
            --enable CONFIG_KSU_SUSFS_SPOOF_UNAME \
            --enable CONFIG_KSU_SUSFS_ENABLE_LOG
          
          # Kernel Identity
          scripts/config --file arch/arm64/configs/gki_defconfig \
            --set-str CONFIG_LOCALVERSION "-CG++" \
            --disable CONFIG_LOCALVERSION_AUTO
          
          # Disable defconfig check
          sed -i 's/check_defconfig//' build.config.gki 2>/dev/null || true
          sed -i 's/check_defconfig//' build.config.gki.aarch64 2>/dev/null || true
          
          echo "✅ Kernel configured"

      - name: 🏗️ Build Kernel
        run: |
          cd $HOME/kernel
          
          export PATH="$HOME/clang/bin:$PATH"
          export KBUILD_BUILD_USER="${KBUILD_BUILD_USER}"
          export KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}"
          
          echo "🔨 Starting kernel compilation..."
          echo "Clang version:"
          clang --version
          
          # Try bazel build first
          if [ -f "tools/bazel" ]; then
            echo "🔨 Building with Bazel..."
            tools/bazel run --config=fast --config=stamp //common:kernel_aarch64_dist || BUILD_FAILED=1
          fi
          
          # Fallback to traditional build
          if [ ! -z "$BUILD_FAILED" ] || [ ! -f "tools/bazel" ]; then
            echo "🔨 Building with make..."
            
            make ARCH=arm64 \
              LLVM=1 \
              LLVM_IAS=1 \
              CC=clang \
              LD=ld.lld \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              O=out \
              gki_defconfig
            
            make ARCH=arm64 \
              LLVM=1 \
              LLVM_IAS=1 \
              CC=clang \
              LD=ld.lld \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              O=out \
              -j$(nproc --all)
          fi
          
          echo "✅ Kernel compilation completed"

      - name: 🔍 Locate Kernel Image
        id: locate
        run: |
          cd $HOME/kernel
          
          # Search for Image file
          KERNEL_IMG=$(find . -name "Image" -type f | head -n 1)
          
          if [ -z "$KERNEL_IMG" ]; then
            echo "❌ Kernel Image not found!"
            exit 1
          fi
          
          echo "✅ Found kernel: $KERNEL_IMG"
          echo "KERNEL_PATH=$KERNEL_IMG" >> $GITHUB_OUTPUT
          
          # Copy to common location
          mkdir -p $HOME/kernel_out
          cp "$KERNEL_IMG" $HOME/kernel_out/Image
          
          # Also copy dtb/dtbo if exists
          find . -name "*.dtb" -exec cp {} $HOME/kernel_out/ \; 2>/dev/null || true
          find . -name "dtbo.img" -exec cp {} $HOME/kernel_out/ \; 2>/dev/null || true

      - name: 📦 Prepare AnyKernel3
        run: |
          cd $HOME
          
          echo "🔽 Cloning AnyKernel3..."
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          
          cd AnyKernel3
          
          echo "📝 Configuring AnyKernel3..."
          cat > anykernel.sh << 'AKEOF'
          # AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers
          
          ## AnyKernel setup
          properties() { '
          kernel.string=CG+ Gaming Kernel by caglar @ guvenc
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=houji
          device.name2=Mi14
          device.name3=2311DRN6C
          supported.versions=14-15
          supported.patchlevels=
          '; }
          
          ## AnyKernel methods (DO NOT CHANGE)
          # import patching functions/variables - see for reference
          . tools/ak3-core.sh
          
          ## AnyKernel boot install
          dump_boot
          
          # begin ramdisk changes
          
          # end ramdisk changes
          
          write_boot
          AKEOF
          
          echo "📋 Copying kernel files..."
          cp $HOME/kernel_out/Image ./
          
          echo "✅ AnyKernel3 prepared"

      - name: 📦 Create Flashable ZIP
        id: package
        run: |
          cd $HOME/AnyKernel3
          
          DATE=$(date +%Y%m%d-%H%M)
          ZIP_NAME="${KERNEL_NAME}-${DEVICE}-${DATE}.zip"
          
          echo "📦 Creating ZIP: $ZIP_NAME"
          zip -r9 "$ZIP_NAME" * -x .git README.md *placeholder
          
          echo "✅ ZIP created successfully"
          echo "ZIP_FILE=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "ZIP_PATH=$HOME/AnyKernel3/$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: 📤 Upload Kernel ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.ZIP_FILE }}
          path: ${{ steps.package.outputs.ZIP_PATH }}
          if-no-files-found: error

      - name: 🎉 Build Summary
        run: |
          echo "### 🎉 Build Completed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Kernel:** CG+ Gaming Kernel" >> $GITHUB_STEP_SUMMARY
          echo "**Device:** Xiaomi Mi 14 (houji)" >> $GITHUB_STEP_SUMMARY
          echo "**Builder:** $KBUILD_BUILD_USER@$KBUILD_BUILD_HOST" >> $GITHUB_STEP_SUMMARY
          echo "**File:** ${{ steps.package.outputs.ZIP_FILE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Features:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ VortexSU Root" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SUSFS (Full Implementation)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Wi-Fi Patch Applied" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ZyCromerZ Clang" >> $GITHUB_STEP_SUMMARY
