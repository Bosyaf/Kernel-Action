name: Pure Full LTO Kernel (Fixed Path)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 10240
          temp-reserve-mb: 2048
          swap-size-gb: 16
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. ZyC Clang İndir ve Kesin PATH Belirle
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            git curl build-essential bc bison flex libssl-dev libelf-dev \
            cpio kmod wget xz-utils file tree
          
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          echo "📥 ZyC Clang indiriliyor..."
          wget -q "$CLANG_URL" -O clang.tar.gz
          
          echo "📦 Arşiv açılıyor..."
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc
          
          # PATH bulma mantığını garantiye alıyoruz
          # Bin klasörünün tam yolunu bul ve çevre değişkenine ata
          CLANG_PATH=$(find $GITHUB_WORKSPACE/clang-zyc -type d -name "bin" | head -n 1)
          
          if [ -z "$CLANG_PATH" ]; then
            echo "❌ HATA: Bin dizini bulunamadı! Arşiv içeriği:"
            ls -R $GITHUB_WORKSPACE/clang-zyc
            exit 1
          fi
          
          echo "✅ Clang Bin Path bulundu: $CLANG_PATH"
          echo "CLANG_BIN_PATH=$CLANG_PATH" >> $GITHUB_ENV
          
          # Test et
          $CLANG_PATH/clang --version

      - name: 2. Kernel Source İndir
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: 3. SADECE Full LTO Config Uygula
        run: |
          cd common
          # Önce defconfig oluştur
          make ARCH=arm64 gki_defconfig
          
          # Ayarları zorla (Full LTO aktif, CFI kapalı)
          scripts/config --file .config \
            --enable CONFIG_LTO_CLANG \
            --enable CONFIG_LTO_CLANG_FULL \
            --disable CONFIG_LTO_CLANG_THIN \
            --disable CONFIG_LTO_NONE \
            --disable CONFIG_CFI_CLANG \
            --disable CONFIG_CFI_PERMISSIVE \
            --disable CONFIG_SHADOW_CALL_STACK \
            --set-str CONFIG_LOCALVERSION "-FullLTO"
          
          # Config'i doğrula
          make ARCH=arm64 olddefconfig

      - name: 4. Full LTO Derleme (Garantili Komut)
        run: |
          cd common
          # Dinamik PATH ataması
          export PATH="${{ env.CLANG_BIN_PATH }}:$PATH"
          
          echo "🚀 Derleme başlıyor..."
          make -j$(nproc --all) O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            KCFLAGS="-O2 -march=armv9-a+crypto+sha3 -falign-functions=32" \
            Image || { echo "❌ Derleme HATASI!"; exit 1; }

      - name: 5. Paketleme
        run: |
          if [ -f common/out/arch/arm64/boot/Image ]; then
            cp common/out/arch/arm64/boot/Image AnyKernel3/
            cd AnyKernel3
            sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
            zip -r "../Pure-FullLTO-Kernel.zip" ./*
          else
            echo "❌ Image dosyası bulunamadı!"
            exit 1
          fi

      - name: 6. Yayınla
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Laurelin-X Full LTO Build"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
