name: Build Kernel - Xiaomi 14 (houji)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          # Gerçek repo ve branch bilgilerini buraya işledim
          repository: lavajCN/kernel_xiaomi_houji-shennong-spec
          ref: houji-shennong-u-oss
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison flex libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu make gcc g++ \
            libncurses-dev zstd tar wget python3 cpio \
            lld llvm-ar llvm-nm llvm-objcopy llvm-objdump \
            llvm-readelf llvm-strip lz4

      - name: Download Neutron Clang
        run: |
          mkdir -p $HOME/neutron-clang
          # Snapdragon 8 Gen 3 için güncel Neutron Clang
          wget -q https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/10032024/neutron-clang-10032024.tar.zst -O neutron-clang.tar.zst
          tar -I zstd -xf neutron-clang.tar.zst -C $HOME/neutron-clang
          echo "$HOME/neutron-clang/bin" >> $GITHUB_PATH

      - name: Build Kernel
        run: |
          # Çıktı klasörü oluştur
          mkdir -p out
          
          # Çevresel değişkenleri tanımla
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$HOME/neutron-clang/bin:$PATH"
          export KCONFIG_CONFIG=out/.config
          
          # 1. Adım: Configleri Düzgünce Birleştir (Merge)
          # GKI temeli + Pineapple (SD8G3) + Houji (Xiaomi 14) + Consolidate (Xiaomi yamaları)
          bash scripts/kconfig/merge_config.sh -O out \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config

          # 2. Adım: Derlemeyi Başlat
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            READELF=llvm-readelf \
            AR=llvm-ar \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            Image modules

      - name: Package Artifacts
        run: |
          mkdir -p build_assets
          # Kernel imajını kopyala
          cp out/arch/arm64/boot/Image build_assets/
          
          # Tüm modülleri (.ko) bul ve kopyala (Xiaomi 14 için şart)
          find out -name "*.ko" -exec cp {} build_assets/ \;
          
          # Her şeyi tek bir zip/tar içinde topla
          tar -czf xiaomi_14_kernel_build.tar.gz -C build_assets .

      - name: Upload Kernel Image & Modules
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi-14-Houji-Kernel
          path: xiaomi_14_kernel_build.tar.gz
