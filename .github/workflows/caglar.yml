name: CG+ Gaming Kernel - LavaJ Android14 GKI + KSU

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      DEVICE: "houji"
      KERNEL_NAME: "CG+GamingKernel-LavaJ-GKI-KSU"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: 🔧 Maximize & Clean Build Space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache /usr/local/.ghcup
          sudo apt-get clean && sudo apt-get autoclean && sudo apt-get autoremove -y

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc bison build-essential curl flex git libelf-dev libssl-dev lz4 python3 rsync zip unzip cpio wget zstd gzip xz-utils make gcc-aarch64-linux-gnu ca-certificates

      - name: 🔥 Setup Neutron Clang
        run: |
          mkdir -p $HOME/clang && cd $HOME/clang
          curl -L "https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/10032024/neutron-clang-10032024.tar.zst" -o clang.tar.zst
          tar -xf clang.tar.zst && rm clang.tar.zst
          if [ ! -d "clang/bin" ]; then mv * temp/ 2>/dev/null && mv temp clang; fi

      - name: 📱 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: lavajCN/android_kernel_xiaomi_sm8650
          ref: android14-6.1-v
          path: kernel
          fetch-depth: 1

      - name: 🧹 Complete Cleanup
        run: |
          cd $GITHUB_WORKSPACE/kernel
          rm -rf out .out drivers/ksu
          make ARCH=arm64 mrproper distclean

      - name: 🔐 Install KernelSU (Nuclear Option)
        run: |
          cd $GITHUB_WORKSPACE/kernel
          find . -name "ksu" -type d -exec rm -rf {} \; 2>/dev/null || true
          rm -rf drivers/ksu /tmp/ksu*
          git clone --depth=1 https://github.com/tiann/KernelSU.git /tmp/ksu_temp
          mkdir -p drivers/ksu
          cp -r /tmp/ksu_temp/kernel/* drivers/ksu/
          mkdir -p drivers/ksu/include/uapi 2>/dev/null || true
          printf '#ifndef _UAPI_APP_PROFILE_H_\n#define _UAPI_APP_PROFILE_H_\n#include <linux/types.h>\nstruct app_profile {\n  __u32 uid;\n  __u32 flags;\n};\n#endif\n' > drivers/ksu/include/uapi/app_profile.h
          rm -rf /tmp/ksu_temp
          echo "✅ Nuclear KSU install complete"

      - name: ⚙️ Configure Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          scripts/config --file arch/arm64/configs/gki_defconfig --set-str CONFIG_LOCALVERSION "-CG++-Neutron-KSU" --disable CONFIG_LOCALVERSION_AUTO --enable CONFIG_KSU

      - name: 🏗️ Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          export PATH="$HOME/clang/clang/bin:$PATH"
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip O=out gki_defconfig
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip O=out -j$(nproc)

      - name: 📦 Setup AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          path: AnyKernel3

      - name: 📝 Configure AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          printf 'properties() { '"'"'kernel.string=CG+ Gaming Kernel + KSU\ndo.devicecheck=1\ndo.modules=0\ndo.systemless=1\ndo.cleanup=1\ndevice.name1=houji\ndevice.name2=shennong\nsupported.versions=14-16\n'"'"'; }\n. tools/ak3-core.sh\ndump_boot\nwrite_boot\n' > anykernel.sh
          cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image ./

      - name: 📦 Create ZIP
        id: zip
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          zip -r9 "CG+GamingKernel.zip" * -x .git README.md *placeholder .gitignore
          echo "file=CG+GamingKernel.zip" >> $GITHUB_OUTPUT

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: CG+GamingKernel.zip
          path: $GITHUB_WORKSPACE/AnyKernel3/CG+GamingKernel.zip
