name: CG+ Gaming Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      DEVICE: "houji"
      KERNEL_NAME: "CG+GamingKernel"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: 🔧 Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 10240
          temp-reserve-mb: 2048
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates clang curl \
            flex git libelf-dev libssl-dev \
            lz4 python3 rsync zip unzip cpio wget \
            llvm lld gcc-aarch64-linux-gnu \
            zstd libarchive-tools make

      - name: 🔥 Setup ZyCromerZ Clang
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          
          echo "⬇️ Fetching Clang..."
          CLANG_URL=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          
          echo "📥 Downloading: $CLANG_URL"
          wget -q --show-progress "$CLANG_URL" -O clang.tar.gz
          
          echo "📂 Extracting..."
          tar -xf clang.tar.gz
          rm clang.tar.gz
          
          echo "✅ Clang ready"
          $HOME/clang/bin/clang --version

      - name: 📱 Download Kernel Source (Fast Method)
        run: |
          cd $HOME
          
          echo "📥 Downloading kernel source as tarball..."
          wget -q --show-progress \
            https://github.com/mvaisakh/xiaomi14/archive/refs/heads/kplatform.tar.gz \
            -O kernel.tar.gz
          
          echo "📂 Extracting kernel source..."
          tar -xzf kernel.tar.gz
          mv xiaomi14-kplatform kernel
          rm kernel.tar.gz
          
          cd kernel
          echo "✅ Source ready"
          ls -lah

      - name: ⚙️ Configure Kernel
        run: |
          cd $HOME/kernel
          
          echo "🔧 Setting version string..."
          
          scripts/config --file arch/arm64/configs/gki_defconfig \
            --set-str CONFIG_LOCALVERSION "-CG++" \
            --disable CONFIG_LOCALVERSION_AUTO
          
          echo "✅ Config done"

      - name: 🏗️ Build Kernel
        run: |
          cd $HOME/kernel
          
          export PATH="$HOME/clang/bin:$PATH"
          export KBUILD_BUILD_USER="${KBUILD_BUILD_USER}"
          export KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}"
          
          echo "🔨 Building kernel..."
          clang --version
          
          # Build with Make (Bazel needs git history)
          make ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            O=out \
            gki_defconfig
          
          make ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            O=out \
            -j$(nproc --all)
          
          # Verify
          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          
          echo "✅ Build completed"
          ls -lh out/arch/arm64/boot/Image
          
          # Stage
          mkdir -p $HOME/kernel_out
          cp out/arch/arm64/boot/Image $HOME/kernel_out/

      - name: 📦 Prepare AnyKernel3
        run: |
          cd $HOME
          
          echo "🔽 Downloading AnyKernel3..."
          wget -q https://github.com/osm0sis/AnyKernel3/archive/refs/heads/master.tar.gz
          tar -xzf master.tar.gz
          mv AnyKernel3-master AnyKernel3
          rm master.tar.gz
          
          cd AnyKernel3
          
          cat > anykernel.sh << 'AKEOF'
          # AnyKernel3 Ramdisk Mod Script
          
          ## AnyKernel setup
          properties() { '
          kernel.string=CG+ Gaming Kernel by caglar @ guvenc
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=houji
          device.name2=shennong
          device.name3=2311DRN6C
          device.name4=23116PN5BC
          supported.versions=14-16
          supported.patchlevels=
          '; }
          
          ## AnyKernel methods
          . tools/ak3-core.sh
          
          ## Boot install
          dump_boot
          write_boot
          AKEOF
          
          cp $HOME/kernel_out/Image ./
          
          echo "✅ AnyKernel3 ready"

      - name: 📦 Create ZIP
        id: package
        run: |
          cd $HOME/AnyKernel3
          
          DATE=$(date +%Y%m%d-%H%M)
          ZIP_NAME="${KERNEL_NAME}-${DEVICE}-${DATE}.zip"
          
          zip -r9 "$ZIP_NAME" * -x .git README.md *placeholder .gitignore
          
          echo "✅ $ZIP_NAME"
          ls -lh "$ZIP_NAME"
          
          echo "ZIP_FILE=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "ZIP_PATH=$HOME/AnyKernel3/$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.ZIP_FILE }}
          path: ${{ steps.package.outputs.ZIP_PATH }}

      - name: 🎉 Summary
        run: |
          echo "### 🎉 Build Success!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Kernel:** CG+ Gaming Kernel" >> $GITHUB_STEP_SUMMARY
          echo "**Device:** Xiaomi Mi 14 (houji)" >> $GITHUB_STEP_SUMMARY
          echo "**Android:** 14-16" >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`${{ steps.package.outputs.ZIP_FILE }}\`" >> $GITHUB_STEP_SUMMARY
