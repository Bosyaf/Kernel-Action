name: CG+ Gaming Kernel - LavaJ Android14 GKI + KSU

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      DEVICE: "houji"
      KERNEL_NAME: "CG+GamingKernel-LavaJ-GKI-KSU"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: 🔧 Maximize & Clean Build Space
        run: |
          echo "🧹 Cleaning system..."
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/.ghcup
          sudo apt-get clean
          sudo apt-get autoclean
          sudo apt-get autoremove -y
          
          echo "📊 Disk space:"
          df -h /

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update -qq || true
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential curl flex git \
            libelf-dev libssl-dev lz4 python3 rsync \
            zip unzip cpio wget zstd gzip xz-utils \
            make gcc-aarch64-linux-gnu ca-certificates 2>&1 | grep -v "^Reading\|^Building"

      - name: 🔥 Setup Google Clang R584948
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          
          echo "⬇️ Downloading Google Clang R584948..."
          
          curl -L --progress-bar \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/mirror-goog-main-llvm-toolchain-source/clang-r584948.tar.gz" \
            --output clang-r584948.tar.gz
          
          if [ ! -f "clang-r584948.tar.gz" ]; then
            echo "❌ Download failed!"
            exit 1
          fi
          
          echo "📂 Extracting..."
          tar -xzf clang-r584948.tar.gz
          rm -f clang-r584948.tar.gz
          
          if [ ! -d "clang/bin" ]; then
            mkdir -p temp
            mv * temp/ 2>/dev/null || true
            mv temp clang || true
          fi
          
          echo "✅ Clang ready"
          ./clang/bin/clang --version

      - name: 📱 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: lavajCN/android_kernel_xiaomi_sm8650
          ref: android14-6.1-v
          path: kernel
          fetch-depth: 1

      - name: 🧹 Clean Kernel Source
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "🧹 Cleaning..."
          rm -rf out
          make ARCH=arm64 mrproper || true
          
          echo "✅ Clean done"

      - name: 🔧 Fix Source Code Issues
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "🔧 Fixing source code compilation errors..."
          
          # Fix: arch/arm64/kvm/sys_regs.c:2970 - uninitialized variable
          echo "Fixing sys_regs.c..."
          sed -i 's/void __user \*ubatch = u64_to_user_ptr(attr->batch.in_batch);/typeof(attr->batch.in_batch) __tmp = attr->batch.in_batch; void __user *ubatch = u64_to_user_ptr(__tmp);/g' arch/arm64/kvm/sys_regs.c 2>/dev/null || true
          
          # Better fix for the clidr issue
          if grep -q "get_clidr_el1(NULL, &clidr)" arch/arm64/kvm/sys_regs.c; then
            echo "Patching KVM sys_regs..."
            sed -i 's/\(u64 clidr;\)/\1 = 0;/' arch/arm64/kvm/sys_regs.c
            sed -i 's/void __user \*ubatch = u64_to_user_ptr(attr->batch.in_batch);/u64 __tmp_ubatch = attr->batch.in_batch; void __user *ubatch = u64_to_user_ptr(__tmp_ubatch);/' arch/arm64/kvm/sys_regs.c
          fi
          
          # Fix: kernel/bpf/syscall.c - similar uninitialized warnings
          echo "Fixing bpf/syscall.c..."
          if [ -f "kernel/bpf/syscall.c" ]; then
            sed -i 's/void __user \*keys = u64_to_user_ptr(attr->batch.keys);/u64 __tmp_keys = attr->batch.keys; void __user *keys = u64_to_user_ptr(__tmp_keys);/g' kernel/bpf/syscall.c
            sed -i 's/void __user \*values = u64_to_user_ptr(attr->batch.values);/u64 __tmp_values = attr->batch.values; void __user *values = u64_to_user_ptr(__tmp_values);/g' kernel/bpf/syscall.c
          fi
          
          echo "✅ Source code patches applied"

      - name: 🔐 Install KernelSU
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "📥 Installing KernelSU..."
          
          mkdir -p drivers/ksu/kernel
          git clone --depth=1 https://github.com/tiann/KernelSU.git ksu_temp
          cp -r ksu_temp/kernel/* drivers/ksu/kernel/
          rm -rf ksu_temp
          
          echo "✅ KernelSU installed"

      - name: ⚙️ Configure Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "🔧 Configuring kernel..."
          
          scripts/config --file arch/arm64/configs/gki_defconfig \
            --set-str CONFIG_LOCALVERSION "-CG++-Google-R584948-KSU" \
            --disable CONFIG_LOCALVERSION_AUTO \
            --enable CONFIG_KSU
          
          echo "✅ Configuration done"

      - name: 🏗️ Build Kernel with Google Clang R584948
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          export PATH="$HOME/clang/clang/bin:$PATH"
          export KBUILD_BUILD_USER="${KBUILD_BUILD_USER}"
          export KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}"
          
          echo "🔨 Building kernel..."
          clang --version
          
          echo ""
          echo "Step 1: Loading defconfig..."
          make ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            O=out gki_defconfig
          
          if [ $? -ne 0 ]; then
            echo "❌ Defconfig failed!"
            exit 1
          fi
          
          echo ""
          echo "Step 2: Building (30-60 minutes)..."
          make ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            O=out \
            -j$(nproc --all)
          
          BUILD_STATUS=$?
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build failed!"
            exit 1
          fi
          
          echo ""
          echo "Step 3: Verifying..."
          
          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "❌ Kernel Image not found!"
            exit 1
          fi
          
          echo "✅ Build success!"
          ls -lh out/arch/arm64/boot/Image
          
          mkdir -p $HOME/kernel_out
          cp out/arch/arm64/boot/Image $HOME/kernel_out/

      - name: 📦 Setup AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          path: AnyKernel3

      - name: 📝 Configure AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          
          cat > anykernel.sh << 'EOF'
          properties() { '
          kernel.string=CG+ Gaming Kernel (Google Clang R584948) + KSU by caglar @ guvenc
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=houji
          device.name2=shennong
          device.name3=2311DRN6C
          device.name4=23116PN5BC
          supported.versions=14-16
          '; }
          . tools/ak3-core.sh
          dump_boot
          write_boot
          EOF
          
          cp $HOME/kernel_out/Image ./
          echo "✅ AnyKernel3 ready"

      - name: 📦 Create ZIP
        id: zip
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          
          DATE=$(date +%Y%m%d-%H%M)
          ZIP="${KERNEL_NAME}-GoogleR584948-${DATE}.zip"
          
          zip -r9 "$ZIP" * -x .git README.md *placeholder .gitignore
          
          echo "✅ ZIP: $ZIP"
          ls -lh "$ZIP"
          
          echo "file=$ZIP" >> $GITHUB_OUTPUT
          echo "path=$(pwd)/$ZIP" >> $GITHUB_OUTPUT

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.file }}
          path: ${{ steps.zip.outputs.path }}
          retention-days: 30

      - name: 🎉 Summary
        run: |
          echo "### ✅ Build Success!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Kernel:** CG+ Gaming Kernel" >> $GITHUB_STEP_SUMMARY
          echo "**Device:** Xiaomi Mi 14 (houji)" >> $GITHUB_STEP_SUMMARY
          echo "**Compiler:** Google Clang R584948" >> $GITHUB_STEP_SUMMARY
          echo "**Root:** KernelSU ✅" >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`${{ steps.zip.outputs.file }}\`" >> $GITHUB_STEP_SUMMARY
