name: CG+ Gaming Kernel - LavaJ Android14 GKI + KSU

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      DEVICE: "houji"
      KERNEL_NAME: "CG+GamingKernel-LavaJ-GKI-KSU"

    steps:
      - name: 🔧 Maximize Space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc bison build-essential curl flex git libelf-dev libssl-dev lz4 python3 rsync zip unzip cpio wget zstd gzip xz-utils make gcc-aarch64-linux-gnu ca-certificates

      - name: 🔥 Setup Neutron Clang
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          curl -LO "https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/10032024/neutron-clang-10032024.tar.zst"
          tar --zstd -xf neutron-clang-10032024.tar.zst
          rm neutron-clang-10032024.tar.zst
          if [ ! -d "clang" ]; then
            DIR=$(find . -maxdepth 1 -type d ! -name "." | head -n 1)
            [ -n "$DIR" ] && mv "$DIR" clang
          fi

      - name: 📱 Checkout Source
        uses: actions/checkout@v4
        with:
          repository: lavajCN/android_kernel_xiaomi_sm8650
          ref: android14-6.1-v
          path: kernel
          fetch-depth: 1

      - name: 🧹 Cleanup
        run: |
          cd $GITHUB_WORKSPACE/kernel
          rm -rf out drivers/ksu
          make ARCH=arm64 mrproper || true

      - name: 🔐 Install KernelSU
        run: |
          cd $GITHUB_WORKSPACE/kernel
          rm -rf drivers/ksu /tmp/ksu*
          git clone --depth=1 https://github.com/tiann/KernelSU.git /tmp/ksu
          mkdir -p drivers/ksu
          cp -r /tmp/ksu/kernel/* drivers/ksu/
          mkdir -p drivers/ksu/include/uapi
          printf '#ifndef _UAPI_APP_PROFILE_H_\n#define _UAPI_APP_PROFILE_H_\n#include <linux/types.h>\nstruct app_profile { __u32 uid; __u32 flags; };\n#endif\n' > drivers/ksu/include/uapi/app_profile.h
          rm -rf /tmp/ksu

      - name: ⚙️ Configure
        run: |
          cd $GITHUB_WORKSPACE/kernel
          scripts/config --file arch/arm64/configs/gki_defconfig --set-str CONFIG_LOCALVERSION "-CG++-KSU" --disable CONFIG_LOCALVERSION_AUTO --enable CONFIG_KSU

      - name: 🏗️ Build
        run: |
          cd $GITHUB_WORKSPACE/kernel
          export PATH="$HOME/clang/clang/bin:$PATH"
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip O=out gki_defconfig
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip O=out -j$(nproc)

      - name: 📦 AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          path: AnyKernel3

      - name: 📝 Package
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          printf 'properties() { '"'"'kernel.string=CG+ Kernel\ndevice.name1=houji\ndevice.name2=shennong\n'"'"'; }\n. tools/ak3-core.sh\ndump_boot\nwrite_boot\n' > anykernel.sh
          cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image ./
          zip -r9 kernel.zip * -x .git README.md

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: CG-Kernel-ZIP
          path: $GITHUB_WORKSPACE/AnyKernel3/kernel.zip
