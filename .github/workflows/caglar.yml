name: CG+ ZyC Gaming Kernel (FULL LTO STABLE)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space + BIG SWAP
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          temp-reserve-mb: 1024
          swap-size-gb: 16   # 🔥 FULL LTO için şart

      - name: Extra Disk Cleanup
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Paketler + ZyC Clang
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd ccache

          CLANG_LINK=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          curl -L -o clang.tar.gz "$CLANG_LINK"

          mkdir clang-zyc
          tar -xzf clang.tar.gz -C clang-zyc
          rm -f clang.tar.gz

      - name: Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: VortexSU
        run: |
          cd common
          curl -LSs https://raw.githubusercontent.com/Kingfinik98/VortexSU/refs/heads/main/kernel/setup.sh | bash -s main

      - name: Patchler (WiFi + BBRv3 + BBG)
        run: |
          cd common
          curl -fLSs https://github.com/OnePlus-12-Development/android_kernel_qcom_sm8650/commit/3e0cb08.patch > wifi.patch || true
          [ -s wifi.patch ] && patch -p1 --forward < wifi.patch || true

          patch -p1 --fuzz=3 < $GITHUB_WORKSPACE/patches/bbrv3.patch || true

          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' security/Kconfig || true

      - name: SUSFS
        run: |
          cd common
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu -b gki-android14-6.1 ../susfs
          cp -R ../susfs/kernel_patches/fs/* ./fs/
          cp -R ../susfs/kernel_patches/include/* ./include/
          patch -p1 --forward < ../susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true

      - name: CONFIG (FULL LTO + STABLE)
        run: |
          cd common
          CONFIG=arch/arm64/configs/gki_defconfig

          # ❌ Thin kapat
          ./scripts/config --file $CONFIG --disable CONFIG_LTO_CLANG_THIN

          # ✅ FULL LTO
          ./scripts/config --file $CONFIG --enable CONFIG_LTO
          ./scripts/config --file $CONFIG --enable CONFIG_LTO_CLANG
          ./scripts/config --file $CONFIG --enable CONFIG_LTO_CLANG_FULL

          # RAM kurtar
          ./scripts/config --file $CONFIG --disable CONFIG_DEBUG_INFO
          ./scripts/config --file $CONFIG --disable CONFIG_KALLSYMS_ALL

          # Performans
          ./scripts/config --file $CONFIG --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE

          # BBR
          ./scripts/config --file $CONFIG --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file $CONFIG --set-str CONFIG_DEFAULT_TCP_CONG bbr

      - name: BUILD (FULL LTO SAFE)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1

          # 🔥 RAM FIX
          export TMPDIR=$GITHUB_WORKSPACE/tmp
          mkdir -p $TMPDIR
          export LDFLAGS="-Wl,--no-keep-memory"

          make O=out gki_defconfig
          make O=out olddefconfig

          # ❗ FULL LTO için düşük paralellik
          make -j2 O=out \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            Image

          echo "BOOTHASH=ZyC-$(date +%s)" >> $GITHUB_ENV

      - name: AnyKernel3
        run: |
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image .
          zip -r ../kernel.zip ./*

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          files: kernel.zip
