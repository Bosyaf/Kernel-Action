name: caglar++ Total Ultimate V5 (Clang-17 Edition)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "caglar++"

    steps:
      - name: Alanı Hazırla
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048

      - name: 0. Kendi Repomuzu Çek (Zula Yamaları İçin)
        uses: actions/checkout@v4

      - name: 1. Gerekli Paketleri Kur ve Clang-17 İndir
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget \
            clang-17 lld-17 gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: 2. Safkan Xiaomi Kaynağını Çek (Houji/Shennong)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          # Xiaomi Houji-Shennong Source (Native WALT ve Özel Sürücüler)
          git clone https://github.com/lavajCN/kernel_xiaomi_houji-shennong-spec.git --depth=1 common

      - name: 3. SADECE VortexSU Kurulumu
        run: |
          cd common
          curl -LSs "https://raw.githubusercontent.com/Kingfinik98/VortexSU/refs/heads/main/kernel/setup.sh" | bash -s main

      - name: 4. BBRv3 Mikroskop Operasyonu
        run: |
          cd common
          echo ">>> BBRv3 Yaması Uygulanıyor (Mikroskop Operasyonu)..."
          patch -p1 --fuzz=3 < $GITHUB_WORKSPACE/patches/bbrv3.patch || true
          sed -i 's/return "fq_codel";/return "cake";/g' net/sched/sch_generic.c

      - name: 5. SUSFS Master Formülü (Hatasız - Çakışmalar Temizlendi)
        run: |
          cd common
          echo "Simonpunk Orijinal SUSFS (GKI 6.1) Çekiliyor..."
          git clone --depth=1 -q https://gitlab.com/simonpunk/susfs4ksu -b gki-android14-6.1 ../susfs
          
          cp -R ../susfs/kernel_patches/fs/* ./fs/
          cp -R ../susfs/kernel_patches/include/* ./include/
          patch -p1 --forward < ../susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true
          
          echo "Kingfinik98 Özel 6.1 Fix Yaması Uygulanıyor..."
          git clone https://github.com/Kingfinik98/build-vortex.git ../build-vortex
          patch -p1 --forward < ../build-vortex/kernel-patches/susfs/fs_proc_base.c-fix-k6.1.patch || true
          
          echo "Namespace SUSFS Tanımları Enjekte Ediliyor..."
          cat << 'EOF' > .ns_inject_tmp
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT
          #include <linux/susfs_def.h>
          extern bool susfs_is_current_ksu_domain(void);
          extern bool susfs_is_current_zygote_domain(void);
          extern bool susfs_is_boot_completed_triggered;
          extern bool susfs_is_sdcard_android_data_decrypted;

          static DEFINE_IDA(susfs_mnt_id_ida);
          static DEFINE_IDA(susfs_mnt_group_ida);
          #define CL_COPY_MNT_NS BIT(25)
          #endif
          EOF
          sed -i '/#include "internal.h"/r .ns_inject_tmp' ./fs/namespace.c
          rm -f .ns_inject_tmp
          
          echo "CRC Fix Uygulanıyor (VorteXSU 6.1 Özel)..."
          sed -i '/#include <linux\/susfs_def.h>/i #ifndef __GENKSYMS__' fs/statfs.c
          sed -i '/#include <linux\/susfs_def.h>/a #endif' fs/statfs.c

      - name: 6. Config Birleştirme ve Ölüm Makinesi Şalterleri
        run: |
          cd common
          
          # >>> DERİN TEMİZLİK (MRPROPER) <<<
          make ARCH=arm64 mrproper
          
          # 1. Google'ın ana iskeletini oluştur
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="clang-17" gki_defconfig
          
          # 2. İşlemci (Pineapple) ve Cihaz (Houji) Configlerini Üstüne Ekle (Config Merge)
          ./scripts/kconfig/merge_config.sh -m -O out out/.config arch/arm64/configs/vendor/pineapple_GKI.config arch/arm64/configs/vendor/houji_GKI.config
          
          # 3. Ayarları resmileştir
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="clang-17" olddefconfig
          
          CONFIG_FILE="out/.config"
          
          # --- 300 HZ (ISI VE TEPKİ SÜRESİ DENGESİ) ---
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_100
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_250
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HZ_300
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_1000

          # --- FULL PREEMPT (Eksiksiz Akıcılık) ---
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_NONE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_VOLUNTARY
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT_BUILD
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT_COUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPTION
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT_RCU

          # --- WALT & PERFORMANS YÖNETİMİ (ZORLA GÖMÜLÜ YAPMA) ---
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_WALT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_CORE_CTL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_WALT_INPUT_BOOST
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_TOUCHBOOST 
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_WALT
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_CPU_FREQ_DEFAULT_GOV "walt"
          
          sed -i 's/CONFIG_SCHED_WALT=m/CONFIG_SCHED_WALT=y/g' $CONFIG_FILE
          sed -i 's/CONFIG_SCHED_CORE_CTL=m/CONFIG_SCHED_CORE_CTL=y/g' $CONFIG_FILE
          
          # --- RCU OPTİMİZASYONLARI (ZİRVE AKICILIK) ---
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_RCU_NOCB_CPU_DEFAULT_ALL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_RCU_NOCB_CPU_CB_BOOST

          # --- COMPILER OPTİMİZASYONLARI ---
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PGO_CLANG 
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE
          
          # --- AĞ KODLARI (0 Ping) ---
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_CAKE
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_NET_SCH "cake"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_FQ_CODEL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_FQ
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_LOW_LATENCY
          
          sed -i 's/CONFIG_TCP_CONG_BBR=m/CONFIG_TCP_CONG_BBR=y/g' $CONFIG_FILE
          sed -i 's/CONFIG_NET_SCH_CAKE=m/CONFIG_NET_SCH_CAKE=y/g' $CONFIG_FILE

          # --- SUSFS Config Mermileri ---
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_KSTAT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_OVERLAYFS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_TRY_UMOUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SPOOF_UNAME
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_ENABLE_LOG
          
          # İSİM DAMGASI
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-CG+"

      - name: 7. Kernel Derleme (Clang 17, O3, BOLT, ThinLTO)
        run: |
          cd common
          sed -i 's/^PHONY += all/  /g' Makefile || true
          
          # Orijinal Clang 17 ile tam uyumlu derleme. Gereksiz uyarılar susturuldu.
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang-17" \
            LD="ld.lld-17" \
            HOSTLD="ld.lld-17" \
            LLVM_BOLT=1 \
            KCFLAGS="-O3 -funroll-loops -march=armv9-a+crypto -fno-semantic-interposition -fno-stack-protector -flto-jobs=$(nproc --all) -Wno-constant-logical-operand -Wno-format -Wno-uninitialized-const-pointer -Wno-error=format -Wno-error=uninitialized-const-pointer -Wno-error=default-const-init-var-unsafe" \
            Image
          
          echo "BOOTHASH=CG+-V5-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: 8. AnyKernel3 (Temiz Paketleme ve LUNAR Zulası)
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Death Machine V5/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          
          # --- LUNAR'DAN ARAKLANAN ZEHİRLİ AYARLARI HAZIRLA ---
          cat << 'EOF' > cg_lunar_service.sh
          #!/system/bin/sh
          # CG+ Ultimate V5 - Zehirli Lunar Ayarları
          while [ "$(getprop sys.boot_completed)" != "1" ]; do sleep 1; done
          
          mkdir -p /dev/mount_masks
          mask_val() {
              find "$2" -type f | while read -r file; do
                  file="$(realpath "$file")"
                  umount "$file" >/dev/null 2>&1
                  chown root:root "$file"
                  chmod 0644 "$file"
                  echo "$1" >"$file"
                  chmod 0444 "$file"
                  
                  TIME="$(date "+%s%N")"
                  echo "$1" >"/dev/mount_masks/mount_mask_$TIME"
                  mount --bind "/dev/mount_masks/mount_mask_$TIME" "$file"
                  restorecon -R -F "$file" >/dev/null 2>&1
              done
          }

          # Xiaomi Servis Katliamı
          killall -9 mi_thermald
          for svc in mimd-service mimd-service2_0 miuibooster; do
              stop $svc
          done
          mask_val "0" /sys/module/migt/parameters/enable_pkg_monitor
          mask_val "0" /proc/sys/migt/enable_pkg_monitor
          mask_val "0" /sys/module/metis/parameters/cluaff_control

          # Ağ Maskesi (BBR ve CAKE'i Garantile)
          mask_val "bbr" /proc/sys/net/ipv4/tcp_congestion_control
          mask_val "cake" /proc/sys/net/core/default_qdisc
          EOF
          
          # AnyKernel3 flaşlanırken scripti otomatik KSU servisine atacak mermi!
          echo 'ui_print ">>> Zehirli Lunar Ayarları Sisteme Enjekte Ediliyor...";' >> anykernel.sh
          echo 'mkdir -p /data/adb/service.d;' >> anykernel.sh
          echo 'cp $home/cg_lunar_service.sh /data/adb/service.d/cg_lunar_service.sh;' >> anykernel.sh
          echo 'chmod 0755 /data/adb/service.d/cg_lunar_service.sh;' >> anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../CG+-Total-Ultimate-V5.zip" ./*

      - name: 9. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Total Ultimate V5"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
