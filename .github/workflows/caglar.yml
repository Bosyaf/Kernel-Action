name: CG+ Gaming Kernel - LavaJ QGKI Spec + KSU

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      DEVICE: "houji"
      KERNEL_NAME: "CG+GamingKernel-LavaJ-QGKI-KSU"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: 🔧 Maximize & Clean Build Space
        run: |
          echo "🧹 Cleaning system..."
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/.ghcup
          sudo apt-get clean
          sudo apt-get autoclean
          sudo apt-get autoremove -y
          
          echo "📊 Disk space:"
          df -h /

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update -qq || true
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential clang curl flex git \
            libelf-dev libssl-dev lz4 python3 rsync \
            zip unzip cpio wget llvm lld \
            gcc-aarch64-linux-gnu zstd make 2>&1 | grep -v "^Reading\|^Building"

      - name: 🔥 Setup ZyCromerZ Clang
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          
          echo "⬇️ Fetching Clang link..."
          CLANG_URL=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          
          echo "📥 Downloading Clang..."
          curl -L "$CLANG_URL" --output clang.tar.gz
          
          echo "📂 Extracting..."
          tar -xf clang.tar.gz
          rm -f clang.tar.gz
          
          echo "✅ Clang ready"
          $HOME/clang/bin/clang --version

      - name: 📱 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: lavajCN/kernel_xiaomi_houji-shennong-spec
          path: kernel
          fetch-depth: 1

      - name: 🧹 Clean Kernel Source Tree
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "🧹 Cleaning kernel source tree..."
          
          # Remove old build artifacts
          rm -rf out
          
          # Clean source
          make ARCH=arm64 mrproper || true
          
          echo "✅ Source tree cleaned"

      - name: 🔐 Install KernelSU
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "📥 Installing KernelSU..."
          
          mkdir -p drivers/ksu/kernel
          git clone --depth=1 https://github.com/tiann/KernelSU.git ksu_temp
          cp -r ksu_temp/kernel/* drivers/ksu/kernel/
          rm -rf ksu_temp
          
          echo "✅ KernelSU installed"
          ls -la drivers/ksu/kernel/ | head -10

      - name: 🔧 Build Defconfig (Consolidate Method)
        id: defconfig
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "🔧 Building consolidated defconfig for Houji..."
          
          # Start with GKI base
          cp arch/arm64/configs/gki_defconfig arch/arm64/configs/houji_defconfig
          
          # Append consolidate fragments
          cat arch/arm64/configs/consolidate.fragment >> arch/arm64/configs/houji_defconfig
          
          # Append Houji vendor config
          cat arch/arm64/configs/vendor/houji_consolidate.config >> arch/arm64/configs/houji_defconfig
          
          echo "✅ Defconfig created: houji_defconfig"
          echo "Lines in config:"
          wc -l arch/arm64/configs/houji_defconfig
          
          echo "defconfig=houji_defconfig" >> $GITHUB_OUTPUT

      - name: ⚙️ Configure Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          DEFCONFIG="${{ steps.defconfig.outputs.defconfig }}"
          
          echo "🔧 Configuring with: $DEFCONFIG"
          
          scripts/config --file arch/arm64/configs/$DEFCONFIG \
            --set-str CONFIG_LOCALVERSION "-CG++-LavaJ-QGKI" \
            --disable CONFIG_LOCALVERSION_AUTO \
            --enable CONFIG_KSU
          
          echo "✅ Config ready"
          echo ""
          echo "CONFIG_KSU settings:"
          grep -i "CONFIG_KSU" arch/arm64/configs/$DEFCONFIG | head -5

      - name: 🏗️ Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          export PATH="$HOME/clang/bin:$PATH"
          export KBUILD_BUILD_USER="${KBUILD_BUILD_USER}"
          export KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}"
          
          DEFCONFIG="${{ steps.defconfig.outputs.defconfig }}"
          
          echo "🔨 Starting kernel build..."
          echo ""
          echo "Clang Version:"
          clang --version
          echo ""
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Step 1: Loading defconfig ($DEFCONFIG)..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          make ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            O=out $DEFCONFIG
          
          if [ $? -ne 0 ]; then
            echo "❌ Defconfig loading failed!"
            exit 1
          fi
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Step 2: Building kernel (this takes 30-60 minutes)..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          make ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            O=out -j$(nproc --all) 2>&1 | tail -100
          
          BUILD_STATUS=$?
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build failed with status $BUILD_STATUS"
            exit 1
          fi
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Step 3: Verifying build output..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          KERNEL_IMG=$(find out -name "Image" -type f | head -n1)
          
          if [ -z "$KERNEL_IMG" ]; then
            echo "❌ Kernel Image not found!"
            echo "Searching for any Image files..."
            find out -name "Image*" -o -name "vmlinux*" 2>/dev/null || true
            exit 1
          fi
          
          echo "✅ Kernel Image found!"
          ls -lh "$KERNEL_IMG"
          
          mkdir -p $HOME/kernel_out
          cp "$KERNEL_IMG" $HOME/kernel_out/Image
          echo "✅ Kernel staged for packaging"

      - name: 📦 Setup AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          path: AnyKernel3

      - name: 📝 Configure AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          
          cat > anykernel.sh << 'EOF'
          # AnyKernel3 Ramdisk Mod Script
          # CG+ Gaming Kernel - LavaJ QGKI
          
          properties() { '
          kernel.string=CG+ Gaming Kernel LavaJ QGKI + KSU by caglar @ guvenc
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=houji
          device.name2=shennong
          device.name3=2311DRN6C
          device.name4=23116PN5BC
          supported.versions=14-16
          supported.patchlevels=
          '; }
          
          ## AnyKernel methods
          . tools/ak3-core.sh
          
          ## Boot install
          dump_boot
          write_boot
          EOF
          
          cp $HOME/kernel_out/Image ./
          echo "✅ AnyKernel3 configured"
          ls -lh Image

      - name: 📦 Create Flashable ZIP
        id: zip
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          
          DATE=$(date +%Y%m%d-%H%M)
          ZIP="${KERNEL_NAME}-${DATE}.zip"
          
          echo "📦 Creating flashable ZIP: $ZIP"
          zip -r9 "$ZIP" * -x .git README.md *placeholder .gitignore .gitattributes
          
          if [ ! -f "$ZIP" ]; then
            echo "❌ ZIP creation failed!"
            exit 1
          fi
          
          echo "✅ ZIP created successfully"
          ls -lh "$ZIP"
          
          echo "file=$ZIP" >> $GITHUB_OUTPUT
          echo "path=$(pwd)/$ZIP" >> $GITHUB_OUTPUT

      - name: 📤 Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.file }}
          path: ${{ steps.zip.outputs.path }}
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          echo "### ✅ Build Completed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Kernel:** CG+ Gaming Kernel (QGKI Edition)" >> $GITHUB_STEP_SUMMARY
          echo "**Device:** Xiaomi Mi 14 (houji)" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** lavajCN/kernel_xiaomi_houji-shennong-spec" >> $GITHUB_STEP_SUMMARY
          echo "**Kernel Type:** QGKI (Qualcomm GKI with vendor extensions)" >> $GITHUB_STEP_SUMMARY
          echo "**Root Method:** KernelSU ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Defconfig:** houji_defconfig (GKI + Consolidate + Houji Vendor)" >> $GITHUB_STEP_SUMMARY
          echo "**Builder:** caglar@guvenc" >> $GITHUB_STEP_SUMMARY
          echo "**Flashable File:** \`${{ steps.zip.outputs.file }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Installation Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Download ZIP from Artifacts section" >> $GITHUB_STEP_SUMMARY
          echo "2. Boot into TWRP Recovery" >> $GITHUB_STEP_SUMMARY
          echo "3. Flash the ZIP file" >> $GITHUB_STEP_SUMMARY
          echo "4. Reboot to system" >> $GITHUB_STEP_SUMMARY
          echo "5. Grant root access to apps via KernelSU manager" >> $GITHUB_STEP_SUMMARY
