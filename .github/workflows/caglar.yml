name: CG+ Gaming Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      DEVICE: "houji"
      KERNEL_NAME: "CG+GamingKernel"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: 🔧 Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 10240
          temp-reserve-mb: 2048
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates clang curl \
            flex git libelf-dev libssl-dev \
            lz4 python3 python3-pip rsync \
            zip unzip cpio wget \
            llvm lld gcc-aarch64-linux-gnu \
            zstd libarchive-tools make

      - name: 🔥 Setup ZyCromerZ Clang
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          
          echo "⬇️ Fetching latest Clang link..."
          CLANG_URL=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          
          echo "📥 Downloading Clang from: $CLANG_URL"
          wget -q --show-progress "$CLANG_URL" -O clang.tar.gz
          
          echo "📂 Extracting Clang..."
          tar -xf clang.tar.gz
          rm -f clang.tar.gz
          
          echo "✅ Clang installed successfully"
          $HOME/clang/bin/clang --version

      - name: 📱 Clone Kernel Source
        run: |
          cd $HOME
          echo "🔽 Cloning Xiaomi Mi 14 kernel source..."
          git clone --depth=1 https://github.com/mvaisakh/xiaomi14 -b kplatform kernel
          
          cd kernel
          echo "✅ Source cloned"
          echo "Latest commit:"
          git log -1 --oneline

      - name: ⚙️ Configure Kernel
        run: |
          cd $HOME/kernel
          
          echo "🔧 Setting kernel version string..."
          
          # Only modify LOCALVERSION
          scripts/config --file arch/arm64/configs/gki_defconfig \
            --set-str CONFIG_LOCALVERSION "-CG++" \
            --disable CONFIG_LOCALVERSION_AUTO
          
          echo "✅ Configuration done"
          grep "CONFIG_LOCALVERSION" arch/arm64/configs/gki_defconfig

      - name: 🏗️ Build Kernel with Bazel
        run: |
          cd $HOME/kernel
          
          export PATH="$HOME/clang/bin:$PATH"
          export KBUILD_BUILD_USER="${KBUILD_BUILD_USER}"
          export KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}"
          
          echo "🔨 Starting kernel build..."
          echo "Clang version:"
          clang --version
          
          # Use Bazel build (recommended for this kernel)
          if [ -f "tools/bazel" ]; then
            echo "🔨 Building with Bazel (Kleaf)..."
            tools/bazel run --config=fast --config=stamp //common:kernel_aarch64_dist
          else
            echo "❌ Bazel not found, trying make..."
            
            make ARCH=arm64 \
              LLVM=1 \
              LLVM_IAS=1 \
              CC=clang \
              LD=ld.lld \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              O=out \
              gki_defconfig
            
            make ARCH=arm64 \
              LLVM=1 \
              LLVM_IAS=1 \
              CC=clang \
              LD=ld.lld \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              O=out \
              -j$(nproc --all)
          fi
          
          echo "✅ Build completed"

      - name: 🔍 Locate Kernel Files
        id: locate
        run: |
          cd $HOME/kernel
          
          echo "🔍 Searching for kernel Image..."
          
          # Search in Bazel output first
          KERNEL_IMG=$(find bazel-bin -name "Image" -type f 2>/dev/null | head -n 1)
          
          # Fallback to out directory
          if [ -z "$KERNEL_IMG" ]; then
            KERNEL_IMG=$(find out -name "Image" -type f 2>/dev/null | head -n 1)
          fi
          
          # Last resort: search everywhere
          if [ -z "$KERNEL_IMG" ]; then
            KERNEL_IMG=$(find . -name "Image" -type f | grep -v ".git" | head -n 1)
          fi
          
          if [ -z "$KERNEL_IMG" ]; then
            echo "❌ Kernel Image not found!"
            echo "Directory structure:"
            ls -R | grep "Image" || true
            exit 1
          fi
          
          echo "✅ Found kernel Image: $KERNEL_IMG"
          ls -lh "$KERNEL_IMG"
          
          # Copy to staging directory
          mkdir -p $HOME/kernel_out
          cp "$KERNEL_IMG" $HOME/kernel_out/Image
          
          echo "📦 Kernel staged successfully"
          ls -lh $HOME/kernel_out/

      - name: 📦 Prepare AnyKernel3
        run: |
          cd $HOME
          
          echo "🔽 Cloning AnyKernel3..."
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          
          cd AnyKernel3
          
          echo "📝 Configuring AnyKernel3 for Xiaomi Mi 14..."
          cat > anykernel.sh << 'AKEOF'
          # AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers
          
          ## AnyKernel setup
          properties() { '
          kernel.string=CG+ Gaming Kernel by caglar @ guvenc
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=houji
          device.name2=shennong
          device.name3=2311DRN6C
          device.name4=23116PN5BC
          supported.versions=14-16
          supported.patchlevels=
          '; }
          
          ## AnyKernel methods (DO NOT CHANGE)
          # import patching functions/variables - see for reference
          . tools/ak3-core.sh
          
          ## AnyKernel boot install
          dump_boot
          
          # begin ramdisk changes
          
          # end ramdisk changes
          
          write_boot
          AKEOF
          
          echo "📋 Copying kernel Image..."
          cp $HOME/kernel_out/Image ./
          
          echo "✅ AnyKernel3 ready"
          ls -lh Image

      - name: 📦 Create Flashable ZIP
        id: package
        run: |
          cd $HOME/AnyKernel3
          
          DATE=$(date +%Y%m%d-%H%M)
          ZIP_NAME="${KERNEL_NAME}-${DEVICE}-${DATE}.zip"
          
          echo "📦 Creating flashable ZIP: $ZIP_NAME"
          zip -r9 "$ZIP_NAME" * -x .git README.md *placeholder .gitignore .gitattributes
          
          echo "✅ ZIP created"
          ls -lh "$ZIP_NAME"
          
          echo "ZIP_FILE=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "ZIP_PATH=$HOME/AnyKernel3/$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: 📤 Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.ZIP_FILE }}
          path: ${{ steps.package.outputs.ZIP_PATH }}
          if-no-files-found: error

      - name: 🎉 Build Summary
        run: |
          echo "### 🎉 Kernel Build Completed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Kernel:** CG+ Gaming Kernel" >> $GITHUB_STEP_SUMMARY
          echo "**Device:** Xiaomi Mi 14 (houji)" >> $GITHUB_STEP_SUMMARY
          echo "**Android:** 14/15/16 (HyperOS 3 compatible)" >> $GITHUB_STEP_SUMMARY
          echo "**Builder:** $KBUILD_BUILD_USER@$KBUILD_BUILD_HOST" >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`${{ steps.package.outputs.ZIP_FILE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Features:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Clean GKI kernel" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ZyCromerZ Clang (latest)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Custom version string (-CG++)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Download from Artifacts above**" >> $GITHUB_STEP_SUMMARY
