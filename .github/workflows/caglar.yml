name: caglar++ Vanilla Lineage Test (Saf Motor)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve Yuki Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd
          
          echo "🔥 Yuki Clang Linki Çekiliyor..."
          curl -L -o clang.tar.zst "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst"
          
          mkdir -p $GITHUB_WORKSPACE/yuki-clang
          tar -I zstd -xf clang.tar.zst -C $GITHUB_WORKSPACE/yuki-clang
          rm -f clang.tar.zst

      - name: 2. LineageOS Motor Bloğunu Çek (Yamalar Yok)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          
          echo ">>> SM8650 Lineage-22.1 Saf Motor Bloğu Çekiliyor..."
          git clone https://github.com/Xiaomi-SM8650/android_kernel_xiaomi_sm8650.git -b lineage-22.1 --depth=1 common

      - name: 3. Akıllı Defconfig Bulucu (Ayar Değiştirmeden)
        run: |
          cd common
          
          # Motorun kendi içindeki en uygun beynini (defconfig) buluyoruz, içine HİÇBİR ŞEY eklemiyoruz.
          if [ -f "arch/arm64/configs/vendor/xiaomi/sm8650-common_defconfig" ]; then
              DEFCONFIG="vendor/xiaomi/sm8650-common_defconfig"
          elif [ -f "arch/arm64/configs/vendor/sm8650-perf_defconfig" ]; then
              DEFCONFIG="vendor/sm8650-perf_defconfig"
          else
              DEFCONFIG="gki_defconfig"
          fi
          
          echo "🔥 SEÇİLEN STANDART BEYİN: $DEFCONFIG"
          echo "DEFCONFIG_NAME=$DEFCONFIG" >> $GITHUB_ENV
          
          # Güvenlik için repodaki varsayılan ismi bozmamak adına basit bir tag
          sed -i 's/check_defconfig//' build.config.gki || true

      - name: 4. Standart Kernel Derleme (Saf ve Temiz)
        run: |
          cd common
          
          export PATH="$GITHUB_WORKSPACE/yuki-clang/bin:$PATH"
          
          sed -i 's/^PHONY += all/  /g' Makefile || true
          touch .scmversion
          
          echo "🔥 DERLEME BAŞLIYOR... ($DEFCONFIG_NAME)"
          
          # 1. Aşama: Beyni okut (Hiçbir eklenti yok)
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            $DEFCONFIG_NAME
          
          # 2. Aşama: Standart Derleme (Sadece O2 bayrağı, tehlikeli kodlar iptal)
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            KCFLAGS="-O2 -Wno-error" \
            Image || { echo "❌ Derleme HATASI! Motorun kendisi bozuk!"; exit 1; }
          
          echo "BOOTHASH=Vanilla+-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: 5. AnyKernel3 (Saf Paketleme)
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Vanilla Lineage Test/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../Yuki-Vanilla-Test.zip" ./*

      - name: 6. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Vanilla Test (Saf Motor)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
