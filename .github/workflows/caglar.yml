name: CG+ Gaming Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      DEVICE: "houji"
      KERNEL_NAME: "CG+GamingKernel"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: 🔧 Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 10240
          temp-reserve-mb: 2048
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates clang curl \
            flex git libelf-dev libssl-dev \
            lz4 python3 python3-pip rsync \
            zip unzip cpio wget \
            llvm lld gcc-aarch64-linux-gnu \
            zstd libarchive-tools make git-lfs

      - name: 🔥 Setup ZyCromerZ Clang
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          
          echo "⬇️ Fetching latest Clang link..."
          CLANG_URL=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          
          echo "📥 Downloading Clang from: $CLANG_URL"
          aria2c -x16 -s16 "$CLANG_URL" -o clang.tar.gz || wget -q --show-progress "$CLANG_URL" -O clang.tar.gz
          
          echo "📂 Extracting Clang..."
          tar -xf clang.tar.gz
          rm -f clang.tar.gz
          
          echo "✅ Clang installed"
          $HOME/clang/bin/clang --version

      - name: 📱 Clone Kernel Source (Optimized)
        run: |
          cd $HOME
          
          echo "🔽 Cloning Xiaomi Mi 14 kernel (optimized)..."
          
          git clone \
            --depth=1 \
            --single-branch \
            --branch kplatform \
            --filter=blob:none \
            https://github.com/mvaisakh/xiaomi14 kernel
          
          cd kernel
          
          echo "✅ Source cloned"
          echo "Latest commit:"
          git log -1 --oneline
          
          echo "📊 Repository size:"
          du -sh .

      - name: ⚙️ Configure Kernel
        run: |
          cd $HOME/kernel
          
          echo "🔧 Setting kernel version string..."
          
          scripts/config --file arch/arm64/configs/gki_defconfig \
            --set-str CONFIG_LOCALVERSION "-CG++" \
            --disable CONFIG_LOCALVERSION_AUTO
          
          echo "✅ Configuration done"

      - name: 🏗️ Build Kernel
        run: |
          cd $HOME/kernel
          
          export PATH="$HOME/clang/bin:$PATH"
          export KBUILD_BUILD_USER="${KBUILD_BUILD_USER}"
          export KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}"
          
          echo "🔨 Starting kernel build..."
          clang --version
          
          # Check if Bazel exists
          if [ -f "tools/bazel" ]; then
            echo "🔨 Building with Bazel..."
            tools/bazel run --config=fast --config=stamp //common:kernel_aarch64_dist
            
            # Find Image in Bazel output
            KERNEL_IMG=$(find bazel-bin -name "Image" -type f 2>/dev/null | head -n 1)
            
          else
            echo "🔨 Building with Make..."
            
            make ARCH=arm64 \
              LLVM=1 \
              LLVM_IAS=1 \
              CC=clang \
              LD=ld.lld \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              O=out \
              gki_defconfig
            
            make ARCH=arm64 \
              LLVM=1 \
              LLVM_IAS=1 \
              CC=clang \
              LD=ld.lld \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              O=out \
              -j$(nproc --all)
            
            KERNEL_IMG="out/arch/arm64/boot/Image"
          fi
          
          # Verify build
          if [ ! -f "$KERNEL_IMG" ]; then
            echo "❌ Build failed - Image not found"
            exit 1
          fi
          
          echo "✅ Build completed"
          ls -lh "$KERNEL_IMG"
          
          # Stage kernel
          mkdir -p $HOME/kernel_out
          cp "$KERNEL_IMG" $HOME/kernel_out/Image

      - name: 📦 Prepare AnyKernel3
        run: |
          cd $HOME
          
          echo "🔽 Cloning AnyKernel3..."
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          
          cd AnyKernel3
          
          cat > anykernel.sh << 'AKEOF'
          # AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers
          
          ## AnyKernel setup
          properties() { '
          kernel.string=CG+ Gaming Kernel by caglar @ guvenc
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=houji
          device.name2=shennong
          device.name3=2311DRN6C
          device.name4=23116PN5BC
          supported.versions=14-16
          supported.patchlevels=
          '; }
          
          ## AnyKernel methods (DO NOT CHANGE)
          . tools/ak3-core.sh
          
          ## AnyKernel boot install
          dump_boot
          write_boot
          AKEOF
          
          cp $HOME/kernel_out/Image ./
          
          echo "✅ AnyKernel3 ready"

      - name: 📦 Create Flashable ZIP
        id: package
        run: |
          cd $HOME/AnyKernel3
          
          DATE=$(date +%Y%m%d-%H%M)
          ZIP_NAME="${KERNEL_NAME}-${DEVICE}-${DATE}.zip"
          
          zip -r9 "$ZIP_NAME" * -x .git README.md *placeholder .gitignore .gitattributes
          
          echo "✅ ZIP: $ZIP_NAME"
          ls -lh "$ZIP_NAME"
          
          echo "ZIP_FILE=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "ZIP_PATH=$HOME/AnyKernel3/$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: 📤 Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.ZIP_FILE }}
          path: ${{ steps.package.outputs.ZIP_PATH }}
          if-no-files-found: error

      - name: 🎉 Build Summary
        run: |
          echo "### 🎉 Build Completed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Kernel:** CG+ Gaming Kernel" >> $GITHUB_STEP_SUMMARY
          echo "**Device:** Xiaomi Mi 14 (houji)" >> $GITHUB_STEP_SUMMARY
          echo "**Android:** 14-16 (HyperOS 3)" >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`${{ steps.package.outputs.ZIP_FILE }}\`" >> $GITHUB_STEP_SUMMARY
