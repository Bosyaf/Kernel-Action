name: Pure Full LTO Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 10240
          temp-reserve-mb: 2048
          swap-size-gb: 16
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. ZyC Clang İndir
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            git curl build-essential bc bison flex libssl-dev libelf-dev \
            cpio kmod wget xz-utils
          
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc
          rm -f clang.tar.gz
          
          CLANG_BIN_PATH=$(find $GITHUB_WORKSPACE/clang-zyc -type d -name "bin" | head -n 1)
          echo "CLANG_BIN_PATH=$CLANG_BIN_PATH" >> $GITHUB_ENV
          $CLANG_BIN_PATH/clang --version

      - name: 2. Kernel Source İndir
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: 3. SADECE Full LTO Config
        run: |
          cd common
          
          # Vanilla defconfig
          make ARCH=arm64 gki_defconfig
          
          # SADECE Full LTO ayarları
          scripts/config --file arch/arm64/configs/gki_defconfig \
            --enable CONFIG_LTO_CLANG \
            --enable CONFIG_LTO_CLANG_FULL \
            --disable CONFIG_LTO_CLANG_THIN \
            --disable CONFIG_LTO_NONE \
            --disable CONFIG_CFI_CLANG \
            --disable CONFIG_CFI_PERMISSIVE \
            --disable CONFIG_SHADOW_CALL_STACK \
            --disable CONFIG_DEBUG_INFO \
            --disable CONFIG_DEBUG_INFO_BTF \
            --disable CONFIG_DEBUG_INFO_DWARF4 \
            --disable CONFIG_DEBUG_INFO_DWARF5 \
            --set-str CONFIG_LOCALVERSION "-FullLTO"

      - name: 4. Host Tools için LTO Bypass
        run: |
          cd common
          
          # Host programları LTO'dan muaf tut
          cat << 'EOF' >> scripts/Makefile.host
          KBUILD_HOSTCFLAGS := $(filter-out -flto%, $(KBUILD_HOSTCFLAGS)) -fno-lto
          KBUILD_HOSTLDFLAGS := $(filter-out -flto%, $(KBUILD_HOSTLDFLAGS)) -fno-lto
          EOF
          
          # check-local-export bypass
          cat << 'EOF' > scripts/check-local-export
          #!/bin/sh
          exit 0
          EOF
          chmod +x scripts/check-local-export

      - name: 5. Full LTO Derleme
        run: |
          cd common
          
          export PATH="${{ env.CLANG_BIN_PATH }}:$PATH"
          export LD_LIBRARY_PATH="${{ env.CLANG_BIN_PATH }}/../lib:$LD_LIBRARY_PATH"
          
          echo "✅ Clang Version:"
          clang --version
          
          touch .scmversion
          
          # Config oluştur
          make -j$(nproc) O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            HOSTCFLAGS="-O2 -fno-lto" \
            HOSTLDFLAGS="-fno-lto" \
            gki_defconfig
          
          make -j$(nproc) O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            HOSTCFLAGS="-O2 -fno-lto" \
            HOSTLDFLAGS="-fno-lto" \
            olddefconfig
          
          echo "📊 LTO Config Kontrolü:"
          grep -E "CONFIG_LTO_CLANG_FULL|CONFIG_CFI_CLANG" out/.config || true
          
          # Ana derleme
          make -j$(nproc) O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            HOSTCFLAGS="-O2 -fno-lto" \
            HOSTLDFLAGS="-fno-lto" \
            KCFLAGS="-O2" \
            Image
          
          ls -lh out/arch/arm64/boot/Image
          echo "BOOTHASH=FullLTO-$(date +%s | tail -c 6)" >> $GITHUB_ENV

      - name: 6. AnyKernel3 Zip
        run: |
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          cp ../common/out/arch/arm64/boot/Image .
          zip -r9 "../Pure-FullLTO-Kernel.zip" ./*

      - name: 7. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Pure Full LTO Kernel"
          body: |
            ## ⚡ Minimal Full LTO Build
            - **Compiler:** ZyC Clang 22.0.0git
            - **LTO:** Full (enabled)
            - **Base:** GKI defconfig (vanilla)
            - **Extra features:** None
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
