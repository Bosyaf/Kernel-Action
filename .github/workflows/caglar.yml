name: Build Kernel - Xiaomi 14 (houji)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: lavajCN/kernel_xiaomi_houji-shennong-spec
          ref: houji-shennong-u-oss
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison flex libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu make gcc g++ \
            libncurses-dev zstd tar wget python3 cpio lz4

      - name: Download Neutron Clang
        run: |
          mkdir -p $HOME/neutron-clang
          wget -q https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/10032024/neutron-clang-10032024.tar.zst -O neutron-clang.tar.zst
          tar -I zstd -xf neutron-clang.tar.zst -C $HOME/neutron-clang
          # Clang içindeki bin klasörünü sisteme tanıtıyoruz
          echo "$HOME/neutron-clang/bin" >> $GITHUB_PATH

      - name: Build Kernel
        run: |
          mkdir -p out
          
          # Çevresel değişkenler
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$HOME/neutron-clang/bin:$PATH"
          export KCONFIG_CONFIG=out/.config
          
          # 1. Adım: Configleri Birleştir
          # Neutron Clang içindeki llvm araçlarını kullanması için LLVM=1 ekliyoruz
          bash scripts/kconfig/merge_config.sh -O out \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config

          # 2. Adım: Derleme
          # Burada LLVM=1 dediğimizde sistem otomatik olarak 
          # PATH'e eklediğimiz neutron-clang içindeki llvm-ar, llvm-nm vb. araçları kullanacak.
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            Image modules

      - name: Package Artifacts
        run: |
          mkdir -p build_assets
          if [ -f out/arch/arm64/boot/Image ]; then
            cp out/arch/arm64/boot/Image build_assets/
          fi
          
          # Modülleri topla
          find out -name "*.ko" -exec cp {} build_assets/ \;
          
          tar -czf xiaomi_14_kernel.tar.gz -C build_assets .

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi-14-Houji-Kernel
          path: xiaomi_14_kernel.tar.gz
