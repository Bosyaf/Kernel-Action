name: CG+ Ultimate (Yuki Clang + Özel Config)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "Usta"
      KBUILD_BUILD_HOST: "CG-Ultimate-Tezgah"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 🛠️ 1. Tezgahi Genislet ve Kaynaklari Hazirla
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: 🛠️ 2. Paketler ve YUKI CLANG (Bolt) Çekimi
        run: |
          echo "🔥 Temel paketler yükleniyor..."
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi lld llvm pkg-config zstd
          
          echo "🔥 Yuki Clang (+Bolt) İndiriliyor..."
          mkdir -p $GITHUB_WORKSPACE/yuki-clang
          wget -qO yuki.tar.zst "Https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20251211.tar.zst"
          
          echo "📦 Yuki Paketi Açılıyor..."
          tar -I zstd -xf yuki.tar.zst -C $GITHUB_WORKSPACE/yuki-clang
          rm -f yuki.tar.zst
          echo "✅ Yuki Clang Tezgaha Hazir!"

      - name: 🛠️ 3. Kaynakları Çek (Staging Dalı)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: 🛠️ 4. VortexSU ve Özel Yamalar
        run: |
          cd common
          curl -LSs "https://raw.githubusercontent.com/Kingfinik98/VortexSU/refs/heads/main/kernel/setup.sh" | bash -s main
          
          # WiFi ve BBG Yaması
          curl -fLSs https://github.com/OnePlus-12-Development/android_kernel_qcom_sm8650/commit/3e0cb08.patch > wifi.patch || true
          if [ -s wifi.patch ] && grep -q "diff" wifi.patch; then
            patch -p1 --forward < wifi.patch || true
          fi
          patch -p1 --fuzz=3 < $GITHUB_WORKSPACE/patches/bbrv3.patch || true
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' security/Kconfig || true
          
          echo "🔥 Ustanın dosyasından BTQCA kopma düzeltmesi uygulanıyor..."
          TARGET_FILE="drivers/bluetooth/btqca.h"
          if [ -f "$TARGET_FILE" ]; then
            sed -i '/QCA_WCN3998,/a\	QCA_WCN3988,' "$TARGET_FILE" || true
          fi

      - name: 🛠️ 5. Gelişmiş SUSFS Master Formülü (Ustanın Dosyalarından)
        run: |
          cd common
          git clone --depth=1 -q https://gitlab.com/simonpunk/susfs4ksu -b gki-android14-6.1 ../susfs
          cp -R ../susfs/kernel_patches/fs/* ./fs/
          cp -R ../susfs/kernel_patches/include/* ./include/
          patch -p1 --forward < ../susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true
          
          git clone https://github.com/Kingfinik98/build-vortex.git ../build-vortex
          patch -p1 --forward < ../build-vortex/kernel-patches/susfs/fs_proc_base.c-fix-k6.1.patch || true
          
          cat << 'EOF' > .ns_inject_tmp
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT
          #include <linux/susfs_def.h>
          extern bool susfs_is_current_ksu_domain(void);
          extern bool susfs_is_current_zygote_domain(void);
          extern bool susfs_is_boot_completed_triggered;
          extern bool susfs_is_sdcard_android_data_decrypted;
          static DEFINE_IDA(susfs_mnt_id_ida);
          static DEFINE_IDA(susfs_mnt_group_ida);
          #define DEFAULT_KSU_MNT_ID 100000
          #define DEFAULT_KSU_MNT_GROUP_ID 100000
          #define VFSMOUNT_MNT_FLAGS_KSU_UNSHARED_MNT BIT(24)
          #define CL_COPY_MNT_NS BIT(25)
          #endif
          EOF
          sed -i '/#include "internal.h"/r .ns_inject_tmp' ./fs/namespace.c || true
          rm -f .ns_inject_tmp
          sed -i '/#include <linux\/susfs_def.h>/i #ifndef __GENKSYMS__' fs/statfs.c
          sed -i '/#include <linux\/susfs_def.h>/a #endif' fs/statfs.c

      - name: 🛠️ 6. Ustanın Dosyalarından Efsane Config Ayarları (Birebir Kopyası)
        run: |
          cd common
          CONFIG_FILE="arch/arm64/configs/gki_defconfig"
          
          # Bizim Temel Optimizasyonumuz
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_CMDLINE "console=ttynull stack_depot_disable=on cgroup_disable=pressure kasan.page_alloc.sample=10 kasan.stacktrace=off kvm-arm.mode=protected bootconfig ioremap_guard"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CMDLINE_EXTEND
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_NONE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT
          
          # 🔥 BURADAN İTİBAREN SADECE VE SADECE USTANIN DOSYASINDAKİ AYARLAR VARDIR 🔥
          
          # Performans ve Frekans 
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TMPFS_XATTR
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TMPFS_POSIX_ACL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HZ_300
          ./scripts/config --file $CONFIG_FILE --set-val CONFIG_HZ 300
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_SCHEDUTIL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_ONDEMAND
          
          # ZRAM, MGLRU, F2FS ve I/O 
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SWAP
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_BLK_DEV_ZRAM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ZRAM_DEF_COMP_LZ4
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ZRAM_WRITEBACK
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ZRAM_MEMORY_TRACKING
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_MQ_IOSCHED_DEADLINE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEFAULT_DEADLINE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_F2FS_FS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_F2FS_FS_XATTR
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_F2FS_FS_POSIX_ACL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_F2FS_FS_COMPRESSION
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LRU_GEN
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LRU_GEN_ENABLED
          
          # Ağ ve Arayüz Optimizasyonları 
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP_NF_TARGET_TTL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_FQ
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_ADVANCED
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEFAULT_BBR
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_WESTWOOD
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP6_NF_TARGET_HL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP6_NF_MATCH_HL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_BBG
          
          # Gereksiz Hata Ayıklayıcıları Kapatma (TAMAMEN USTANIN LİSTESİ)
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_UBSAN
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PAGE_OWNER
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_RCU_TRACE
          
          # SUSFS Gizlilik Zırhları 
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_KSU_SUSFS_SUS_OVERLAYFS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_MAP
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_KSTAT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_TRY_UMOUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SPOOF_UNAME
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_KSU_SUSFS_ENABLE_LOG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_OPEN_REDIRECT
          
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG_THIN
          
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-CG-Ultimate++"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCALVERSION_AUTO
          sed -i 's/check_defconfig//' build.config.gki || true

      - name: 🛠️ 7. Yuki Clang ile Motoru Derle
        run: |
          cd common
          YUKI_BIN=$(find $GITHUB_WORKSPACE/yuki-clang -type d -name "bin" | head -n 1)
          export PATH="$YUKI_BIN:$PATH"
          
          sed -i 's/^PHONY += all/  /g' Makefile || true
          touch .scmversion
          
          cat << 'EOF' > scripts/check-local-export
          #!/bin/sh
          exit 0
          EOF
          chmod +x scripts/check-local-export
          
          echo "🔥 Defconfig Ayarlaniyor..."
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" REAL_CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            gki_defconfig
          
          echo "🔥 YUKI CLANG ILE DEV DERLEME BASLIYOR..."
          # MLGO HATASI VEREN PARÇA TAMAMEN SİLİNDİ! SAF GÜÇ DEVREDE.
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" REAL_CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            KCFLAGS="-O2 -march=armv9.2-a+crypto+crc -fno-stack-protector -fomit-frame-pointer -Wno-constant-logical-operand" \
            Image || { echo "❌ Derleme HATASI!"; exit 1; }
          
          echo "BOOTHASH=CG-Ultimate-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: 🛠️ 8. AnyKernel3 (Temiz Paketleme)
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Ultimate Yuki-Clang Kernel/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../CG-Ultimate-YukiClang.zip" ./*

      - name: 🛠️ 9. Dükkana Teslim (Release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Ultimate (Yuki Clang + Özel Config)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
