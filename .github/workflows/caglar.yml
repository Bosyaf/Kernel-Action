name: CG+ Gaming Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      DEVICE: "houji"
      KERNEL_NAME: "CG+GamingKernel"
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: 🔧 Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential clang curl flex git \
            libelf-dev libssl-dev lz4 python3 rsync \
            zip unzip cpio wget llvm lld \
            gcc-aarch64-linux-gnu zstd make

      - name: 🔥 Setup Clang
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          
          CLANG_URL=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          
          curl -L "$CLANG_URL" | tar -xz
          
          $HOME/clang/bin/clang --version

      - name: 📱 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: mvaisakh/xiaomi14
          ref: kplatform
          path: kernel
          fetch-depth: 1

      - name: ⚙️ Configure Kernel
        run: |
          cd kernel
          
          scripts/config --file arch/arm64/configs/gki_defconfig \
            --set-str CONFIG_LOCALVERSION "-CG++" \
            --disable CONFIG_LOCALVERSION_AUTO

      - name: 🏗️ Build Kernel
        run: |
          cd kernel
          
          export PATH="$HOME/clang/bin:$PATH"
          export KBUILD_BUILD_USER="${KBUILD_BUILD_USER}"
          export KBUILD_BUILD_HOST="${KBUILD_BUILD_HOST}"
          
          make ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            O=out gki_defconfig
          
          make ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            O=out -j$(nproc)
          
          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          
          mkdir -p $HOME/kernel_out
          cp out/arch/arm64/boot/Image $HOME/kernel_out/

      - name: 📦 Setup AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          path: AnyKernel3

      - name: 📝 Configure AnyKernel3
        run: |
          cd AnyKernel3
          
          cat > anykernel.sh << 'EOF'
          # AnyKernel3 Script
          
          properties() { '
          kernel.string=CG+ Gaming Kernel by caglar @ guvenc
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=houji
          device.name2=shennong
          device.name3=2311DRN6C
          device.name4=23116PN5BC
          supported.versions=14-16
          '; }
          
          . tools/ak3-core.sh
          
          dump_boot
          write_boot
          EOF
          
          cp $HOME/kernel_out/Image ./

      - name: 📦 Create ZIP
        id: zip
        run: |
          cd AnyKernel3
          
          DATE=$(date +%Y%m%d-%H%M)
          ZIP="${KERNEL_NAME}-${DEVICE}-${DATE}.zip"
          
          zip -r9 "$ZIP" * -x .git README.md *placeholder
          
          echo "file=$ZIP" >> $GITHUB_OUTPUT
          echo "path=$(pwd)/$ZIP" >> $GITHUB_OUTPUT

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.file }}
          path: ${{ steps.zip.outputs.path }}

      - name: 🎉 Summary
        run: |
          echo "### ✅ Build Success" >> $GITHUB_STEP_SUMMARY
          echo "**File:** ${{ steps.zip.outputs.file }}" >> $GITHUB_STEP_SUMMARY
