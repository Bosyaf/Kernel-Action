name: Build Android Perf Binary

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-perf:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          temp-reserve-mb: 1024
          swap-size-gb: 4

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Packages
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            git curl wget python3 build-essential flex bison \
            libelf-dev libssl-dev libcap-dev libcapstone-dev \
            libbabeltrace-dev libdw-dev libunwind-dev \
            pkg-config zlib1g-dev libperl-dev binutils-dev \
            libslang2-dev liblzma-dev libnuma-dev \
            make gcc g++ clang lld llvm \
            gcc-aarch64-linux-gnu

      - name: Clone Kernel Source
        run: |
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: Build AArch64 Perf (Non-static)
        run: |
          cd common/tools/perf
          make clean || true

          make -j"$(nproc)" \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=aarch64-linux-gnu-gcc \
            LD=aarch64-linux-gnu-ld \
            NO_LIBPYTHON=1 \
            NO_JEVENTS=1 \
            NO_LIBBPF=1 \
            NO_AUXTRACE=1 \
            NO_SDT=1 \
            NO_LIBCRYPTO=1 \
            NO_LIBPERL=1 \
            NO_LIBNUMA=1 \
            NO_GTK2=1 \
            NO_GTK=1 \
            NO_SLANG=1 \
            perf V=1 || true

          echo "=== AArch64 perf check ==="
          file perf || true
          aarch64-linux-gnu-readelf -h perf || true
          ls -lah perf || true

      - name: Collect Outputs
        run: |
          mkdir -p out
          if [ -f common/tools/perf/perf ]; then
            cp common/tools/perf/perf out/perf
            echo "✅ perf binary bulundu"
          else
            echo "❌ perf binary oluşmadı"
            exit 1
          fi

          file out/perf || true
          ls -lah out

      - name: Upload Perf Artifact
        uses: actions/upload-artifact@v4
        with:
          name: perf-binary
          path: out/perf
          if-no-files-found: error

      - name: Release Perf Binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: perf-bin-${{ github.run_id }}
          name: "perf binary build"
          files: out/perf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
