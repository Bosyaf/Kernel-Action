name: PGO Training Kernel (Final Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "pgo"

    steps:
      - name: Disk Temizle
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 16384
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Paketler
        run: |
          sudo apt update && sudo apt install -y \
            git curl wget bc bison flex libssl-dev libelf-dev \
            cpio kmod xz-utils file python3 zstd zip unzip

      - name: Yuki Clang İndir
        run: |
          URL="https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20251211.tar.zst"
          mkdir -p "$GITHUB_WORKSPACE/llvm"
          curl -LSso clang.tar.zst "$URL"
          tar --zstd -xf clang.tar.zst -C "$GITHUB_WORKSPACE/llvm"
          rm -f clang.tar.zst
          
          LLVM_DIR=$(find "$GITHUB_WORKSPACE/llvm" -type f -name clang | grep '/bin/clang$' | head -n1 | xargs dirname)
          echo "LLVM_DIR=$LLVM_DIR" >> $GITHUB_ENV
          echo "$LLVM_DIR" >> $GITHUB_PATH
          clang --version

      - name: Kernel Source
        run: |
          git clone -b android14-6.1-staging --depth=1 \
            https://github.com/ramabondanp/android_kernel_common-6.1.git kernel

      - name: AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git

      - name: 🔍 PGO Kontrolü ve Aktifleştirme
        run: |
          cd kernel
          export PATH="${{ env.LLVM_DIR }}:$PATH"
          
          echo "╔══════════════════════════════════════════════╗"
          echo "║     PGO AYARLARI TAM BAŞARIYLA UYGULANIYOR   ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          
          # 1. Temel defconfig
          echo "📋 gki_defconfig oluşturuluyor..."
          make O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            gki_defconfig > /dev/null 2>&1
          
          # 2. PGO ayarlarını direkt .config'e ekle (Kconfig'de olmasa bile geçerli olur)
          echo "🔧 PGO ve LTO ayarları ekleniyor..."
          echo "# PGO Configuration" >> out/.config
          echo "CONFIG_PGO_CLANG=y" >> out/.config
          echo "CONFIG_DEBUG_FS=y" >> out/.config
          echo "CONFIG_LTO_CLANG_THIN=y" >> out/.config
          echo "# CONFIG_CFI_CLANG is not set" >> out/.config
          
          # 3. Eski varsa sil
          sed -i '/^# CONFIG_PGO_CLANG is not set$/d' out/.config
          sed -i '/^CONFIG_CFI_CLANG=/d' out/.config
          
          # 4. İsim
          scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-PGO-TRAIN"
          
          # 5. Final defconfig ile doğrula
          echo "⚙️ Ayarlar sabitleniyor..."
          make O=out ARCH=arm64 LLVM=1 olddefconfig > /dev/null 2>&1
          
          # 6. Doğrulama
          echo ""
          echo "📊 Config Durumu:"
          grep "^CONFIG_PGO_CLANG" out/.config || echo "❌ PGO yok!"
          grep "^CONFIG_DEBUG_FS" out/.config || echo "❌ DebugFS yok!"
          grep "^CONFIG_LTO_CLANG" out/.config || echo "❌ LTO yok!"
          echo ""
          
          if ! grep -q "^CONFIG_PGO_CLANG=y" out/.config; then
            echo "❌ PGO aktif edilemedi - durduruluyor"
            exit 1
          fi
          
          echo "✅ Tüm PGO ayarları başarıyla uygulandı!"

      - name: 🚀 Kernel Derleme
        run: |
          cd kernel
          export PATH="${{ env.LLVM_DIR }}:$PATH"
          
          echo "Derleme başlıyor ($(nproc) çekirdek)..."
          START_TIME=$(date +%s)
          
          make -j$(nproc) O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld HOSTAR=llvm-ar \
            Image modules 2>&1 | tee compile.log
            
          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - START_TIME))
          
          [ -f out/arch/arm64/boot/Image ] || { echo "❌ Image yok!"; tail compile.log; exit 1; }
          
          echo "✅ Derleme Başarılı! (${BUILD_TIME}s)"

      - name: ZIP Hazırla
        run: |
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/kernel.string=.*/kernel.string=PGO Training by Caglar/' anykernel.sh
          zip -r9 ../PGO-Training-Kernel.zip ./* -x '.git*'
          echo "ZIP_NAME=PGO-Training-Kernel.zip" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pgo-${{ github.run_number }}
          files: PGO-Training-Kernel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Sonuç
        if: success()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║       ✅ PGO TRAINING KERNEL HAZIR!          ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "📦 Zip: ${{ env.ZIP_NAME }}"
          echo "🕐 Süre: ${((SECONDS / 60))}dk $((SECONDS % 60))sn"
          echo ""
          echo "📱 PROFİL TOPLAMA TALİMATLARI:"
          echo "┌───────────────────────────────────────┐"
          echo "│ 1. Flash → Boot et                   │"
          echo "│ 2. Termux/Terminal (root):           │"
          echo "│    su                                │"
          echo "│    cat /sys/kernel/debug/pgo/profraw │"
          echo "│      > /sdcard/Download/prof.dat     │"
          echo "│ 3. 30 dk ağır oyun + kullan          │"
          echo "│ 4. prof.dat dosyasını çıkar          │"
          echo "│ 5. 2. aşamada optimize build yap     │"
          echo "└───────────────────────────────────────┘"
          echo ""
