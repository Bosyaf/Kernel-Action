name: Profil Araci (PGO & BOLT Icin)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "Usta"
      KBUILD_BUILD_HOST: "Profil-Tezgahi"

    steps:
      - name: 🛠️ 1. Tezgahi Genislet
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: 🛠️ 2. Google Clang r584948 Çekimi (Hızlı Arşiv)
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd
          
          echo "🔥 Hedef: Google Clang r584948 (Arşivden) Cekiliyor..."
          mkdir -p $GITHUB_WORKSPACE/clang-llvm
          curl -L -o clang.tar.gz "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/mirror-goog-main-llvm-toolchain-source/clang-r584948.tar.gz"
          
          echo "📦 Arşiv Açılıyor..."
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-llvm
          rm -f clang.tar.gz
          echo "✅ Google Clang Tezgaha Indi."

      - name: 🛠️ 3. Kaynaklari ve AnyKernel3 Çek
        run: |
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3

      - name: 🛠️ 4. Sadece Wi-Fi Yamasi (Modüller Temizlendi)
        run: |
          cd common
          echo ">>> Wi-Fi Yamasi Uygulaniyor..."
          curl -fLSs https://github.com/OnePlus-12-Development/android_kernel_qcom_sm8650/commit/3e0cb08.patch > wifi.patch || true
          if [ -s wifi.patch ] && grep -q "diff" wifi.patch; then
            patch -p1 --forward < wifi.patch || true
          fi

      - name: 🛠️ 5. Kara Kutu Config Ayarlari (Profil Sensörleri)
        run: |
          cd common
          CONFIG_FILE="arch/arm64/configs/gki_defconfig"
          
          # --- TEMEL SENSÖRLER ---
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEBUG_INFO
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_FRAME_POINTER
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEBUG_FS
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_COMPRESSED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_REDUCED
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG_THIN
          
          # --- USTANIN EKLEDİĞİ TELEMETRİ VE HARİTA AYARLARI ---
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PERF_EVENTS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KALLSYMS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KALLSYMS_ALL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEBUG_INFO_DWARF4
          
          # Isim Damgasi
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Profil-Araci"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCALVERSION_AUTO
          sed -i 's/check_defconfig//' build.config.gki || true

      - name: 🛠️ 6. Sensörlü Kernel Derleme (Ustanin Özel Komutu)
        run: |
          cd common
          
          # Arşivden direkt çıkan bin klasörüne giden doğru yol (Path ayarı düzeltildi)
          export PATH="$GITHUB_WORKSPACE/clang-llvm/bin:$PATH"
          
          echo "🔥 Clang Testi:"
          clang --version || { echo "❌ CLANG HATASI!"; exit 1; }
          
          sed -i 's/^PHONY += all/  /g' Makefile || true
          touch .scmversion
          
          cat << 'EOF' > scripts/check-local-export
          #!/bin/sh
          exit 0
          EOF
          chmod +x scripts/check-local-export
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            gki_defconfig
          
          # 🔥 USTANIN VERDIGI DERLEME KOMUTU 🔥
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" \
            STRIP="true" \
            KCFLAGS="-O2 -fno-omit-frame-pointer -fdebug-info-for-profiling -mllvm -enable-fs-discriminator=true" \
            Image vmlinux || { echo "❌ Derleme HATASI!"; exit 1; }
          
          echo "BOOTHASH=Profil-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: 🛠️ 7. AnyKernel3 (Paketleme) ve vmlinux Hazirligi
        run: |
          # 1. Image dosyasını telefona kurmalık ZIP yapıyoruz
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=PGO BOLT Profil Kerneli/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../Profil-Kernel-Flashable.zip" ./*
          
          # 2. Devasa vmlinux haritasını bizim için ZIPliyoruz (Telefona flashlanmaz!)
          cd ..
          echo ">>> Devasa vmlinux haritasi zipleniyor..."
          zip -j "vmlinux-haritasi.zip" common/out/vmlinux

      - name: 🛠️ 8. Dükkana Teslim (Release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "PGO/BOLT Profil Çıkarma Aracı"
          files: |
            Profil-Kernel-Flashable.zip
            vmlinux-haritasi.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
