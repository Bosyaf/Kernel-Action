name: Google Clang r584948 Exact Binary Scan

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  scan-google-clang:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Paketleri Kur
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends curl xz-utils tar findutils

      - name: Google Clang r584948 İndir ve Aç
        run: |
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/mirror-goog-main-llvm-toolchain-source/clang-r584948.tar.gz"

          mkdir -p $GITHUB_WORKSPACE/clang-google
          echo "📥 Google Clang indiriliyor..."
          curl -fL "$CLANG_URL" -o clang-google.tar.gz || { echo "❌ Google Clang indirilemedi"; exit 1; }

          echo "📦 Arşiv açılıyor..."
          tar -xzf clang-google.tar.gz -C $GITHUB_WORKSPACE/clang-google || { echo "❌ Arşiv açılamadı"; exit 1; }
          rm -f clang-google.tar.gz

      - name: Exact Binary Scan
        run: |
          echo "=== clang ==="
          find $GITHUB_WORKSPACE/clang-google -type f -name clang | sort || true

          echo
          echo "=== clang++ ==="
          find $GITHUB_WORKSPACE/clang-google -type f -name clang++ | sort || true

          echo
          echo "=== llvm-profdata ==="
          find $GITHUB_WORKSPACE/clang-google -type f -name llvm-profdata | sort || true

          echo
          echo "=== llvm-profgen ==="
          find $GITHUB_WORKSPACE/clang-google -type f -name llvm-profgen | sort || true

          echo
          echo "=== llvm-bolt ==="
          find $GITHUB_WORKSPACE/clang-google -type f -name llvm-bolt | sort || true

          echo
          echo "=== merge-fdata ==="
          find $GITHUB_WORKSPACE/clang-google -type f -name merge-fdata | sort || true

          echo
          echo "=== opt ==="
          find $GITHUB_WORKSPACE/clang-google -type f -name opt | sort || true

      - name: Version Check
        run: |
          GOOGLE_CLANG="$(find $GITHUB_WORKSPACE/clang-google -type f -name clang | head -n 1)"

          if [ -z "$GOOGLE_CLANG" ]; then
            echo "❌ clang bulunamadı"
            exit 1
          fi

          GOOGLE_BIN="$(dirname "$GOOGLE_CLANG")"

          echo "=== Google clang path ==="
          echo "$GOOGLE_CLANG"

          echo
          echo "=== Google bin path ==="
          echo "$GOOGLE_BIN"

          echo
          echo "=== Version checks ==="
          "$GOOGLE_BIN/clang" --version || true
          "$GOOGLE_BIN/llvm-profdata" --version || true
          "$GOOGLE_BIN/llvm-profgen" --version || true
          "$GOOGLE_BIN/llvm-bolt" --version || true
          "$GOOGLE_BIN/merge-fdata" --version || true
          "$GOOGLE_BIN/opt" --version || true
