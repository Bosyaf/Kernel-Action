name: MI14 Boot Safe GKI Full LTO

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    env:
      KBUILD_BUILD_USER: caglar
      KBUILD_BUILD_HOST: guvenc
      PATCH_FILE: patches/0ac686b9e81ba331c2ad9b420fd21262a80daaa4.patch
      GOOGLE_CLANG_REV: r530567

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          temp-reserve-mb: 512
          swap-size-gb: 48

      - name: Checkout user repo
        uses: actions/checkout@v4

      - name: Cache Google Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/google-clang
          key: google-clang-${{ env.GOOGLE_CLANG_REV }}

      - name: Install packages
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd zip patch pahole ca-certificates

      - name: Download Google Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/google-clang"
          cd "$GITHUB_WORKSPACE/google-clang"
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${GOOGLE_CLANG_REV}.tar.gz"
          echo "Downloading ${CLANG_URL}"
          curl -L "${CLANG_URL}" | tar -xz
          test -x "$GITHUB_WORKSPACE/google-clang/bin/clang"

      - name: Show Clang version
        run: |
          "$GITHUB_WORKSPACE/google-clang/bin/clang" --version
          "$GITHUB_WORKSPACE/google-clang/bin/ld.lld" --version || true

      - name: Hardened Memory
        run: |
          sudo modprobe zram num_devices=1 2>/dev/null || true
          if [ -e /sys/block/zram0/disksize ]; then
            sudo swapoff /dev/zram0 2>/dev/null || true
            echo 1 | sudo tee /sys/block/zram0/reset >/dev/null 2>&1 || true
            echo lz4 | sudo tee /sys/block/zram0/comp_algorithm >/dev/null 2>&1 || true
            echo 16G | sudo tee /sys/block/zram0/disksize >/dev/null
            sudo mkswap /dev/zram0
            sudo swapon -p 100 /dev/zram0
          fi

          sudo sysctl -w vm.overcommit_memory=1
          sudo sysctl -w vm.swappiness=200
          sudo sysctl -w vm.vfs_cache_pressure=500
          sudo sysctl -w vm.dirty_ratio=10
          sudo sysctl -w vm.dirty_background_ratio=5
          sudo sysctl -w vm.max_map_count=2097152
          sudo sysctl -w vm.page-cluster=0

          free -h
          swapon --show

      - name: Clone sources
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          git clone --depth 1 https://github.com/Xiaomi-SM8650-houji/Xiaomi_Kernel_OpenSource.git xiaomi-oss

          COMMON_URL="https://github.com/ramabondanp/android_kernel_common-6.1.git"
          if git ls-remote --exit-code --heads "$COMMON_URL" android14-6.1 >/dev/null 2>&1; then
            COMMON_BRANCH="android14-6.1"
          else
            COMMON_BRANCH="android14-6.1-staging"
          fi

          echo "Using common branch: $COMMON_BRANCH"
          git clone -b "$COMMON_BRANCH" "$COMMON_URL" --depth 1 common
          echo "COMMON_BRANCH=$COMMON_BRANCH" >> "$GITHUB_ENV"

      - name: Apply selected patch only
        run: |
          PATCH_PATH="$GITHUB_WORKSPACE/$PATCH_FILE"
          echo "Selected patch: $PATCH_PATH"

          if [ ! -f "$PATCH_PATH" ]; then
            echo "HATA: Patch bulunamadı: $PATCH_PATH"
            ls -lah "$GITHUB_WORKSPACE/patches" || true
            exit 1
          fi

          cd common

          if git apply --check "$PATCH_PATH"; then
            git apply --3way "$PATCH_PATH"
          else
            patch --dry-run -p1 < "$PATCH_PATH"
            patch -p1 < "$PATCH_PATH"
          fi

          grep -n "ANDROID_KABI_USE(6, struct sysv_sem sysvsem)" include/linux/sched.h >/dev/null || {
            echo "HATA: SYSVIPC patch doğrulanamadı"
            exit 1
          }

      - name: Detect Xiaomi config fragments
        run: |
          XIAOMI_CFG="$(find "$GITHUB_WORKSPACE/xiaomi-oss" -type f -name 'xiaomi_GKI.config' | head -n 1 || true)"
          HOUJI_CFG="$(find "$GITHUB_WORKSPACE/xiaomi-oss" -type f -name 'houji_GKI.config' | head -n 1 || true)"
          PINEAPPLE_CFG="$(find "$GITHUB_WORKSPACE/xiaomi-oss" -type f \( -name 'pineapple_GKI.config' -o -name 'pineapple*GKI*.config' \) | head -n 1 || true)"

          echo "XIAOMI_CFG=$XIAOMI_CFG" >> "$GITHUB_ENV"
          echo "HOUJI_CFG=$HOUJI_CFG" >> "$GITHUB_ENV"
          echo "PINEAPPLE_CFG=$PINEAPPLE_CFG" >> "$GITHUB_ENV"

          echo "Detected:"
          echo "XIAOMI_CFG=$XIAOMI_CFG"
          echo "HOUJI_CFG=$HOUJI_CFG"
          echo "PINEAPPLE_CFG=$PINEAPPLE_CFG"

      - name: Configure kernel
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/google-clang/bin:$PATH"

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            gki_defconfig

          MERGE_LIST=""
          if [ -n "${XIAOMI_CFG}" ] && [ -f "${XIAOMI_CFG}" ]; then
            MERGE_LIST="${MERGE_LIST} ${XIAOMI_CFG}"
          fi
          if [ -n "${HOUJI_CFG}" ] && [ -f "${HOUJI_CFG}" ]; then
            MERGE_LIST="${MERGE_LIST} ${HOUJI_CFG}"
          fi
          if [ -n "${PINEAPPLE_CFG}" ] && [ -f "${PINEAPPLE_CFG}" ]; then
            MERGE_LIST="${MERGE_LIST} ${PINEAPPLE_CFG}"
          fi

          if [ -n "${MERGE_LIST}" ]; then
            echo "Merging config fragments:"
            echo "${MERGE_LIST}"
            scripts/kconfig/merge_config.sh -m -O out out/.config ${MERGE_LIST}
          fi

          CONFIG_FILE="out/.config"

          ./scripts/config --file "$CONFIG_FILE" --set-str CONFIG_CMDLINE "console=ttynull bootconfig"
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_CMDLINE_EXTEND

          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_KPROBES
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_HAVE_KPROBES
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_KPROBE_EVENTS
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_SYSVIPC

          # Full LTO
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_LTO_NONE
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_THINLTO
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_LTO_CLANG
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_LTO_CLANG_FULL
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE

          # GKI/vendor uyumu için güvenli
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_TRIM_UNUSED_KSYMS
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_MODVERSIONS
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_MODULE_FORCE_LOAD
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_MODULE_SIG_FORCE

          # Derleme RAM tüketimi azalt
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_DEBUG_INFO
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_DEBUG_INFO_DWARF4 || true
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_DEBUG_INFO_DWARF5 || true
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_GDB_SCRIPTS || true
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_DEBUG_INFO_BTF || true

          ./scripts/config --file "$CONFIG_FILE" --set-str CONFIG_LOCALVERSION "-MI14-BootSafe-FullLTO"
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_LOCALVERSION_AUTO

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            olddefconfig

          echo "=== FINAL CONFIG CHECK ==="
          grep -E "CONFIG_LTO_CLANG_FULL|CONFIG_SYSVIPC|CONFIG_MODVERSIONS|CONFIG_TRIM_UNUSED_KSYMS|CONFIG_MODULE_FORCE_LOAD|CONFIG_DEBUG_INFO|CONFIG_CFI|CONFIG_KCFI" out/.config || true

      - name: Build kernel
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/google-clang/bin:$PATH"

          touch .scmversion
          ulimit -n 65535 || true

          printf '%s\n' '#!/bin/sh' 'exit 0' > scripts/check-local-export
          chmod +x scripts/check-local-export

          THREAD_FLAG=""
          if ld.lld --help | grep -q -- '--no-threads'; then
            THREAD_FLAG="--no-threads"
          elif ld.lld --help | grep -q -- '--threads='; then
            THREAD_FLAG="--threads=1"
          fi
          echo "LLD thread flag: ${THREAD_FLAG}"

          sync
          echo 3 | sudo tee /proc/sys/vm/drop_caches >/dev/null
          free -h
          swapon --show

          make -j1 O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            LDFLAGS_vmlinux="--export-dynamic ${THREAD_FLAG}" \
            Image || { echo "❌ BUILD FAILED"; free -h; exit 1; }

          test -f out/arch/arm64/boot/Image || { echo "HATA: Image oluşmadı"; exit 1; }

          echo "BOOTHASH=MI14-BootSafe-FullLTO-$(date +%s%N | cut -c1-10)" >> "$GITHUB_ENV"

      - name: Pack AnyKernel3
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=MI14 Boot Safe GKI Full LTO/' anykernel.sh || true
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh || true
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh || true
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh || true

          cp ../common/out/arch/arm64/boot/Image .
          zip -r ../MI14-BootSafe-GKI-FullLTO.zip ./*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MI14-BootSafe-GKI-FullLTO
          path: |
            MI14-BootSafe-GKI-FullLTO.zip
            common/out/arch/arm64/boot/Image
          if-no-files-found: error

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: MI14 Boot Safe GKI Full LTO
          files: MI14-BootSafe-GKI-FullLTO.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
