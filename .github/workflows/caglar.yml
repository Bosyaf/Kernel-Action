      - name: 7. Kernel Derleme (8 Gen 3 Ultra Build)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          
          sed -i 's/^PHONY += all/  /g' Makefile || true
          touch .scmversion
          
          cat << 'EOF' > scripts/check-local-export
          #!/bin/sh
          exit 0
          EOF
          chmod +x scripts/check-local-export
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            gki_defconfig
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            olddefconfig
          
          # ═══════════════════════════════════════════════════════════════
          # 🎮 GAMING OPTIMIZED CFLAGS FOR SNAPDRAGON 8 GEN 3
          # ═══════════════════════════════════════════════════════════════
          # -O3: Maximum optimization (aggressive inlining, loop unrolling)
          # -march=armv9.2-a: Full ARMv9.2 support (Cortex-X4 architecture)
          # +sve2: Scalable Vector Extension 2 (SIMD acceleration for games)
          # +sve2-bitperm: Bit permutation instructions
          # +crypto: Hardware crypto acceleration
          # +crc: CRC32 instructions
          # +dotprod: Dot product (ML/AI acceleration in games)
          # +i8mm: Int8 matrix multiply (AI upscaling)
          # +bf16: BFloat16 (AI features in games)
          # +profile: Profiling support
          # -mtune=cortex-x4: Optimize for Cortex-X4 Prime core
          # -fno-stack-protector: Remove stack canary overhead
          # -fomit-frame-pointer: Free up a register
          # -fno-plt: Direct calls (faster)
          # -fmerge-all-constants: Merge identical constants
          # -fdata-sections -ffunction-sections: Dead code elimination
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O3 -march=armv9.2-a+sve2+sve2-bitperm+crypto+crc+dotprod+i8mm+bf16 -mtune=cortex-x4 -fno-stack-protector -fomit-frame-pointer -fno-plt -fmerge-all-constants -fdata-sections -ffunction-sections -finline-functions -funroll-loops -fvectorize -fslp-vectorize -Wno-error -Wno-unused -Wno-constant-logical-operand" \
            LDFLAGS="-Wl,--gc-sections -Wl,-O3 -Wl,--as-needed -Wl,--sort-common" \
            Image || { echo "❌ Derleme HATASI!"; exit 1; }
          
          echo "BOOTHASH=ZyC-Gaming-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: 8. AnyKernel3 (Gaming Package)
        run: |
          cd ./AnyKernel3
          
          # Update anykernel.sh for Mi14
          cat > anykernel.sh << 'AKEOF'
          # AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers
          
          ## AnyKernel setup
          properties() { '
          kernel.string=CG++ Gaming Kernel for Xiaomi 14 (8 Gen 3)
          do.devicecheck=0
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=houji
          device.name2=shennong
          device.name3=aurora
          device.name4=xiaomi14
          supported.versions=
          supported.patchlevels=
          '; }
          
          # shell variables
          block=boot;
          is_slot_device=auto;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          
          . tools/ak3-core.sh;
          
          ## AnyKernel boot install
          dump_boot;
          write_boot;
          AKEOF
          
          cp ../common/out/arch/arm64/boot/Image .
          zip -r9 "../CG-Gaming-Kernel-8Gen3-$(date +%Y%m%d).zip" ./*

