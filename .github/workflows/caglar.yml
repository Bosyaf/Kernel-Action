name: Build Kernel - Xiaomi 14 (houji)

on:
  workflow_dispatch:
  push:
    branches:
      - houji-shennong-u-oss

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison flex libssl-dev libelf-dev \
            binutils-aarch64-linux-gnu \
            make gcc g++ \
            libncurses-dev \
            zstd tar wget \
            python3 cpio

      - name: Download Neutron Clang
        run: |
          mkdir -p $HOME/neutron-clang
          wget -q \
            https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/10032024/neutron-clang-10032024.tar.zst \
            -O neutron-clang.tar.zst
          tar -I zstd -xf neutron-clang.tar.zst -C $HOME/neutron-clang
          echo "$HOME/neutron-clang/bin" >> $GITHUB_PATH

      - name: Verify Clang
        run: clang --version

      - name: Merge and generate kernel config
        run: |
          mkdir -p out

          # Tüm config katmanlarını sırayla birleştir
          cat arch/arm64/configs/gki_defconfig \
              configs/vendor/pineapple_GKI.config \
              configs/vendor/houji_GKI.config \
              configs/vendor/houji_consolidate.config \
              > out/merged.config

          # merge_config.sh'in yaptığı şeyin aynısı:
          # birleşik config'i KCONFIG_ALLCONFIG olarak ver,
          # eksik sembolleri default ile doldur
          make O=out \
            ARCH=arm64 \
            SUBARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1 \
            KCONFIG_ALLCONFIG=out/merged.config \
            alldefconfig

      - name: Build kernel
        run: |
          make O=out \
            ARCH=arm64 \
            SUBARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1 \
            -j$(nproc) \
            Image.gz modules 2>&1 | tee out/build.log

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-houji-${{ github.sha }}
          path: |
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/Image
            out/build.log
            
