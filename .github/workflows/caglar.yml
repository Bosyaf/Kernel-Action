name: caglar++ Kernel (PGO GENERATE CLEAN + WIFI)

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "pgo-gen"

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt update -qq
          sudo apt install -y \
            git curl bc bison flex libssl-dev make libc6-dev \
            libncurses5-dev lld llvm zstd gcc-aarch64-linux-gnu

      - name: Clang
        run: |
          curl -L -o clang.tar.zst "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst"
          mkdir clang
          tar -I zstd -xf clang.tar.zst -C clang
          rm clang.tar.zst

      - name: Source
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1
          git clone https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      # 🔥 WIFI PATCH BURADA
      - name: Apply WiFi Patch
        run: |
          cd common

          echo ">>> WiFi patch indiriliyor..."
          curl -fLSs https://github.com/OnePlus-12-Development/android_kernel_qcom_sm8650/commit/3e0cb08.patch -o wifi.patch || true

          if [ -s wifi.patch ] && grep -q "diff" wifi.patch; then
            echo ">>> WiFi patch uygulanıyor..."
            patch -p1 --forward < wifi.patch || true
          else
            echo ">>> WiFi patch boş veya indirilemedi, skip"
          fi

      - name: CONFIG (PGO GENERATE)
        run: |
          cd common
          CFG=arch/arm64/configs/gki_defconfig

          # 🔥 PGO GENERATE
          ./scripts/config --file $CFG --enable CONFIG_PGO_CLANG
          ./scripts/config --file $CFG --enable CONFIG_DEBUG_FS

          # ❗ USE kapalı olacak
          ./scripts/config --file $CFG --disable CONFIG_PGO_CLANG_USE

          # ❗ LTO kapalı (çok önemli)
          ./scripts/config --file $CFG --disable CONFIG_LTO_CLANG_THIN

          # stabil config
          ./scripts/config --file $CFG --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE

          ./scripts/config --file $CFG --set-str CONFIG_LOCALVERSION "-PGO-GEN"

      - name: BUILD
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            gki_defconfig

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

          make -j$(nproc) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld \
            KCFLAGS="-O2" \
            Image

      - name: PACK
        run: |
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image .
          zip -r ../PGO-GEN.zip ./*
