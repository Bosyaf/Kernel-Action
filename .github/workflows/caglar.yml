name: Kernel PGO Generate (Ultra Minimal Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            git curl wget bc bison flex build-essential \
            libssl-dev libelf-dev cpio kmod xz-utils file python3

      - name: Download ZyC Clang
        run: |
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          
          mkdir -p "$GITHUB_WORKSPACE/clang"
          curl -L "$CLANG_URL" -o clang.tar.gz
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang"
          rm -f clang.tar.gz

          echo "=== Toolchain tree ==="
          find "$GITHUB_WORKSPACE/clang" -maxdepth 4 -type f | sort | head -n 100

          CLANG_BIN=$(find "$GITHUB_WORKSPACE/clang" -type f -path "*/bin/clang" | head -n 1)
          if [ -z "$CLANG_BIN" ]; then
            echo "❌ clang bulunamadı"
            find "$GITHUB_WORKSPACE/clang" -type f | grep -E 'clang|ld.lld|llvm-ar' || true
            exit 1
          fi

          CLANG_DIR="$(dirname "$CLANG_BIN")"

          echo "CLANG_DIR=$CLANG_DIR" >> $GITHUB_ENV
          echo "$CLANG_DIR" >> $GITHUB_PATH

          echo "✅ clang: $CLANG_BIN"
          "$CLANG_DIR/clang" --version
          "$CLANG_DIR/ld.lld" --version || true
          "$CLANG_DIR/llvm-ar" --version || true

      - name: Clone Kernel
        run: |
          git clone --depth=1 -b android14-6.1-staging \
            https://github.com/ramabondanp/android_kernel_common-6.1.git kernel

      - name: Build (PGO Generate)
        run: |
          cd kernel

          export PATH="${{ env.CLANG_DIR }}:$PATH"

          echo "=== PATH tools ==="
          which clang || true
          which ld.lld || true
          which llvm-ar || true

          clang --version
          ld.lld --version || true

          make O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            gki_defconfig

          scripts/config --file out/.config --enable CONFIG_DEBUG_FS
          scripts/config --file out/.config --enable CONFIG_PGO_CLANG

          # varsa aktif olur, yoksa olddefconfig düşürür
          scripts/config --file out/.config --enable CONFIG_PGO_CLANG_KERNEL || true

          make O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            olddefconfig

          echo "=== Final config check ==="
          grep "CONFIG_PGO_CLANG" out/.config || true
          grep "CONFIG_DEBUG_FS" out/.config || true
          grep "CONFIG_LTO_CLANG" out/.config || true

          make -j$(nproc) O=out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            Image

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: kernel-pgo
          path: kernel/out/arch/arm64/boot/Image
