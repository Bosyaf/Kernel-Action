name: CG+ Houji Full Pure Engineering Final

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketleri Kur
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd

      - name: 2. Clang r487747c Önbellek (Cache)
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/official-clang
          key: clang-r487747c-android14-v1

      - name: 3. Resmi Clang r487747c İndir (Sadece Cache Yoksa)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/official-clang
          git clone --depth=1 -b android14-release https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 ${{ github.workspace }}/clang-repo
          cp -r ${{ github.workspace }}/clang-repo/clang-r487747c/* ${{ github.workspace }}/official-clang/
          rm -rf ${{ github.workspace }}/clang-repo

      - name: 4. Kaynak Kodlarını Çek (Eksik Kütüphaneler Dahil)
        run: |
          # 1. Ana Kernel Motoru
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14.git ${{ github.workspace }}/common
          
          # 2. Senin Taze Donanım Haritaların
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14-devicetrees.git ${{ github.workspace }}/houji-dt
          
          # 3. EKSİK OLAN SES VE KAMERA KÜTÜPHANELERİ (Hatanın Çözümü Burada)
          mkdir -p ${{ github.workspace }}/common/vendor/qcom/opensource
          git clone --depth=1 https://github.com/LineageOS/android_vendor_qcom_opensource_audio-kernel.git ${{ github.workspace }}/common/vendor/qcom/opensource/audio-kernel
          git clone --depth=1 https://github.com/LineageOS/android_vendor_qcom_opensource_camera-kernel.git ${{ github.workspace }}/common/vendor/qcom/opensource/camera-kernel
          
          # 4. AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 5. Donanım Haritası Enjeksiyonu ve Header Fix
        run: |
          # Önce yolu temizle ve senin dosyalarını enjekte et
          rm -rf ${{ github.workspace }}/common/arch/arm64/boot/dts/vendor
          mkdir -p ${{ github.workspace }}/common/arch/arm64/boot/dts/vendor
          cp -r ${{ github.workspace }}/houji-dt/* ${{ github.workspace }}/common/arch/arm64/boot/dts/vendor/
          
          # KRİTİK: 'bindings' klasörünü ve dışarıdan gelen headerları sisteme tanıt
          # Bu sayede 'msm-camera.h' gibi dosyalar bulunabilecek
          mkdir -p ${{ github.workspace }}/common/include/dt-bindings/msm
          cp -r ${{ github.workspace }}/common/vendor/qcom/opensource/camera-kernel/include/dt-bindings/msm/* ${{ github.workspace }}/common/include/dt-bindings/msm/ || true
          cp -r ${{ github.workspace }}/houji-dt/bindings/* ${{ github.workspace }}/common/include/dt-bindings/ || true
          
          # Makefile bağlantısı
          if ! grep -q "vendor/" ${{ github.workspace }}/common/arch/arm64/boot/dts/Makefile; then
            echo "obj-y += vendor/" >> ${{ github.workspace }}/common/arch/arm64/boot/dts/Makefile
          fi
          
          # Clang yerleşimi
          mkdir -p ${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c
          cp -r ${{ github.workspace }}/official-clang/* ${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/
          
          echo "✅ Enjeksiyon ve Header kütüphaneleri tamam!"

      - name: 6. Config Merge
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig
          ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-Houji-Pure"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig

      - name: 7. Derleme (Image + Modules + DTBS)
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          # DTC_FLAGS ile donanım klasörlerini derleyiciye zorla gösteriyoruz
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 -D__ANDROID_COMMON_KERNEL__ -Wno-error" \
            DTC_FLAGS="-i ${{ github.workspace }}/common/arch/arm64/boot/dts/vendor/qcom -i ${{ github.workspace }}/common/include" \
            Image modules dtbs || echo "⚠️ Bazı DTB hataları olabilir, ama qcom olanlara bakacağız."

      - name: 8. Paketleme (Final Stripped Package)
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          mkdir -p modules/vendor/lib/modules
          
          # 1. Image
          cp $GITHUB_WORKSPACE/common/out/arch/arm64/boot/Image . || exit 1
          
          # 2. DTBO MERGER (0 byte lanetini bitiren yer)
          echo "🔍 Houji DTBO parçaları toplanıyor..."
          find $GITHUB_WORKSPACE/common/out/arch/arm64/boot/dts/vendor/ -name "*.dtbo" -exec cat {} + > dtbo.img
          
          # 3. MODÜLLERİ TEMİZLE VE TOPLA (248MB -> 40MB)
          find $GITHUB_WORKSPACE/common/out -name "*.ko" -exec $GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin/llvm-strip --strip-debug {} \;
          find $GITHUB_WORKSPACE/common/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \;
          
          # Kontrol Logları
          echo "📊 SONUÇ ÖZETİ:"
          ls -lh Image
          ls -lh dtbo.img
          echo "📦 Modül Sayısı: $(find modules -name "*.ko" | wc -l)"
          du -sh modules/vendor/lib/modules/
          
          zip -r9 "../CG-Houji-Official-Final.zip" ./* -x .git*

      - name: 9. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Houji-Final-${{ github.run_id }}
          name: "Xiaomi 14 (HOUJI) Full Package - FINAL"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
