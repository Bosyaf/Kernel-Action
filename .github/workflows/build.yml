name: Build Kernel with Timestamp Release

on:
  workflow_dispatch:  # 手动触发
  push:
    tags:
      - "houji-6.1-*"
    branches: [ "houji-shennong-u-oss" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整提交历史

      - name: Generate Timestamp
        id: timestamp
        run: |
          # 生成北京时间（格式：年月日-时分）
          TZ='Asia/Shanghai'
          TIMESTAMP=$(date +"%Y%m%d-%H%M")
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Setup Dynamic Tag
        id: dynamic-tag
        run: |
          # 如果触发的是 tag 事件，保留原 tag 名称
          if [[ ${{ github.event_name }} == 'push' && ${{ startsWith(github.ref, 'refs/tags/') }} ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            # 手动触发或分支推送时使用时间戳 + 短提交 SHA
            COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=auto-${{ steps.timestamp.outputs.timestamp }}-${COMMIT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Print Tag Info
        run: |
          echo "Using Tag: ${{ steps.dynamic-tag.outputs.tag }}"
          echo "Trigger Event: ${{ github.event_name }}"

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential bc rsync libncurses-dev flex bison \
            libssl-dev libelf-dev dwarves zstd lz4 python3 python3-pip \
            android-sdk-libsparse-utils clang gcc
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu libc6-dev-arm64-cross      # ARM64 C++ 标准库开发文件


      - name: Build Kernel
        run: |
          git clone https://github.com/lavajCN/kernel_xiaomi_houji-shennong-spec
          cd kernel_xiaomi_houji-shennong-spec
          
          # 实际构建命令（示例）
          make -j$(nproc --all) ARCH=arm64 CLANG_TRIPLE=aarch64-linux-gnu- \
              CROSS_COMPILE=aarch64-linux-gnu- \

          # 打包产物
          mkdir -p ../artifact
          cp arch/arm64/boot/Image ../artifact/
          tar czvf ../artifact/kernel-${{ steps.dynamic-tag.outputs.tag }}.tar.gz -C out/arch/arm64/boot/ .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.dynamic-tag.outputs.tag }}  # 动态生成的 Tag
          name: "Kernel Build (${{ steps.dynamic-tag.outputs.tag }})"
          files: |
            artifact/Image
            artifact/*.tar.gz
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto Push Tag (For non-tag triggers)
        if: ${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/') }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag ${{ steps.dynamic-tag.outputs.tag }}
          git push origin ${{ steps.dynamic-tag.outputs.tag }}
