name: CG+ Xiaomi 14 (HOUJI) Pure Official Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve Kaynak Kodunu Çek
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd libelf-dev libssl-dev
          
          # Kaynağı çek
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14.git $GITHUB_WORKSPACE/common
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 2. Resmi Google Clang (r487747c) Kurulumu
        run: |
          echo "🔥 Resmi Google Clang r487747c indiriliyor (Git Clone)..."
          # Tar hatası almamak için doğrudan git üzerinden çekiyoruz
          mkdir -p $GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/clang-r487747c $GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c
          
          echo "$GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin" >> $GITHUB_PATH

      - name: 3. HOUJI Full (Consolidate) Config Hazırlığı
        run: |
          cd $GITHUB_WORKSPACE/common
          export PATH="$GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          # Derleyici değişkenlerini sisteme tanıt
          export CLANG_PATH=$GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin
          
          # 1. Temel GKI config
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            gki_defconfig
          
          # 2. Houji Consolidate Merge (HOUJI Özel Sürücüler)
          # LLVM=1 ile merge sırasında GCC'ye kaçmasını engelliyoruz
          LLVM=1 LLVM_IAS=1 ARCH=arm64 ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config
          
          # 3. Localversion ve Gereksiz Ayarları Temizleme
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-Houji-Official"
          
          # 4. Son defconfig kontrolü
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            olddefconfig

      - name: 4. Derleme (Güvenli Mod -O2)
        run: |
          cd $GITHUB_WORKSPACE/common
          export PATH="$GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          # KCFLAGS -O2 ve resmi bayraklarla derleme
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            CC="clang" \
            LD="ld.lld" \
            AR="llvm-ar" \
            NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" \
            OBJDUMP="llvm-objdump" \
            STRIP="llvm-strip" \
            KCFLAGS="-O2 -D__ANDROID_COMMON_KERNEL__" \
            Image dtbo.img
            
          echo "BOOTHASH=Houji-Official-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 5. Paketleme
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Houji Official (Xiaomi 14)/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          [ -f ../common/out/arch/arm64/boot/dtbo.img ] && cp ../common/out/arch/arm64/boot/dtbo.img .
          
          zip -r "../CG-Houji-Official-SM8650.zip" ./*

      - name: 6. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (HOUJI) Official Google Clang Build"
          body: |
            - Build: Houji Full Consolidate
            - Compiler: Google Clang r487747c (Official)
            - Optimization: -O2
            - Note: No custom mods, pure source.
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
