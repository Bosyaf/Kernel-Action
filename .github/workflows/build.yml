name: Build Xiaomi houji kernel (monolithic)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build houji_defconfig
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    env:
      KERNEL_REPO:    https://github.com/Bosyaf/xiaomi14.git
      KERNEL_BRANCH:  monolithic
      DEFCONFIG:      houji_defconfig
      ARCH:           arm64
      SUBARCH:        arm64

    steps:
      # ----------------------------------------------------------
      # 1. Disk / paket / araç hazırlığı
      # ----------------------------------------------------------
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -a -f || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git ccache automake flex lzop bison gperf build-essential zip curl jq \
            zlib1g-dev libxml2-utils bzip2 libbz2-dev \
            squashfs-tools schedtool dpkg-dev liblz4-tool \
            make libssl-dev pwgen libswitch-perl policycoreutils \
            libxml-sax-base-perl libxml-simple-perl bc \
            xsltproc unzip device-tree-compiler \
            python3 python3-pip rsync cpio kmod libelf-dev wget xz-utils \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu

      # ----------------------------------------------------------
      # 2. Kernel kaynağı
      # ----------------------------------------------------------
      - name: Checkout kernel source
        run: |
          git clone --depth=1 -b "${KERNEL_BRANCH}" "${KERNEL_REPO}" kernel
          cd kernel
          echo "Kernel HEAD: $(git rev-parse HEAD)"
          test -f arch/arm64/configs/houji_defconfig
          head -3 Makefile

      # ----------------------------------------------------------
      # 3. Toolchain (AOSP Clang prebuilt - ZyCromerZ mirror)
      # ----------------------------------------------------------
      - name: Download AOSP Clang toolchain
        run: |
          set -e
          mkdir -p toolchain/clang && cd toolchain/clang

          REL_JSON=$(curl -s https://api.github.com/repos/ZyCromerZ/Clang/releases/latest)
          TAR_URL=$(echo "$REL_JSON" | jq -r '.assets[] | select(.name|test("Clang.*tar\\.gz$")) | .browser_download_url' | head -n1)
          echo "Downloading: $TAR_URL"

          curl -L --retry 3 --fail -o clang.tar.gz "$TAR_URL"
          tar -xf clang.tar.gz
          rm -f clang.tar.gz

          ls bin/clang
          ./bin/clang --version

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: houji-kernel-ccache
          max-size: 5G

      # ----------------------------------------------------------
      # 4. Build (sadece houji_defconfig - ekleme/değişiklik YOK)
      # ----------------------------------------------------------
      - name: Build kernel (houji_defconfig)
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:/usr/lib/ccache:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="github"
          export KBUILD_BUILD_HOST="actions"

          MAKE_ARGS=(
            ARCH=arm64
            O=out
            LLVM=1
            LLVM_IAS=1
            CC="ccache clang"
            HOSTCC="ccache clang"
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          )

          # 1) defconfig
          make "${MAKE_ARGS[@]}" "${DEFCONFIG}"

          # 2) Image + modules + dtbs
          make -j"$(nproc --all)" "${MAKE_ARGS[@]}" \
               Image Image.gz modules dtbs 2>&1 | tee build.log

          echo "=== Build artifacts ==="
          ls -lh out/arch/arm64/boot/ || true
          find out/arch/arm64/boot/dts -name "*.dtb" 2>/dev/null | head || true

      # ----------------------------------------------------------
      # 5. Çıktı toplama
      # ----------------------------------------------------------
      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p artifacts
          cp -v kernel/out/arch/arm64/boot/Image          artifacts/ 2>/dev/null || true
          cp -v kernel/out/arch/arm64/boot/Image.gz       artifacts/ 2>/dev/null || true
          cp -v kernel/out/arch/arm64/boot/Image.gz-dtb   artifacts/ 2>/dev/null || true
          cp -v kernel/out/arch/arm64/boot/dtbo.img       artifacts/ 2>/dev/null || true
          if [ -d kernel/out/arch/arm64/boot/dts ]; then
            mkdir -p artifacts/dtbs
            find kernel/out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} artifacts/dtbs/ \;
          fi
          cp -v kernel/build.log     artifacts/ 2>/dev/null || true
          cp -v kernel/out/.config   artifacts/houji_defconfig.built 2>/dev/null || true
          ls -lhR artifacts || true

      - name: Upload kernel artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: houji-kernel-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
          
