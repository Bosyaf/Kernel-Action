name: Xiaomi 14 Houji - Normal Build Log

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bc bison build-essential flex git libssl-dev \
            libelf-dev python3 wget zip cpio curl dwarves \
            which pahole rsync unzip xz-utils lz4 zstd \
            gcc-aarch64-linux-gnu
          pahole --version

      - name: Setup Neutron Clang
        run: |
          mkdir -p "$HOME/toolchains/neutron-clang"
          cd "$HOME/toolchains/neutron-clang"
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S
          echo "$HOME/toolchains/neutron-clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        run: |
          git clone -b monolithic-test-2 https://github.com/mvaisakh/xiaomi14.git --depth=1 msm-kernel

      - name: Normal Build
        run: |
          chmod +x msm-kernel/build/build.sh
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"

          export ROOT_DIR=$GITHUB_WORKSPACE
          export KERNEL_DIR=msm-kernel
          export BUILD_CONFIG=msm-kernel/build.config.msm.pineapple
          export VARIANT=consolidate
          export OUT_DIR=$GITHUB_WORKSPACE/out
          export DIST_DIR=$GITHUB_WORKSPACE/dist
          export LLVM=1
          export LLVM_IAS=1
          export TARGET_PRODUCT=houji

          bash msm-kernel/build/build.sh 2>&1 | tee $GITHUB_WORKSPACE/build.log

      - name: Show Outputs
        if: always()
        run: |
          echo "=== IMG DOSYALARI ==="
          find $GITHUB_WORKSPACE -type f \( -name "*.img" -o -name "Image" \) | sort || true

          echo "=== KO DOSYALARI ==="
          find $GITHUB_WORKSPACE -type f -name "*.ko" | head -200 || true

      - name: Print Error Summary
        if: failure()
        run: |
          echo "=== SON 120 SATIR ==="
          tail -n 120 $GITHUB_WORKSPACE/build.log || true

          echo "=== HATA SATIRLARI ==="
          grep -n -i -E "error:|fatal error:|undefined reference|No rule to make target|FAILED|wlan|qcacld|cnss" \
            $GITHUB_WORKSPACE/build.log | tail -n 100 || true

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload Dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/**
            out/dist/**
