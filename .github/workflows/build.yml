name: CG+ Yuki Houji (Kernel Only Test)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/clang-yuki
          key: clang-yuki-bolt-20260124

      - name: Download Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang-yuki
          curl -L "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst" | tar --zstd -xC $GITHUB_WORKSPACE/clang-yuki

      - name: Cache Kernel Source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/common
          key: kernel-source-ramabondanp-6.1-staging-${{ github.sha }}
          restore-keys: |
            kernel-source-ramabondanp-

      - name: Clone Kernel Source
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: Clone Device Trees
        run: |
          git clone -b kplatform --depth=1 https://github.com/mvaisakh/xiaomi14-devicetrees.git dt_tmp

      - name: Integrate Device Trees
        run: |
          cd common
          
          echo "📦 Device tree dosyaları kopyalanıyor..."
          
          # Houji DTS dosyaları
          cp -v ../dt_tmp/qcom/houji* arch/arm64/boot/dts/qcom/ || true
          
          # Pineapple DTS dosyaları
          cp -v ../dt_tmp/qcom/pineapple* arch/arm64/boot/dts/qcom/ || true
          
          # Include klasörleri
          cp -rv ../dt_tmp/qcom/audio arch/arm64/boot/dts/qcom/ || true
          cp -rv ../dt_tmp/qcom/camera arch/arm64/boot/dts/qcom/ || true
          cp -rv ../dt_tmp/qcom/display arch/arm64/boot/dts/qcom/ || true
          
          # Bindings
          cp -rv ../dt_tmp/bindings/* Documentation/devicetree/bindings/ || true
          
          rm -rf ../dt_tmp
          
          echo "✅ Device trees entegre edildi!"
          echo "📋 DTS dosyaları:"
          ls arch/arm64/boot/dts/qcom/houji* || true

      - name: Build Kernel (Test)
        id: build
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-yuki/bin:$PATH"
          
          echo "🔥 Derleme başlıyor..."
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            gki_defconfig 2>&1 | tee config.log
          
          # Config ayarları (sadece temel)
          ./scripts/config --file out/.config --set-val CONFIG_HZ 300
          ./scripts/config --file out/.config --enable CONFIG_PREEMPT
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-Houji-Test"
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig 2>&1 | tee olddefconfig.log
          
          # DERLE (hataları yakala)
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            Image 2>&1 | tee build.log || echo "BUILD_FAILED=1" >> $GITHUB_ENV
          
          # Hataları özetle
          echo ""
          echo "=== BUILD HATALARI (İlk 30) ==="
          grep -i "error:" build.log | head -30 || echo "Hata yok!"
          
          echo ""
          echo "=== BUILD UYARILARI (İlk 20) ==="
          grep -i "warning:" build.log | head -20 || echo "Uyarı yok!"

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            common/config.log
            common/olddefconfig.log
            common/build.log

      - name: Check Build Status
        run: |
          if [ -f "$GITHUB_ENV" ] && grep -q "BUILD_FAILED=1" $GITHUB_ENV; then
            echo "❌ Build başarısız! Logları kontrol et."
            exit 1
          else
            echo "✅ Build başarılı!"
          fi
