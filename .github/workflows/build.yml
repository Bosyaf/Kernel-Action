name: CG+ Yuki Gaming Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/clang-yuki
          key: clang-yuki-bolt-20260124
          restore-keys: |
            clang-yuki-

      - name: Download Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/clang-yuki"
          curl -L "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst" | tar --zstd -xC "$GITHUB_WORKSPACE/clang-yuki"

      - name: Install Packages
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd patch gawk

      - name: Clone Sources
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: KernelSU-Next + Multi-Manager
        run: |
          cd common

          rm -rf drivers/kernelsu KernelSU KernelSU-Next drivers/staging/kernelsu
          sed -i '/kernelsu/d' drivers/Kconfig 2>/dev/null || true
          sed -i '/kernelsu/d' drivers/Makefile 2>/dev/null || true

          git clone https://github.com/pershoot/KernelSU-Next.git -b dev-susfs --depth=1 KernelSU-Next

          cd KernelSU-Next
          patch -p1 --forward < "$GITHUB_WORKSPACE/patches/ksu/ksun-add-more-managers-support.patch" || true
          cd ..

          mkdir -p drivers/kernelsu
          cp -a KernelSU-Next/kernel/. drivers/kernelsu/

          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          echo 'obj-y += kernelsu/' >> drivers/Makefile

          APP_PROFILE_SRC="$(find KernelSU-Next -type f -name app_profile.h | head -n1 || true)"
          if [ -z "$APP_PROFILE_SRC" ]; then
            echo "app_profile.h not found in KernelSU-Next"
            exit 1
          fi

          mkdir -p drivers/kernelsu/include/uapi drivers/kernelsu/uapi include/uapi
          cp -f "$APP_PROFILE_SRC" drivers/kernelsu/include/uapi/app_profile.h
          cp -f "$APP_PROFILE_SRC" drivers/kernelsu/uapi/app_profile.h
          cp -f "$APP_PROFILE_SRC" include/uapi/app_profile.h

          test -f drivers/kernelsu/Kbuild
          test -f drivers/kernelsu/include/uapi/app_profile.h
          echo "KernelSU installation done"

      - name: SUSFS + Hotfixes
        run: |
          cd common

          SUSFS_BRANCH="gki-android14-6.1"
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b $SUSFS_BRANCH susfs

          cp -a susfs/kernel_patches/fs/. fs/
          cp -a susfs/kernel_patches/include/. include/
          patch -p1 --forward < "susfs/kernel_patches/50_add_susfs_in_${SUSFS_BRANCH}.patch" || true

          if ! grep -q "static DEFINE_IDA(susfs_mnt_id_ida)" fs/namespace.c; then
            cat > /tmp/ns_inject.txt << 'EOF'
            
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT
          #include <linux/susfs_def.h>
          #include <linux/jump_label.h>
          extern bool susfs_is_current_ksu_domain(void);
          extern struct static_key_false susfs_set_sdcard_android_data_decrypted_key_false;
          #define CL_COPY_MNT_NS BIT(25)
          static DEFINE_IDA(susfs_mnt_id_ida);
          static DEFINE_IDA(susfs_mnt_group_ida);
          #define DEFAULT_KSU_MNT_ID 500000
          #define DEFAULT_KSU_MNT_GROUP_ID 5000
          #define VFSMOUNT_MNT_FLAGS_KSU_UNSHARED_MNT 0x80000000
          #endif
          EOF
            sed -i '/#include "internal.h"/r /tmp/ns_inject.txt' fs/namespace.c
          fi

          if grep -q '#include <linux/susfs_def.h>' fs/statfs.c; then
            if ! grep -q '__GENKSYMS__' fs/statfs.c; then
              sed -i '/#include <linux\/susfs_def.h>/i #ifndef __GENKSYMS__' fs/statfs.c
              sed -i '/#include <linux\/susfs_def.h>/a #endif' fs/statfs.c
            fi
          fi

          patch -p1 --forward < "$GITHUB_WORKSPACE/patches/susfs/fs_proc_base.c-fix-k6.1.patch" || true

          if [ -f drivers/kernelsu/extras.c ] && ! grep -q "susfs_avc_log_spoofing_key_true" drivers/kernelsu/extras.c; then
            cat > /tmp/avc_fix.txt << 'EOF'
          #ifdef CONFIG_KSU_SUSFS
          #ifndef susfs_avc_log_spoofing_key_true
          __attribute__((weak))
          struct static_key_true susfs_avc_log_spoofing_key_true = STATIC_KEY_TRUE_INIT;
          #endif
          #endif
          EOF
            LAST_INC="$(grep -n '^#include' drivers/kernelsu/extras.c | tail -1 | cut -d: -f1)"
            [ -n "$LAST_INC" ] && sed -i "${LAST_INC}r /tmp/avc_fix.txt" drivers/kernelsu/extras.c
          fi

          if [ -f drivers/kernelsu/supercalls.c ]; then
            sed -i 's/#ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME/#if 0 \/* disabled *\//' drivers/kernelsu/supercalls.c || true
          fi

          test -f include/linux/susfs.h
          test -f include/linux/susfs_def.h
          echo "SUSFS installation done"

      - name: Wi-Fi + Baseband Guard
        run: |
          cd common

          curl -fLSs https://github.com/OnePlus-12-Development/android_kernel_qcom_sm8650/commit/3e0cb08.patch > wifi.patch || true
          [ -s wifi.patch ] && patch -p1 --forward < wifi.patch || true
          rm -f wifi.patch

          wget -qO- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash || true
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' security/Kconfig || true

      - name: Extra Performance Patches
        run: |
          cd common
          if [ -d "../patches" ]; then
            for f in ../patches/*.patch; do
              patch -p1 --forward < "$f" || true
            done
          fi

      - name: Configure Kernel
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-yuki/bin:$PATH"

          touch .scmversion
          printf '#!/bin/sh\nexit 0\n' > scripts/check-local-export
          chmod +x scripts/check-local-export

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 gki_defconfig
          C=out/.config

          ./scripts/config --file $C --set-str CONFIG_CMDLINE "console=ttynull stack_depot_disable=on cgroup_disable=pressure kvm-arm.mode=protected bootconfig ioremap_guard noirqdebug quiet kasan.page_alloc.sample=0 kasan.stacktrace=off kasan=off slub_debug=- page_owner=off"
          ./scripts/config --file $C --enable CONFIG_CMDLINE_EXTEND
          ./scripts/config --file $C --disable CONFIG_HZ_100
          ./scripts/config --file $C --disable CONFIG_HZ_250
          ./scripts/config --file $C --enable CONFIG_HZ_300
          ./scripts/config --file $C --disable CONFIG_HZ_1000
          ./scripts/config --file $C --set-val CONFIG_HZ 300

          ./scripts/config --file $C --enable CONFIG_KSU
          ./scripts/config --file $C --enable CONFIG_KSU_MULTI_MANAGER_SUPPORT
          ./scripts/config --file $C --enable CONFIG_KSU_ALLOWLIST_WORKAROUND

          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT || true
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SUS_KSTAT
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SUS_KSTAT_SPOOF_GENERIC || true
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT || true
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT || true
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSTAT || true
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SPOOF_UNAME || true
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_ENABLE_LOG || true
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SUS_SU || true
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS || true
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG || true
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_OPEN_REDIRECT || true

          ./scripts/config --file $C --enable CONFIG_BBG
          ./scripts/config --file $C --set-str CONFIG_LSM "landlock,lockdown,yama,loadpin,safesetid,integrity,selinux,baseband_guard,bpf"

          ./scripts/config --file $C --set-str CONFIG_LOCALVERSION "-C-G+"
          ./scripts/config --file $C --disable CONFIG_LOCALVERSION_AUTO

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

          echo "===== CHECK ====="
          grep -E 'CONFIG_KSU=|CONFIG_KSU_SUSFS=|CONFIG_KSU_MULTI_MANAGER_SUPPORT=|CONFIG_BBG=|CONFIG_LSM=' out/.config || true
          test -f drivers/kernelsu/include/uapi/app_profile.h
          echo "Config check done"

      - name: Build Kernel
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-yuki/bin:$PATH"

          make -j"$(nproc --all)" O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            KCFLAGS="-O2 -march=armv9.2-a+crypto+sha3+crc+dotprod+rcpc+lse -falign-functions=64 -fomit-frame-pointer -ffunction-sections -fdata-sections -fno-delete-null-pointer-checks -Wno-constant-logical-operand" \
            KLDFLAGS="-Wl,--gc-sections -Wl,--as-needed -Wl,--icf=safe -Wl,-O2" \
            Image

          echo "BOOTHASH=Yuki-$(date +%s)" >> "$GITHUB_ENV"

      - name: AnyKernel3
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Yuki Balanced Pro/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          echo "device.name1=houji" >> anykernel.sh
          echo "device.name2=shennong" >> anykernel.sh
          echo "device.name3=aurora" >> anykernel.sh
          echo "device.name4=xiaomi14" >> anykernel.sh
          cp ../common/out/arch/arm64/boot/Image .
          zip -r ../CG-Yuki-Balanced-Pro.zip ./*

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Yuki Clang (Balanced Pro)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
