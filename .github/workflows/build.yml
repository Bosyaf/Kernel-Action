name: CG+ Galadriel (Pure Hardware Build)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve Yuki Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
            
          CLANG_URL="https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst"
          curl -fLSs "$CLANG_URL" -o clang.tar.zst
          mkdir -p $GITHUB_WORKSPACE/clang-yuki
          tar -I zstd -xf clang.tar.zst -C $GITHUB_WORKSPACE/clang-yuki
          rm -f clang.tar.zst
          echo "$GITHUB_WORKSPACE/clang-yuki/bin" >> $GITHUB_PATH

      - name: 2. Kaynakları Çek (Kernel + Senin Donanım Repon)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          # Ana Kernel
          git clone -b android14-6.1-staging https://github.com/Bosyaf/android_kernel_common-6.1.git --depth=1 common
          # Senin verdiğin Donanım Reposu (kplatform branch)
          mkdir -p vendor/qcom/opensource
          git clone -b kplatform https://github.com/Bosyaf/xiaomi14-devicetrees.git vendor/qcom/opensource

      - name: 3. DTS ve Altyapı Hazırlığı
        run: |
          cd common
          # Repondaki tüm DTS/DTSI dosyalarını kernel ağacına kopyalıyoruz
          mkdir -p arch/arm64/boot/dts/vendor/qcom/pineapple
          find ../vendor/qcom/opensource -name "*.dts" -o -name "*.dtsi" -exec cp {} arch/arm64/boot/dts/vendor/qcom/pineapple/ \;
          
          # Mi 14 (houji) Ses DTBO kaydı
          [ -f arch/arm64/boot/dts/vendor/qcom/pineapple/Makefile ] && echo "dtbo-y += houji-sm8650-audio.dtbo" >> arch/arm64/boot/dts/vendor/qcom/pineapple/Makefile
          
          touch .scmversion

      - name: 4. Defconfig ve Donanım Şalterleri
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-yuki/bin:$PATH"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 gki_defconfig
          CONFIG_FILE="out/.config"
          
          # Donanım sürücüleri için gerekli GKI kancalarını aktif et
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SND
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SND_SOC
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_VIDEO_V4L2
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CFG80211
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM_QCOM_CPUFREQ_HW
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_COMMON_CLK_QCOM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCSI_UFS_QCOM
          
          # Versiyon ismi
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Galadriel-HW"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCALVERSION_AUTO
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: 5. Ana Kernel ve DTBS Derleme
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-yuki/bin:$PATH"
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-Wno-error" \
            Image modules dtbs

      - name: 6. REPODAKİ TÜM DONANIMLARI DERLE (Sırasıyla)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-yuki/bin:$PATH"
          KERNEL_OUT="$GITHUB_WORKSPACE/common/out"
          HW_ROOT="$GITHUB_WORKSPACE/vendor/qcom/opensource"
          
          # Senin repondaki tüm klasörlerin listesi
          HW_DIRS="audio bt camera data display dsp eSE eva fingerprint graphics mm mm-sys mmrm nfc synx video wlan"
          
          for dir in $HW_DIRS; do
            if [ -d "$HW_ROOT/$dir" ]; then
              echo "🛠️  Derleniyor: $dir ..."
              # Klasörün içinde Makefile veya Kbuild var mı?
              if [ -f "$HW_ROOT/$dir/Makefile" ] || [ -f "$HW_ROOT/$dir/Kbuild" ]; then
                make -j$(nproc --all) -C $HW_ROOT/$dir \
                  O=$KERNEL_OUT ARCH=arm64 LLVM=1 LLVM_IAS=1 \
                  KERNEL_SRC=$GITHUB_WORKSPACE/common \
                  KBUILD_EXTRA_SYMBOLS=$KERNEL_OUT/Module.symvers \
                  M=$HW_ROOT/$dir || echo "⚠️  $dir başarısız, atlanıyor."
              fi
            fi
          done

      - name: 7. AnyKernel3 Paketleme
        run: |
          cd ./AnyKernel3
          cp ../common/out/arch/arm64/boot/Image .
          # Tüm DTBO'ları topla
          find ../common/out/arch/arm64/boot/dts/ -name "*.dtbo" -exec cp {} . \;
          
          # Tüm modülleri topla (.ko)
          mkdir -p modules/vendor/lib/modules
          find ../common/out -name "*.ko" -exec cp -v {} modules/vendor/lib/modules/ \;
          
          sed -i 's/kernel.string=.*/kernel.string=CG+ Galadriel Mi 14 HW/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          
          zip -r "../CG-Galadriel-HW.zip" ./*

      - name: 8. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: HW-BUILD-${{ github.run_id }}
          name: "CG+ Galadriel Mi 14 Full Hardware Build"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
