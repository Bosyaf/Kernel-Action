name: Bosyaf MONOLITHIC (Built-in Vendor)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "bos"
      KBUILD_BUILD_HOST: "yaf"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz || { echo "HATA!"; exit 1; }
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> "$GITHUB_PATH"

      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b monolithic-test-2 https://github.com/Bosyaf/xiaomi14.git --depth=1 common

      - name: 3. MONOLITHIC Config (consolidate = built-in vendor)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          mkdir -p out

          # 1. Base GKI
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 gki_defconfig

          # 2. Pineapple GKI
          scripts/kconfig/merge_config.sh -m -O out/ \
            out/.config arch/arm64/configs/vendor/pineapple_GKI.config

          # 3. CONSOLIDATE - Vendor driver'lari built-in yap (CONFIG_*=y)
          scripts/kconfig/merge_config.sh -m -O out/ \
            out/.config arch/arm64/configs/consolidate.fragment

          # 4. Pineapple consolidate config
          scripts/kconfig/merge_config.sh -m -O out/ \
            out/.config arch/arm64/configs/vendor/pineapple_consolidate.config

          # 5. Houji device
          scripts/kconfig/merge_config.sh -m -O out/ \
            out/.config arch/arm64/configs/vendor/houji_GKI.config

          # 6. Finalize
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig
          
          echo "CONFIG check:"
          grep -E "CONFIG_QCOM_|CONFIG_MSM_" out/.config | grep "=y" | head -10

      - name: 4. Kernel Derle (Her şey built-in)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            Image dtbs

          if [ ! -f out/arch/arm64/boot/Image ]; then
            echo "HATA!"; exit 1
          fi
          
          IMAGE_SIZE=$(stat -c%s out/arch/arm64/boot/Image)
          echo "Image boyutu: $((IMAGE_SIZE / 1024 / 1024)) MB (buyuk olmali - vendor built-in)"
          ls -lh out/arch/arm64/boot/Image

      - name: 5. AnyKernel3 Vendor Modul Temizleyici Ekle
        run: |
          cd AnyKernel3
          
          # anykernel.sh'a vendor modul temizleme ekle
          cat >> anykernel.sh << 'EOF'

# Vendor ramdisk modullerini devre disi birak (monolithic kernel)
ui_print " "
ui_print "Vendor moduller devre disi birakiliyor..."

# Vendor lib modules temizle
if [ -d /vendor/lib/modules ]; then
  rm -rf /vendor/lib/modules/*.ko
  rm -f /vendor/lib/modules/modules.load
  rm -f /vendor/lib/modules/modules.dep
  rm -f /vendor/lib/modules/modules.alias
  echo "# Monolithic kernel - no external modules" > /vendor/lib/modules/modules.load
fi

# Vendor_dlkm mount edilmisse onu da temizle
VENDOR_DLKM=$(find /dev/block -name vendor_dlkm 2>/dev/null | head -1)
if [ -n "$VENDOR_DLKM" ]; then
  ui_print "vendor_dlkm partition temizleniyor..."
  mkdir -p /tmp/vendor_dlkm
  mount -o rw $VENDOR_DLKM /tmp/vendor_dlkm 2>/dev/null
  if [ $? -eq 0 ]; then
    rm -rf /tmp/vendor_dlkm/lib/modules/*.ko
    echo "# Monolithic kernel" > /tmp/vendor_dlkm/lib/modules/modules.load
    umount /tmp/vendor_dlkm
  fi
fi

ui_print "Vendor moduller temizlendi - monolithic kernel aktif"
EOF

          # Device info
          sed -i 's/kernel.string=.*/kernel.string=Bosyaf MONOLITHIC/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh

      - name: 6. Paketleme (Sadece Image + DTBs)
        run: |
          cd AnyKernel3
          
          # Image
          cp ../common/out/arch/arm64/boot/Image .
          
          # DTBs
          find ../common/out/arch/arm64/boot/dts/vendor -name "*.dtb" -exec cp {} . \; 2>/dev/null || true
          
          # MODUL YOK - hepsi built-in!
          
          echo "Paket icerigi:"
          ls -lh Image *.dtb 2>/dev/null
          echo "Image boyutu (MB): $(($(stat -c%s Image) / 1024 / 1024))"
          
          zip -r9 "../Bosyaf-MONOLITHIC-Houji-$(date +%Y%m%d-%H%M).zip" ./*

      - name: 7. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "houji-mono-$(date +%Y%m%d-%H%M)"
          name: "Bosyaf MONOLITHIC - Houji"
          body: |
            ### Mi 14 Houji - MONOLITHIC Kernel
            ⚠️ Vendor ramdisk modulleri devre disi - TUM driver'lar built-in
            - Consolidate build - vendor drivers Image icinde
            - Vendor modulleri otomatik temizlenir
            - OTA sonrasi yeniden flash gerekebilir
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
