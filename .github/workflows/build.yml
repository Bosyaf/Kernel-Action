name: Houji (Mi 14) Official Source Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve Resmi AOSP Clang r487747
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make \
            gcc-aarch64-linux-gnu pkg-config zstd
          echo "🔧 Resmi AOSP Clang r487747 indiriliyor..."
          mkdir -p $GITHUB_WORKSPACE/clang
          
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/788f1e86014660a5230ba4e9f52c39d5b393cd2b/clang-r487747.tar.gz"
          
          success=false
          for i in {1..3}; do
            if curl -fL --retry 3 --retry-delay 5 "$CLANG_URL" -o clang.tar.gz; then
              if tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang; then
                success=true
                break
              fi
            fi
            echo "⚠️ İndirme veya açma başarısız, tekrar deneniyor ($i/3)..."
            rm -f clang.tar.gz
            sleep 5
          done
          if [ "$success" = false ]; then
            echo "❌ Google sunucusu reddetti, yedek (mirror) kaynaktan r487747 çekiliyor..."
            curl -fL --retry 3 "https://raw.githubusercontent.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-r487747/14.0/clang-r487747.tar.gz" -o clang.tar.gz || \
            wget -q "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main-kernel-build-2024/clang-r487747c.tar.gz" -O clang.tar.gz
            tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang
          fi
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH
          
          echo "🔍 Araçlar kontrol ediliyor:"
          ls $GITHUB_WORKSPACE/clang/bin/ | grep -E "clang|ld.lld|llvm-ar"
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          $GITHUB_WORKSPACE/clang/bin/clang --version | head -1

      - name: 2. Xiaomi Mi 14 (shennong-u-oss) Kaynak Kodu
        run: |
          echo "📦 Xiaomi Mi 14 (houji) orijinal kaynak kodu çekiliyor..."
          git clone -b shennong-u-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            --depth=1 common
          echo "✅ Source hazır."

      - name: 2.5 Eksik Kconfig Dosyalarını Tamamla
        run: |
          cd common
          echo "🔧 Eksik Kconfig kaynakları kontrol ediliyor..."

          # === Bilinen eksik: drivers/misc/hwid/Kconfig ===
          mkdir -p drivers/misc/hwid
          cat > drivers/misc/hwid/Kconfig << 'KCEOF'
          #
          # XIAOMI_HWID - Placeholder (proprietary, removed from OSS tree)
          #
          config XIAOMI_HWID
                  bool "Xiaomi Hardware ID support"
                  default n
                  help
                    Placeholder for proprietary Xiaomi HWID module.
                    This module is not available in the open-source release.
          KCEOF
          echo "✅ drivers/misc/hwid/Kconfig oluşturuldu"

          # === Genel tarama: Kaynak kodda referans verilen ama dosyası olmayan Kconfig'ler ===
          echo "🔍 Tüm eksik Kconfig referansları taranıyor..."
          grep -rn 'source "' --include='Kconfig*' . 2>/dev/null | \
            sed -n 's/.*source "\([^"]*\)".*/\1/p' | sort -u | while read ref; do
              # Yolu kök dizine göre çözümle
              target="$ref"
              if [ ! -f "$target" ]; then
                echo "⚠️  Eksik: $target → Placeholder oluşturuluyor"
                mkdir -p "$(dirname "$target")"
                echo "# Auto-generated placeholder for missing $target" > "$target"
              fi
          done

          # source '...' (tek tırnak) versiyonunu da tara
          grep -rn "source '" --include='Kconfig*' . 2>/dev/null | \
            sed -n "s/.*source '\([^']*\)'.*/\1/p" | sort -u | while read ref; do
              if [ ! -f "$ref" ]; then
                echo "⚠️  Eksik: $ref → Placeholder oluşturuluyor"
                mkdir -p "$(dirname "$ref")"
                echo "# Auto-generated placeholder for missing $ref" > "$ref"
              fi
          done

          echo "✅ Kconfig düzeltmeleri tamamlandı."

      - name: 3. Config Birleştirme (Full Official Layout)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 gki_defconfig
          ./scripts/kconfig/merge_config.sh -m -O out out/.config arch/arm64/configs/vendor/pineapple_GKI.config
          ./scripts/kconfig/merge_config.sh -m -O out out/.config arch/arm64/configs/vendor/pineapple_consolidate.config
          ./scripts/kconfig/merge_config.sh -m -O out out/.config arch/arm64/configs/vendor/houji_GKI.config
          ./scripts/kconfig/merge_config.sh -m -O out out/.config arch/arm64/configs/vendor/houji_consolidate.config
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig
          echo "✅ Configler başarıyla birleştirildi."

      - name: 4. Derleme (Image + DTBO + Modüller)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          echo "🚀 Derleme başlatılıyor..."
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            Image Image.gz Image.lz4 dtbo.img modules 2>&1 | tee build.log
          echo "BUILD_TAG=houji-official-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 5. Çıktıları Paketle
        run: |
          mkdir -p dist/modules
          cp common/out/arch/arm64/boot/Image* dist/ 2>/dev/null || true
          cp common/out/arch/arm64/boot/dtbo.img dist/ 2>/dev/null || true
          find common/out -name "*.ko" -exec cp {} dist/modules/ \;
          cp common/out/Module.symvers dist/ 2>/dev/null || true
          cp common/build.log dist/ 2>/dev/null || true
          echo "📦 Toplam Modül Sayısı: $(ls dist/modules/ | wc -l)"

      - name: 6. Sonuçları Yükle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_TAG }}
          path: dist/
