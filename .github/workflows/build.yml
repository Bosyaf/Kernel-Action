name: Xiaomi 14 (Houji) Pure Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Kernel İsmi"
        required: false
        default: "Galadriel-Pure"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 16384
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Install Dependencies & Toolchain
        run: |
          sudo apt update -qq && sudo apt install -y python3 git curl build-essential flex bison libssl-dev libelf-dev bc cpio zip device-tree-compiler
          mkdir -p $GITHUB_WORKSPACE/clang
          curl -fLSs "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz" | tar -xzf - -C $GITHUB_WORKSPACE/clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel & DeviceTrees
        run: |
          # 1. Kernel Gövdesi
          git clone -b kplatform https://github.com/mvaisakh/xiaomi14.git source --depth=1
          
          # 2. Cihaz Ağacı (Beyin) - Tam olarak dts/vendor içine klonluyoruz
          # Önce mevcut olan link dosyasını siliyoruz
          rm -f source/arch/arm64/boot/dts/vendor
          git clone -b kplatform https://github.com/mvaisakh/xiaomi14-devicetrees.git source/arch/arm64/boot/dts/vendor --depth=1

      - name: Config Merge (Houji Tam Donanım)
        run: |
          cd source
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          OUT_DIR=$GITHUB_WORKSPACE/out
          mkdir -p $OUT_DIR
          
          # Config birleştirme sırası (Hiyerarşik)
          # 1. Temel GKI
          # 2. Pineapple GKI + Houji GKI
          # 3. Consolidate (GKI kısıtlamalarını kaldıran parçalar)
          scripts/kconfig/merge_config.sh -m -O $OUT_DIR \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/consolidate.fragment \
            arch/arm64/configs/vendor/pineapple_consolidate.config \
            arch/arm64/configs/vendor/houji_consolidate.config

          # İsmi güncelle ve config'i kesinleştir
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"-${{ github.event.inputs.kernel_name }}\"/" $OUT_DIR/.config
          make O=$OUT_DIR ARCH=arm64 LLVM=1 olddefconfig

      - name: Build Kernel, DTBs & Modules
        run: |
          cd source
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          OUT_DIR=$GITHUB_WORKSPACE/out
          
          # DTB Include yollarını dts/vendor içine yönlendiriyoruz (Header hatalarını bu çözer)
          # -I flagi bindings klasörünü bulmasını sağlar
          export DTC_INCLUDE="-I$(pwd)/arch/arm64/boot/dts/vendor -I$(pwd)/arch/arm64/boot/dts/vendor/qcom"

          # 1. Image derle
          make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 LLVM=1 LLVM_IAS=1 Image
          
          # 2. DTB ve DTBO derle
          make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 LLVM=1 LLVM_IAS=1 \
               DTC_FLAGS="${DTC_INCLUDE} -Wno-graph_child_address -Wno-interrupt_provider" \
               dtbs

          # 3. Modülleri derle
          make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 LLVM=1 LLVM_IAS=1 modules

      - name: Package with AnyKernel3
        run: |
          AK3=$GITHUB_WORKSPACE/AnyKernel3
          OUT=$GITHUB_WORKSPACE/out
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 $AK3
          
          # Dosyaları yerleştir
          cp $OUT/arch/arm64/boot/Image $AK3/
          mkdir -p $AK3/dtb $AK3/dtbo
          find $OUT/arch/arm64/boot/dts/vendor -name "*.dtb" -exec cp {} $AK3/dtb/ \;
          find $OUT/arch/arm64/boot/dts/vendor -name "*.dtbo" -exec cp {} $AK3/dtbo/ \;
          
          # Modülleri yerleştir
          mkdir -p $AK3/modules/vendor/lib/modules
          find $OUT -name "*.ko" -exec cp {} $AK3/modules/vendor/lib/modules/ \;

          # AnyKernel Ayarları
          cd $AK3
          sed -i "s/kernel.string=.*/kernel.string=${{ github.event.inputs.kernel_name }}/" anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=xiaomi14' anykernel.sh
          
          zip -r "../Houji-Kernel.zip" ./*

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Houji-${{ github.run_id }}
          name: "Xiaomi 14 (Houji) ${{ github.event.inputs.kernel_name }}"
          files: "Houji-Kernel.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
