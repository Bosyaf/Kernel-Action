name: WLAN Hızlı Fix Testi

on:
  workflow_dispatch:

jobs:
  build-wlan:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Paketler ve ZyC Clang
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz || { echo "HATA!"; exit 1; }
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> "$GITHUB_PATH"

      - name: Kaynakları Çek
        run: |
          git clone -b monolithic-test-2 https://github.com/Bosyaf/xiaomi14.git --depth=1 common

      - name: WLAN PATCH UYGULA
        run: |
          cd common
          
          # DOSYA 1: wlan_cfg80211.h (cfg80211 API fix)
          WLAN_CFG_FILE="techpack/wlan/qcacld-3.0/cmn/os_if/linux/wlan_cfg80211.h"
          
          # cfg80211_ch_switch_notify(dev, chandef) -> cfg80211_ch_switch_notify(dev, chandef, 0, 0)
          sed -i 's/cfg80211_ch_switch_notify(dev, chandef);/cfg80211_ch_switch_notify(dev, chandef, 0, 0);/g' $WLAN_CFG_FILE
          
          # cfg80211_ch_switch_started_notify(dev, chandef, count) -> cfg80211_ch_switch_started_notify(dev, chandef, 0, count, false, 0)
          sed -i 's/cfg80211_ch_switch_started_notify(dev, chandef, count);/cfg80211_ch_switch_started_notify(dev, chandef, 0, count, false, 0);/g' $WLAN_CFG_FILE

          # DOSYA 2: i_qdf_mem.h (IOMMU macro fix)
          IOMMU_MEM_FILE="techpack/wlan/qcacld-3.0/cmn/qdf/linux/src/i_qdf_mem.h"
          
          # Eksik IOMMU makrolarını dosyanın başına (include'lardan sonra) ekle
          sed -i '/#include <linux\/dma-mapping.h>/a \
          \
          /* QCOM IOMMU KERNEL 6.1 COMPATIBILITY */ \
          #ifndef QCOM_IOMMU_MAPPING_CONF_S1_BYPASS \
          #define QCOM_IOMMU_MAPPING_CONF_S1_BYPASS 0 \
          #define QCOM_IOMMU_MAPPING_CONF_ATOMIC    1 \
          #define QCOM_IOMMU_MAPPING_CONF_FAST      2 \
          static inline int qcom_iommu_get_mappings_configuration(struct iommu_domain *domain) { return QCOM_IOMMU_MAPPING_CONF_FAST; } \
          #endif \
          ' $IOMMU_MEM_FILE
          
          echo "WLAN Patchleri uygulandi!"

      - name: Sadece WLAN Derle (Hızlı Test)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          
          # Hızlı config
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 houji_defconfig
          
          # Warningleri error yapmayı engelle
          export KCFLAGS="-Wno-error=multistatement-macros -Wno-error=enum-int-mismatch -Wno-error=uninitialized"
          export HOSTCFLAGS="-Wno-error"
          
          # Sadece WLAN techpack'i derle! (Tüm kerneli beklemeyiz)
          echo "WLAN modul derlemesi basliyor..."
          make -j$(nproc) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            techpack/wlan/qcacld-3.0/
          
          echo "WLAN DERLEMESI BASARILI!"
