name: CG+ Yuki Gaming Kernel (Pershoot KSU-Next + SUSFS + BBG)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 8192

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/clang-zyc
          key: clang-zyc-22-20250928-${{ runner.os }}
          restore-keys: |
            clang-zyc-

      - name: Download Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          echo "ZyC Clang 22 indiriliyor..."
          curl -fLSs "https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz
          echo ">>> Clang indirme tamamlandi."

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison libssl-dev \
            libncurses-dev liblz4-tool zlib1g-dev libxml2-utils rsync unzip \
            dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu lld llvm \
            pkg-config zstd jq patch

      - name: Clone Sources
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 AnyKernel3
          git clone -b android14-6.1-staging \
            https://github.com/ramabondanp/android_kernel_common-6.1.git \
            --depth=1 common

      - name: Setup Clang PATH
        run: echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> $GITHUB_PATH

      - name: Integrate KernelSU-Next + MultiManager
        run: |
          cd common

          echo ">>> KernelSU-Next (pershoot/dev-susfs) klonlaniyor..."
          git clone -b dev-susfs --depth=1 \
            https://github.com/pershoot/KernelSU-Next.git ksu_tmp

          echo ">>> Repo icerigi:"
          ls ksu_tmp/

          mkdir -p drivers/kernelsu

          # Pershoot dev-susfs: kernel/ klasoru varsa icini kopyala, yoksa kok dizini kopyala
          if [ -d "ksu_tmp/kernel" ]; then
            echo ">>> kernel/ klasoru bulundu, icerik kopyalaniyor..."
            rsync -a ksu_tmp/kernel/ drivers/kernelsu/
          else
            echo ">>> kernel/ klasoru yok, kok dizinden kopyalaniyor..."
            rsync -a --exclude='.git' ksu_tmp/ drivers/kernelsu/
          fi

          rm -rf ksu_tmp

          echo ">>> drivers/kernelsu icerigi:"
          ls drivers/kernelsu/

          # MultiManager: manager.c'yi bul ve guvvenli sekilde yamala
          MGR=$(find drivers/kernelsu -name "manager.c" | head -n1)
          if [ -n "$MGR" ]; then
            echo ">>> manager.c bulundu: $MGR"
            python3 - "$MGR" << 'PYEOF'
          import sys, re

          path = sys.argv[1]
          with open(path, 'r') as f:
              content = f.read()

          target = 'static bool is_manager_apk(const char *package_name)'
          patch_marker = '/* MULTIMANAGER_PATCHED */'

          if patch_marker not in content:
              # Fonksiyon imzasini bul, govdesini koru ama her zaman true don
              content = content.replace(
                  target,
                  patch_marker + '\n' + target
              )
              # Fonksiyon govdesinin ilk satirina early return ekle
              content = re.sub(
                  r'(/* MULTIMANAGER_PATCHED */
' +
                  re.escape(target) +
                  r's*{)',
                  r'\1\n    return true; /* MultiManager: allow all managers */\n#if 0 /* original logic disabled */',
                  content,
                  count=1
              )
              # Kapanan parantezden once endif ekle (ilk eslesen)
              idx = content.find(patch_marker)
              depth = 0
              i = content.find('{', idx)
              while i < len(content):
                  if content[i] == '{':
                      depth += 1
                  elif content[i] == '}':
                      depth -= 1
                      if depth == 0:
                          content = content[:i] + '#endif\n' + content[i:]
                          break
                  i += 1
              with open(path, 'w') as f:
                  f.write(content)
              print(">>> MultiManager yamasi uygulandi:", path)
          else:
              print(">>> Zaten yamali, atlaniyor:", path)
          PYEOF
          else
            echo ">>> manager.c bulunamadi, MultiManager atlaniyor"
          fi

          # Kconfig entegrasyonu
          if ! grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig 2>/dev/null; then
            if grep -q '^endmenu' drivers/Kconfig 2>/dev/null; then
              sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
            else
              printf '\nsource "drivers/kernelsu/Kconfig"\n' >> drivers/Kconfig
            fi
            echo ">>> drivers/Kconfig guncellendi."
          fi

          # Makefile entegrasyonu
          if ! grep -q 'kernelsu' drivers/Makefile 2>/dev/null; then
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
            echo ">>> drivers/Makefile guncellendi."
          fi

          echo ">>> KSU entegrasyonu tamamlandi."

      - name: Integrate SUSFS (Pershoot susfs4ksu)
        run: |
          cd common

          echo ">>> pershoot/susfs4ksu (gki-android14-6.1-dev) klonlaniyor..."
          git clone -b gki-android14-6.1-dev --depth=1 \
            https://gitlab.com/pershoot/susfs4ksu.git susfs_tmp

          echo ">>> susfs4ksu repo icerigi:"
          ls susfs_tmp/

          # fs/susfs klasorunu bul
          SUSFS_DIR=$(find susfs_tmp -type d -name "susfs" | head -n1)

          if [ -z "$SUSFS_DIR" ]; then
            echo "HATA: susfs klasoru bulunamadi!"
            echo "Tum dizin yapisi:"
            find susfs_tmp -type d
            exit 1
          fi

          echo ">>> susfs klasoru bulundu: $SUSFS_DIR"
          mkdir -p fs/susfs
          rsync -a "$SUSFS_DIR/" fs/susfs/

          # Header dosyalari - find + exec kullan (pipe/while subshell sorunundan kacin)
          find susfs_tmp -name "susfs.h" -exec cp -fv {} include/linux/ \;
          find susfs_tmp -name "susfs_def.h" -exec cp -fv {} include/linux/ \;

          # Kernel patch dosyalari (KernelSU yamalarini atla)
          if [ -d "susfs_tmp/kernel_patches" ]; then
            while IFS= read -r -d '' p; do
              echo ">>> Patch deneniyor: $p"
              if patch -p1 -N --forward --dry-run < "$p" > /dev/null 2>&1; then
                patch -p1 -N --forward < "$p"
                echo "    [OK] Uygulandi: $p"
              else
                echo "    [SKIP] Zaten uygulanmis veya uyumsuz: $p"
              fi
            done < <(find susfs_tmp/kernel_patches \
              -type f -name "*.patch" \
              ! -path "*KernelSU*" \
              -print0 | sort -z)
          fi

          rm -rf susfs_tmp

          # fs/susfs/Kconfig kontrolu
          if [ ! -f "fs/susfs/Kconfig" ]; then
            echo "HATA: fs/susfs/Kconfig kopyalamadan sonra hala yok!"
            ls -la fs/susfs/ || true
            exit 1
          fi

          # fs/Kconfig entegrasyonu
          if ! grep -q 'source "fs/susfs/Kconfig"' fs/Kconfig; then
            if grep -q 'source "fs/overlayfs/Kconfig"' fs/Kconfig; then
              sed -i \
                '/source "fs\/overlayfs\/Kconfig"/a source "fs/susfs/Kconfig"' \
                fs/Kconfig
            elif grep -q '^endmenu' fs/Kconfig; then
              sed -i '/^endmenu/i source "fs/susfs/Kconfig"' fs/Kconfig
            else
              printf '\nsource "fs/susfs/Kconfig"\n' >> fs/Kconfig
            fi
            echo ">>> fs/Kconfig guncellendi."
          fi

          # fs/Makefile entegrasyonu
          if ! grep -q 'susfs/' fs/Makefile; then
            echo 'obj-$(CONFIG_KSU_SUSFS) += susfs/' >> fs/Makefile
            echo ">>> fs/Makefile guncellendi."
          fi

          echo ">>> SUSFS entegrasyonu tamamlandi."
          ls -la fs/susfs/

      - name: Integrate BBG
        run: |
          cd common

          git clone --depth=1 \
            https://github.com/vc-teahouse/Baseband-guard.git bbg_tmp

          mkdir -p drivers/bbg

          if [ -d "bbg_tmp/drivers/bbg" ]; then
            rsync -a bbg_tmp/drivers/bbg/ drivers/bbg/
            echo ">>> BBG: bbg_tmp/drivers/bbg/ kopyalandi."
          else
            rsync -a --exclude='.git' bbg_tmp/ drivers/bbg/ || true
            echo ">>> BBG: kok dizin kopyalandi."
          fi
          rm -rf bbg_tmp

          # Kconfig olustur (yoksa)
          if [ ! -f "drivers/bbg/Kconfig" ]; then
            cat > drivers/bbg/Kconfig << 'KEOF'
          config BBG
          	bool "Baseband Guard"
          	default n
          	help
          	  Enable Baseband Guard (BBG) for modem stability and security.
          KEOF
            echo ">>> drivers/bbg/Kconfig olusturuldu."
          fi

          # Alt Makefile olustur (yoksa)
          if [ ! -f "drivers/bbg/Makefile" ]; then
            echo 'obj-y += bbg.o' > drivers/bbg/Makefile
            echo ">>> drivers/bbg/Makefile olusturuldu."
          fi

          # Ana drivers/Kconfig entegrasyonu
          if ! grep -q 'source "drivers/bbg/Kconfig"' drivers/Kconfig 2>/dev/null; then
            if grep -q '^endmenu' drivers/Kconfig 2>/dev/null; then
              sed -i '/^endmenu/i source "drivers/bbg/Kconfig"' drivers/Kconfig
            else
              printf '\nsource "drivers/bbg/Kconfig"\n' >> drivers/Kconfig
            fi
            echo ">>> drivers/Kconfig BBG icin guncellendi."
          fi

          # Ana drivers/Makefile entegrasyonu
          if ! grep -q 'bbg/' drivers/Makefile 2>/dev/null; then
            echo 'obj-$(CONFIG_BBG) += bbg/' >> drivers/Makefile
            echo ">>> drivers/Makefile BBG icin guncellendi."
          fi

          echo ">>> BBG entegrasyonu tamamlandi."
          ls -la drivers/bbg/

      - name: Kernel Config
        run: |
          cd common

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            gki_defconfig

          CFG="out/.config"

          ./scripts/config --file "$CFG" --enable  CONFIG_KSU
          ./scripts/config --file "$CFG" --enable  CONFIG_KSU_SUSFS
          ./scripts/config --file "$CFG" --enable  CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --file "$CFG" --enable  CONFIG_KSU_SUSFS_SUS_MOUNT
          ./scripts/config --file "$CFG" --enable  CONFIG_KSU_SUSFS_SUS_KSTAT
          ./scripts/config --file "$CFG" --enable  CONFIG_KSU_SUSFS_SUS_OVERLAYFS
          ./scripts/config --file "$CFG" --enable  CONFIG_BBG
          ./scripts/config --file "$CFG" --set-val CONFIG_HZ 300
          ./scripts/config --file "$CFG" --enable  CONFIG_PREEMPT
          ./scripts/config --file "$CFG" --enable  CONFIG_TCP_CONG_BBR
          ./scripts/config --file "$CFG" --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --file "$CFG" --set-str CONFIG_LOCALVERSION "-CG+-Yuki-SUSFS"
          ./scripts/config --file "$CFG" --disable CONFIG_LOCALVERSION_AUTO

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            olddefconfig

          echo "=== CONFIG CHECK ==="
          grep -E "CONFIG_KSU=|CONFIG_KSU_SUSFS=|CONFIG_BBG=" out/.config

      - name: Build Kernel
        run: |
          cd common

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            Image

          ls -lh out/arch/arm64/boot/Image
          echo "BOOTHASH=Yuki-$(date +%Y%m%d-%H%M)" >> "$GITHUB_ENV"

      - name: Package
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Yuki Gaming Kernel/' anykernel.sh
          cp ../common/out/arch/arm64/boot/Image .
          ZIP_NAME="CG-Yuki-KSU-SUSFS-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "../${ZIP_NAME}" ./*
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Yuki Gaming Kernel (KSU-Next + SUSFS)"
          body: |
            ## CG+ Yuki Gaming Kernel

            ### Ozellikler
            - **KernelSU-Next** (Pershoot dev-susfs)
            - **SUSFS** (Pershoot Method - gki-android14-6.1-dev)
            - **MultiManager** Destegi
            - **HZ=300** Gaming Mode
            - **TCP BBR** Congestion Control
            - **BBG** (Baseband Guard)
            - **ZyC Clang 22** (22.0.0git-20250928)

            ### Kurulum
            1. ZIP dosyasini AnyKernel3 ile flash edin
            2. TWRP veya benzeri recovery kullanin
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: "*.zip"
          retention-days: 7
          
