name: Kernel Build - SM8650 (Pineapple)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'lineage-21'
        type: choice
        options:
          - lineage-21
          - lineage-22.1
          - lineage-22.2

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bc bison build-essential flex git libssl-dev \
            libelf-dev python3 wget zip cpio curl dwarves which pahole \
            kmod lz4 ccache device-tree-compiler

      - name: Setup Neutron Clang
        run: |
          mkdir -p "$HOME/toolchains/neutron-clang"
          cd "$HOME/toolchains/neutron-clang"
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S
          echo "$HOME/toolchains/neutron-clang/bin" >> $GITHUB_PATH

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: OnePlus-12-Development/android_kernel_qcom_sm8650
          ref: ${{ github.event.inputs.branch || 'lineage-21' }}
          path: kernel
          submodules: true

      - name: Setup Build Environment
        run: |
          cd kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_PATH=$HOME/toolchains/neutron-clang/bin
          export PATH=$CLANG_PATH:$PATH
          export KBUILD_BUILD_USER=builder
          export KBUILD_BUILD_HOST=github-actions

      - name: Merge Configs and Build
        run: |
          cd kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_PATH=$HOME/toolchains/neutron-clang/bin
          export PATH=$CLANG_PATH:$PATH
          
          # Create out directory
          mkdir -p out
          
          # Check for gki_defconfig location
          if [ -f "arch/arm64/configs/gki_defconfig" ]; then
            BASE_CONFIG="gki_defconfig"
          elif [ -f "arch/arm64/configs/vendor/gki_defconfig" ]; then
            BASE_CONFIG="vendor/gki_defconfig"
          else
            echo "Error: gki_defconfig not found!"
            ls -la arch/arm64/configs/
            exit 1
          fi
          
          # Generate base config
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 $BASE_CONFIG
          
          # Merge pineapple GKI configs if they exist
          if [ -f "arch/arm64/configs/vendor/pineapple_GKI.config" ]; then
            echo "Merging vendor/pineapple_GKI.config..."
            ./scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/vendor/pineapple_GKI.config
          fi
          
          if [ -f "arch/arm64/configs/vendor/oplus/pineapple_GKI.config" ]; then
            echo "Merging vendor/oplus/pineapple_GKI.config..."
            ./scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/vendor/oplus/pineapple_GKI.config
          fi
          
          # Regenerate config with merged options
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig
          
          # Build kernel
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Prepare Artifacts
        run: |
          cd kernel
          mkdir -p artifacts
          
          # Copy kernel image
          if [ -f "out/arch/arm64/boot/Image" ]; then
            cp out/arch/arm64/boot/Image artifacts/
          fi
          
          if [ -f "out/arch/arm64/boot/Image.gz" ]; then
            cp out/arch/arm64/boot/Image.gz artifacts/
          fi
          
          if [ -f "out/arch/arm64/boot/Image.lz4" ]; then
            cp out/arch/arm64/boot/Image.lz4 artifacts/
          fi
          
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            cp out/arch/arm64/boot/Image.gz-dtb artifacts/
          fi
          
          # Copy DTB/DTBO
          if [ -d "out/arch/arm64/boot/dts" ]; then
            find out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} artifacts/ \;
            find out/arch/arm64/boot/dts -name "*.dtbo" -exec cp {} artifacts/ \;
          fi
          
          # Copy modules
          find out -name "*.ko" | while read module; do
            cp "$module" artifacts/ 2>/dev/null || true
          done
          
          # Copy config
          cp out/.config artifacts/kernel.config
          
          # Get kernel version
          KERNEL_VERSION=$(make O=out kernelversion)
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV
          
          # Create build info
          cat > artifacts/build-info.txt << EOF
          Kernel Version: $KERNEL_VERSION
          Branch: ${{ github.event.inputs.branch || 'lineage-21' }}
          Build Date: $(date)
          Clang Version: $(clang --version | head -n1)
          EOF

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-sm8650-pineapple-${{ github.event.inputs.branch }}-${{ github.run_number }}
          path: kernel/artifacts/*
          retention-days: 30
