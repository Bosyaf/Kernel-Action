name: CG+ Galadriel (Yuki Clang +BOLT Full LTO)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      NCPU: "2"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 24

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
            
          echo "🔥 Kusursuz Denge: ZyC Clang 23 (Ocak 2026 Sürümü - ARMv9-a Uyumlu)"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/23.0.0git-20260130-release/Clang-23.0.0git-20260130.tar.gz"
          echo "ZyC Clang 23 indiriliyor: $CLANG_URL"
          
          curl -fLSs "$CLANG_URL" -o clang.tar.gz || { echo "HATA: Clang URL'si patlak (404)!"; exit 1; }
          
          echo "Arşiv Çıkarılıyor..."
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc
          rm -f clang.tar.gz
          
          # Clang yolunu GitHub'ın ana PATH'ine kalıcı ekliyoruz ki sistem başka bir şey kullanmasın
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> $GITHUB_PATH
          echo "✅ Clang İndirildi ve PATH'e eklendi!"
      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/Bosyaf/android_kernel_common-6.1.git --depth=1 common
      - name: 3. KernelSU-Next Kurulumu (pershoot/dev-susfs)
        run: |
          cd common
          echo "📦 KernelSU-Next kuruluyor..."
          curl -LSs --retry 5 --retry-delay 10 \
            "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
      - name: 3.5. Multi-Manager Desteği
        run: |
          cd common/KernelSU-Next
          echo "🔥 Multi-manager patchi uygulanıyor..."
          if [ -f "$GITHUB_WORKSPACE/patches/ksu/ksun-add-more-managers-support.patch" ]; then
            patch -p1 --forward < "$GITHUB_WORKSPACE/patches/ksu/ksun-add-more-managers-support.patch" || echo "⚠️ Patch başarısız, devam ediliyor..."
          else
            echo "⚠️ Multi-manager patch dosyası bulunamadı, atlanıyor..."
          fi
          echo "✅ KowSU, MKSU, VortexSU, ReSukiSU desteği kontrol edildi!"
      - name: 4. SUSFS4KSU Kurulumu (gki-android14-6.1-dev)
        run: |
          cd common
          echo "📦 SUSFS4KSU kuruluyor..."
          git clone --depth=1 -q https://gitlab.com/pershoot/susfs4ksu -b gki-android14-6.1-dev susfs4ksu
          echo "📦 SUSFS dosyaları kopyalanıyor..."
          cp -R susfs4ksu/kernel_patches/fs/* ./fs/ || true
          cp -R susfs4ksu/kernel_patches/include/* ./include/ || true
          echo "📦 Patch dosyaları listesi:"
          ls -la susfs4ksu/kernel_patches/*.patch || true
          echo "📦 SUSFS patch uygulanıyor..."
          SUSFS_PATCH=$(ls susfs4ksu/kernel_patches/50_add_susfs*.patch 2>/dev/null | head -1)
          if [ -n "$SUSFS_PATCH" ]; then
            echo "  → Uygulanıyor: $(basename $SUSFS_PATCH)"
            patch -p1 < "$SUSFS_PATCH" || true
          else
            echo "  ⚠️ Patch dosyası bulunamadı, atlanıyor..."
          fi
          echo "📦 namespace.c SUSFS patch uygulanıyor..."
          wget -q --tries=3 --timeout=30 \
            "https://raw.githubusercontent.com/Bosyaf/Kernel-Action/main/fs_namespace.patch" \
            -O fs_namespace.patch 2>/dev/null || \
          curl -LSs --retry 3 \
            "https://raw.githubusercontent.com/Bosyaf/Kernel-Action/main/fs_namespace.patch" \
            -o fs_namespace.patch 2>/dev/null || true
          if [ -f fs_namespace.patch ] && [ -s fs_namespace.patch ]; then
            patch -p1 < fs_namespace.patch || true
            echo "  ✅ Uygulandı"
          else
            echo "  ⚠️ Patch bulunamadı"
          fi
          rm -f fs_namespace.patch
          find . -name "*.rej" -delete 2>/dev/null || true
      - name: 4.5. KernelSU-Next Multi Manager Patch
        run: |
          cd common
          echo "📦 Multi Manager patch'i uygulanıyor..."
          if [ -f "KernelSU-Next/ksu-add-more-managers-support.patch" ]; then
            patch -p1 < KernelSU-Next/ksu-add-more-managers-support.patch || true
          fi
          echo "📦 SUSFS symbol fix uygulanıyor..."
          if [ -f "drivers/kernelsu/supercalls.c" ]; then
            sed -i 's/#ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME/#if 0 \/\/ DISABLED to fix build \*\//' drivers/kernelsu/supercalls.c || true
          fi
          echo "📦 AVC spoof fix uygulanıyor..."
          if [ -f "drivers/kernelsu/extras.c" ]; then
            if grep -q "susfs_avc_log_spoofing_key_true" drivers/kernelsu/extras.c; then
              if ! grep -q "__attribute__((weak))" drivers/kernelsu/extras.c; then
                printf '\n#ifdef CONFIG_KSU_SUSFS\n#ifndef susfs_avc_log_spoofing_key_true\n__attribute__((weak))\nstruct static_key_true susfs_avc_log_spoofing_key_true = STATIC_KEY_TRUE_INIT;\n#endif\n#endif\n' >> drivers/kernelsu/extras.c
              fi
            fi
          fi
      - name: 5. Wi-Fi ve Asya Yamaları
        run: |
          cd common
          curl -fLSs --retry 3 https://github.com/OnePlus-12-Development/android_kernel_qcom_sm8650/commit/3e0cb08.patch > wifi.patch || true
          if [ -s wifi.patch ] && grep -q "diff" wifi.patch; then
            patch -p1 --forward < wifi.patch || true
          fi
          rm -f wifi.patch
          wget -q --tries=3 --timeout=30 -O setup_bb.sh \
            https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh 2>/dev/null || \
          curl -fLSs --retry 3 -o setup_bb.sh \
            https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh 2>/dev/null || true
          if [ -f setup_bb.sh ] && [ -s setup_bb.sh ]; then
            bash setup_bb.sh || true
            rm -f setup_bb.sh
          fi
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' security/Kconfig || true
      - name: 5.5. Özel Performans (Bosyaf Patches)
        run: |
          cd common
          echo "🔥 Repo içerisindeki özel yamalar uygulanıyor..."
          PATCH_DIR="../patches"
          if [ ! -d "$PATCH_DIR" ]; then
            echo "❌ HATA: $PATCH_DIR dizini bulunamadı!"
          else
            PATCH_COUNT=0
            PATCH_OK=0
            PATCH_FAIL=0
            for patch_file in "$PATCH_DIR"/*.patch; do
              [ -f "$patch_file" ] || continue
              PATCH_COUNT=$((PATCH_COUNT+1))
              filename=$(basename "$patch_file")
              echo "----------------------------------------------------"
              echo "📦 İşleniyor: $filename"
              if patch -p1 --forward < "$patch_file"; then
                echo "✅ BAŞARILI: $filename"
                PATCH_OK=$((PATCH_OK+1))
              else
                echo "❌ ATLANDI: $filename"
                PATCH_FAIL=$((PATCH_FAIL+1))
              fi
            done
            echo "----------------------------------------------------"
            echo "📊 Patch raporu: $PATCH_OK/$PATCH_COUNT başarılı, $PATCH_FAIL atlandı"
          fi

      - name: 5.6. KCFI Stub Dosyası (Clang 22+ Uyumluluğu)
        run: |
          cd common

          echo "🔧 KCFI type ID stub'ları oluşturuluyor..."

          # Stub assembly dosyası - eksik KCFI sembollerini sağlar
          cat > arch/arm64/mm/kcfi_stubs.S << 'STUBEOF'
          /*
           * KCFI type ID stubs for arm64 assembly functions.
           * Clang 22+ CFI bu sembolleri arar, kernel 6.1 assembly'de yok.
           * Her sembol 4 byte (32-bit type hash), değer=0 ( bypass ).
           */

            .macro kcfi_typeid, name
            .section .rodata, "a"
            .globl __kcfi_typeid_\name
            .type __kcfi_typeid_\name, @object
            .p2align 2
          __kcfi_typeid_\name:
            .word 0
            .size __kcfi_typeid_\name, 4
            .endm

            /* idmap / TTBR1 */
            kcfi_typeid idmap_cpu_replace_ttbr1
            kcfi_typeid __idmap_kpti_flag
            kcfi_typeid __cpu_set_tcr_t0sz

            /* cpu ops */
            kcfi_typeid __cpu_setup
            kcfi_typeid __cpu_soft_restart
            kcfi_typeid __soft_restart

            /* smp / suspend */
            kcfi_typeid secondary_holding_pen
            kcfi_typeid __cpu_secondary_start  
            kcfi_typeid cpu_resume
            kcfi_typeid __cpu_suspend_exit

            /* hypervisor */
            kcfi_typeid __kvm_hyp_init
            kcfi_typeid __kvm_hyp_vector
            kcfi_typeid __kvm_hyp_resume
            kcfi_typeid __kvm_call_hyp

            /* pKVM */
            kcfi_typeid __pkvm_init
            kcfi_typeid __pkvm_cpu_on
            kcfi_typeid __pkvm_prot_finalize
            kcfi_typeid __pkvm_do_psci_finisher
            kcfi_typeid __pkvm_cpu_off
          STUBEOF

          echo "obj-y += kcfi_stubs.o" >> arch/arm64/mm/Makefile

          echo "✅ KCFI stub dosyası oluşturuldu ve Makefile'a eklendi!"
          cat arch/arm64/mm/kcfi_stubs.S
          
      - name: 6. Full Kernel Config & Derleme Hazırlığı
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          # ======================================================
          # OOM koruma: Swap ve VM ayarları ÖNCE yapılsın
          # ======================================================
          echo "🔧 Bellek optimizasyonu yapılıyor..."
          sudo sysctl -w vm.overcommit_memory=1
          sudo sysctl -w vm.swappiness=100
          sudo sysctl -w vm.vfs_cache_pressure=500
          sudo sysctl -w vm.dirty_ratio=10
          sudo sysctl -w vm.dirty_background_ratio=5
          echo "📊 Mevcut bellek durumu:"
          free -h
          echo "📊 Disk durumu:"
          df -h / $GITHUB_WORKSPACE
          sed -i 's/^PHONY += all/  /g' Makefile || true
          touch .scmversion
          cat << 'EOF' > scripts/check-local-export
          #!/bin/sh
          exit 0
          EOF
          chmod +x scripts/check-local-export
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            gki_defconfig
          CONFIG_FILE="out/.config"
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_CMDLINE "console=ttynull stack_depot_disable=on cgroup_disable=pressure kvm-arm.mode=protected bootconfig ioremap_guard noirqdebug quiet kasan.page_alloc.sample=0 kasan.stacktrace=off kasan=off slub_debug=- page_owner=off"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CMDLINE_EXTEND
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_100
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_250
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HZ_300
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_1000
          ./scripts/config --file $CONFIG_FILE --set-val CONFIG_HZ 300
          # ========== FULL LTO CONFIG =============================
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG_FULL
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CFI_CLANG
          # ========================================================
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_NONE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_VOLUNTARY
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT_BUILD
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NO_HZ_IDLE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_NO_HZ_FULL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_WALT || true
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_DEFAULT_GOV_WALT || true
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_CPU_FREQ_DEFAULT_GOV "walt" || true
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_IDLE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM_PSCI_CPUIDLE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM_CPUIDLE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_IDLE_GOV_MENU
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_IDLE_GOV_TEO
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_THERMAL_GOV_FAIR_SHARE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_GOV_POWER_ALLOCATOR
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_DEFAULT_GOV_POWER_ALLOCATOR
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_MC
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_CLUSTER
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_SCHED_SMT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_UCLAMP_TASK
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_UCLAMP_TASK_GROUP
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ENERGY_MODEL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KPROBES
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HAVE_KPROBES
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KPROBE_EVENTS
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_NUMA_BALANCING
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_REDUCED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_COMPRESSED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_SPLIT
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF4
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF5
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP_NF_TARGET_TTL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP6_NF_TARGET_HL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP6_NF_MATCH_HL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_ADVANCED
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_NET_SCH "fq_codel"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_FQ_CODEL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_FQ
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_WIREGUARD
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_BBG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_OVERLAY_FS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TMPFS_XATTR
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TMPFS_POSIX_ACL
          # ========== KERNELSU & SUSFS CONFIG'LERI ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_KSTAT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SPOOF_UNAME
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_OPEN_REDIRECT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_ENABLE_LOG
          # ========== KERNELSU & SUSFS CONFIG'LERI BITIS ==========
          # Localversion
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Laerwen"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCALVERSION_AUTO
          sed -i 's/check_defconfig//' build.config.gki || true
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            olddefconfig
      - name: 7. Kernel Derleme (Full LTO - Bellek Güvenli)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          echo "📊 Derleme öncesi bellek durumu:"
          free -h
          echo "📊 Swap durumu:"
          swapon --show

          BUILD_START=$(date +%s)
          echo "🔥 Full LTO kernel derlemesi başlıyor (NCPU=$NCPU)..."

          # ======================================================
          # Otomatik KCFI stub retry döngüsü
          # Clang 22+ yeni __kcfi_typeid_* sembolleri isteyebilir
          # Her hatada stub dosyasına ekle ve tekrar dene
          # ======================================================
          MAX_ATTEMPTS=5
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "📦 Derleme denemesi $attempt/$MAX_ATTEMPTS..."

            make -j$NCPU O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
              AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
              KCFLAGS="-O2 \
              -march=armv9.2-a+crypto+crc+dotprod+rcpc+lse \
              -falign-loops=32 \
              -fomit-frame-pointer \
              -ffunction-sections \
              -fdata-sections \
              -Wno-error \
              -Wno-format \
              -Wno-format-extra-args \
              -Wno-constant-logical-operand" \
              KLDFLAGS="-Wl,--gc-sections \
              -Wl,--as-needed \
              -Wl,--strip-debug \
              -Wl,--icf=safe \
              -Wl,-O2 \
              -Wl,--threads=1" \
              Image 2>&1 | tee /tmp/build_${attempt}.log && break

            # ======================================================
            # Build failed - KCFI sembol hatası var mı?
            # ======================================================
            MISSING_SYMS=$(grep "undefined symbol: __kcfi_typeid_" /tmp/build_${attempt}.log 2>/dev/null | sed 's/.*undefined symbol: //' | sort -u)

            if [ -n "$MISSING_SYMS" ]; then
              echo ""
              echo "🔍 Eksik KCFI sembolleri tespit edildi:"
              echo "$MISSING_SYMS"
              echo ""

              # Her eksik sembolü stub dosyasına ekle
              for sym in $MISSING_SYMS; do
                name=${sym#__kcfi_typeid_}
                echo "  ➕ Ekleniyor: $name"
                cat >> arch/arm64/mm/kcfi_stubs.S << SYMEOF

              kcfi_typeid $name
          SYMEOF
              done

              echo "✅ Yeni stub'lar eklendi, tekrar derleniyor..."
              continue
            else
              # KCFI dışında başka bir hata
              echo "❌ Derleme HATASI (KCFI dışı)!"
              exit 1
            fi
          done

          if [ $attempt -ge $MAX_ATTEMPTS ]; then
            echo "❌ $MAX_ATTEMPTS deneme sonunda derleme başarısız!"
            exit 1
          fi

          IMAGE_TIME=$(($(date +%s) - BUILD_START))
          echo "✅ Image derleme süresi: $((IMAGE_TIME/60)) dakika $((IMAGE_TIME%60)) saniye"
          echo "📊 Image sonrası bellek durumu:"
          free -h

          # ======================================================
          # Modüller
          # ======================================================
          MODULE_START=$(date +%s)
          make -j$(nproc) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 \
            -march=armv9.2-a+crypto+crc+dotprod+rcpc+lse \
            -falign-loops=32 \
            -fomit-frame-pointer \
            -ffunction-sections \
            -fdata-sections \
            -Wno-error \
            -Wno-format \
            -Wno-format-extra-args \
            -Wno-constant-logical-operand" \
            KLDFLAGS="-Wl,--gc-sections \
            -Wl,--as-needed \
            -Wl,--strip-debug \
            -Wl,--icf=safe \
            -Wl,-O2 \
            -Wl,--threads=1" \
            modules || { echo "❌ Modül derleme HATASI!"; exit 1; }

          MODULE_TIME=$(($(date +%s) - MODULE_START))
          echo "✅ Modül derleme süresi: $((MODULE_TIME/60)) dakika $((MODULE_TIME%60)) saniye"

          TOTAL_TIME=$(($(date +%s) - BUILD_START))
          echo "🎉 TOPLAM derleme süresi: $((TOTAL_TIME/60)) dakika $((TOTAL_TIME%60)) saniye"

          echo "BOOTHASH=Galadriel-Victory-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV
      - name: 8. AnyKernel3 Paketleme
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Galadriel Kernel/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh
          cp ../common/out/arch/arm64/boot/Image .
          mkdir -p modules/vendor/lib/modules
          find ../common/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \;
          zip -r "../CG-Galadriel.zip" ./*
          echo "📦 Paket boyutu: $(du -h ../CG-Galadriel.zip | cut -f1)"
      - name: 9. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Galadriel (Yuki Clang +BOLT Full LTO)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
