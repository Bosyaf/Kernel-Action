name: CG+ Xiaomi 14 (HOUJI) Official Pure Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketleri Kur
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd

      - name: 2. Kaynak Kodunu Çek (HOUJI)
        run: |
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14.git $GITHUB_WORKSPACE/common
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 3. Clang r584948 Önbellek (Cache)
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: common/prebuilts/clang/host/linux-x86/clang-r487747c
          key: clang-r584948-v1

      - name: 4. Clang r584948 İndir (Cache yoksa)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          echo "🔥 Clang Cache bulunamadı, indiriliyor..."
          mkdir -p $GITHUB_WORKSPACE/clang-temp
          cd $GITHUB_WORKSPACE/clang-temp
          git clone --depth=1 -b mirror-goog-main-llvm-toolchain-source https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-repo
          mkdir -p $GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c
          cp -r clang-repo/clang-r584948/* $GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c/
          rm -rf $GITHUB_WORKSPACE/clang-temp

      - name: 5. HOUJI Full (Consolidate) Config Hazırlığı
        run: |
          cd $GITHUB_WORKSPACE/common
          export PATH="$GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          # 1. Temel GKI
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig
          
          # 2. Merge - SADECE HOUJI ÖZEL
          ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config
          
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-Houji-Pure"
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig

      - name: 6. Derleme (SADECE Image - Hatasız Mod)
        run: |
          cd $GITHUB_WORKSPACE/common
          export PATH="$GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          # dtbs veya dtbo derlemiyoruz, Allwinner hatalarından kaçıyoruz.
          # Sadece kernel'ın ana gövdesi (Image) derlenecek.
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            CC="clang" \
            LD="ld.lld" \
            AR="llvm-ar" \
            NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" \
            OBJDUMP="llvm-objdump" \
            STRIP="llvm-strip" \
            KCFLAGS="-O2 -D__ANDROID_COMMON_KERNEL__" \
            Image || { echo "❌ Derleme HATASI!"; exit 1; }
            
          echo "BOOTHASH=Houji-Official-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 7. Paketleme
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Houji Official (Xiaomi 14)/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji' anykernel.sh
          
          # Sadece derlenen Image'ı alıyoruz
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../CG-Houji-Official-SM8650.zip" ./*

      - name: 8. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (HOUJI) Pure Official Build"
          body: |
            - Build: Houji Full Consolidate
            - Optimization: -O2
            - Note: Only Image compiled to avoid DTS errors.
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
