name: CG+ Xiaomi 14 (SM8650) Yuki Clang Bazel-Ready Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Gelişmiş Ortam Hazırlığı
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          
          echo "🔥 Yuki Clang 22 (ZyCromerZ) İndiriliyor..."
          mkdir -p $GITHUB_WORKSPACE/yuki-clang
          curl -L "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst" | tar --zstd -xC $GITHUB_WORKSPACE/yuki-clang
          echo "$GITHUB_WORKSPACE/yuki-clang/bin" >> $GITHUB_PATH

      - name: 2. Xiaomi 14 (kplatform) Kaynak Kodu
        run: |
          # Bazel yapılandırmasını içeren kplatform branch'i
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14.git common
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 3. KernelSU-Next & SUSFS (SM8650 Optimizeli)
        run: |
          cd common
          curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
          
          # SUSFS Yamaları
          git clone --depth=1 -q https://gitlab.com/pershoot/susfs4ksu -b gki-android14-6.1-dev susfs4ksu
          cp -R susfs4ksu/kernel_patches/fs/* ./fs/
          cp -R susfs4ksu/kernel_patches/include/* ./include/
          patch -p1 < susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true
          
          # Xiaomi mühendisliğindeki build hatalarını önleme (DTS çakışmaları vb.)
          find . -name "*.rej" -delete 2>/dev/null || true

      - name: 4. Gelişmiş Config Yapılandırması
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/yuki-clang/bin:$PATH"
          
          # Xiaomi 14 (houji) için ana defconfig'i oluştur
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            gki_defconfig
            
          CONFIG_FILE="out/.config"
          
          # Xiaomi 14 (SM8650) Performans Ayarları
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Laurelin-X"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HZ_300
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_WALT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_BBR
          
          # Bazel dosyasında gördüğümüz modüler yapının make tarafındaki karşılığı
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            olddefconfig

      - name: 5. Kernel & DTBO Derleme (Yuki Clang Power)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/yuki-clang/bin:$PATH"
          
          # Snapdragon 8 Gen 3 (Cortex-X4) Mimari Flagleri
          # Bazel'in yaptığı optimizasyonu manuel olarak KCFLAGS ile enjekte ediyoruz
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" \
            LD="ld.lld" \
            NM="llvm-nm" \
            AR="llvm-ar" \
            OBJCOPY="llvm-objcopy" \
            OBJDUMP="llvm-objdump" \
            STRIP="llvm-strip" \
            KCFLAGS="-O3 -march=armv9.2-a+crypto+crc+dotprod+rcpc+lse -mtune=cortex-x4 -falign-loops=32 -fomit-frame-pointer" \
            Image dtbo.img
            
          echo "BOOTHASH=Xiaomi14-Yuki-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 6. AnyKernel3 Paketleme (Xiaomi 14 Destekli)
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Yuki Balanced (Xiaomi 14)/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          # Xiaomi 14 kod adları (Houji: Std, Shennong: Pro)
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora' anykernel.sh
          
          # Hem Image hem DTBO kopyalıyoruz (Xiaomi 14 için DTBO kritiktir!)
          cp ../common/out/arch/arm64/boot/Image .
          cp ../common/out/arch/arm64/boot/dtbo.img . 2>/dev/null || echo "DTBO bulunamadı, atlanıyor."
          
          zip -r "../CG-Xiaomi14-Yuki.zip" ./*

      - name: 7. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (SM8650) Yuki Clang 22 Build"
          body: "Source: mvaisakh kplatform | Toolchain: Yuki Clang 22 | KSU-Next + SUSFS"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
