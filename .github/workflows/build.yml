name: Xiaomi 14 Houji Full Stock (kplatform)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y \
            git curl python3 python3-pip \
            build-essential bc bison flex \
            libssl-dev libelf-dev \
            rsync unzip wget xz-utils \
            zstd zip

      - name: Download Yuki Clang
        run: |
          mkdir clang
          curl -L "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst" \
            | tar --zstd -x -C clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Clone Xiaomi 14 kplatform Source
        run: |
          git clone --depth=1 -b kplatform \
            https://github.com/mvaisakh/xiaomi14.git kernel_platform

      - name: Build Houji Kernel (Bazel)
        run: |
          cd kernel_platform
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export CC=clang
          export CXX=clang++

          python3 build_with_bazel.py

      - name: Collect Output
        run: |
          mkdir release
          find kernel_platform -type f \( -name "*.img" -o -name "Image" -o -name "*.dtb" -o -name "*.dtbo" \) -exec cp {} release/ \; || true

      - name: Zip Artifacts
        run: |
          cd release
          zip -r ../houji-kernel.zip *

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: houji-${{ github.run_number }}
          name: Xiaomi14-Houji-FullStock
          files: houji-kernel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
