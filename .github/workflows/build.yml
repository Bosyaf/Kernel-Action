name: Xiaomi 14 (Houji) Pure Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Build variant (consolidate = tam moduller, gki = sadece GKI)"
        required: true
        default: "consolidate"
        type: choice
        options:
          - consolidate
          - gki
      kernel_name:
        description: "Kernel isim soneki"
        required: false
        default: "Galadriel-Pure"

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      VARIANT: ${{ github.event.inputs.variant }}
      KERNEL_NAME: ${{ github.event.inputs.kernel_name }}

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 16384
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Install Dependencies & Google Toolchain
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev \
            libxml2-utils rsync unzip dwarves bc cpio wget \
            xz-utils make gcc-aarch64-linux-gnu pkg-config zstd

          mkdir -p $GITHUB_WORKSPACE/toolchain/clang-google
          curl -fLSs "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz" | tar -xzf - -C $GITHUB_WORKSPACE/toolchain/clang-google
          echo "$GITHUB_WORKSPACE/toolchain/clang-google/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source (Gövde)
        run: |
          git clone -b kplatform https://github.com/mvaisakh/xiaomi14.git source --depth=1

      - name: Clone External Device Tree (Beyin)
        run: |
          # Device Tree reposunu tam olarak vendor klasörüne klonluyoruz
          mkdir -p source/arch/arm64/boot/dts/vendor
          git clone -b kplatform https://github.com/Bosyaf/xiaomi14-devicetrees.git source/arch/arm64/boot/dts/vendor --depth=1

      - name: Prepare Config
        run: |
          cd source
          export PATH="$GITHUB_WORKSPACE/toolchain/clang-google/bin:$PATH"
          OUT_DIR="$GITHUB_WORKSPACE/out"
          mkdir -p "${OUT_DIR}"

          # Config birleştirme
          make O="${OUT_DIR}" ARCH=arm64 LLVM=1 gki_defconfig
          scripts/kconfig/merge_config.sh -m -O "${OUT_DIR}" "${OUT_DIR}/.config" arch/arm64/configs/vendor/pineapple_GKI.config || true
          scripts/kconfig/merge_config.sh -m -O "${OUT_DIR}" "${OUT_DIR}/.config" arch/arm64/configs/vendor/houji_GKI.config || true
          
          if [ "$VARIANT" = "consolidate" ]; then
            scripts/kconfig/merge_config.sh -m -O "${OUT_DIR}" "${OUT_DIR}/.config" arch/arm64/configs/consolidate.fragment || true
            scripts/kconfig/merge_config.sh -m -O "${OUT_DIR}" "${OUT_DIR}/.config" arch/arm64/configs/vendor/pineapple_consolidate.config || true
          fi
          
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"-${KERNEL_NAME}\"/" "${OUT_DIR}/.config"
          make O="${OUT_DIR}" ARCH=arm64 LLVM=1 olddefconfig

      - name: Build Kernel & DTBs
        run: |
          cd source
          export PATH="$GITHUB_WORKSPACE/toolchain/clang-google/bin:$PATH"
          OUT_DIR="$GITHUB_WORKSPACE/out"

          # 1. Kernel Image derle
          make -j$(nproc --all) O="${OUT_DIR}" ARCH=arm64 LLVM=1 LLVM_IAS=1 Image

          # 2. Sadece bizim eklediğimiz vendor DTB'lerini derle (Hata almamak için)
          # DTC_FLAGS ile tanınmayan kuralları susturuyoruz
          make -j$(nproc --all) O="${OUT_DIR}" ARCH=arm64 LLVM=1 LLVM_IAS=1 \
               DTC_FLAGS="-Wno-graph_child_address -Wno-graph_port -Wno-interrupt_provider" \
               dtbs || echo "DTB build finished with warnings (normal for vendor trees)"

      - name: Build & Install Modules
        if: github.event.inputs.variant == 'consolidate'
        run: |
          cd source
          export PATH="$GITHUB_WORKSPACE/toolchain/clang-google/bin:$PATH"
          OUT_DIR="$GITHUB_WORKSPACE/out"
          MOD_DIR="$GITHUB_WORKSPACE/modules_temp"
          mkdir -p "${MOD_DIR}"

          # Modülleri derle ve geçici klasöre yükle
          make -j$(nproc --all) O="${OUT_DIR}" ARCH=arm64 LLVM=1 LLVM_IAS=1 modules
          make O="${OUT_DIR}" ARCH=arm64 LLVM=1 INSTALL_MOD_PATH="${MOD_DIR}" modules_install

          # Gereksiz dosyaları temizle ve modülleri küçült (strip)
          find "${MOD_DIR}" -name "*.ko" -exec llvm-strip --strip-debug {} \;

      - name: Package with AnyKernel3
        run: |
          OUT_DIR="$GITHUB_WORKSPACE/out"
          MOD_DIR="$GITHUB_WORKSPACE/modules_temp"
          
          # 1. Image kopyala
          cp "${OUT_DIR}/arch/arm64/boot/Image" ./AnyKernel3/

          # 2. DTB ve DTBO'ları topla (Yeni repomuzun çıktıları buralarda olacak)
          mkdir -p ./AnyKernel3/dtb ./AnyKernel3/dtbo
          find "${OUT_DIR}/arch/arm64/boot/dts/vendor" -name "*.dtb" -exec cp {} ./AnyKernel3/dtb/ \; 2>/dev/null || true
          find "${OUT_DIR}/arch/arm64/boot/dts/vendor" -name "*.dtbo" -exec cp {} ./AnyKernel3/dtbo/ \; 2>/dev/null || true

          # 3. Modülleri AnyKernel3 yapısına uygun kopyala
          if [ -d "${MOD_DIR}/lib/modules" ]; then
            # Klasör hiyerarşisini düzleterek sadece .ko dosyalarını alıyoruz
            mkdir -p ./AnyKernel3/modules/vendor/lib/modules
            find "${MOD_DIR}/lib/modules" -name "*.ko" -exec cp {} ./AnyKernel3/modules/vendor/lib/modules/ \;
          fi

          # AnyKernel Ayarları
          cd ./AnyKernel3
          sed -i "s/kernel.string=.*/kernel.string=CG+ $KERNEL_NAME ($VARIANT)/" anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=xiaomi14' anykernel.sh

          # Zip oluştur
          ZIP_NAME="Houji-PureKernel-${VARIANT}-$(date +%Y%m%d-%H%M).zip"
          zip -r "../${ZIP_NAME}" ./*
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "BOOTHASH=Pure-Houji-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (Houji) ${{ env.VARIANT }} - $(date +%Y-%m-%d)"
          body: |
            ## Galadriel Pure Kernel
            - **Kernel:** mvaisakh kplatform (6.1.x)
            - **Device Tree:** Bosyaf xiaomi14-devicetrees (Updated)
            - **Toolchain:** Google Clang r487747c
            - **Fixes:** Integrated external device tree to fix DTB build errors.
          files: "${{ env.ZIP_NAME }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
