name: Xiaomi 14 Monolithic Build (houji)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 24

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve Xiaomi Resmi Clang 17 Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/788f1e86014660a5230ba4e9f52c39d5b393cd2b/clang-r487747.tar.gz"
          mkdir -p $GITHUB_WORKSPACE/clang-17
          curl -fLSs "$CLANG_URL" | tar -xzf - -C $GITHUB_WORKSPACE/clang-17
          echo "$GITHUB_WORKSPACE/clang-17/bin" >> $GITHUB_PATH
          
      - name: 2. Kaynakları Çek (Bosyaf Monolithic)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          # Burayı senin istediğin Bosyaf reposuyla güncelledim
          git clone -b monolithic-test-2 https://github.com/Bosyaf/xiaomi14.git --depth=1 common

      - name: 3. WLAN Klasörünü Devre Dışı Bırak (Bypass)
        run: |
          cd common
          echo "🚫 WLAN Techpack derleme dışı bırakılıyor..."
          # Makefile ve Kbuild içindeki wlan girişlerini kapatıyoruz
          [ -f techpack/Kbuild ] && sed -i 's/obj-y += wlan/# obj-y += wlan/g' techpack/Kbuild
          [ -f techpack/Makefile ] && sed -i 's/obj-y += wlan/# obj-y += wlan/g' techpack/Makefile
          sed -i 's/techpack\/wlan//g' Makefile || true
          
      - name: 4. Kernel Config Hazırlığı (houji_defconfig)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-17/bin:$PATH"
          touch .scmversion
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            houji_defconfig
          
          # Config içinden WLAN'ı kapatıyoruz
          ./scripts/config --file out/.config --disable CONFIG_QCA_CLD_WLAN

      - name: 5. Kernel Derleme (Monolithic - Wi-Fi Klasörü Atlandı)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-17/bin:$PATH"
          
          # Monolithic birleştirmede patlamamak için --threads=1 eklendi
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 -march=armv9-a+crypto -Wno-error" \
            LDFLAGS_vmlinux="--threads=1" \
            Image || { echo "❌ Derleme HATASI!"; exit 1; }
          
      - name: 6. AnyKernel3 Paketleme
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Xiaomi 14 Monolithic (Bosyaf Source)/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          # Kalan modülleri (audio, video, display vs.) alalım
          mkdir -p modules/vendor/lib/modules
          find ../common/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \; || true
          
          zip -r "../Xiaomi14-Monolithic-Bosyaf.zip" ./*

      - name: 7. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Mono-Success-${{ github.run_id }}"
          name: "Xiaomi 14 Monolithic (Bosyaf Source)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
