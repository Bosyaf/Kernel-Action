name: CG+ Mi 14 Vendor Kernel (ZyCromerZ Clang 23)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyCromerZ Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          echo "🔥 ZyCromerZ Clang İndiriliyor..."
          CLANG_LINK=$(curl -sL https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-main-link.txt)
          echo "İndirilecek Link: $CLANG_LINK"
          curl -L -o clang.tar.gz "$CLANG_LINK"
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc --strip-components=1
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> $GITHUB_PATH
          echo "✅ ZyCromerZ Clang İndirildi ve PATH'e eklendi!"

      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common
          git clone -b kplatform https://github.com/mvaisakh/xiaomi14-devicetrees.git --depth=1 device-trees
          git clone -b houji-shennong-u-oss https://github.com/lavajCN/kernel_xiaomi_houji-shennong-spec.git --depth=1 vendor-source

      - name: 3. Device Tree ve Bindings Dosyalarını Kopyala
        run: |
          cd common
          echo "📦 Device Tree dosyaları kopyalanıyor..."
          
          # qcom DTS dosyalarını kopyala
          cp -r ../device-trees/qcom/* ./arch/arm64/boot/dts/
          
          # Vendor DTS klasörlerini kopyala
          for dir in audio bt camera data display dsp eSE eva fingerprint graphics mm mmrm mm-sys nfc synx video wlan; do
            if [ -d "../device-trees/$dir" ]; then
              cp -r "../device-trees/$dir" ./arch/arm64/boot/dts/
              echo "  ✅ $dir kopyalandı"
            fi
          done
          
          # dt-bindings header dosyalarını kopyala
          echo "📦 dt-bindings header dosyaları kopyalanıyor..."
          cp -r ../device-trees/bindings/* ./Documentation/devicetree/bindings/
          
          echo "✅ Device Trees ve Bindings hazır!"

      - name: 4. WALT Scheduler Ekle
        run: |
          cd common
          echo "📦 WALT Scheduler dosyaları kopyalanıyor..."
          
          # WALT klasörünü oluştur
          mkdir -p ./kernel/sched/walt
          
          # WALT dosyalarını kopyala
          cp -r ../vendor-source/kernel/sched/walt/* ./kernel/sched/walt/
          
          echo "✅ WALT Scheduler hazır!"

      - name: 5. GKI Çakışan Sürücüleri İptal Et
        run: |
          cd common
          echo "📦 GKI EAS sürücüleri devre dışı bırakılıyor..."
          
          # EAS ile WALT çakışmasını önle
          sed -i 's/CONFIG_ENERGY_MODEL=y/CONFIG_ENERGY_MODEL=n/' arch/arm64/configs/gki_defconfig || true
          
          # GKI schedutil'ı kapat (WALT kullanacağız)
          sed -i 's/CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL/# CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL is not set/' arch/arm64/configs/gki_defconfig || true
          
          echo "✅ GKI çakışan sürücüler iptal edildi!"

      - name: 6. Kernel Config & Derleme Hazırlığı
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          
          sed -i 's/^PHONY += all/  /g' Makefile || true
          touch .scmversion
          
          cat << 'EOF' > scripts/check-local-export
          #!/bin/sh
          exit 0
          EOF
          chmod +x scripts/check-local-export
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            gki_defconfig
            
          CONFIG_FILE="out/.config"
          
          # ========== CMDLINE & DEBUG ==========
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_CMDLINE "console=ttyMSM0,115200n8 earlycon=msm_geni_serial,0xa9C000 androidboot.hardware=qcom androidboot.console=ttyMSM0 lpm_levels.sleep_disabled=1 service_locator.enable=1 swiotlb=2048 loop.max_part=7 cgroup.memory=nokmem,nosocket kasan.page_alloc.sample=0 kasan.stacktrace=off kasan=off slub_debug=- page_owner=off"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CMDLINE_EXTEND
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_REDUCED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_COMPRESSED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_SPLIT
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF4
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF5
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_NUMA_BALANCING
          # ========== CMDLINE & DEBUG BITIS ==========
          
          # ========== HZ & PREEMPT ==========
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_100
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_250
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HZ_300
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_1000
          ./scripts/config --file $CONFIG_FILE --set-val CONFIG_HZ 300
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_NONE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_VOLUNTARY
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT_BUILD
          # ========== HZ & PREEMPT BITIS ==========
          
          # ========== CPUFreq & WALT ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_GOV_WALT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_FREQ_DEFAULT_GOV_WALT
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_CPU_FREQ_DEFAULT_GOV "walt"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_CPU_FREQ_GOV_SCHEDUTIL
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL
          # ========== CPUFreq & WALT BITIS ==========
          
          # ========== CPU Idle ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_IDLE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM_PSCI_CPUIDLE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ARM_CPUIDLE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_IDLE_GOV_MENU
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CPU_IDLE_GOV_TEO
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_THERMAL_GOV_FAIR_SHARE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_GOV_POWER_ALLOCATOR
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_DEFAULT_GOV_POWER_ALLOCATOR
          # ========== CPU Idle BITIS ==========
          
          # ========== Scheduler ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_WALT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_MC
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_CLUSTER
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_SCHED_SMT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_UCLAMP_TASK
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_UCLAMP_TASK_GROUP
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_ENERGY_MODEL
          # ========== Scheduler BITIS ==========
          
          # ========== KProbes ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KPROBES
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HAVE_KPROBES
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KPROBE_EVENTS
          # ========== KProbes BITIS ==========
          
          # ========== LTO ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LTO_CLANG_FULL
          # ========== LTO BITIS ==========
          
          # ========== Network ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP_NF_TARGET_TTL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP6_NF_TARGET_HL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP6_NF_MATCH_HL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_ADVANCED
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_NET_SCH "fq_codel"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_FQ_CODEL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_FQ
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_WIREGUARD
          # ========== Network BITIS ==========
          
          # ========== Misc ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_OVERLAY_FS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TMPFS_XATTR
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TMPFS_POSIX_ACL
          # ========== Misc BITIS ==========
          
          # ========== Vendor Config (Houji) ==========
          echo "📦 Vendor config fragment uygulanıyor..."
          cat ../vendor-source/arch/arm64/configs/vendor/houji_GKI.config >> $CONFIG_FILE
          cat ../vendor-source/arch/arm64/configs/consolidate.fragment >> $CONFIG_FILE
          echo "✅ Vendor config uygulandı!"
          # ========== Vendor Config BITIS ==========
          
          # ========== Local Version ==========
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Mi14-Vendor"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCALVERSION_AUTO
          sed -i 's/check_defconfig//' build.config.gki || true
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            olddefconfig

      - name: 7. Kernel Derleme
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          
          echo "🔍 Config kontrolü:"
          grep -E "CONFIG_SCHED_WALT|CONFIG_CPU_FREQ_GOV_WALT|CONFIG_HZ=|CONFIG_PREEMPT=" out/.config || true
          
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 \
            -march=armv9.2-a+crypto+crc+dotprod+rcpc+lse \
            -falign-loops=32 \
            -fomit-frame-pointer \
            -ffunction-sections \
            -fdata-sections \
            -Wno-constant-logical-operand" \
            KLDFLAGS="-Wl,--gc-sections \
            -Wl,--as-needed \
            -Wl,--strip-debug \
            -Wl,--icf=safe \
            -Wl,-O2" \
            Image dtbs || { echo "❌ Derleme HATASI!"; exit 1; }
          
          echo "BOOTHASH=Mi14-Vendor-ZyC22-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: 8. AnyKernel3
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Mi 14 Vendor Kernel/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          cp ../common/out/arch/arm64/boot/dts/vendor/qcom/*.dtbo . 2>/dev/null || true
          zip -r "../CG-Mi14-Vendor-Kernel.zip" ./*

      - name: 9. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Mi 14 Vendor Kernel (WALT + ZyCromerZ Clang 23)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
