name: Kernel Build - Xiaomi Mi 14 GKI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libncurses5-dev \
          libssl-dev \
          bison \
          flex \
          libelf-dev \
          libkmod-dev \
          cpio \
          python3 \
          python3-pip \
          wget \
          curl \
          git \
          lzop \
          bc \
          kmod \
          xz-utils \
          zip \
          unzip \
          device-tree-compiler \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu

    - name: Download Android Clang (r487747c - Android 14 6.1)
      run: |
        mkdir -p $HOME/toolchain
        cd $HOME/toolchain
        echo "Downloading Clang r487747c..."
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r487747c.tar.gz -O clang.tar.gz || \
        wget -q https://storage.googleapis.com/android-global/clang/r487747c/linux-x86_64.tar.xz -O clang.tar.xz
        
        if [ -f clang.tar.gz ]; then
          mkdir clang && tar -xf clang.tar.gz -C clang
        else
          tar -xf clang.tar.xz
          mv clang-r487747c clang
        fi
        
        echo "$HOME/toolchain/clang/bin" >> $GITHUB_PATH
        ls -la $HOME/toolchain/clang/bin/clang

    - name: Verify source structure
      run: |
        echo "=== Repo root ==="
        ls -la
        echo ""
        echo "=== arch/arm64/configs/ ==="
        ls -la arch/arm64/configs/
        echo ""
        echo "=== gki_defconfig exists? ==="
        ls -la arch/arm64/configs/gki_defconfig

    - name: Show clang version
      run: |
        clang --version
        aarch64-linux-gnu-gcc --version

    - name: Generate kernel config
      run: |
        make ARCH=arm64 \
          CC=clang \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LLVM=1 \
          LLVM_IAS=1 \
          gki_defconfig

    - name: Build kernel
      run: |
        make -j$(nproc) ARCH=arm64 \
          CC=clang \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          LLVM=1 \
          LLVM_IAS=1 \
          2>&1 | tee build.log

    - name: Check build output
      if: always()
      run: |
        echo "=== Boot directory ==="
        ls -la arch/arm64/boot/ 2>/dev/null || echo "boot/ not found"
        echo ""
        echo "=== Image files ==="
        find arch/arm64/boot/ -name "Image*" -type f 2>/dev/null
        find . -name "Image" -type f 2>/dev/null | head -10
        find . -name "Image.gz*" -type f 2>/dev/null | head -10

    - name: Upload Image
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Image
        path: arch/arm64/boot/Image
        if-no-files-found: warn
        retention-days: 14

    - name: Upload Image.gz
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Image.gz
        path: arch/arm64/boot/Image.gz
        if-no-files-found: warn
        retention-days: 14

    - name: Upload Image.gz-dtb
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Image.gz-dtb
        path: arch/arm64/boot/Image.gz-dtb
        if-no-files-found: warn
        retention-days: 14

    - name: Upload all kernel modules
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: kernel-modules
        path: |
          **/*.ko
        if-no-files-found: ignore
        retention-days: 14

    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 14
