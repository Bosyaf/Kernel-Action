name: Xiaomi 14 Houji - WLAN First Build

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bc bison build-essential flex git libssl-dev \
            libelf-dev python3 wget zip cpio curl dwarves which pahole \
            rsync unzip xz-utils
          pahole --version

      - name: Setup Neutron Clang
        run: |
          mkdir -p "$HOME/toolchains/neutron-clang"
          cd "$HOME/toolchains/neutron-clang"
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S
          echo "$HOME/toolchains/neutron-clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        run: |
          git clone -b monolithic-test-2 https://github.com/mvaisakh/xiaomi14.git --depth=1 kernel

      - name: Patch WLAN Compatibility
        run: |
          cd kernel
          python3 - << 'PY'
          from pathlib import Path
          import re

          # -------------------------------------------------
          # 1) cfg80211 API uyum patchi
          # -------------------------------------------------
          p = Path("techpack/wlan/qcacld-3.0/cmn/os_if/linux/wlan_cfg80211.h")
          if p.exists():
              s = p.read_text()

              s = s.replace(
                  "cfg80211_ch_switch_notify(dev, chandef);",
                  "cfg80211_ch_switch_notify(dev, chandef, 0, 0);"
              )

              s = s.replace(
                  "cfg80211_ch_switch_started_notify(dev, chandef, count);",
                  "cfg80211_ch_switch_started_notify(dev, chandef, 0, count, false, 0);"
              )

              p.write_text(s)

          # -------------------------------------------------
          # 2) IOMMU eksik sembol / fonksiyon geçici uyum patchi
          # -------------------------------------------------
          p = Path("techpack/wlan/qcacld-3.0/cmn/qdf/linux/src/i_qdf_mem.h")
          if p.exists():
              s = p.read_text()

              s = s.replace("return QCOM_IOMMU_MAPPING_CONF_S1_BYPASS;", "return 0;")
              s = s.replace("return QCOM_IOMMU_MAPPING_CONF_ATOMIC;", "return 1;")
              s = s.replace("return QCOM_IOMMU_MAPPING_CONF_FAST;", "return 2;")
              s = s.replace(
                  "mapping_config = qcom_iommu_get_mappings_configuration(domain);",
                  "mapping_config = 2;"
              )

              p.write_text(s)

          # -------------------------------------------------
          # 3) set_bitrate_mask callback imza uyumu
          # Yeni kernel:
          # (wiphy, dev, link_id, peer, mask)
          # -------------------------------------------------
          files = [
              Path("techpack/wlan/qcacld-3.0/core/hdd/src/wlan_hdd_cfg80211.c"),
              Path("techpack/wlan/qcacld-3.0/core/hdd/src/wlan_hdd_cfg80211.h"),
              Path("techpack/wlan/qcacld-3.0/core/hdd/inc/wlan_hdd_cfg80211.h"),
          ]

          sig_pat = re.compile(
              r'(wlan_hdd_cfg80211_set_bitrate_mask\s*\(\s*'
              r'struct\s+wiphy\s*\*wiphy\s*,\s*'
              r'struct\s+net_device\s*\*dev\s*,\s*)'
              r'(const\s+u8\s*\*peer\s*,\s*'
              r'const\s+struct\s+cfg80211_bitrate_mask\s*\*mask\s*\))',
              re.S
          )

          for p in files:
              if not p.exists():
                  continue

              s = p.read_text()

              s2 = sig_pat.sub(
                  r'\1unsigned int link_id,\n\t\t\t\t const u8 *peer,\n\t\t\t\t const struct cfg80211_bitrate_mask *mask)',
                  s
              )

              if p.suffix == ".c" and "unsigned int link_id" in s2 and "(void)link_id;" not in s2:
                  s2 = re.sub(
                      r'(wlan_hdd_cfg80211_set_bitrate_mask\s*\([^)]*link_id[^)]*\)\s*\{)',
                      r'\1\n\t(void)link_id;',
                      s2,
                      count=1,
                      flags=re.S
                  )

              p.write_text(s2)
          PY

          echo "===== cfg80211 kontrol ====="
          grep -n "cfg80211_ch_switch" techpack/wlan/qcacld-3.0/cmn/os_if/linux/wlan_cfg80211.h || true

          echo "===== bitrate mask kontrol ====="
          grep -n "wlan_hdd_cfg80211_set_bitrate_mask" techpack/wlan/qcacld-3.0/core/hdd/src/wlan_hdd_cfg80211.c || true

          echo "===== iommu kontrol ====="
          grep -n "mapping_config" techpack/wlan/qcacld-3.0/cmn/qdf/linux/src/i_qdf_mem.h | head -20 || true

      - name: Prepare Kernel Tree
        run: |
          set -o pipefail
          cd kernel
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 houji_defconfig 2>&1 | tee ../defconfig.log

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-Wno-error=unknown-warning-option -Wno-error=incompatible-function-pointer-types" \
            HOSTCFLAGS="-Wno-error=unknown-warning-option" \
            prepare modules_prepare scripts 2>&1 | tee ../prepare.log

      - name: Fast WLAN Test - Single Object
        run: |
          set -o pipefail
          cd kernel
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-Wno-error=unknown-warning-option -Wno-error=incompatible-function-pointer-types" \
            HOSTCFLAGS="-Wno-error=unknown-warning-option" \
            V=1 \
            techpack/wlan/qcacld-3.0/core/hdd/src/wlan_hdd_cfg80211.o \
            2>&1 | tee ../wlan-object.log

      - name: Fast WLAN Test - Full qcacld Module
        run: |
          set -o pipefail
          cd kernel
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-Wno-error=unknown-warning-option -Wno-error=incompatible-function-pointer-types" \
            HOSTCFLAGS="-Wno-error=unknown-warning-option" \
            V=1 \
            M=techpack/wlan/qcacld-3.0 \
            modules \
            2>&1 | tee ../wlan-module.log

      - name: Full Kernel Build
        run: |
          set -o pipefail
          cd kernel
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            KCFLAGS="-Wno-error=unknown-warning-option -Wno-error=incompatible-function-pointer-types" \
            HOSTCFLAGS="-Wno-error=unknown-warning-option" \
            -j$(nproc --all) \
            2>&1 | tee ../build.log

      - name: Print Error Summary
        if: always()
        run: |
          for f in defconfig.log prepare.log wlan-object.log wlan-module.log build.log; do
            if [ -f "$f" ]; then
              echo "======================================="
              echo "LOG: $f"
              echo "======================================="
              grep -n -i -E "error:|fatal error:|undefined reference|No rule to make target|unknown warning option|incompatible function pointer|qcacld|wlan|cnss|iommu|cfg80211" "$f" | tail -n 120 || true
              echo "--------------- SON 80 SATIR ---------------"
              tail -n 80 "$f" || true
            fi
          done

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          if-no-files-found: ignore
          path: |
            defconfig.log
            prepare.log
            wlan-object.log
            wlan-module.log
            build.log

      - name: Upload Kernel Output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-output
          if-no-files-found: ignore
          path: |
            kernel/out/arch/arm64/boot/Image
            kernel/out/**/*.ko
