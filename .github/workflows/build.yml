name: Bosyaf Houji (WLAN Hariç)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: bos
      KBUILD_BUILD_HOST: yaf

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build vars
        run: |
          echo "BUILD_TS=$(date +%Y%m%d-%H%M)" >> "$GITHUB_ENV"

      - name: Install deps + ZyC Clang
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip zip dwarves bc cpio wget xz-utils make \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            pkg-config zstd pahole

          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fL "$CLANG_URL" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> "$GITHUB_PATH"

      - name: Clone sources
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          git clone --depth 1 -b monolithic-test-2 https://github.com/Bosyaf/xiaomi14.git common

      - name: Patch sources (WLAN HARIC)
        run: |
          cd common

          # Clang uninitialized fix
          sed -i 's/const struct sde_pingpong_cfg \*pp_cfg;/const struct sde_pingpong_cfg *pp_cfg = NULL;/' \
            techpack/display/msm/sde/sde_rm.c

          sed -i 's/const char \*name;/const char *name = NULL;/' \
            drivers/input/misc/qcom-hv-haptics.c

          sed -i 's/struct synx_map_entry \*map_entry;/struct synx_map_entry *map_entry = NULL;/' \
            techpack/synx-kernel/msm/synx/synx.c

      - name: Configure (Modular, WLAN disabled)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          mkdir -p out

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            HOSTCC=gcc HOSTCXX=g++ \
            houji_defconfig

          scripts/config --file out/.config \
            -e MODULES \
            -e MODULE_UNLOAD \
            -e MODVERSIONS \
            -d QCA_CLD_WLAN \
            -d CNSS2 \
            -d CNSS_GENL \
            -d CNSS_UTILS \
            -d ICNSS2 \
            -d WCNSS_MEM_PRE_ALLOC \
            -d CNSS_QCA6750 \
            -d CNSS_QMI_SVC \
            -d CNSS_PLAT_IPC_QMI_SVC

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            HOSTCC=gcc HOSTCXX=g++ \
            olddefconfig

          echo "=== WLAN durumu ==="
          grep -E 'CONFIG_(QCA_CLD_WLAN|CNSS2|CNSS_GENL|CNSS_UTILS|ICNSS2|WCNSS_MEM_PRE_ALLOC)=' out/.config || true

      - name: Build kernel + modules (WLAN hariç)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          make -j"$(nproc --all)" O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            HOSTCC=gcc HOSTCXX=g++ \
            Image modules dtbs

          test -f out/arch/arm64/boot/Image

          echo "=== BUILD SONUCU ==="
          echo "Image:"
          ls -lh out/arch/arm64/boot/Image

          echo "Toplam KO sayisi:"
          find out -name "*.ko" | wc -l

          echo "Techpack modulleri:"
          find out -path "*/techpack/*" -name "*.ko" | head -20

      - name: Prepare AnyKernel3
        run: |
          cd AnyKernel3

          sed -i 's/kernel.string=.*/kernel.string=Bosyaf Houji (WLAN stock)/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh

      - name: Package zip
        run: |
          cd AnyKernel3

          cp ../common/out/arch/arm64/boot/Image .

          find ../common/out/arch/arm64/boot/dts -type f \( -name "*.dtb" -o -name "*.dtbo" \) -exec cp {} . \; 2>/dev/null || true

          # Moduller (WLAN haric)
          mkdir -p modules/vendor/lib/modules
          find ../common/out -name "*.ko" ! -path "*wlan*" -exec cp {} modules/vendor/lib/modules/ \;

          find modules/vendor/lib/modules -name "*.ko" -exec basename {} \; | sort > modules/vendor/lib/modules/modules.load

          echo "=== PAKET ICERIGI ==="
          echo "Image: $(ls -lh Image | awk '{print $5}')"
          echo "DTB/DTBO: $(ls *.dtb *.dtbo 2>/dev/null | wc -l)"
          echo "Modul (WLAN haric): $(find modules -name '*.ko' | wc -l)"

          zip -r9 "../Bosyaf-Houji-NoWLAN-${BUILD_TS}.zip" ./*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: houji-nowlan-${{ env.BUILD_TS }}
          path: |
            common/out/arch/arm64/boot/Image
            Bosyaf-Houji-NoWLAN-*.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: houji-nowlan-${{ env.BUILD_TS }}
          name: Bosyaf Houji (WLAN Stock) - ${{ env.BUILD_TS }}
          body: |
            ### Xiaomi 14 (Houji) - WLAN Hariç Build
            - Kernel Image + techpack modülleri (camera, audio, display vs.)
            - WLAN modülü YOK - stock vendor_boot'taki kullanılacak
            - Diğer tüm donanım modülleri dahil
          files: Bosyaf-Houji-NoWLAN-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
