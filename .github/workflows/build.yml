name: Houji (Mi 14) Source Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve AOSP Clang r487747c
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make \
            gcc-aarch64-linux-gnu pkg-config zstd

          echo "🔧 AOSP Clang r487747c indiriliyor (Android 14 / Kernel 6.1 için resmi sürüm)..."
          mkdir -p $GITHUB_WORKSPACE/clang
          cd $GITHUB_WORKSPACE/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main-kernel-build-2024/clang-r487747c.tar.gz -O clang.tar.gz || \
          curl -fLSs "https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.3/clang+llvm-17.0.3-aarch64-linux-gnu.tar.xz" -o clang.tar.gz
          tar -xf clang.tar.gz
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH
          echo "✅ Clang hazır: $(clang --version | head -1)"

      - name: 2. Xiaomi Mi 14 (shennong-u-oss) Source Çek
        run: |
          echo "📦 Xiaomi Mi 14 (houji/shennong) orijinal kaynak kodu çekiliyor..."
          git clone -b shennong-u-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            --depth=1 common
          echo "✅ Source çekildi."
          echo "📋 Kernel versiyonu:"
          head -5 common/Makefile

      - name: 3. Config Hazırlığı (gki + pineapple + houji)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"

          touch .scmversion
          sed -i 's/check_defconfig//' build.config.gki 2>/dev/null || true

          echo "⚙️ 1. Adım: GKI base config..."
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            HOSTCC=clang HOSTCXX=clang++ \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            gki_defconfig

          echo "⚙️ 2. Adım: Pineapple GKI config..."
          ./scripts/kconfig/merge_config.sh -m -O out \
            out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config

          echo "⚙️ 3. Adım: Pineapple consolidate config..."
          ./scripts/kconfig/merge_config.sh -m -O out \
            out/.config \
            arch/arm64/configs/vendor/pineapple_consolidate.config

          echo "⚙️ 4. Adım: Houji GKI config..."
          ./scripts/kconfig/merge_config.sh -m -O out \
            out/.config \
            arch/arm64/configs/vendor/houji_GKI.config

          echo "⚙️ 5. Adım: Houji consolidate config..."
          ./scripts/kconfig/merge_config.sh -m -O out \
            out/.config \
            arch/arm64/configs/vendor/houji_consolidate.config

          echo "⚙️ 6. Adım: Config finalleştiriliyor..."
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            HOSTCC=clang HOSTCXX=clang++ \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            olddefconfig

          echo "✅ Config hazır."

      - name: 4. Kernel Derleme
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"

          echo "🔥 Derleme başlıyor..."
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld \
            HOSTCC=clang HOSTCXX=clang++ \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            Image Image.gz Image.lz4 dtbo.img modules 2>&1 | tee build.log

          echo "BUILD_TAG=houji-source-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 5. Çıktıları Topla
        run: |
          mkdir -p dist/modules

          # Kernel dosyaları
          cp common/out/arch/arm64/boot/Image       dist/ 2>/dev/null || true
          cp common/out/arch/arm64/boot/Image.gz    dist/ 2>/dev/null || true
          cp common/out/arch/arm64/boot/Image.lz4   dist/ 2>/dev/null || true
          cp common/out/arch/arm64/boot/dtbo.img    dist/ 2>/dev/null || true

          # Modüller
          find common/out -name "*.ko" -exec cp {} dist/modules/ \;

          # Sembol dosyası
          cp common/out/Module.symvers dist/ 2>/dev/null || true

          # Derleme logu
          cp common/build.log dist/ 2>/dev/null || true

          # Özet rapor
          echo "=============================="
          echo "       ÇIKTI LİSTESİ          "
          echo "=============================="
          ls -lh dist/
          echo ""
          echo "=============================="
          echo "   MODÜL SAYISI: $(ls dist/modules/ | wc -l)"
          echo "=============================="
          ls dist/modules/ | head -20
          echo "..."

      - name: 6. Artifact Yükle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_TAG }}
          path: dist/
