name: Build Kernel - SM8650 (pineapple)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: 1. Paketler ve Neutron Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd zip

          echo "🔥 Neutron Clang kuruluyor..."
          mkdir -p "$HOME/toolchains/neutron-clang"
          cd "$HOME/toolchains/neutron-clang"
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S

          echo "$HOME/toolchains/neutron-clang/bin" >> $GITHUB_PATH
          echo "✅ Neutron Clang İndirildi ve PATH'e eklendi!"

      - name: 2. Kaynakları Çek
        run: |
          git clone -b lineage-22.2 https://github.com/Bosyaf/android_kernel_qcom_sm8650.git --depth=1 common
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3

      - name: 3. Config Merge (gki_defconfig + pineapple_GKI.config)
        working-directory: common
        run: |
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"
          touch .scmversion
          mkdir -p out

          chmod +x scripts/kconfig/merge_config.sh

          ARCH=arm64 ./scripts/kconfig/merge_config.sh -m -O out \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/pineapple_GKI.config

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            olddefconfig

      - name: 4. Kernel Derleme (Sadece Image)
        working-directory: common
        run: |
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            Image 2>&1 | tee build.log

      - name: 5. Image Kontrol
        working-directory: common
        run: |
          if [ -f "out/arch/arm64/boot/Image" ]; then
            echo "✅ Image bulundu!"
            ls -lh out/arch/arm64/boot/Image
          else
            echo "❌ Image bulunamadı!"
            tail -100 build.log
            exit 1
          fi

      - name: 6. AnyKernel3 ile Paketleme
        run: |
          cd AnyKernel3
          
          sed -i 's/kernel.string=.*/kernel.string=SM8650-Custom-Kernel/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          
          rm -rf .git README.md
          
          DATE=$(date +"%Y%m%d-%H%M")
          ZIP_NAME="Kernel-Mi14-SM8650-${DATE}.zip"
          zip -r9 "../${ZIP_NAME}" ./*
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "✅ Paket oluşturuldu: ${ZIP_NAME}"

      - name: 7. Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: 8. Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: common/build.log
          retention-days: 7
