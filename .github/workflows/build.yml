name: Bosyaf MONOLITHIC (Built-in Vendor)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "bos"
      KBUILD_BUILD_HOST: "yaf"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 16384

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> "$GITHUB_PATH"

      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b monolithic-test-2 https://github.com/Bosyaf/xiaomi14.git --depth=1 common

      - name: 2.5. Kaynak Kod Patch (Uninitialized Variable Fix)
        run: |
          cd common
          
          # Patch 1: sde_rm.c - pp_cfg
          sed -i 's/const struct sde_pingpong_cfg \*pp_cfg;/const struct sde_pingpong_cfg *pp_cfg = NULL;/' \
            techpack/display/msm/sde/sde_rm.c
          
          # Patch 2: qcom-hv-haptics.c - name
          sed -i 's/const char \*name;/const char *name = NULL;/' \
            drivers/input/misc/qcom-hv-haptics.c
          
          echo "Patch uygulandi - kontrol:"
          grep "pp_cfg = NULL" techpack/display/msm/sde/sde_rm.c | head -1
          grep "name = NULL" drivers/input/misc/qcom-hv-haptics.c | head -1

      - name: 3. GERCEK MONOLITHIC Config
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          mkdir -p out

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 houji_defconfig

          # 5 tur =m → =y + olddefconfig dongusu
          # Her turda kalan =m azalir
          for i in 1 2 3 4 5; do
            COUNT=$(grep -c "=m" out/.config)
            echo "Tur $i: $COUNT adet =m kaldi"
            [ "$COUNT" -eq 0 ] && break
            sed -i 's/=m$/=y/' out/.config
            make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig
          done

          # Son hamle - kalan =m varsa zorla
          sed -i 's/=m$/=y/' out/.config

          echo "FINAL =m sayisi:"
          grep -c "=m" out/.config || echo "0"
          echo "FINAL =y sayisi:"
          grep -c "=y" out/.config
      - name: 4. Kernel Derle
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            Image dtbs

          if [ ! -f out/arch/arm64/boot/Image ]; then
            echo "HATA!"; exit 1
          fi
          
          echo "Image boyutu:"
          ls -lh out/arch/arm64/boot/Image
          
          echo "KO sayisi (0 olmali):"
          find out -name "*.ko" | wc -l

      - name: 5. AnyKernel3 Hazırla
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Bosyaf MONOLITHIC/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh

      - name: 6. Paketleme
        run: |
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image .
          find ../common/out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} . \; 2>/dev/null || true
          zip -r9 "../Bosyaf-MONOLITHIC-Houji-$(date +%Y%m%d-%H%M).zip" ./*

      - name: 7. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "houji-mono-$(date +%Y%m%d-%H%M)"
          name: "Bosyaf MONOLITHIC - Houji"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
