name: Build Kernel SM8650

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git libelf-dev libssl-dev \
            libncurses5-dev libxml2 libxml2-utils xsltproc zip \
            zlib1g-dev cpio kmod python3

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ~/clang
          key: clang-r522817

      - name: Download Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang
          cd ~/clang
          wget -q --show-progress \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android15-release/clang-r522817.tar.gz"
          tar -xzf clang-r522817.tar.gz
          rm clang-r522817.tar.gz

      - name: Clone Kernel
        run: |
          git clone --depth=1 https://github.com/Bosyaf/android_kernel_qcom_sm8650 kernel
          cd kernel
          find . -name "*defconfig" -o -name "*.config" | head -20

      - name: Setup Paths
        run: echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Configure Kernel
        run: |
          cd kernel
          export ARCH=arm64
          
          if [ -f "arch/arm64/configs/gki_defconfig" ]; then
            make O=out ARCH=arm64 gki_defconfig
            
            for cfg in arch/arm64/configs/vendor/*.config; do
              [ -f "$cfg" ] && cat "$cfg" >> out/.config
            done
            
            make O=out ARCH=arm64 olddefconfig
          else
            echo "Searching for defconfig..."
            find arch/arm64/configs -name "*defconfig" | head -1 | xargs -I {} basename {} | xargs -I {} make O=out ARCH=arm64 {}
          fi

      - name: Build Kernel
        run: |
          cd kernel
          make -j$(nproc) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            2>&1 | tee build.log

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: kernel-houji
          path: |
            kernel/out/arch/arm64/boot/Image*
            kernel/out/arch/arm64/boot/*.img
            kernel/build.log
