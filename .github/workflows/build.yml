name: Xiaomi 14 (Houji) Consolidated Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Kernel İsmi"
        required: false
        default: "Galadriel-Pure"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 16384
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: 1. Bağımlılıklar ve ZyC Clang 22
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd device-tree-compiler
            
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          curl -fLSs "$CLANG_URL" | tar -xzf - -C $GITHUB_WORKSPACE/clang-zyc
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> $GITHUB_PATH

      - name: 2. Kaynakları Çek (Common + Hardware)
        run: |
          # Ana Kernel Source (GKI Body)
          git clone -b android14-6.1-staging https://github.com/Bosyaf/android_kernel_common-6.1.git --depth=1 common
          
          # Hardware Source (DTBO/DTS/Headers)
          git clone -b 16 https://github.com/Bosyaf/android_device_houji-kernel.git --depth=1 hardware
          
          # AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3

      - name: 3. Cihaz Ağacı ve Header Entegrasyonu
        run: |
          # DTS/DTBO Source klasörünü kernel içindeki vendor yoluna bağla
          cd common/arch/arm64/boot/dts
          rm -rf vendor
          # Eğer elindeki hardware reposunda doğrudan dts dosyaları varsa onu bağla
          # Yoksa dts-tree reposunu kullanacağız. Şimdilik linki kuruyoruz:
          ln -s ../../../../../hardware vendor
          
          # Eksik kütüphaneleri (headers) ana kernele kopyala
          cd $GITHUB_WORKSPACE
          cp -r hardware/kernel-headers/* common/include/
          echo "✅ Hardware and Headers integrated."

      - name: 4. Config Merge (Houji Consolidated)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          OUT_DIR=$GITHUB_WORKSPACE/out
          mkdir -p $OUT_DIR
          
          # Sıralı Config Birleştirme (KPlatform Standartı)
          scripts/kconfig/merge_config.sh -m -O $OUT_DIR \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/consolidate.fragment \
            arch/arm64/configs/vendor/pineapple_consolidate.config \
            arch/arm64/configs/vendor/houji_consolidate.config

          # İsmi güncelle
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"-${{ github.event.inputs.kernel_name }}\"/" $OUT_DIR/.config
          
          # Configi kesinleştir
          make O=$OUT_DIR ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: 5. Derleme (Kernel + DTBs + Modules)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          OUT_DIR=$GITHUB_WORKSPACE/out
          
          # DTB Include yollarını göster (Header hatalarını önlemek için)
          export DTC_INCLUDE="-I$(pwd)/arch/arm64/boot/dts/vendor -I$(pwd)/include"

          # Image, DTBs ve Modules derle
          make -j$(nproc --all) O=$OUT_DIR ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            DTC_FLAGS="${DTC_INCLUDE} -Wno-graph_child_address" \
            Image dtbs modules

      - name: 6. Paketleme (AnyKernel3)
        run: |
          AK3=$GITHUB_WORKSPACE/AnyKernel3
          OUT=$GITHUB_WORKSPACE/out
          
          # Image
          cp $OUT/arch/arm64/boot/Image $AK3/
          
          # Yeni derlenen DTB ve DTBO'ları al
          mkdir -p $AK3/dtb $AK3/dtbo
          find $OUT/arch/arm64/boot/dts/vendor -name "*.dtb" -exec cp {} $AK3/dtb/ \;
          find $OUT/arch/arm64/boot/dts/vendor -name "*.dtbo" -exec cp {} $AK3/dtbo/ \;
          
          # Modülleri al
          mkdir -p $AK3/modules/vendor/lib/modules
          find $OUT -name "*.ko" -exec cp {} $AK3/modules/vendor/lib/modules/ \;

          # AnyKernel Ayarları
          cd $AK3
          sed -i "s/kernel.string=.*/kernel.string=CG+ ${{ github.event.inputs.kernel_name }}/" anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=xiaomi14' anykernel.sh

          zip -r "../Houji-Consolidated.zip" ./*

      - name: 7. Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Houji-${{ github.run_id }}
          name: "Xiaomi 14 (Houji) Consolidated - ZyC 22"
          files: "Houji-Consolidated.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
