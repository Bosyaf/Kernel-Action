name: Xiaomi 14 Houji - Monolithic Kernel (Yuki + BOLT)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd

      - name: Download Yuki Clang 23
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang-yuki
          curl -fLSs "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst" | tar -I zstd -xf - -C $GITHUB_WORKSPACE/clang-yuki
          echo "$GITHUB_WORKSPACE/clang-yuki/bin" >> $GITHUB_PATH
          echo "✅ Yuki Clang 23 (+BOLT +PGO +Polly) hazır!"

      - name: Clone Kernel Source (Monolithic)
        run: |
          git clone -b monolithic https://github.com/Bosyaf/xiaomi14.git --depth=1 kernel
          cd kernel
          echo "📦 Monolithic source (houji tam donanımlı) klonlandı"

      - name: Clone AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3

      - name: Kernel Configuration
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang-yuki/bin:$PATH"
          
          # Temizlik
          make mrproper
          
          # Houji defconfig yükle
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 houji_defconfig
          
          # Vendor fragment'leri ekle (monolithic'te birleştirme gerekebilir)
          scripts/kconfig/merge_config.sh -m -r -O out \
            arch/arm64/configs/houji_defconfig \
            arch/arm64/configs/vendor/pineapple_consolidate.config || true
          
          # Config güncelle
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig
          
          # Localversion ayarla
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-Houji-BOLT"
          ./scripts/config --file out/.config --disable CONFIG_LOCALVERSION_AUTO
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: Build Kernel + Ultimate BOLT
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang-yuki/bin:$PATH"
          
          # 1. Ham vmlinux derleme (BOLT için relocations aktif)
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 \
            -march=armv9.2-a+crypto+crc+rcpc+lse \
            -falign-functions=64 \
            -fomit-frame-pointer \
            -ffunction-sections \
            -fdata-sections \
            -Wno-error" \
            KLDFLAGS="-Wl,--gc-sections \
            -Wl,--emit-relocs \
            -Wl,--as-needed \
            -Wl,-O2" \
            KAFLAGS="-march=armv9.2-a+crypto+crc+rcpc+lse" \
            vmlinux || exit 1
          
          # 2. Ultimate BOLT Optimizasyonu
          echo "🚀 Ultimate BOLT + Re-alignment başlıyor..."
          $GITHUB_WORKSPACE/clang-yuki/bin/llvm-bolt out/vmlinux -o out/vmlinux.bolt \
            --relocs \
            --reorder-blocks=ext-tsp \
            --reorder-functions=cdsort \
            --split-functions \
            --split-all-cold \
            --align-text=2097152 \
            --jump-tables=move \
            --indirect-calls=move \
            --plt=all \
            --dyno-stats

          # 3. Re-alignment (Binary fixup)
          echo "🔧 Binary Re-alignment (Section optimization)..."
          $GITHUB_WORKSPACE/clang-yuki/bin/llvm-objcopy \
            --set-section-alignment .text=65536 \
            --set-section-alignment .rodata=4096 \
            out/vmlinux.bolt out/vmlinux.final

          # 4. Final Image oluşturma
          echo "📦 BOLT + Re-aligned Image oluşturuluyor..."
          $GITHUB_WORKSPACE/clang-yuki/bin/llvm-objcopy -O binary out/vmlinux.final out/arch/arm64/boot/Image
          gzip -n -k -f -9 out/arch/arm64/boot/Image > out/arch/arm64/boot/Image.gz
          
          echo "BOOTHASH=Houji-BOLT-Ultimate-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: Package with AnyKernel3
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Xiaomi 14 Houji BOLT Kernel/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          
          # Cihaz isimleri ekle
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=xiaomi14' anykernel.sh
          
          cp ../kernel/out/arch/arm64/boot/Image .
          zip -r "../Houji-BOLT-Kernel.zip" ./*

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 Houji - Ultimate BOLT Kernel"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
