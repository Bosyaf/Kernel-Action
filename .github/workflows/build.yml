name: Houji Source Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Paketler ve Clang
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev \
            rsync unzip dwarves bc cpio wget xz-utils make \
            gcc-aarch64-linux-gnu pkg-config zstd

          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          mkdir -p $GITHUB_WORKSPACE/clang
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: Source Çek
        run: |
          git clone -b shennong-u-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            --depth=1 common

      - name: Config Hazırla
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"

          # 1. Base GKI config
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            gki_defconfig

          # 2. Pineapple platform config
          ./scripts/kconfig/merge_config.sh -m -O out \
            out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config

          # 3. Houji cihaz config
          ./scripts/kconfig/merge_config.sh -m -O out \
            out/.config \
            arch/arm64/configs/vendor/houji_GKI.config

          # 4. Consolidate (tam paket)
          ./scripts/kconfig/merge_config.sh -m -O out \
            out/.config \
            arch/arm64/configs/vendor/houji_consolidate.config

          # 5. Finalleştir
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            olddefconfig

      - name: Derle
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld \
            HOSTCC=clang HOSTCXX=clang++ \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            Image Image.gz Image.lz4 dtbo.img modules 2>&1 | tee build.log

      - name: Çıktıları Topla
        run: |
          mkdir -p dist
          # Kernel dosyaları
          cp common/out/arch/arm64/boot/Image dist/ || true
          cp common/out/arch/arm64/boot/Image.gz dist/ || true
          cp common/out/arch/arm64/boot/Image.lz4 dist/ || true
          cp common/out/arch/arm64/boot/dtbo.img dist/ || true
          # Modüller
          mkdir -p dist/modules
          find common/out -name "*.ko" -exec cp {} dist/modules/ \;
          # Log
          cp common/build.log dist/ || true
          # Özet
          echo "=== ÇIKTI LİSTESİ ===" 
          ls -lh dist/
          echo "=== MODÜL SAYISI ==="
          ls dist/modules/ | wc -l

      - name: Artifactları Yükle
        uses: actions/upload-artifact@v4
        with:
          name: houji-build-output
          path: dist/
