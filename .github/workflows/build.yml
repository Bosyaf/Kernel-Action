name: Houji kplatform WALT Inject (Neutron)

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout Workflow Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bc bison build-essential cpio curl dwarves e2fsprogs erofs-utils file flex \
            gawk gcc-aarch64-linux-gnu git jq kmod libelf-dev liblz4-tool libncurses-dev \
            libssl-dev pahole pkg-config python3 python3-pip rsync unzip wget xz-utils zip \
            zstd android-sdk-libsparse-utils
          python3 -m pip install --upgrade pip
          python3 -m pip install --user gdown
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Neutron Clang
        run: |
          mkdir -p "$HOME/toolchains/neutron-clang"
          cd "$HOME/toolchains/neutron-clang"
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S
          echo "$HOME/toolchains/neutron-clang/bin" >> $GITHUB_PATH

      - name: Clone Sources
        run: |
          git clone -b kplatform https://github.com/mvaisakh/xiaomi14.git kernel --depth=1
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 AnyKernel3

      - name: Patch WALT Build Flags
        run: |
          cd kernel
          if ! grep -q 'Wno-error=format' kernel/sched/walt/Makefile; then
            echo 'ccflags-y += -Wno-error=format' >> kernel/sched/walt/Makefile
          fi
          echo "===== kernel/sched/walt/Makefile ====="
          tail -n 20 kernel/sched/walt/Makefile

      - name: Merge Houji Config Stack
        run: |
          cd kernel
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"

          mkdir -p out

          CONFIGS=(
            arch/arm64/configs/gki_defconfig
            arch/arm64/configs/consolidate.fragment
            arch/arm64/configs/vendor/pineapple_GKI.config
            arch/arm64/configs/vendor/pineapple_consolidate.config
            arch/arm64/configs/vendor/houji_GKI.config
            arch/arm64/configs/vendor/houji_consolidate.config
          )

          ARCH=arm64 LLVM=1 LLVM_IAS=1 \
          bash scripts/kconfig/merge_config.sh -m -O out "${CONFIGS[@]}"

          ./scripts/config --file out/.config --module CONFIG_SCHED_WALT || true
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION ""
          ./scripts/config --file out/.config --disable CONFIG_LOCALVERSION_AUTO

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            olddefconfig

          echo "===== WALT config ====="
          grep -n "CONFIG_SCHED_WALT" out/.config || true

          echo "===== kernelrelease ====="
          make -s O=out kernelrelease || true

      - name: Build Image + Only WALT Module
        run: |
          set -o pipefail
          cd kernel
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            KCFLAGS="-Wno-error=unknown-warning-option -Wno-error=format" \
            HOSTCFLAGS="-Wno-error=unknown-warning-option" \
            prepare modules_prepare Image 2>&1 | tee "$GITHUB_WORKSPACE/build.log"

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            KCFLAGS="-Wno-error=unknown-warning-option -Wno-error=format" \
            HOSTCFLAGS="-Wno-error=unknown-warning-option" \
            M=kernel/sched/walt modules 2>&1 | tee -a "$GITHUB_WORKSPACE/build.log"

          IMAGE_PATH="out/arch/arm64/boot/Image"
          WALT_KO="$(find out -type f \( -name 'sched-walt.ko' -o -name 'sched_walt.ko' \) | head -n1)"

          if [ ! -f "$IMAGE_PATH" ]; then
            echo "❌ Image bulunamadı"
            exit 1
          fi

          if [ -z "$WALT_KO" ]; then
            echo "❌ WALT modülü bulunamadı"
            find out -type f | grep -i walt || true
            exit 1
          fi

          cp "$IMAGE_PATH" "$GITHUB_WORKSPACE/Image"
          cp "$WALT_KO" "$GITHUB_WORKSPACE/sched-walt.ko"

          echo "===== Built outputs ====="
          ls -lh "$GITHUB_WORKSPACE/Image"
          ls -lh "$GITHUB_WORKSPACE/sched-walt.ko"
          modinfo "$GITHUB_WORKSPACE/sched-walt.ko" || true

      - name: Download Stock vendor_dlkm.img
        run: |
          gdown --fuzzy "https://drive.google.com/file/d/1efQ2T3D3B-sLn3CVCe89AjL9ROq3ZvjX/view?usp=drivesdk" -O vendor_dlkm_stock.img
          echo "===== file output ====="
          file vendor_dlkm_stock.img

          if file vendor_dlkm_stock.img | grep -qi "HTML"; then
            echo "❌ HTML indi. Drive linki public değil."
            exit 1
          fi

      - name: Extract Stock vendor_dlkm
        run: |
          set -e
          mkdir -p vendor_dlkm_root vendor_dlkm_mount

          IMG="vendor_dlkm_stock.img"
          WORK_IMG="$IMG"

          if file "$IMG" | grep -qi "Android sparse image"; then
            echo "Sparse image bulundu, raw'a çevriliyor..."
            simg2img "$IMG" vendor_dlkm_stock.raw.img
            WORK_IMG="vendor_dlkm_stock.raw.img"
          fi

          if file "$WORK_IMG" | grep -qi "EROFS"; then
            echo "FS_KIND=erofs" >> $GITHUB_ENV
            if command -v extract.erofs >/dev/null 2>&1; then
              extract.erofs -i "$WORK_IMG" -o vendor_dlkm_root
            else
              fsck.erofs --extract=vendor_dlkm_root "$WORK_IMG"
            fi
          elif file "$WORK_IMG" | grep -qi "ext4"; then
            echo "FS_KIND=ext4" >> $GITHUB_ENV
            sudo mount -o loop,ro "$WORK_IMG" vendor_dlkm_mount
            rsync -aH vendor_dlkm_mount/ vendor_dlkm_root/
            sudo umount vendor_dlkm_mount
          else
            echo "❌ Desteklenmeyen dosya sistemi:"
            file "$WORK_IMG"
            exit 1
          fi

          echo "===== WALT candidates ====="
          find vendor_dlkm_root -type f | grep -Ei 'walt|sched' | head -100 || true

      - name: Replace Stock WALT With Built WALT
        run: |
          set -e

          STOCK_WALT="$(find vendor_dlkm_root -type f \( -iname 'sched_walt.ko' -o -iname 'sched-walt.ko' \) | head -n1)"
          if [ -z "$STOCK_WALT" ]; then
            STOCK_WALT="$(find vendor_dlkm_root -type f -iname '*walt*.ko' | head -n1)"
          fi

          if [ -z "$STOCK_WALT" ]; then
            echo "❌ vendor_dlkm içinde WALT bulunamadı"
            find vendor_dlkm_root -type f | grep -Ei 'walt|sched' || true
            exit 1
          fi

          echo "Stock WALT path: $STOCK_WALT"
          ls -lh "$STOCK_WALT"

          cp -f "$STOCK_WALT" "${STOCK_WALT}.bak"
          install -m 0644 "$GITHUB_WORKSPACE/sched-walt.ko" "$STOCK_WALT"

          echo "===== replaced ====="
          ls -lh "$STOCK_WALT"

      - name: Rebuild vendor_dlkm Patched Image
        run: |
          set -e

          if [ "$FS_KIND" = "erofs" ]; then
            mkfs.erofs -zlz4hc --mount-point=/vendor_dlkm vendor_dlkm_patched.img vendor_dlkm_root
          elif [ "$FS_KIND" = "ext4" ]; then
            SIZE_BYTES="$(du -sb vendor_dlkm_root | awk '{print $1}')"
            SIZE_BYTES=$((SIZE_BYTES + 64*1024*1024))
            BLOCKS=$(( (SIZE_BYTES + 4095) / 4096 ))
            mke2fs -q -t ext4 -b 4096 -d vendor_dlkm_root -L vendor_dlkm vendor_dlkm_patched.img "$BLOCKS"
          else
            echo "❌ FS_KIND bilinmiyor"
            exit 1
          fi

          echo "===== patched image ====="
          ls -lh vendor_dlkm_patched.img
          file vendor_dlkm_patched.img

      - name: Build AnyKernel3 Zip For Image
        run: |
          cd AnyKernel3

          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/g' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh
          sed -i 's/kernel.string=.*/kernel.string=Houji kplatform WALT Test/' anykernel.sh

          cp "$GITHUB_WORKSPACE/Image" .

          zip -r9 "$GITHUB_WORKSPACE/Houji-kplatform-Image.zip" ./* -x .git README.md '*placeholder'

      - name: Prepare Release Files
        run: |
          mkdir -p release

          cp Image release/
          cp sched-walt.ko release/
          cp vendor_dlkm_patched.img release/
          cp Houji-kplatform-Image.zip release/
          cp build.log release/ || true

          cat > release/FLASH_README.txt << 'EOF'
          FLASH SIRASI

          1) Recovery/Kernel manager ile:
             Houji-kplatform-Image.zip

          2) Fastboot modda:
             fastboot flash vendor_dlkm vendor_dlkm_patched.img

          3) Reboot:
             fastboot reboot

          NOTLAR
          - Bu paket full vendor_dlkm source build değildir.
          - Stock vendor_dlkm içine yeni sched-walt.ko enjekte eder.
          - Aynı testte Image + vendor_dlkm birlikte flashlanmalıdır.
          EOF

          echo "TAG_NAME=houji-kplatform-walt-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: houji-kplatform-walt-output
          path: release/*

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Houji kplatform WALT Inject"
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print Last Log Lines On Failure
        if: failure()
        run: |
          echo "===== SON 200 SATIR ====="
          tail -n 200 build.log || true
