name: Xiaomi 14 (Houji) Pure Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Build variant"
        required: true
        default: "consolidate"
        type: choice
        options:
          - consolidate
          - gki
      kernel_name:
        description: "Kernel isim soneki"
        required: false
        default: "Galadriel-Pure"
      include_modules:
        description: "Modulleri derle"
        required: false
        default: true
        type: boolean

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      VARIANT: ${{ github.event.inputs.variant || 'consolidate' }}
      KERNEL_NAME: ${{ github.event.inputs.kernel_name || 'Galadriel-Pure' }}
      INCLUDE_MODULES: ${{ github.event.inputs.include_modules || 'true' }}

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 16384
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          path: AnyKernel3

      - name: Install Dependencies & Download Toolchain
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev \
            libxml2-utils rsync unzip dwarves bc cpio wget \
            xz-utils make gcc-aarch64-linux-gnu pkg-config zstd

          echo "🔥 Downloading Google Clang 17.0.2 (android14 r487747c)"
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz"
          mkdir -p $GITHUB_WORKSPACE/toolchain/clang-google
          curl -fLSs "$CLANG_URL" | tar -xzf - -C $GITHUB_WORKSPACE/toolchain/clang-google
          echo "$GITHUB_WORKSPACE/toolchain/clang-google/bin" >> $GITHUB_PATH

          echo "📋 Clang version:"
          $GITHUB_WORKSPACE/toolchain/clang-google/bin/clang --version

      - name: Clone Kernel Source
        run: |
          echo "📥 Cloning mvaisakh/xiaomi14 (kplatform branch)..."
          git clone -b kplatform https://github.com/mvaisakh/xiaomi14.git source --depth=1
          cd source
          git submodule update --init --recursive --depth=1 || true

          echo "=============================================="
          echo "📋 Kernel Version: $(make kernelversion 2>/dev/null || echo '6.1.166')"
          echo "=============================================="

      - name: Prepare & Merge Kernel Config
        run: |
          cd source
          export PATH="$GITHUB_WORKSPACE/toolchain/clang-google/bin:$PATH"

          OUT_DIR="$GITHUB_WORKSPACE/out"
          mkdir -p "$OUT_DIR"

          echo "=============================================="
          echo "📱 Device: Xiaomi 14 (houji)"
          echo "🔧 SoC: Snapdragon 8 Gen 3 (pineapple/SM8650)"
          echo "📦 Variant: $VARIANT"
          echo "🏷️  Kernel Name: $KERNEL_NAME"
          echo "=============================================="

          # Step 1: gki_defconfig temel config
          echo "📋 Step 1: Applying gki_defconfig (base)"
          make O="$OUT_DIR" ARCH=arm64 LLVM=1 gki_defconfig

          # Step 2: SoC GKI fragment (SM8650 Pineapple)
          echo "📋 Step 2: Merging pineapple_GKI.config"
          scripts/kconfig/merge_config.sh -m \
            -O "$OUT_DIR" \
            "$OUT_DIR/.config" \
            arch/arm64/configs/vendor/pineapple_GKI.config || true

          # Step 3: Cihaz GKI fragment (Xiaomi 14 houji)
          echo "📋 Step 3: Merging houji_GKI.config"
          scripts/kconfig/merge_config.sh -m \
            -O "$OUT_DIR" \
            "$OUT_DIR/.config" \
            arch/arm64/configs/vendor/houji_GKI.config || true

          # Step 4-5: Consolidate only
          if [ "$VARIANT" = "consolidate" ]; then
            echo "📋 Step 4: Merging consolidate.fragment"
            scripts/kconfig/merge_config.sh -m \
              -O "$OUT_DIR" \
              "$OUT_DIR/.config" \
              arch/arm64/configs/consolidate.fragment || true

            echo "📋 Step 5: Merging pineapple_consolidate.config"
            scripts/kconfig/merge_config.sh -m \
              -O "$OUT_DIR" \
              "$OUT_DIR/.config" \
              arch/arm64/configs/vendor/pineapple_consolidate.config || true
          fi

          # ── SADECE QCOM: Gereksiz mimarileri kapat ──
          # gki_defconfig tum mimarileri aciyor (sunxi, bcm, hisi, tegra)
          # Bunlarin DTB'leri derlenirken hata veriyor
          # Biz sadece QCOM/Pineapple istiyoruz
          echo "📋 Removing non-QCOM architectures from config"
          sed -i 's/CONFIG_ARCH_SUNXI=y/# CONFIG_ARCH_SUNXI is not set/' "$OUT_DIR/.config"
          sed -i 's/CONFIG_ARCH_BCM=y/# CONFIG_ARCH_BCM is not set/' "$OUT_DIR/.config"
          sed -i 's/CONFIG_ARCH_BRCMSTB=y/# CONFIG_ARCH_BRCMSTB is not set/' "$OUT_DIR/.config"
          sed -i 's/CONFIG_ARCH_HISI=y/# CONFIG_ARCH_HISI is not set/' "$OUT_DIR/.config"
          sed -i 's/CONFIG_ARCH_TEGRA=y/# CONFIG_ARCH_TEGRA is not set/' "$OUT_DIR/.config"
          sed -i 's/CONFIG_ARM_SCPI_CPUFREQ=y/# CONFIG_ARM_SCPI_CPUFREQ is not set/' "$OUT_DIR/.config"
          sed -i 's/CONFIG_ARM_SCMI_CPUFREQ=y/# CONFIG_ARM_SCMI_CPUFREQ is not set/' "$OUT_DIR/.config"
          sed -i 's/CONFIG_PCIE_DW=y/# CONFIG_PCIE_DW is not set/' "$OUT_DIR/.config" || true

          # Custom localversion
          echo "🏷️ Setting LOCALVERSION to -$KERNEL_NAME"
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"-$KERNEL_NAME\"/" \
            "$OUT_DIR/.config" || true
          grep -q "CONFIG_LOCALVERSION=" "$OUT_DIR/.config" || \
            echo "CONFIG_LOCALVERSION=\"-$KERNEL_NAME\"" >> "$OUT_DIR/.config"

          # Bagimliklari coz
          echo "📋 Resolving config dependencies (olddefconfig)"
          make O="$OUT_DIR" ARCH=arm64 LLVM=1 olddefconfig

          echo "✅ Config preparation complete!"

      - name: Build Kernel
        run: |
          cd source
          export PATH="$GITHUB_WORKSPACE/toolchain/clang-google/bin:$PATH"

          OUT_DIR="$GITHUB_WORKSPACE/out"

          echo "🔨 Building kernel Image + houji DTBs..."
          make -j$(nproc --all) \
            O="$OUT_DIR" \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            Image \
            dtbs

          echo "✅ Kernel Image + DTBs built successfully!"

          # Consolidate icin modulleri de derle
          if [ "$VARIANT" = "consolidate" ] && [ "$INCLUDE_MODULES" = "true" ]; then
            echo "📦 Building kernel modules..."
            make -j$(nproc --all) \
              O="$OUT_DIR" \
              ARCH=arm64 \
              LLVM=1 \
              LLVM_IAS=1 \
              modules || echo "⚠️ Module build had issues (non-fatal)"
          fi

          # Build sonucunu kaydet
          echo "BOOTHASH=Pure-Houji-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +%Y-%m-%d_%H-%M)" >> $GITHUB_ENV
          echo "KERNEL_VARIANT=$VARIANT" >> $GITHUB_ENV

          IMAGE_PATH=$(find "$OUT_DIR" -name "Image" -type f | head -n 1)
          if [ -n "$IMAGE_PATH" ]; then
            IMAGE_SIZE=$(du -h "$IMAGE_PATH" | cut -f1)
            echo "📊 Kernel Image size: $IMAGE_SIZE"
          fi

          # Houji DTB'leri goster
          echo "📋 Houji/Pineapple DTBs:"
          find "$OUT_DIR/arch/arm64/boot/dts/qcom" -name "*.dtb" 2>/dev/null | grep -iE "pineapple|houji" || \
          find "$OUT_DIR/arch/arm64/boot/dts/qcom" -name "*.dtb" 2>/dev/null | head -20

      - name: Package with AnyKernel3
        run: |
          OUT_DIR="$GITHUB_WORKSPACE/out"

          # ── Kernel Image ──
          IMAGE_PATH=$(find "$OUT_DIR" -name "Image" -type f | head -n 1)
          if [ -z "$IMAGE_PATH" ]; then
            echo "❌ ERROR: Kernel Image not found!"
            exit 1
          fi
          echo "✅ Found kernel Image: $IMAGE_PATH"
          cp "$IMAGE_PATH" ./AnyKernel3/

          # ── QCOM DTB dosyalari ──
          mkdir -p ./AnyKernel3/dtb
          if [ -d "$OUT_DIR/arch/arm64/boot/dts/qcom" ]; then
            find "$OUT_DIR/arch/arm64/boot/dts/qcom" -name "*.dtb" \
              -exec cp {} ./AnyKernel3/dtb/ \; 2>/dev/null || true
            DTB_COUNT=$(find ./AnyKernel3/dtb -name "*.dtb" | wc -l)
            echo "✅ Copied $DTB_COUNT QCOM DTB files"
          else
            echo "⚠️ QCOM DTB directory not found"
          fi

          # ── DTBO overlay dosyalari ──
          mkdir -p ./AnyKernel3/dtbo
          find "$OUT_DIR/arch/arm64/boot/dts/qcom" -name "*.dtbo" \
            -exec cp {} ./AnyKernel3/dtbo/ \; 2>/dev/null || true
          DTBO_COUNT=$(find ./AnyKernel3/dtbo -name "*.dtbo" | wc -l)
          echo "✅ Copied $DTBO_COUNT DTBO files"

          # ── AnyKernel3 ayarlari ──
          cd ./AnyKernel3
          sed -i "s/kernel.string=.*/kernel.string=CG+ $KERNEL_NAME ($VARIANT)/" anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh

          sed -i '/is_slot_device=auto/a \
          device.name1=houji\
          device.name2=shennong\
          device.name3=xiaomi14' anykernel.sh

          # Flashable zip olustur
          ZIP_NAME="Houji-PureKernel-$VARIANT-$BUILD_DATE.zip"
          zip -r "../$ZIP_NAME" ./*
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "✅ Created $ZIP_NAME"
          echo "📊 ZIP size: $(du -h ../$ZIP_NAME | cut -f1)"
          echo "📦 ZIP contents:"
          unzip -l "../$ZIP_NAME" | tail -5

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (Houji) ${{ env.KERNEL_VARIANT }} - ${{ env.BUILD_DATE }}"
          body: |
            ## 🔥 Galadriel Pure Kernel - Xiaomi 14 (Houji)

            **Variant:** ${{ env.KERNEL_VARIANT }}
            **Kernel Version:** 6.1.166 (kplatform)
            **Source:** [mvaisakh/xiaomi14 (kplatform)](https://github.com/mvaisakh/xiaomi14/tree/kplatform)
            **Toolchain:** Google Clang 17.0.2 (r487747c)
            **Build Date:** ${{ env.BUILD_DATE }}

            ### 📱 Supported Devices
            - Xiaomi 14 (houji)
            - Xiaomi 14 Pro (shennong)

            ### 📋 Config Merge Order
            1. `gki_defconfig` (base)
            2. `pineapple_GKI.config` (SoC GKI)
            3. `houji_GKI.config` (device GKI)
            4. `consolidate.fragment` (consolidate only)
            5. `pineapple_consolidate.config` (consolidate only)

            ### 📦 Contents
            - Kernel Image (houji-specific)
            - QCOM/Pineapple DTBs
            - DTBO overlays (if available)

            ### ⚠️ Flash at your own risk!
          files: "${{ env.ZIP_NAME }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
