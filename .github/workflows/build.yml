name: Build Kernel - Xiaomi Mi 14 (Houji)

on:
  workflow_dispatch:
    inputs:
      KERNEL_DEFCONFIG:
        description: 'Defconfig dosyası'
        required: true
        default: 'gki_defconfig'
        type: string
      KSU:
        description: 'KernelSU eklensin mi?'
        required: true
        default: true
        type: boolean
      LTO:
        description: 'LTO tipi (thin/full/none)'
        required: true
        default: 'thin'
        type: choice
        options:
          - thin
          - full
          - none

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git ccache automake flex lzop bison \
            gperf build-essential zip curl zlib1g-dev \
            g++-multilib libxml2-utils bzip2 libbz2-dev \
            libbz2-1.0 libghc-bzlib-dev squashfs-tools \
            patchelf expat uuid-dev mtools bc \
            libssl-dev libfl-dev python3 python3-pip \
            libarchive-tools pahole cpio kmod \
            binutils-aarch64-linux-gnu
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Bosyaf/android_kernel_qcom_sm8650
          ref: main
          path: kernel_source
          fetch-depth: 1

      - name: Download Clang Toolchain
        run: |
          mkdir -p toolchain
          
          # Snapdragon LLVM / Clang 19 (AOSP Prebuilt)
          echo "Downloading AOSP Clang..."
          git clone --depth=1 https://gitlab.com/ThankYouMario/android_prebuilts_clang-standalone.git -b 19 toolchain/clang
          
          # GCC aarch64
          echo "Downloading GCC aarch64..."
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git toolchain/gcc-aarch64
          
          # GCC arm32
          echo "Downloading GCC arm32..."
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git toolchain/gcc-arm
      - name: Setup KernelSU (Optional)
        if: ${{ inputs.KSU }}
        working-directory: kernel_source
        run: |
          echo "Setting up KernelSU..."
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          echo "KernelSU setup complete!"
      - name: Set Build Environment
        run: |
          echo "KERNEL_DIR=$GITHUB_WORKSPACE/kernel_source" >> $GITHUB_ENV
          echo "CLANG_DIR=$GITHUB_WORKSPACE/toolchain/clang" >> $GITHUB_ENV
          echo "GCC_AARCH64_DIR=$GITHUB_WORKSPACE/toolchain/gcc-aarch64" >> $GITHUB_ENV
          echo "GCC_ARM_DIR=$GITHUB_WORKSPACE/toolchain/gcc-arm" >> $GITHUB_ENV
          
          # PATH ayarla
          echo "$GITHUB_WORKSPACE/toolchain/clang/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/toolchain/gcc-aarch64/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/toolchain/gcc-arm/bin" >> $GITHUB_PATH
      - name: Find Correct Defconfig
        working-directory: kernel_source
        run: |
          echo "=== Mevcut defconfig dosyaları ==="
          find . -name "*defconfig*" -path "*/arch/arm64/configs/*" | head -30
          echo ""
          echo "=== GKI defconfig aranıyor ==="
          find . -name "gki_defconfig" -o -name "vendor/*_defconfig" | head -20
          echo ""
          echo "=== Houji/Mi14 ile ilgili config ==="
          find . -name "*houji*" -o -name "*xiaomi*" -o -name "*pineapple*" | head -20
      - name: Generate Defconfig
        working-directory: kernel_source
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          # Defconfig oluştur
          echo "Using defconfig: ${{ inputs.KERNEL_DEFCONFIG }}"
          
          make O=out \
            ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            ${{ inputs.KERNEL_DEFCONFIG }}
      - name: Build Kernel
        working-directory: kernel_source
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Kaç CPU var?
          NPROC=$(nproc --all)
          echo "Building with $NPROC threads..."
          
          # LTO ayarı
          LTO_FLAG=""
          if [ "${{ inputs.LTO }}" = "thin" ]; then
            LTO_FLAG="LTO=thin"
          elif [ "${{ inputs.LTO }}" = "full" ]; then
            LTO_FLAG="LTO=full"
          fi
          
          # Derleme başla
          make -j${NPROC} O=out \
            ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LLVM=1 \
            LLVM_IAS=1 \
            ${LTO_FLAG} \
            2>&1 | tee build.log
          
          echo "Build completed!"
      - name: Check Build Output
        working-directory: kernel_source
        run: |
          echo "=== Checking for kernel image ==="
          find out -name "Image" -o -name "Image.gz" -o -name "Image.gz-dtb" -o -name "Image.lz4" 2>/dev/null
          
          if [ -f "out/arch/arm64/boot/Image" ]; then
            echo "✅ Kernel Image found!"
            ls -lh out/arch/arm64/boot/Image
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            echo "✅ Kernel Image.gz found!"
            ls -lh out/arch/arm64/boot/Image.gz
          else
            echo "❌ Kernel image NOT found!"
            echo "=== Son build log satırları ==="
            tail -50 build.log
            exit 1
          fi
          
          echo ""
          echo "=== DTB/DTBO dosyaları ==="
          find out -name "*.dtb" -o -name "*.dtbo" 2>/dev/null | head -10
      - name: Create AnyKernel3 Package
        run: |
          echo "Packaging with AnyKernel3..."
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          
          cd anykernel
          
          # AnyKernel3 config - Xiaomi Mi 14 (houji)
          cat > anykernel.sh << 'ANYKERNEL_EOF'
          # AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers
          
          properties() { '
          kernel.string=Custom Kernel for Xiaomi Mi 14 by Bosyaf
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=houji
          device.name2=Houji
          device.name3=mi14
          supported.versions=14-15
          supported.patchlevels=
          '; }
          
          block=boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          
          . tools/ak3-core.sh;
          
          set_perm_recursive 0 0 755 644 $ramdisk/*;
          set_perm_recursive 0 0 750 750 $ramdisk/init* $ramdisk/sbin;
          
          dump_boot;
          write_boot;
          ANYKERNEL_EOF
          
          # Kernel image kopyala
          if [ -f "$GITHUB_WORKSPACE/kernel_source/out/arch/arm64/boot/Image" ]; then
            cp $GITHUB_WORKSPACE/kernel_source/out/arch/arm64/boot/Image .
          elif [ -f "$GITHUB_WORKSPACE/kernel_source/out/arch/arm64/boot/Image.gz" ]; then
            cp $GITHUB_WORKSPACE/kernel_source/out/arch/arm64/boot/Image.gz .
          fi
          
          # DTBO kopyala (varsa)
          if [ -f "$GITHUB_WORKSPACE/kernel_source/out/arch/arm64/boot/dtbo.img" ]; then
            cp $GITHUB_WORKSPACE/kernel_source/out/arch/arm64/boot/dtbo.img .
          fi
          
          # Gereksiz dosyaları sil
          rm -rf .git README.md
          
          # ZIP oluştur
          DATE=$(date +"%Y%m%d-%H%M")
          KSU_TAG=""
          if [ "${{ inputs.KSU }}" = "true" ]; then
            KSU_TAG="-KernelSU"
          fi
          
          ZIP_NAME="Kernel-Mi14-Houji${KSU_TAG}-${DATE}.zip"
          zip -r9 "../${ZIP_NAME}" . -x '*.git*'
          
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "✅ Package created: ${ZIP_NAME}"
      - name: Upload Kernel ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel_source/build.log
          retention-days: 7
          
