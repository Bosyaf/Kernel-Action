name: Build Kernel - Xiaomi Mi 14 (Houji)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      KSU:
        description: 'KernelSU eklensin mi?'
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    timeout-minutes: 420

    steps:
      - name: Tum GitHub Actions Cachelerini Temizle
        run: |
          echo "🧹 Tüm cache'ler siliniyor..."
          gh extension install actions/gh-actions-cache 2>/dev/null || true
          REPO=${{ github.repository }}
          BRANCH=${{ github.ref_name }}
          CACHE_LIST=$(gh actions-cache list -R "$REPO" -B "$BRANCH" 2>/dev/null | cut -f1)
          if [ -n "$CACHE_LIST" ]; then
            echo "$CACHE_LIST" | while read -r cache_id; do
              if [ -n "$cache_id" ]; then
                echo "  → Siliniyor: $cache_id"
                gh actions-cache delete "$cache_id" -R "$REPO" -B "$BRANCH" --confirm 2>/dev/null || true
              fi
            done
          else
            echo "  ✅ Silinecek cache yok."
          fi
          echo "✅ Cache temizleme tamamlandı."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Runner Disk ve Bellek Temizligi
        run: |
          echo "🧹 Runner hafızası temizleniyor..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/go /opt/hostedtoolcache/Python /opt/hostedtoolcache/PyPy /opt/hostedtoolcache/node /opt/hostedtoolcache/ruby /opt/hostedtoolcache/Java_Temurin-Hotspot /opt/hostedtoolcache/cmake 2>/dev/null || true
          sudo rm -rf /home/runneradmin/.cache /home/runner/.cache 2>/dev/null || true
          sudo rm -rf /tmp/* 2>/dev/null || true
          sudo apt-get clean -y 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo rm -rf /var/cache/apt /var/lib/apt/lists 2>/dev/null || true
          sudo rm -rf /usr/local/lib/node_modules /usr/local/share/chrom* /usr/local/share/pip* 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile 2>/dev/null || true
          echo "🧹 Çalışma alanı temizleniyor..."
          rm -rf $GITHUB_WORKSPACE/* $GITHUB_WORKSPACE/.* 2>/dev/null || true
          echo "✅ Runner tertemiz!"

      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 16384

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make \
            gcc-aarch64-linux-gnu pkg-config zstd zip

      - name: Download Clang Toolchain
        run: |
          mkdir -p toolchain
          echo "Downloading AOSP Clang..."
          git clone --depth=1 https://gitlab.com/ThankYouMario/android_prebuilts_clang-standalone.git -b 19 toolchain/clang
          echo "Downloading GCC aarch64..."
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git toolchain/gcc-aarch64
          echo "Downloading GCC arm32..."
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git toolchain/gcc-arm
          echo "$GITHUB_WORKSPACE/toolchain/clang/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/toolchain/gcc-aarch64/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/toolchain/gcc-arm/bin" >> $GITHUB_PATH
          echo "✅ Toolchain hazır!"

      - name: Checkout Kernel Source
        run: |
          git clone --depth=1 https://github.com/Bosyaf/android_kernel_qcom_sm8650.git kernel_source

      - name: Setup KernelSU (Optional)
        if: ${{ inputs.KSU }}
        working-directory: kernel_source
        run: |
          echo "📦 KernelSU kuruluyor..."
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          echo "✅ KernelSU setup complete!"

      - name: Find Correct Defconfig
        working-directory: kernel_source
        run: |
          echo "=== Mevcut defconfig dosyaları ==="
          find . -name "*defconfig*" -path "*/arch/arm64/configs/*" | head -30
          echo ""
          echo "=== GKI defconfig ==="
          find . -name "gki_defconfig" | head -20
          echo ""
          echo "=== Houji/Mi14/pineapple ile ilgili ==="
          find . -iname "*houji*" -o -iname "*xiaomi*" -o -iname "*pineapple*" | head -20
          echo ""
          echo "=== Build scriptleri ==="
          find . -maxdepth 2 -name "build*.sh" -o -name "build.config*" | head -20

      - name: Generate Defconfig
        working-directory: kernel_source
        run: |
          touch .scmversion
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            gki_defconfig

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            olddefconfig

      - name: Build Kernel
        working-directory: kernel_source
        run: |
          NPROC=$(nproc --all)
          echo "Building with $NPROC threads..."

          make -j${NPROC} O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            Image 2>&1 | tee build.log

          if [ -f "out/arch/arm64/boot/Image" ]; then
            echo "✅ Kernel Image found!"
            ls -lh out/arch/arm64/boot/Image
          else
            echo "❌ Kernel image NOT found!"
            tail -100 build.log
            exit 1
          fi

      - name: Create AnyKernel3 Package
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          cd anykernel
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh

          cp ../kernel_source/out/arch/arm64/boot/Image .

          rm -rf .git README.md
          DATE=$(date +"%Y%m%d-%H%M")
          KSU_TAG=""
          if [ "${{ inputs.KSU }}" = "true" ]; then
            KSU_TAG="-KernelSU"
          fi
          ZIP_NAME="Kernel-Mi14-Houji${KSU_TAG}-${DATE}.zip"
          zip -r9 "../${ZIP_NAME}" ./*
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "✅ Package created: ${ZIP_NAME}"

      - name: Upload Kernel ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel_source/build.log
          retention-days: 7
