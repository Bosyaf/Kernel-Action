name: Xiaomi HOUJI Kernel - Neutron Clang 19

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-houji-kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "houji-builder"
      KBUILD_BUILD_HOST: "xiaomi-14"

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MiCode/Xiaomi_Kernel_OpenSource
          ref: shennong-u-oss
          path: kernel
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd libfdt-dev device-tree-compiler kmod ccache

      - name: Download Neutron Clang 19
        run: |
          echo "🔥 Neutron Clang 19 İndiriliyor..."
          
          mkdir -p $HOME/toolchains/neutron-clang
          cd $HOME/toolchains/neutron-clang
          
          curl -fLSs "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman" -o antman
          chmod +x antman
          ./antman -S
          
          echo "$HOME/toolchains/neutron-clang/bin" >> $GITHUB_PATH
          
          echo "✅ Neutron Clang 19 Kuruldu!"
          clang --version | head -3

      - name: Build HOUJI Kernel (Neutron Clang 19)
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          
          echo "🔨 HOUJI KERNEL DERLENİYOR..."
          echo "================================================"
          echo "Device: Xiaomi 14 (HOUJI)"
          echo "Source: MiCode/Xiaomi_Kernel_OpenSource"
          echo "Branch: shennong-u-oss"
          echo "Toolchain: Neutron Clang 19"
          echo "================================================"
          echo ""
          
          # Temizle
          make -j$(nproc --all) clean O=${OUT_DIR} || true
          rm -rf ${OUT_DIR}
          mkdir -p ${OUT_DIR}
          
          # ============================================
          # HOUJI CONFIG MERGE (GERÇEK CONFIG'LER)
          # ============================================
          echo "📁 HOUJI Config Merge Başlatılıyor..."
          echo ""
          
          # Mevcut config'leri göster
          echo "📋 Mevcut HOUJI config'leri:"
          find arch/arm64/configs -name "*houji*" 2>/dev/null | sort
          find arch/arm64/configs/vendor -name "*houji*" 2>/dev/null | sort
          echo ""
          
          # ============================================
          # MERGE CONFIG - HOUJI İÇİN
          # ============================================
          echo "⚙️ Config Merge Ediliyor..."
          
          ./scripts/kconfig/merge_config.sh -O ${OUT_DIR} \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config \
            2>&1
          
          if [ $? -ne 0 ]; then
            echo "⚠️ Merge uyarıları var, devam ediliyor..."
          fi
          
          # consolidate.fragment varsa ekle
          if [ -f "arch/arm64/configs/consolidate.fragment" ]; then
            echo "📝 consolidate.fragment ekleniyor..."
            cat arch/arm64/configs/consolidate.fragment >> ${OUT_DIR}/.config
          fi
          
          # pineapple config'leri de gerekliyse
          if [ -f "arch/arm64/configs/vendor/pineapple_GKI.config" ]; then
            echo "📝 pineapple_GKI.config ekleniyor (SM8650 ortak)..."
            cat arch/arm64/configs/vendor/pineapple_GKI.config >> ${OUT_DIR}/.config
          fi
          
          if [ -f "arch/arm64/configs/vendor/pineapple_consolidate.config" ]; then
            echo "📝 pineapple_consolidate.config ekleniyor..."
            cat arch/arm64/configs/vendor/pineapple_consolidate.config >> ${OUT_DIR}/.config
          fi
          
          # Config'i finalize et
          echo ""
          echo "🔧 Config finalize ediliyor (olddefconfig)..."
          make O=${OUT_DIR} olddefconfig
          
          echo ""
          echo "✅ HOUJI Config Hazır!"
          echo "================================================"
          
          # ============================================
          # KERNEL DERLEME
          # ============================================
          echo "⚡ KERNEL DERLEME BAŞLIYOR..."
          echo "================================================"
          
          make -j$(nproc --all) \
            O=${OUT_DIR} \
            ARCH=${ARCH} \
            CROSS_COMPILE=${CROSS_COMPILE} \
            CC=${CC} \
            LLVM=${LLVM} \
            LLVM_IAS=${LLVM_IAS} \
            AR=${AR} \
            NM=${NM} \
            OBJCOPY=${OBJCOPY} \
            OBJDUMP=${OBJDUMP} \
            STRIP=${STRIP} \
            Image.gz-dtb dtbo.img modules 2>&1 | tee ${OUT_DIR}/kernel.log
          
          BUILD_STATUS=${PIPESTATUS[0]}
          
          if [ ${BUILD_STATUS} -eq 0 ]; then
            echo ""
            echo "✅ HOUJI KERNEL DERLEME BAŞARILI!"
            echo "BOOTHASH=HOUJI-Neutron19-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV
          else
            echo ""
            echo "❌ KERNEL DERLEME BAŞARISIZ!"
            echo "Hata logları: ${OUT_DIR}/kernel.log"
            tail -100 ${OUT_DIR}/kernel.log
            exit 1
          fi
          
          echo "================================================"

      - name: Prepare Kernel Files
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          mkdir -p release
          
          echo "📦 Kernel dosyaları hazırlanıyor..."
          
          if [ -f "${OUT_DIR}/arch/arm64/boot/Image.gz-dtb" ]; then
            cp ${OUT_DIR}/arch/arm64/boot/Image.gz-dtb release/
            echo "✓ Image.gz-dtb kopyalandı"
          fi
          
          if [ -f "${OUT_DIR}/arch/arm64/boot/dtbo.img" ]; then
            cp ${OUT_DIR}/arch/arm64/boot/dtbo.img release/
            echo "✓ dtbo.img kopyalandı"
          fi
          
          if [ -f "${OUT_DIR}/arch/arm64/boot/Image.gz" ]; then
            cp ${OUT_DIR}/arch/arm64/boot/Image.gz release/
            echo "✓ Image.gz kopyalandı"
          fi
          
          if [ -d "${OUT_DIR}/modules" ]; then
            cp -r ${OUT_DIR}/modules release/
            echo "✓ Modules kopyalandı"
          fi
          
          cat > release/build-info.txt << EOF
          ╔═══════════════════════════════════════════════════════╗
          ║     XIAOMI HOUJI KERNEL BUILD                         ║
          ╠═══════════════════════════════════════════════════════╣
          ║  Device:        Xiaomi 14 (HOUJI)                     ║
          ║  Source:        MiCode/Xiaomi_Kernel_OpenSource       ║
          ║  Branch:        shennong-u-oss                        ║
          ║  Toolchain:     Neutron Clang 19                      ║
          ║  Build Date:    $(date)                               ║
          ║  Build ID:      ${{ env.BOOTHASH }}                   ║
          ║  GitHub Run:    ${{ github.run_id }}                  ║
          ╚═══════════════════════════════════════════════════════╝
          
          Config Files Used:
          - arch/arm64/configs/vendor/houji_GKI.config
          - arch/arm64/configs/vendor/houji_consolidate.config
          - arch/arm64/configs/consolidate.fragment (if exists)
          - arch/arm64/configs/vendor/pineapple_GKI.config (if exists)
          - arch/arm64/configs/vendor/pineapple_consolidate.config (if exists)
          
          Files:
          - Image.gz-dtb  : Kernel + Device Tree
          - dtbo.img      : Device Tree Overlay
          - modules/      : Kernel Modules
          EOF
          
          echo ""
          ls -lh release/

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: houji-kernel-${{ github.run_id }}
          path: kernel/release/
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "🔥 Xiaomi HOUJI Kernel - Neutron Clang 19"
          body: |
            # 🔥 Xiaomi HOUJI Kernel Build
            
            ## 📱 Device Information
            | Property | Value |
            |----------|-------|
            | **Device** | Xiaomi 14 |
            | **Codename** | HOUJI |
            | **Chipset** | Snapdragon 8 Gen 3 (SM8650) |
            
            ## 🔧 Build Information
            | Property | Value |
            |----------|-------|
            | **Source** | MiCode/Xiaomi_Kernel_OpenSource |
            | **Branch** | shennong-u-oss |
            | **Toolchain** | Neutron Clang 19 |
            | **Build ID** | `${{ env.BOOTHASH }}` |
            | **GitHub Run** | ${{ github.run_id }} |
            
            ## 📋 Config Files Used
            ```
            arch/arm64/configs/vendor/houji_GKI.config
            arch/arm64/configs/vendor/houji_consolidate.config
            arch/arm64/configs/consolidate.fragment
            arch/arm64/configs/vendor/pineapple_GKI.config
            arch/arm64/configs/vendor/pineapple_consolidate.config
            ```
            
            ## 📦 Included Files
            - ✅ `Image.gz-dtb` - Kernel + Device Tree
            - ✅ `dtbo.img` - Device Tree Overlay
            - ✅ `modules/` - Kernel Modules
            
            ## ⚠️ Flashing
            ```bash
            fastboot flash boot boot.img
            fastboot flash dtbo dtbo.img
            ```
            
            **Build Hash:** `${{ env.BOOTHASH }}`
          files: |
            kernel/release/Image.gz-dtb
            kernel/release/dtbo.img
            kernel/release/build-info.txt
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
