name: CG+ Houji r487747c Persistent Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketleri Kur
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd

      - name: 2. Clang r487747c Önbellek (Cache) Tanımı
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/official-clang
          key: clang-r487747c-android14-v1

      - name: 3. Resmi Clang r487747c İndir (Sadece Cache Yoksa)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          echo "🔥 Clang Cache bulunamadı, senin verdiğin resmi r487747c sürümü indiriliyor..."
          mkdir -p ${{ github.workspace }}/official-clang
          # Verdiğin linkteki android14-release branch'inden çekiyoruz
          git clone --depth=1 -b android14-release https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 ${{ github.workspace }}/clang-repo
          # Sadece r487747c klasörünü cache klasörüne taşı
          cp -r ${{ github.workspace }}/clang-repo/clang-r487747c/* ${{ github.workspace }}/official-clang/
          rm -rf ${{ github.workspace }}/clang-repo

      - name: 4. Kaynak Kodunu Çek (HOUJI - kplatform)
        run: |
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14.git ${{ github.workspace }}/common
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 5. Clang'i Yerleştir ve Hazırla
        run: |
          # Kaynağın beklediği yere Clang'i linkle/kopyala
          mkdir -p ${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c
          cp -r ${{ github.workspace }}/official-clang/* ${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/
          
          # PATH ayarı
          echo "${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin" >> $GITHUB_PATH

      - name: 6. HOUJI Full (Consolidate) Config Merge
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          # 1. Temel
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig
          
          # 2. Houji Full Merge
          ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config
          
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-Houji-Official"
          
          # 3. Finalize
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig

      - name: 7. Derleme (-O2 Güvenli Mod)
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          # Xiaomi'de olduğu gibi derle (Image ve modüller)
          # Hata almamak için uyarı susturma bayrağını ekledim
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 -D__ANDROID_COMMON_KERNEL__ -Wno-error" \
            Image modules || { echo "❌ Derleme HATASI!"; exit 1; }

          # DTBO parçalarını topla
          find out/arch/arm64/boot/dts/vendor/qcom/ -name "*.dtbo" -exec cat {} + > out/arch/arm64/boot/dtbo.img || true
            
          echo "BOOTHASH=Houji-Official-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 8. Paketleme (Modül Klasörü Yok - Sadece Image)
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Houji Official Clang r487747c/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji' anykernel.sh
          
          # Sadece Image ve DTBO (Xiaomi'de olduğu gibi)
          cp ../common/out/arch/arm64/boot/Image .
          [ -f ../common/out/arch/arm64/boot/dtbo.img ] && cp ../common/out/arch/arm64/boot/dtbo.img .
          
          zip -r "../CG-Houji-Official-r487747c.zip" ./*

      - name: 9. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (HOUJI) r487747c Official"
          body: |
            - Build: Houji Full (Consolidate)
            - Compiler: Official Google Clang r487747c (Android 14 Release)
            - Optimization: -O2
            - Note: No separate modules folder, built as requested.
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
