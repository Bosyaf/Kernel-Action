name: CG+ Yuki Houji (Test Build)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/clang-yuki
          key: clang-yuki-bolt-20260124

      - name: Download Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang-yuki
          curl -L "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst" | tar --zstd -xC $GITHUB_WORKSPACE/clang-yuki

      - name: Clone Kernel Source
        run: |
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: Clone Device Trees
        run: |
          git clone -b kplatform --depth=1 https://github.com/mvaisakh/xiaomi14-devicetrees.git dt_tmp

      - name: Integrate Device Trees
        run: |
          cd common
          
          # DTS dosyalarını kopyala
          cp -r ../dt_tmp/qcom/houji* arch/arm64/boot/dts/qcom/
          cp -r ../dt_tmp/qcom/pineapple* arch/arm64/boot/dts/qcom/
          cp -r ../dt_tmp/qcom/audio arch/arm64/boot/dts/qcom/
          cp -r ../dt_tmp/qcom/display arch/arm64/boot/dts/qcom/
          cp -r ../dt_tmp/qcom/camera arch/arm64/boot/dts/qcom/
          cp -r ../dt_tmp/bindings Documentation/devicetree/bindings/
          
          rm -rf ../dt_tmp
          echo "✅ Device trees entegre edildi!"

      - name: KernelSU-Next + SUSFS + MultiManager
        run: |
          cd common
          
          # KernelSU-Next
          git clone -b dev-susfs --depth=1 https://github.com/pershoot/KernelSU-Next.git ksu_tmp
          mkdir -p drivers/kernelsu
          if [ -d "ksu_tmp/kernel" ]; then
            rsync -a ksu_tmp/kernel/ drivers/kernelsu/
          else
            rsync -a --exclude='.git' ksu_tmp/ drivers/kernelsu/
          fi
          rm -rf ksu_tmp
          
          # Kconfig + Makefile
          grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig || echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          grep -q 'kernelsu' drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          
          # MultiManager
          cd drivers/kernelsu
          patch -p1 < $GITHUB_WORKSPACE/patches/ksu/ksun-add-more-managers-support.patch || true
          cd ../..
          
          # SUSFS
          git clone -b gki-android14-6.1-dev --depth=1 https://gitlab.com/pershoot/susfs4ksu.git susfs_tmp
          cp -r susfs_tmp/fs/* ./fs/
          cp -r susfs_tmp/include/* ./include/
          patch -p1 < susfs_tmp/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true
          rm -rf susfs_tmp
          
          echo "✅ KSU + SUSFS + MultiManager entegre edildi!"

      - name: Build Kernel
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-yuki/bin:$PATH"
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            gki_defconfig
          
          # Config ayarları
          ./scripts/config --file out/.config --enable CONFIG_KSU
          ./scripts/config --file out/.config --enable CONFIG_KSU_SUSFS
          ./scripts/config --file out/.config --enable CONFIG_BBG
          ./scripts/config --file out/.config --set-val CONFIG_HZ 300
          ./scripts/config --file out/.config --enable CONFIG_PREEMPT
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-Houji-Test"
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig
          
          # DERLE (HATALARI GÖRMEK İÇİN)
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            Image 2>&1 | tee build.log || true
          
          # Hataları özetle
          echo "=== BUILD HATALARI ==="
          grep -i "error:" build.log | head -20 || echo "Hata yok!"

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: common/build.log
