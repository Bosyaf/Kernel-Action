name: Bosyaf Pure Test (Xiaomi 14)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "bos"
      KBUILD_BUILD_HOST: "yaf"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          echo "🔥 ZyC Clang 22 - ARMv9-a Optimized"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> "$GITHUB_PATH"

      - name: 2. Kendi Kaynağını Çek (Bosyaf/my_work)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone https://github.com/Bosyaf/my_work.git --depth=1 common

      - name: 3. Full Kernel Config & Hassas Temizlik
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          mkdir -p out
          
          # 1. GKI Defconfig oluştur
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 gki_defconfig
          
          CONFIG_FILE="out/.config"
          
          # 2. İstediğin Pozitif Ayarlar (Netfilter ve Debug None)
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NETFILTER_XT_TARGET_HL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NETFILTER_XT_TARGET_HMARK
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEBUG_INFO_NONE

          # 3. Bağımlılıkları Çöz (Pahole'u burada kör ediyoruz ki otomatik satır eklemesin)
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 PAHOLE=/bin/false olddefconfig

          # 4. NOKTA ATIŞI: Sadece bu 6 satırı dosyadan tamamen kazı (Delete)
          # 'd' komutu satırı komple siler.
          echo "⚠️  6 Hassas BTF/Pahole ayarı .config'den kazınıyor..."
          sed -i '/CONFIG_DEBUG_INFO_BTF/d' $CONFIG_FILE
          sed -i '/CONFIG_PAHOLE_HAS_SPLIT_BTF/d' $CONFIG_FILE
          sed -i '/CONFIG_PAHOLE_HAS_BTF_TAG/d' $CONFIG_FILE
          sed -i '/CONFIG_PAHOLE_HAS_LANG_EXCLUDE/d' $CONFIG_FILE
          sed -i '/CONFIG_DEBUG_INFO_BTF_MODULES/d' $CONFIG_FILE
          sed -i '/CONFIG_MODULE_ALLOW_BTF_MISMATCH/d' $CONFIG_FILE
          
          echo "✅ .config dosyasında artık bu 6 satıra dair iz kalmadı."

      - name: 4. Kernel Derleme (Image Üretimi)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          
          # Derleme sırasında PAHOLE=/bin/false geçmek, sistemin bu özellikleri tekrar tetiklemesini engeller.
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            PAHOLE=/bin/false \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 -march=armv9.2-a+crypto+crc+dotprod+rcpc+lse -Wno-error" \
            Image
            
          echo "BOOTHASH=Bosyaf-Test-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: 5. AnyKernel3 (Paketleme)
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Bosyaf Pure Test - Xiaomi 14/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../Bosyaf_Pure_Image.zip" ./*

      - name: 6. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Bosyaf Pure Image (SM8650)"
          files: "Bosyaf_Pure_Image.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
