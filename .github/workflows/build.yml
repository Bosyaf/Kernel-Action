name: Earendil Full Kernel - Mi 14 houji (SM8650)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "Earendil"
      KBUILD_BUILD_HOST: "GitHub-Actions"
      CLANG_DIR: "clang-zyc"

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 1. Install Dependencies & Download Clang
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd device-tree-compiler lz4 pahole libfdt-dev

          echo "🔥 Downloading ZyC Clang (Stable LLVM 18)..."
          # URL güncellendi (2025 tarihi geçersizdi, stabil sürüm kullanıldı)
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/18.0.0git-20240325-release/Clang-18.0.0git-20240325.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz || { echo "❌ Clang indirme hatası!"; exit 1; }
          
          mkdir -p "$GITHUB_WORKSPACE/$CLANG_DIR"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/$CLANG_DIR"
          rm -f clang.tar.gz
          
          # PATH'e ekle
          echo "$GITHUB_WORKSPACE/$CLANG_DIR/bin" >> "$GITHUB_PATH"
          echo "✅ Clang hazır: $(clang --version | head -n1)"

      - name: 2. Download Sources (Kernel, AnyKernel, Mkbootimg)
        run: |
          echo "📦 CodeLinaro SM8650 Kernel..."
          git clone -b linaro/tracking-qcomlt-sm8650 --depth=1 \
            https://git.codelinaro.org/clo/la/kernel/qcom.git kernel
          
          echo "📦 AnyKernel3..."
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 AnyKernel3
          
          echo "📦 Mkbootimg Tools..."
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg
          # Libbase bağımlılığı (mkbootimg için gerekebilir)
          git clone --depth=1 https://android.googlesource.com/platform/system/libbase mkbootimg/libs/libbase 2>/dev/null || true

          echo "=== Defconfig Kontrol ==="
          ls kernel/arch/arm64/configs/ | grep -iE "houji|pineapple|sm8650" || echo "Özel defconfig bulunamadı, varsayılan denenecek."

      - name: 3. Source Code Fixes & Patches
        run: |
          cd kernel
          
          # RTAX Fix
          if grep -q "RTAX_FEATURE_ECN_LOW" include/net/tcp.h 2>/dev/null; then
            if ! grep -q "RTAX_FEATURE_ECN_LOW" include/uapi/linux/rtnetlink.h 2>/dev/null; then
              sed -i '/RTAX_FEATURE_TIMESTAMP/a #define RTAX_FEATURE_ECN_LOW	(1U << 0)' include/uapi/linux/rtnetlink.h
            fi
          fi

          # Warning Suppress
          if [ -f Makefile ]; then
            sed -i '/^KBUILD_CFLAGS +=/a KBUILD_CFLAGS += -Wno-enum-enum-conversion -Wno-enum-conversion -Wno-macro-redefined' Makefile
          fi

          # Check-local-export bypass (Derleme hatasını önler)
          cat > scripts/check-local-export << 'EOF'
          #!/bin/sh
          exit 0
          EOF
          chmod +x scripts/check-local-export

          echo "✅ Kaynak kodu yamalandı."

      - name: 4. Configure Kernel
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/$CLANG_DIR/bin:$PATH"

          # Defconfig Bulma
          DEFCONFIG="pineapple_defconfig" # SM8650 platformu genelde pineapple'dır
          if [ -f "arch/arm64/configs/houji_defconfig" ]; then
            DEFCONFIG="houji_defconfig"
          elif [ -f "arch/arm64/configs/sm8650_defconfig" ]; then
            DEFCONFIG="sm8650_defconfig"
          fi
          echo "Kullanılacak Defconfig: $DEFCONFIG"
          echo "DEFCONFIG_NAME=$DEFCONFIG" >> $GITHUB_ENV

          touch .scmversion
          mkdir -p out

          # LLVM ile config oluştur
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            $DEFCONFIG

          CONFIG_FILE="out/.config"

          # Kernel Config Özelleştirmeleri
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Earendil-Houji"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCALVERSION_AUTO
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ZRAM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_ZRAM_DEF_COMP_ZSTD
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KPROBES
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF_TOOLCHAIN_DEFAULT
          
          # Kaydet
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: 5. Build Kernel (Image + Modules + DTBs)
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/$CLANG_DIR/bin:$PATH"
          export CC="clang"
          export LD="ld.lld"
          export AR="llvm-ar"
          export NM="llvm-nm"
          export OBJCOPY="llvm-objcopy"
          export OBJDUMP="llvm-objdump"
          export STRIP="llvm-strip"
          
          # KCFLAGS ve LDFLAGS ayrı export edilerek tırnak hatası önlendi
          export KCFLAGS="-O2 -fomit-frame-pointer -fno-strict-aliasing -Wno-format -Wno-enum-enum-conversion"
          export LDFLAGS="-Wl,--gc-sections -Wl,--as-needed -Wl,--strip-debug"

          echo "🚀 Derleme Başlıyor (CPU: $(nproc))..."
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            Image.gz dtbs modules

          echo "✅ Derleme Tamamlandı!"

      - name: 6. Collect Artifacts (Modules & DTBs)
        run: |
          cd kernel
          mkdir -p modules_out lib/modules dtb_out dtbo_out

          # Modülleri Yükle
          make O=out INSTALL_MOD_PATH=modules_out INSTALL_MOD_STRIP=1 modules_install
          
          # Modül dosyalarını düzleştir (AnyKernel için)
          if [ -d modules_out/lib/modules ]; then
            find modules_out/lib/modules -name "*.ko" -exec cp {} modules_out/ \; 2>/dev/null || true
            find modules_out/lib/modules -name "modules.*" -exec cp {} modules_out/ \; 2>/dev/null || true
          fi

          # DTB'leri Topla
          find out/arch/arm64/boot/dts -name "*houji*.dtb" -exec cp {} dtb_out/ \; 2>/dev/null || true
          find out/arch/arm64/boot/dts -name "*pineapple*.dtb" -exec cp {} dtb_out/ \; 2>/dev/null || true
          find out/arch/arm64/boot/dts -name "*sm8650*.dtb" -exec cp {} dtb_out/ \; 2>/dev/null || true
          # Eğer spesifik yoksa tüm qcom dtb'leri
          if [ -z "$(ls dtb_out/*.dtb 2>/dev/null)" ]; then
             find out/arch/arm64/boot/dts/qcom -name "*.dtb" -exec cp {} dtb_out/ \; 2>/dev/null || true
          fi

          # DTBO'ları Topla
          find out/arch/arm64/boot/dts -name "*.dtbo" -exec cp {} dtbo_out/ \; 2>/dev/null || true

      - name: 7. Create DTBO Image
        run: |
          cd kernel
          if [ "$(ls dtbo_out/*.dtbo 2>/dev/null | wc -l)" -gt 0 ]; then
            # mkdtboimg python scriptini kullan
            python3 mkbootimg/mkdtboimg.py create dtbo_out/dtbo.img dtbo_out/*.dtbo || \
            (command -v mkdtboimg && mkdtboimg create dtbo_out/dtbo.img dtbo_out/*.dtbo) || \
            echo "⚠️ DTBO oluşturulamadı, araç eksik."
          else
            echo "⚠️ DTBO dosyası bulunamadı."
          fi

      - name: 8. Create vendor_boot Image
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/$CLANG_DIR/bin:$PATH"
          MKBOOTIMG="$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py"
          
          VENDOR_RAMDISK="/tmp/vendor_ramdisk"
          mkdir -p $VENDOR_RAMDISK/lib/modules
          
          # Modülleri ramdisk'e kopyala
          find modules_out -name "*.ko" -exec cp {} $VENDOR_RAMDISK/lib/modules/ \; 2>/dev/null || true
          cp modules_out/modules.load $VENDOR_RAMDISK/lib/modules/ 2>/dev/null || true
          cp modules_out/modules.dep $VENDOR_RAMDISK/lib/modules/ 2>/dev/null || true
          cp modules_out/modules.alias $VENDOR_RAMDISK/lib/modules/ 2>/dev/null || true
          
          # Ramdisk imajı oluştur
          cd $VENDOR_RAMDISK
          find . | cpio -o -H newc 2>/dev/null | gzip -9 > /tmp/vendor_ramdisk.cpio.gz
          cd $GITHUB_WORKSPACE/kernel

          # DTB Seçimi
          DTB_FILE=$(ls dtb_out/*.dtb 2>/dev/null | head -1)
          if [ -z "$DTB_FILE" ]; then
            echo "⚠️ DTB bulunamadı, dummy kullanılıyor."
            touch /tmp/dummy.dtb
            DTB_FILE="/tmp/dummy.dtb"
          fi

          # vendor_boot oluştur
          if [ -f "$MKBOOTIMG" ]; then
            python3 "$MKBOOTIMG" \
              --kernel out/arch/arm64/boot/Image.gz \
              --ramdisk /tmp/vendor_ramdisk.cpio.gz \
              --dtb "$DTB_FILE" \
              --vendor_boot out/vendor_boot.img \
              --vendor_ramdisk_type platform \
              --pagesize 4096 \
              --header_version 4 \
              --cmdline "console=ttyMSM0,115200n8 androidboot.bootdevice=1e00000.ufshc" \
              || echo "❌ vendor_boot oluşturma hatası!"
          else
            echo "❌ mkbootimg.py bulunamadı!"
          fi

      - name: 9. Package AnyKernel3 Zip
        run: |
          cd AnyKernel3
          
          # AnyKernel Ayarları
          sed -i 's/kernel.string=.*/kernel.string=Earendil Kernel Houji/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          
          # Cihaz isimlerini ekle
          cat >> anykernel.sh << EOF
          device.name1=houji
          device.name2=shennong
          device.name3=aurora
          device.name4=xiaomi14
          EOF

          # Dosyaları Kopyala
          cp ../kernel/out/arch/arm64/boot/Image.gz .
          
          mkdir -p dtb dtbo modules
          cp ../kernel/dtb_out/*.dtb dtb/ 2>/dev/null || true
          cp ../kernel/dtbo_out/dtbo.img . 2>/dev/null || true
          cp ../kernel/out/vendor_boot.img . 2>/dev/null || true
          
          cp ../kernel/modules_out/*.ko modules/ 2>/dev/null || true
          cp ../kernel/modules_out/modules.* . 2>/dev/null || true

          # Zip Oluştur
          zip -r9 "../Earendil-Houji-$(date +%Y%m%d-%H%M).zip" ./*
          echo "ZIP_NAME=Earendil-Houji-$(date +%Y%m%d-%H%M).zip" >> $GITHUB_ENV

      - name: 10. Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Earendil Kernel - Mi 14 Houji (${{ env.DEFCONFIG_NAME }})"
          files: "*.zip"
          body: |
            **Device:** Xiaomi 14 (houji)
            **Chipset:** SM8650
            **Kernel:** Earendil Full
            **Build:** GitHub Actions
            
            Includes: Image.gz, vendor_boot.img, dtbo.img, Modules.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
