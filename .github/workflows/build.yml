name: Bosyaf MONOLITHIC (Built-in Vendor)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "bos"
      KBUILD_BUILD_HOST: "yaf"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz || { echo "HATA!"; exit 1; }
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> "$GITHUB_PATH"

      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b monolithic-test-2 https://github.com/Bosyaf/xiaomi14.git --depth=1 common

      - name: 3. GERCEK MONOLITHIC Config
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          mkdir -p out

          # houji_defconfig
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 houji_defconfig

          # TUM =m → =y (gercek monolithic)
          sed -i 's/=m$/=y/' out/.config

          # Finalize
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

          # Kontrol
          echo "Kalan modul sayisi:"
          grep "=m" out/.config | wc -l

          echo "CONFIG kontrol:"
          grep "CONFIG_INTEGRATE_MODULES" out/.config
          grep "CONFIG_ARCH_PINEAPPLE" out/.config

      - name: 4. Kernel Derle
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            Image dtbs

          if [ ! -f out/arch/arm64/boot/Image ]; then
            echo "HATA!"; exit 1
          fi
          ls -lh out/arch/arm64/boot/Image

      - name: 5. AnyKernel3 Hazırla
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Bosyaf MONOLITHIC/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh
          cat >> anykernel.sh << 'EOF'

          ui_print " "
          ui_print "Vendor moduller devre disi birakiliyor..."
          if [ -d /vendor/lib/modules ]; then
            rm -rf /vendor/lib/modules/*.ko
            echo "# Monolithic" > /vendor/lib/modules/modules.load
          fi
          VENDOR_DLKM=$(find /dev/block -name vendor_dlkm 2>/dev/null | head -1)
          if [ -n "$VENDOR_DLKM" ]; then
            mkdir -p /tmp/vdlkm
            mount -o rw $VENDOR_DLKM /tmp/vdlkm 2>/dev/null
            if [ $? -eq 0 ]; then
              rm -rf /tmp/vdlkm/lib/modules/*.ko
              echo "# Monolithic" > /tmp/vdlkm/lib/modules/modules.load
              umount /tmp/vdlkm
            fi
          fi
          ui_print "Vendor moduller temizlendi"
          EOF

      - name: 6. Paketleme
        run: |
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image .
          find ../common/out/arch/arm64/boot/dts/vendor -name "*.dtb" -exec cp {} . \; 2>/dev/null || true
          zip -r9 "../Bosyaf-MONOLITHIC-Houji-$(date +%Y%m%d-%H%M).zip" ./*

      - name: 7. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "houji-mono-$(date +%Y%m%d-%H%M)"
          name: "Bosyaf MONOLITHIC - Houji"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
