name: CG+ Xiaomi 14 (SM8650) Yuki Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Ortam ve Toolchain Hazırlığı
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          
          echo "🔥 Yuki Clang 22 İndiriliyor..."
          mkdir -p $GITHUB_WORKSPACE/yuki-clang
          # Scriptte verdiğin linki kullanıyoruz
          curl -L "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst" | tar --zstd -xC $GITHUB_WORKSPACE/yuki-clang
          
          echo "$GITHUB_WORKSPACE/yuki-clang/bin" >> $GITHUB_PATH
          echo "✅ Clang Hazır: $($GITHUB_WORKSPACE/yuki-clang/bin/clang --version | head -n 1)"

      - name: 2. Xiaomi 14 (kplatform) Kaynak Kodunu Çek
        run: |
          # Senin verdiğin muazzam linki clone'luyoruz
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14.git common
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 3. KernelSU-Next ve SUSFS Entegrasyonu
        run: |
          cd common
          echo "📦 KernelSU-Next kuruluyor..."
          curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
          
          echo "📦 SUSFS4KSU kurulumu..."
          git clone --depth=1 -q https://gitlab.com/pershoot/susfs4ksu -b gki-android14-6.1-dev susfs4ksu
          cp -R susfs4ksu/kernel_patches/fs/* ./fs/
          cp -R susfs4ksu/kernel_patches/include/* ./include/
          
          # Patchleri uygula
          patch -p1 < susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true
          
          # Fix: drivers/kernelsu/supercalls.c
          if [ -f "drivers/kernelsu/supercalls.c" ]; then
            sed -i 's/#ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME/#if 0 \/\/ Fixed build \*\//' drivers/kernelsu/supercalls.c || true
          fi

      - name: 4. Derleme Yapılandırması (SM8650)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/yuki-clang/bin:$PATH"
          
          # Defconfig oluşturma (Xiaomi 14 için genelde gki_defconfig kullanılır)
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            gki_defconfig
            
          CONFIG_FILE="out/.config"
          
          # Performans ve KernelSU Ayarları
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Laurelin-X"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HZ_300
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          
          # Xiaomi 14 mimarisi için zorunlu (Bazı kernel'larda defconfig üzerinden set edilir)
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            olddefconfig

      - name: 5. Kernel Derleme (Snapdragon 8 Gen 3 Optimizasyonu)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/yuki-clang/bin:$PATH"
          
          # SM8650 (Cortex-X4) için mimari flagleri ekliyoruz
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" \
            LD="ld.lld" \
            AR="llvm-ar" \
            NM="llvm-nm" \
            KCFLAGS="-O3 \
            -march=armv9.2-a+crypto+crc+dotprod+rcpc+lse \
            -mtune=cortex-x4 \
            -falign-loops=32 \
            -fomit-frame-pointer" \
            Image
            
          echo "BOOTHASH=Xiaomi14-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 6. Paketleme (AnyKernel3)
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Yuki Xiaomi 14 (SM8650)/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          # Xiaomi 14 Cihaz isimlerini ekle
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../CG-Xiaomi14-Yuki.zip" ./*

      - name: 7. Yayınla (Release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (SM8650) Yuki Clang Build"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
