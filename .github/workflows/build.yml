name: Houji GKI + vendor_dlkm WALT Inject (Neutron)

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout Workflow Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bc bison build-essential cpio curl dwarves e2fsprogs erofs-utils file flex \
            gawk git jq kmod libelf-dev liblz4-tool libncurses-dev libssl-dev pahole \
            pkg-config python3 python3-pip rsync unzip wget xz-utils zip zstd \
            android-sdk-libsparse-utils
          python3 -m pip install --upgrade pip
          python3 -m pip install gdown

      - name: Setup Neutron Clang
        run: |
          mkdir -p "$HOME/toolchains/neutron-clang"
          cd "$HOME/toolchains/neutron-clang"
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S
          echo "$HOME/toolchains/neutron-clang/bin" >> $GITHUB_PATH

      - name: Clone Sources
        run: |
          git clone -b android14-6.1-staging https://github.com/Bosyaf/android_kernel_common-6.1.git common --depth=1
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 AnyKernel3

      - name: Apply Local Patches If Present
        run: |
          cd common
          if [ -d "$GITHUB_WORKSPACE/patches" ]; then
            echo "patches/ bulundu, uygulanıyor..."
            find "$GITHUB_WORKSPACE/patches" -type f -name "*.patch" | sort | while read -r p; do
              echo "Applying: $p"
              patch -p1 --forward < "$p" || true
            done
          else
            echo "patches/ yok, patch adımı atlandı."
          fi

      - name: Configure Kernel
        run: |
          cd common
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            gki_defconfig

          # WALT modül kalsın
          ./scripts/config --file out/.config --module CONFIG_SCHED_WALT || true

          # Vermagic / modül uyumu için branding kapalı
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION ""
          ./scripts/config --file out/.config --disable CONFIG_LOCALVERSION_AUTO

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            olddefconfig

          echo "===== kernelrelease ====="
          make -s O=out kernelrelease || true

      - name: Build Kernel + Modules
        run: |
          set -o pipefail
          cd common
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"

          make -j"$(nproc --all)" O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            KCFLAGS="-Wno-error=unknown-warning-option" \
            Image modules 2>&1 | tee "$GITHUB_WORKSPACE/build.log"

          WALT_KO="$(find out -type f \( -name 'sched-walt.ko' -o -name 'sched_walt.ko' \) | head -n1)"
          if [ -z "$WALT_KO" ]; then
            echo "❌ sched-walt.ko / sched_walt.ko bulunamadı"
            find out -type f | grep -i walt || true
            exit 1
          fi

          cp "$WALT_KO" "$GITHUB_WORKSPACE/sched-walt.ko"
          cp out/arch/arm64/boot/Image "$GITHUB_WORKSPACE/Image"

          echo "===== Built WALT module ====="
          ls -lh "$GITHUB_WORKSPACE/sched-walt.ko"
          modinfo "$GITHUB_WORKSPACE/sched-walt.ko" || true

      - name: Download Stock vendor_dlkm.img
        run: |
          ~/.local/bin/gdown --fuzzy "https://drive.google.com/file/d/1efQ2T3D3B-sLn3CVCe89AjL9ROq3ZvjX/view?usp=drivesdk" -O vendor_dlkm_stock.img
          echo "===== file output ====="
          file vendor_dlkm_stock.img

          if file vendor_dlkm_stock.img | grep -qi "HTML"; then
            echo "❌ Drive dosyası yerine HTML indi. Link public değil."
            exit 1
          fi

      - name: Extract Stock vendor_dlkm
        run: |
          set -e
          mkdir -p vendor_dlkm_root vendor_dlkm_mount

          IMG="vendor_dlkm_stock.img"
          WORK_IMG="$IMG"

          if file "$IMG" | grep -qi "Android sparse image"; then
            echo "Sparse image bulundu, raw'a çevriliyor..."
            simg2img "$IMG" vendor_dlkm_stock.raw.img
            WORK_IMG="vendor_dlkm_stock.raw.img"
          fi

          if file "$WORK_IMG" | grep -qi "EROFS"; then
            echo "FS_KIND=erofs" >> $GITHUB_ENV
            extract.erofs -i "$WORK_IMG" -o vendor_dlkm_root
          elif file "$WORK_IMG" | grep -qi "ext4"; then
            echo "FS_KIND=ext4" >> $GITHUB_ENV
            sudo mount -o loop,ro "$WORK_IMG" vendor_dlkm_mount
            rsync -aH vendor_dlkm_mount/ vendor_dlkm_root/
            sudo umount vendor_dlkm_mount
          else
            echo "❌ Desteklenmeyen vendor_dlkm dosya sistemi:"
            file "$WORK_IMG"
            exit 1
          fi

          echo "===== extracted candidates ====="
          find vendor_dlkm_root -type f | grep -Ei 'walt|sched' | head -100 || true

      - name: Replace Stock WALT With Built WALT
        run: |
          set -e

          STOCK_WALT="$(find vendor_dlkm_root -type f \( -iname 'sched_walt.ko' -o -iname 'sched-walt.ko' \) | head -n1)"
          if [ -z "$STOCK_WALT" ]; then
            STOCK_WALT="$(find vendor_dlkm_root -type f -iname '*walt*.ko' | head -n1)"
          fi

          if [ -z "$STOCK_WALT" ]; then
            echo "❌ vendor_dlkm içinde WALT modülü bulunamadı"
            find vendor_dlkm_root -type f | grep -Ei 'walt|sched' || true
            exit 1
          fi

          echo "Stock WALT path: $STOCK_WALT"
          echo "Stock WALT size:"
          ls -lh "$STOCK_WALT"

          cp -f "$STOCK_WALT" "${STOCK_WALT}.bak"
          install -m 0644 "$GITHUB_WORKSPACE/sched-walt.ko" "$STOCK_WALT"

          echo "New WALT size:"
          ls -lh "$STOCK_WALT"

      - name: Rebuild vendor_dlkm.img
        run: |
          set -e

          if [ "$FS_KIND" = "erofs" ]; then
            mkfs.erofs -zlz4hc --mount-point=/vendor_dlkm vendor_dlkm_patched.img vendor_dlkm_root
          elif [ "$FS_KIND" = "ext4" ]; then
            SIZE_BYTES="$(du -sb vendor_dlkm_root | awk '{print $1}')"
            SIZE_BYTES=$((SIZE_BYTES + 64*1024*1024))
            BLOCKS=$(( (SIZE_BYTES + 4095) / 4096 ))
            mke2fs -q -t ext4 -b 4096 -d vendor_dlkm_root -L vendor_dlkm vendor_dlkm_patched.img "$BLOCKS"
          else
            echo "❌ FS_KIND bilinmiyor"
            exit 1
          fi

          echo "===== patched image ====="
          ls -lh vendor_dlkm_patched.img
          file vendor_dlkm_patched.img

      - name: Build AnyKernel3 Image Zip
        run: |
          cd AnyKernel3

          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/g' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh

          cp "$GITHUB_WORKSPACE/Image" .

          zip -r9 "$GITHUB_WORKSPACE/Houji-Image-Neutron.zip" ./* -x .git README.md '*placeholder'

      - name: Prepare Release Files
        run: |
          mkdir -p release

          cp Image release/
          cp sched-walt.ko release/
          cp vendor_dlkm_patched.img release/
          cp Houji-Image-Neutron.zip release/
          cp build.log release/ || true

          cat > release/FLASH_README.txt << 'EOF'
          FLASH SIRASI

          1) Kernel Image zip:
             Recovery/Kernels üzerinden:
             Houji-Image-Neutron.zip

          2) vendor_dlkm:
             Fastboot modda:
             fastboot flash vendor_dlkm vendor_dlkm_patched.img

          3) Reboot:
             fastboot reboot

          NOT:
          - Çalışan ROM sürümün ile aynı stock vendor_dlkm kullanılmalı.
          - lsmod/proc_modules tarafında sched_walt görünmesi normaldir.
          EOF

          echo "TAG_NAME=houji-neutron-walt-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: houji-neutron-walt-output
          path: release/*

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Houji Neutron WALT vendor_dlkm Inject"
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print Last Build Log Lines On Failure
        if: failure()
        run: |
          echo "===== SON 150 SATIR ====="
          tail -n 150 build.log || true
