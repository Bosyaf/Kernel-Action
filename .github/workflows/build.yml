name: Xiaomi 14 (Houji) Pure Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Kernel isim soneki"
        required: false
        default: "Galadriel-Pure"

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      KERNEL_NAME: ${{ github.event.inputs.kernel_name || 'Galadriel-Pure' }}

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 16384
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          path: AnyKernel3

      - name: Install Dependencies & Download Toolchain
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev \
            libxml2-utils rsync unzip dwarves bc cpio wget \
            xz-utils make gcc-aarch64-linux-gnu pkg-config zstd

          echo "🔥 Downloading Google Clang 17.0.2 (android14 r487747c)"
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz"
          mkdir -p $GITHUB_WORKSPACE/toolchain/clang-google
          curl -fLSs "$CLANG_URL" | tar -xzf - -C $GITHUB_WORKSPACE/toolchain/clang-google
          echo "$GITHUB_WORKSPACE/toolchain/clang-google/bin" >> $GITHUB_PATH

          # Google rust toolchain (pKVM icin gerekli)
          echo "🔥 Downloading Google Rust toolchain"
          RUST_URL="https://android.googlesource.com/platform/prebuilts/rust/linux-x86/+archive/refs/heads/android14-release/latest.tar.gz"
          mkdir -p $GITHUB_WORKSPACE/toolchain/rust-google
          curl -fLSs "$RUST_URL" | tar -xzf - -C $GITHUB_WORKSPACE/toolchain/rust-google
          echo "$GITHUB_WORKSPACE/toolchain/rust-google/bin" >> $GITHUB_PATH

          echo "📋 Toolchain versions:"
          $GITHUB_WORKSPACE/toolchain/clang-google/bin/clang --version
          rustc --version 2>/dev/null || echo "Rust not found (non-critical)"

      - name: Clone Kernel Source
        run: |
          echo "📥 Cloning mvaisakh/xiaomi14 (kplatform branch)..."
          git clone -b kplatform https://github.com/mvaisakh/xiaomi14.git source --depth=1
          cd source
          git submodule update --init --recursive --depth=1 || true

          echo "=============================================="
          echo "📋 Kernel Version: $(make kernelversion 2>/dev/null || echo '6.1.166')"
          echo "=============================================="

      - name: Prepare & Merge Kernel Config
        run: |
          cd source
          export PATH="$GITHUB_WORKSPACE/toolchain/clang-google/bin:$PATH"

          OUT_DIR="$GITHUB_WORKSPACE/out"
          mkdir -p "$OUT_DIR"

          echo "=============================================="
          echo "📱 Device: Xiaomi 14 (houji)"
          echo "🔧 SoC: Snapdragon 8 Gen 3 (pineapple/SM8650)"
          echo "📦 Variant: gki (vendor module uyumlu)"
          echo "🏷️  Kernel Name: $KERNEL_NAME"
          echo "=============================================="

          # Step 1: gki_defconfig - TEMEL config
          echo "📋 Step 1: Applying gki_defconfig (base)"
          make O="$OUT_DIR" ARCH=arm64 LLVM=1 gki_defconfig

          # Step 2: SM8650 SoC GKI fragment
          echo "📋 Step 2: Merging pineapple_GKI.config"
          scripts/kconfig/merge_config.sh -m \
            -O "$OUT_DIR" \
            "$OUT_DIR/.config" \
            arch/arm64/configs/vendor/pineapple_GKI.config || true

          # Step 3: Xiaomi 14 houji GKI fragment
          echo "📋 Step 3: Merging houji_GKI.config"
          scripts/kconfig/merge_config.sh -m \
            -O "$OUT_DIR" \
            "$OUT_DIR/.config" \
            arch/arm64/configs/vendor/houji_GKI.config || true

          # ── BTF'yi aktif et (module loading icin kritik) ──
          echo "📋 Enabling BTF and critical boot configs"
          sed -i 's/# CONFIG_DEBUG_INFO_BTF is not set/CONFIG_DEBUG_INFO_BTF=y/' "$OUT_DIR/.config" || true
          grep -q "CONFIG_DEBUG_INFO_BTF=y" "$OUT_DIR/.config" || \
            echo "CONFIG_DEBUG_INFO_BTF=y" >> "$OUT_DIR/.config"

          # PAHOLE gerekiyor BTF icin
          grep -q "CONFIG_DEBUG_INFO=y" "$OUT_DIR/.config" || \
            echo "CONFIG_DEBUG_INFO=y" >> "$OUT_DIR/.config"

          # Custom localversion
          echo "🏷️ Setting LOCALVERSION to -$KERNEL_NAME"
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"-$KERNEL_NAME\"/" \
            "$OUT_DIR/.config" || true
          grep -q "CONFIG_LOCALVERSION=" "$OUT_DIR/.config" || \
            echo "CONFIG_LOCALVERSION=\"-$KERNEL_NAME\"" >> "$OUT_DIR/.config"

          # Bagimliklari coz
          echo "📋 Resolving config dependencies (olddefconfig)"
          make O="$OUT_DIR" ARCH=arm64 LLVM=1 olddefconfig

          # Onemli config'leri dogrula
          echo "=============================================="
          echo "📋 Critical config check:"
          grep -E "CONFIG_DEBUG_INFO_BTF=|CONFIG_KVM=|CONFIG_MODULE_SIG=|CONFIG_MODULES=|CONFIG_RANDOMIZE_BASE=" "$OUT_DIR/.config" || true
          echo "=============================================="

          echo "✅ Config preparation complete!"

      - name: Build Kernel
        run: |
          cd source
          export PATH="$GITHUB_WORKSPACE/toolchain/clang-google/bin:$PATH"

          OUT_DIR="$GITHUB_WORKSPACE/out"

          echo "🔨 Building houji kernel Image..."
          make -j$(nproc --all) \
            O="$OUT_DIR" \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            Image

          echo "✅ Kernel Image built!"

          echo "📦 Building kernel modules..."
          make -j$(nproc --all) \
            O="$OUT_DIR" \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            modules || echo "⚠️ Some modules failed (non-fatal)"

          # Build sonuclari
          echo "BOOTHASH=Pure-Houji-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +%Y-%m-%d_%H-%M)" >> $GITHUB_ENV

          IMAGE_PATH=$(find "$OUT_DIR" -name "Image" -type f | head -n 1)
          if [ -n "$IMAGE_PATH" ]; then
            echo "📊 Kernel Image size: $(du -h $IMAGE_PATH | cut -f1)"
          fi

          # Kac modul derlendi say
          MODULE_COUNT=$(find "$OUT_DIR" -name "*.ko" | wc -l)
          echo "📦 Built $MODULE_COUNT kernel modules"

      - name: Package with AnyKernel3
        run: |
          OUT_DIR="$GITHUB_WORKSPACE/out"

          # ── Kernel Image ──
          IMAGE_PATH=$(find "$OUT_DIR" -name "Image" -type f | head -n 1)
          if [ -z "$IMAGE_PATH" ]; then
            echo "❌ ERROR: Kernel Image not found!"
            exit 1
          fi
          cp "$IMAGE_PATH" ./AnyKernel3/
          echo "✅ Kernel Image: $(du -h $IMAGE_PATH | cut -f1)"

          # ── Modulleri AnyKernel3'e kopyala ──
          # Bu moduller vendor_dlkm'ye yuklenecek
          # Stock moduller yerine bunlar kullanilacak
          mkdir -p ./AnyKernel3/modules
          MOD_DIR="$GITHUB_WORKSPACE/out/lib/modules"

          if [ -d "$MOD_DIR" ]; then
            # Tum .ko dosyalarini bul ve kopyala
            find "$MOD_DIR" -name "*.ko" -exec cp {} ./AnyKernel3/modules/ \; 2>/dev/null || true
            KO_COUNT=$(find ./AnyKernel3/modules -name "*.ko" | wc -l)
            echo "✅ Copied $KO_COUNT kernel modules"
          else
            echo "⚠️ No modules directory found"
          fi

          # ── AnyKernel3 ayarlari ──
          cd ./AnyKernel3
          sed -i "s/kernel.string=.*/kernel.string=CG+ $KERNEL_NAME (gki)/" anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh

          sed -i '/is_slot_device=auto/a \
          device.name1=houji\
          device.name2=shennong\
          device.name3=xiaomi14' anykernel.sh

          # Flashable zip olustur
          ZIP_NAME="Houji-PureKernel-gki-$BUILD_DATE.zip"
          zip -r "../$ZIP_NAME" ./*
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "✅ Created $ZIP_NAME"
          echo "📊 ZIP size: $(du -h ../$ZIP_NAME | cut -f1)"
          echo "📦 ZIP contents:"
          unzip -l "../$ZIP_NAME" | tail -5

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (Houji) GKI - ${{ env.BUILD_DATE }}"
          body: |
            ## 🔥 Galadriel Pure Kernel - Xiaomi 14 (Houji)

            **Variant:** GKI (vendor module compatible)
            **Kernel Version:** 6.1.166 (kplatform)
            **Source:** [mvaisakh/xiaomi14](https://github.com/mvaisakh/xiaomi14/tree/kplatform)
            **Toolchain:** Google Clang 17.0.2 (r487747c)
            **Build Date:** ${{ env.BUILD_DATE }}

            ### 📱 Supported Devices
            - Xiaomi 14 (houji)
            - Xiaomi 14 Pro (shennong)

            ### 📋 Config
            1. `gki_defconfig` (base)
            2. `pineapple_GKI.config` (SoC)
            3. `houji_GKI.config` (device)
            4. `CONFIG_DEBUG_INFO_BTF=y` (BTF support)

            ### ⚠️ Flash at your own risk!
          files: "${{ env.ZIP_NAME }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
