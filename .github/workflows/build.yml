name: Build Kernel - Xiaomi Mi 14 (Houji)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      KSU:
        description: 'KernelSU eklensin mi?'
        required: true
        default: true
        type: boolean

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
            
          echo "🔥 Kusursuz Denge: ZyC Clang 22 (Eylül 2025 Sürümü - ARMv9-a Uyumlu)"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          echo "ZyC Clang 23 indiriliyor: $CLANG_URL"
          
          curl -fLSs "$CLANG_URL" -o clang.tar.gz || { echo "HATA: Clang URL'si patlak (404)!"; exit 1; }
          
          echo "Arşiv Çıkarılıyor..."
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc
          rm -f clang.tar.gz
          
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> $GITHUB_PATH
          echo "✅ Clang İndirildi ve PATH'e eklendi!"

      - name: Setup KernelSU (Optional)
        if: ${{ inputs.KSU }}
        run: |
          echo "📦 KernelSU kuruluyor..."
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
          echo "✅ KernelSU setup complete!"

      - name: Find Correct Defconfig
        run: |
          echo "=== Mevcut defconfig dosyaları ==="
          find . -name "*defconfig*" -path "*/arch/arm64/configs/*" | head -30
          echo ""
          echo "=== GKI defconfig ==="
          find . -name "gki_defconfig" | head -20
          echo ""
          echo "=== Houji/Mi14/pineapple ile ilgili ==="
          find . -iname "*houji*" -o -iname "*xiaomi*" -o -iname "*pineapple*" | head -20
          echo ""
          echo "=== Build scriptleri ==="
          find . -maxdepth 2 -name "build*.sh" -o -name "build.config*" | head -20

      - name: Generate Defconfig
        run: |
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          touch .scmversion

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            gki_defconfig

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            olddefconfig

      - name: Build Kernel
        run: |
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          NPROC=$(nproc --all)
          echo "Building with $NPROC threads..."

          make -j${NPROC} O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            Image 2>&1 | tee build.log

          if [ -f "out/arch/arm64/boot/Image" ]; then
            echo "✅ Kernel Image found!"
            ls -lh out/arch/arm64/boot/Image
          else
            echo "❌ Kernel image NOT found!"
            tail -100 build.log
            exit 1
          fi

      - name: Create AnyKernel3 Package
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          cd anykernel
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh || true
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh || true

          cp ../out/arch/arm64/boot/Image .

          DATE=$(date +"%Y%m%d-%H%M")
          KSU_TAG=""
          if [ "${{ inputs.KSU }}" = "true" ]; then
            KSU_TAG="-KernelSU"
          fi
          ZIP_NAME="Kernel-Mi14-Houji${KSU_TAG}-${DATE}.zip"
          zip -r9 "../${ZIP_NAME}" ./*
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "✅ Package created: ${ZIP_NAME}"

      - name: Upload Kernel ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
