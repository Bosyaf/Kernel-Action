name: CG+ Yuki Gaming Kernel (KSU-Next + SUSFS + BBG)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 8192

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/clang-zyc
          key: clang-zyc-22-20250928
          restore-keys: |
            clang-zyc-

      - name: Download Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          echo "🔥 ZyC Clang 22 indiriliyor..."
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc
          rm -f clang.tar.gz

      - name: 1. Paketler
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd jq

      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: 3. Pershoot KSU-Next (dev-susfs) - Gerçek Yapı
        run: |
          cd common
          echo "🔐 Pershoot KernelSU-Next (dev-susfs) çekiliyor..."
          
          # Pershoot'un dev-susfs branch'ini çek
          git clone -b dev-susfs --depth=1 https://github.com/pershoot/KernelSU-Next.git ksu_tmp
          
          # KernelSU kodlarını drivers/kernelsu içine kopyala
          mkdir -p drivers/kernelsu
          
          # Pershoot repo yapısı: kernel/ klasörü içinde kaynak kodlar var
          if [ -d "ksu_tmp/kernel" ]; then
            cp -rf ksu_tmp/kernel/* drivers/kernelsu/
          else
            cp -rf ksu_tmp/* drivers/kernelsu/
          fi
          
          rm -rf ksu_tmp
          
          # ✅ MultiManager kontrolü - Pershoot dev-susfs'te zaten var ama kontrol edelim
          echo "🔍 MultiManager durumu kontrol ediliyor..."
          if [ -f "drivers/kernelsu/manager.c" ]; then
            echo "✅ manager.c bulundu (kök dizin)"
            # MultiManager yoksa ekle
            if ! grep -q "return true" drivers/kernelsu/manager.c; then
              echo "🛠️ MultiManager yaması uygulanıyor..."
              sed -i 's/static bool is_manager_apk(const char \*package_name)/static bool is_manager_apk(const char \*package_name) { return true; }\nstatic bool is_manager_apk_old(const char \*package_name)/' drivers/kernelsu/manager.c
            else
              echo "✅ MultiManager zaten aktif!"
            fi
          elif [ -f "drivers/kernelsu/kernel/manager.c" ]; then
            echo "✅ manager.c bulundu (kernel/ klasörü içinde)"
            if ! grep -q "return true" drivers/kernelsu/kernel/manager.c; then
              echo "️ MultiManager yaması uygulanıyor..."
              sed -i 's/static bool is_manager_apk(const char \*package_name)/static bool is_manager_apk(const char \*package_name) { return true; }\nstatic bool is_manager_apk_old(const char \*package_name)/' drivers/kernelsu/kernel/manager.c
            else
              echo "✅ MultiManager zaten aktif!"
            fi
          else
            echo "⚠️ manager.c bulunamadı, repo yapısı farklı olabilir"
            find drivers/kernelsu -name "manager.c" -type f
          fi
          
          # Kconfig entegrasyonu
          if [ -f "drivers/Kconfig" ] && ! grep -q "kernelsu/Kconfig" drivers/Kconfig; then
            sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi
          
          # Makefile entegrasyonu
          if [ -f "drivers/Makefile" ] && ! grep -q "kernelsu" drivers/Makefile; then
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          fi
          
          echo "✅ KSU-Next hazır!"

      - name: 4. Pershoot SUSFS (gki-android14-6.1-dev)
        run: |
          cd common
          echo "🛡️ Pershoot SUSFS entegre ediliyor..."
          
          git clone -b gki-android14-6.1-dev --depth=1 https://gitlab.com/pershoot/susfs4ksu.git susfs_tmp
          
          # SUSFS core dosyaları
          mkdir -p fs/susfs
          if [ -d "susfs_tmp/fs/susfs" ]; then
            cp -rf susfs_tmp/fs/susfs/* fs/susfs/
          fi
          
          # Header dosyaları
          if [ -f "susfs_tmp/include/linux/susfs.h" ]; then
            cp -f susfs_tmp/include/linux/susfs.h include/linux/
          fi
          if [ -f "susfs_tmp/include/linux/susfs_def.h" ]; then
            cp -f susfs_tmp/include/linux/susfs_def.h include/linux/
          fi
          
          # Kernel VFS yamaları
          if [ -d "susfs_tmp/kernel_patches/fs" ]; then
            cp -f susfs_tmp/kernel_patches/fs/* fs/ 2>/dev/null || true
          fi
          if [ -d "susfs_tmp/kernel_patches/include/linux" ]; then
            cp -f susfs_tmp/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true
          fi
          
          rm -rf susfs_tmp
          
          # Kconfig/Makefile
          if [ -f "fs/Kconfig" ] && ! grep -q "susfs/Kconfig" fs/Kconfig; then
            sed -i '/^endmenu/i source "fs/susfs/Kconfig"' fs/Kconfig
          fi
          if [ -f "fs/Makefile" ] && ! grep -q "susfs" fs/Makefile; then
            echo 'obj-$(CONFIG_KSU_SUSFS) += susfs/' >> fs/Makefile
          fi
          
          echo "✅ SUSFS hazır!"

      - name: 5. BBG Entegrasyonu
        run: |
          cd common
          echo "📡 BBG entegre ediliyor..."
          git clone --depth=1 https://github.com/vc-teahouse/Baseband-guard.git bbg_tmp
          
          mkdir -p drivers/bbg
          if [ -d "bbg_tmp/drivers/bbg" ]; then
            cp -rf bbg_tmp/drivers/bbg/* drivers/bbg/
          else
            cp -rf bbg_tmp/* drivers/bbg/ 2>/dev/null || true
          fi
          
          rm -rf bbg_tmp
          
          if [ ! -f "drivers/bbg/Kconfig" ]; then
            echo -e 'config BBG\n\tbool "Baseband Guard"\n\tdefault n' > drivers/bbg/Kconfig
          fi
          if [ ! -f "drivers/bbg/Makefile" ]; then
            echo 'obj-$(CONFIG_BBG) += bbg.o' > drivers/bbg/Makefile
          fi
          
          if [ -f "drivers/Kconfig" ] && ! grep -q "bbg/Kconfig" drivers/Kconfig; then
            sed -i '/^endmenu/i source "drivers/bbg/Kconfig"' drivers/Kconfig
          fi
          if [ -f "drivers/Makefile" ] && ! grep -q "bbg" drivers/Makefile; then
            echo 'obj-$(CONFIG_BBG) += bbg/' >> drivers/Makefile
          fi
          
          echo "✅ BBG hazır!"

      - name: 6. Config Yapılandırması
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 gki_defconfig
          
          CONFIG_FILE="out/.config"
          
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_KSTAT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_OVERLAYFS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_BBG
          ./scripts/config --file $CONFIG_FILE --set-val CONFIG_HZ 300
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-CG+-Yuki-Multi-SUSFS"
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: 7. Derleme
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            KCFLAGS="-O2 -march=armv9.2-a+crypto -fomit-frame-pointer" \
            Image
          
          echo "BOOTHASH=Yuki-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 8. Paketleme
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Yuki MultiManager + SUSFS/' anykernel.sh
          cp ../common/out/arch/arm64/boot/Image .
          ZIP_NAME="CG-Yuki-MultiKSU-SUSFS-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "../${ZIP_NAME}" ./*
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: 9. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "🎮 Yuki Gaming Kernel (MultiManager + Pershoot SUSFS)"
          body: |
            ### 🔥 Özellikler:
            - KernelSU-Next (Pershoot dev-susfs)
            - SUSFS v1.5.1 (Pershoot Method)
            - MultiManager Support
            - HZ=300 Gaming Performance
            - Baseband Guard (BBG)
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
