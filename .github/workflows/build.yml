name: Xiaomi 14 Houji - Absolute Victory

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    
    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paket Kurulumu
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd pahole cmake

      - name: 2. Hafıza Yönetimi (Garantili Saklama)
        id: cache-all
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/official-clang
            ${{ github.workspace }}/common
            ${{ github.workspace }}/houji-dt
            ${{ github.workspace }}/sm8650-modules
          key: houji-kernel-absolute-v16

      - name: 3. Kaynakları İndir (Sadece Hafızada Yoksa)
        if: steps.cache-all.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/official-clang
          git clone --depth=1 -b android14-release https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 ${{ github.workspace }}/clang-repo
          cp -r ${{ github.workspace }}/clang-repo/clang-r487747c/* ${{ github.workspace }}/official-clang/
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14.git ${{ github.workspace }}/common
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14-devicetrees.git ${{ github.workspace }}/houji-dt
          git clone --depth=1 -b main https://github.com/lolipuru/kernel_xiaomi_sm8650-modules.git ${{ github.workspace }}/sm8650-modules
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ${{ github.workspace }}/AnyKernel3

      - name: 4. CERRAHİ LEHİMLEME (Hataları Kökten Siler)
        run: |
          WORKSPACE="${{ github.workspace }}"
          COMMON="${WORKSPACE}/common"
          MODS="${WORKSPACE}/sm8650-modules"
          DT="${WORKSPACE}/houji-dt"

          # --- A. DTC "child_address" HATASINI KÖKTEN SİL ---
          # Bu satır, derleyicinin tanımadığı o kuralı dosyalardan tamamen kazır.
          find ${COMMON}/scripts/dtc/ -type f -exec sed -i 's/"graph_child_address"//g' {} +
          find ${COMMON}/scripts/dtc/ -type f -exec sed -i 's/"graph_port"//g' {} +

          # --- B. DÖNGÜ HATASINI (PCI) SÖK AT ---
          sed -i '/config PCIE_QCOM_ECAM/,/help/d' ${COMMON}/drivers/pci/controller/Kconfig
          find ${COMMON} -name "Kconfig*" -type f -exec sed -i '/select PCIE_QCOM/d' {} +

          # --- C. Yolları ve Haritayı Yerleştir ---
          mkdir -p ${WORKSPACE}/vendor/qcom
          ln -sfn ${MODS}/qcom/opensource ${WORKSPACE}/vendor/qcom/opensource
          rm -rf ${COMMON}/arch/arm64/boot/dts/vendor
          mkdir -p ${COMMON}/arch/arm64/boot/dts/vendor
          cp -r ${DT}/* ${COMMON}/arch/arm64/boot/dts/vendor/
          grep -qxF 'obj-y += vendor/' ${COMMON}/arch/arm64/boot/dts/Makefile || echo "obj-y += vendor/" >> ${COMMON}/arch/arm64/boot/dts/Makefile

          # --- D. Header Lehimleme ---
          mkdir -p ${COMMON}/include/dt-bindings/
          cp -f ${MODS}/qcom/opensource/camera-kernel/dt-bindings/msm-camera.h ${COMMON}/include/dt-bindings/ 2>/dev/null || true
          mkdir -p ${COMMON}/include/uapi/camera/media
          cp -r ${MODS}/qcom/opensource/camera-kernel/include/uapi/camera/* ${COMMON}/include/uapi/camera/ 2>/dev/null || true
          cp -r ${MODS}/qcom/opensource/synx-kernel/include/uapi/* ${COMMON}/include/uapi/ 2>/dev/null || true

          # --- E. Clang ---
          mkdir -p "$(dirname ${COMMON}/prebuilts/clang/host/linux-x86/clang-r487747c)"
          ln -sfn ${WORKSPACE}/official-clang ${COMMON}/prebuilts/clang/host/linux-x86/clang-r487747c

          echo "✅ Cerrahi müdahale bitti. Iskelet ve aksesuarlar hazır."

      - name: 5. Ana Kernel Derle (Image)
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/official-clang/bin:$PATH"
          find arch/arm64/configs/ -type f -exec sed -i '/CONFIG_PCIE_QCOM/d' {} +

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig
          ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config
          
          ./scripts/config --file out/.config --set-val CONFIG_FRAME_WARN 4096
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig
          
          # Iskeleti derle
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang KCFLAGS="-Wno-error=frame-larger-than" Image

      - name: 6. MODÜLLERİ VE DTBO'YU DERLE
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/official-clang/bin:$PATH"
          
          # DTBO Derle
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- CC=clang dtbs

          # Modülleri derle
          MODULES=("mmrm-driver" "securemsm-kernel" "synx-kernel" "camera-kernel" "display-drivers" "audio-kernel" "video-driver" "touch-drivers")
          for mod in "${MODULES[@]}"; do
            echo "🛠️ Derleniyor: $mod"
            make -j$(nproc --all) -C . O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
              CROSS_COMPILE=aarch64-linux-gnu- CC=clang \
              M=../vendor/qcom/opensource/$mod modules || echo "⚠️ $mod atlandı."
          done

      - name: 7. Paketleme
        run: |
          cd ${{ github.workspace }}/AnyKernel3
          COMMON="${{ github.workspace }}/common"
          cp ${COMMON}/out/arch/arm64/boot/Image .
          mkdir -p modules/vendor/lib/modules
          find ${COMMON}/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \;
          find ${COMMON}/out -name "*.dtbo" -exec cat {} + > dtbo.img 2>/dev/null || true
          zip -r9 "../Xiaomi14-Houji-Victory.zip" ./* -x .git*

      - name: 8. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Houji-Absolute-${{ github.run_id }}
          name: "Xiaomi 14 (Houji) FULL SUCCESS"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
