name: Xiaomi 14 Monolithic Build (houji)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 24 # Monolithic + LTO için 24GB Swap hayat kurtarır

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
            
          echo "🔥 Toolchain: ZyC Clang 22"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          curl -fLSs "$CLANG_URL" | tar -xzf - -C $GITHUB_WORKSPACE/clang-zyc
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> $GITHUB_PATH
          
      - name: 2. Kaynakları Çek (MVaisakh Monolithic)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b monolithic-test-2 https://github.com/mvaisakh/xiaomi14.git --depth=1 common

      - name: 3. WLAN Techpack & Clang 22 Fix (LIVE PATCH)
        run: |
          cd common
          echo "🔥 WLAN Techpack hataları tamir ediliyor..."

          # 1. CFG80211 Wi-Fi 7 (MLO) Parametre Güncellemesi (Eksik parametreleri 0 olarak ekliyoruz)
          find techpack/wlan/qcacld-3.0 -name "*.c" -o -name "*.h" | xargs sed -i 's/cfg80211_ch_switch_notify(dev, chandef)/cfg80211_ch_switch_notify(dev, chandef, 0, 0)/g'
          find techpack/wlan/qcacld-3.0 -name "*.c" -o -name "*.h" | xargs sed -i 's/cfg80211_ch_switch_started_notify(dev, chandef, count)/cfg80211_ch_switch_started_notify(dev, chandef, 0, count, false, 0)/g'

          # 2. Eksik IOMMU S1/Atomic/Fast Tanımları (i_qdf_mem.h içine enjekte ediliyor)
          MEM_H="techpack/wlan/qcacld-3.0/cmn/qdf/linux/src/i_qdf_mem.h"
          if [ -f "$MEM_H" ]; then
            sed -i '/#include <linux\/iommu.h>/a #define QCOM_IOMMU_MAPPING_CONF_S1_BYPASS 0\n#define QCOM_IOMMU_MAPPING_CONF_ATOMIC 1\n#define QCOM_IOMMU_MAPPING_CONF_FAST 2\nstatic inline int qcom_iommu_get_mappings_configuration(struct iommu_domain *domain) { return 0; }' $MEM_H
          fi

          # 3. Clang 22 Unknown Warning Hatalarını Sustur (Werror ve geçersiz flagları temizle)
          find techpack/wlan/qcacld-3.0 -name "Makefile" -exec sed -i 's/-Werror//g' {} +
          find techpack/wlan/qcacld-3.0 -name "Makefile" -exec sed -i 's/-Wno-multistatement-macros//g' {} +
          find techpack/wlan/qcacld-3.0 -name "Makefile" -exec sed -i 's/-Wno-enum-int-mismatch//g' {} +
          
          echo "✅ WLAN Tamir Edildi!"

      - name: 4. Kernel Config Hazırlığı (houji_defconfig)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          touch .scmversion
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            houji_defconfig

      - name: 5. Kernel Derleme (Monolithic)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 \
            -march=armv9.2-a+crypto+crc+dotprod+rcpc+lse \
            -falign-loops=32 \
            -fomit-frame-pointer \
            -Wno-error" \
            KAFLAGS="-march=armv9.2-a+crypto+crc+dotprod+rcpc+lse" \
            Image || { echo "❌ Derleme HATASI!"; exit 1; }
          
          echo "BOOTHASH=Houji-Mono-$(date +%s)" >> $GITHUB_ENV
          
      - name: 6. AnyKernel3 Paketleme
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Xiaomi 14 Monolithic Test/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          
          # Techpack modülleri (WLAN, Audio, Video vs.) oluştuysa onları da pakete ekle
          mkdir -p modules/vendor/lib/modules
          find ../common/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \; || true
          
          zip -r "../Xiaomi14-Monolithic.zip" ./*

      - name: 7. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 Monolithic (houji_defconfig)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
