name: Xiaomi 14 (houji) Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential git zip libssl-dev flex bison lz4 libncurses5-dev libncursesw5-dev binutils-aarch64-linux-gnu

      - name: Download Clang (r487747c)
        run: |
          mkdir clang
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz
          tar -C clang/ -xf clang-r487747c.tar.gz

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14 kernel

      - name: Clone Device Tree (DTS)
        run: |
          git clone --depth=1 https://github.com/Bosyaf/xiaomi14-devicetrees sm8650-devicetrees

      - name: Clone Modules (Hardware Drivers)
        run: |
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14-modules modules

      - name: Organize Source Structure
        run: |
          # Modülleri kernel içindeki qcom opensource dizinine taşı
          mkdir -p kernel/vendor/qcom/opensource
          cp -r modules/* kernel/vendor/qcom/opensource/
          
          # Gereksiz dosyaları temizle (opsiyonel)
          rm -rf modules

      - name: Build Kernel
        run: |
          export PATH=$(pwd)/clang/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export LLVM=1
          export LLVM_IAS=1
          
          cd kernel
          
          # Config dosyasını ayarla
          make O=out vendor/houji_consolidate_defconfig
          
          # Derlemeyi başlat (Donanım sürücüleri dahil)
          make -j$(nproc --all) O=out \
                      CC=clang \
                      NM=llvm-nm \
                      OBJCOPY=llvm-objcopy \
                      OBJDUMP=llvm-objdump \
                      STRIP=llvm-strip \
                      LD=ld.lld \
                      AR=llvm-ar \
                      CLANG_TRIPLE=aarch64-linux-gnu-
        
      - name: Check Output
        run: |
          if [ -f kernel/out/arch/arm64/boot/Image ]; then
              echo "Kernel başarıyla derlendi!"
              mkdir -p artifact
              cp kernel/out/arch/arm64/boot/Image artifact/
              # DTB ve DTBO dosyalarını da alalım (Donanım için gerekli)
              find kernel/out/arch/arm64/boot/dts/ -name "*.dtb" -exec cp {} artifact/ \;
              find kernel/out/arch/arm64/boot/dts/ -name "*.dtbo" -exec cp {} artifact/ \;
          else
              echo "Derleme başarısız!"
              exit 1
          fi

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi14-Houji-Kernel
          path: artifact/*
