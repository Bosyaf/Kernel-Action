name: CG+ Yuki Gaming Kernel (Pershoot KSU-Next + SUSFS + BBG)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 8192

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/clang-zyc
          key: clang-zyc-22-20250928
          restore-keys: |
            clang-zyc-

      - name: Download Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          set -e
          echo "Downloading ZyC Clang 22..."
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz

      - name: Dependencies
        run: |
          set -e
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd jq patch

      - name: Clone Sources
        run: |
          set -e
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: Integrate KernelSU-Next (Pershoot dev-susfs)
        run: |
          set -e
          cd common
          echo "[KSU] Cloning pershoot/KernelSU-Next (dev-susfs)..."
          git clone -b dev-susfs --depth=1 https://github.com/pershoot/KernelSU-Next.git ksu_tmp
          mkdir -p drivers/kernelsu
          if [ -d "ksu_tmp/kernel" ]; then
            cp -a ksu_tmp/kernel/. drivers/kernelsu/
          else
            cp -a ksu_tmp/. drivers/kernelsu/
          fi
          rm -rf ksu_tmp
          if [ -f "drivers/Kconfig" ] && ! grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig; then
            sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi
          if [ -f "drivers/Makefile" ] && ! grep -q 'kernelsu' drivers/Makefile; then
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          fi
          echo "[KSU] Done."

      - name: Integrate SUSFS (Correct Path)
        run: |
          set -e
          cd common
          echo "[SUSFS] Cloning pershoot/susfs4ksu..."
          git clone -b gki-android14-6.1-dev --depth=1 https://gitlab.com/pershoot/susfs4ksu.git susfs_tmp
          
          # BU KISIM HATAYI ÇÖZÜYOR: Doğru, gömülü yolu kullanıyoruz.
          SUSFS_SRC_DIR="susfs_tmp/kernel_patches/KernelSU/10_enable_susfs_for_ksu/fs/susfs"
          
          if [ ! -d "$SUSFS_SRC_DIR" ]; then
            echo "FATAL ERROR: SUSFS source directory not found at the expected path: $SUSFS_SRC_DIR"
            exit 1
          fi
          
          echo "[SUSFS] Found source directory at: $SUSFS_SRC_DIR"
          mkdir -p fs/susfs
          cp -a "$SUSFS_SRC_DIR"/. fs/susfs/
          
          # Header dosyalarını kopyala
          for hdr in susfs.h susfs_def.h; do
            HDR_PATH="$(find susfs_tmp -type f -name "$hdr" -print -quit || true)"
            if [ -n "$HDR_PATH" ]; then
              cp -f "$HDR_PATH" include/linux/
            fi
          done
          
          # Kernel VFS yamalarını uygula
          if [ -d "susfs_tmp/kernel_patches" ]; then
            find susfs_tmp/kernel_patches -type f -name "*.patch" ! -path "*10_enable_susfs_for_ksu*" | sort | while read -r p; do
              patch -p1 -N --forward < "$p" || echo "    (Skipped patch: $p)"
            done
          fi
          
          rm -rf susfs_tmp
          
          # Entegrasyon (Artık Kconfig dosyası var)
          if [ -f "fs/Kconfig" ] && ! grep -q 'source "fs/susfs/Kconfig"' fs/Kconfig; then
            sed -i '/^endmenu/i source "fs/susfs/Kconfig"' fs/Kconfig
          fi
          if [ -f "fs/Makefile" ] && ! grep -q 'susfs/' fs/Makefile; then
            echo 'obj-$(CONFIG_KSU_SUSFS) += susfs/' >> fs/Makefile
          fi
          echo "[SUSFS] Done."

      - name: Integrate BBG (Baseband Guard)
        run: |
          set -e
          cd common
          git clone --depth=1 https://github.com/vc-teahouse/Baseband-guard.git bbg_tmp
          mkdir -p drivers/bbg
          cp -a bbg_tmp/drivers/bbg/. drivers/bbg/ 2>/dev/null || cp -a bbg_tmp/. drivers/bbg/ 2>/dev/null || true
          rm -rf bbg_tmp
          cat > drivers/bbg/Kconfig << 'EOF'
          config BBG
            bool "Baseband Guard"
            default n
          EOF
          cat > drivers/bbg/Makefile << 'EOF'
          obj-$(CONFIG_BBG) += bbg.o
          EOF
          if [ -f "drivers/Kconfig" ]; then sed -i '/^endmenu/i source "drivers/bbg/Kconfig"' drivers/Kconfig; fi
          if [ -f "drivers/Makefile" ]; then echo 'obj-$(CONFIG_BBG) += bbg/' >> drivers/Makefile; fi

      - name: Kernel Config & Build
        run: |
          set -e
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export HOSTCC=clang
          export HOSTCXX=clang++
          export HOSTLD=ld.lld
          
          make O=out ARCH=arm64 gki_defconfig
          
          CONFIG_FILE="out/.config"
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_KSU
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_KSU_SUSFS
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_BBG
          ./scripts/config --file "$CONFIG_FILE" --set-val CONFIG_HZ 300
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_PREEMPT
          ./scripts/config --file "$CONFIG_FILE" --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --file "$CONFIG_FILE" --set-str CONFIG_LOCALVERSION "-CG+-Yuki"
          
          make O=out ARCH=arm64 olddefconfig
          
          make -j"$(nproc --all)" O=out ARCH=arm64 Image
          
          echo "BOOTHASH=Yuki-$(date +%Y%m%d-%H%M)" >> "$GITHUB_ENV"

      - name: Package & Release
        run: |
          set -e
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image .
          ZIP_NAME="CG-Yuki-KSU-SUSFS-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "../${ZIP_NAME}" ./*
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          cd ..
          ls -lh *.zip
        
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Yuki Kernel (KSU + SUSFS)"
          body: |
            - KernelSU-Next (Pershoot dev-susfs)
            - SUSFS (Pershoot Method)
            - BBG (Baseband Guard)
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
