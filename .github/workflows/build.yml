name: CG+ Yuki Gaming Kernel (Pershoot KSU-Next dev-susfs + SUSFS + BBG)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 8192

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/clang-zyc
          key: clang-zyc-22-20250928
          restore-keys: |
            clang-zyc-

      - name: Download Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          set -e
          echo "Downloading ZyC Clang 22..."
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz

      - name: Dependencies
        run: |
          set -e
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd jq patch

      - name: Clone sources
        run: |
          set -e
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: Integrate KernelSU-Next (Pershoot dev-susfs)
        run: |
          set -e
          cd common
          echo "[KSU] Cloning pershoot/KernelSU-Next (dev-susfs)..."
          git clone -b dev-susfs --depth=1 https://github.com/pershoot/KernelSU-Next.git ksu_tmp
          mkdir -p drivers/kernelsu
          if [ -d "ksu_tmp/kernel" ]; then
            cp -a ksu_tmp/kernel/. drivers/kernelsu/
          else
            cp -a ksu_tmp/. drivers/kernelsu/
          fi
          rm -rf ksu_tmp
          if [ -f "drivers/Kconfig" ] && ! grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig; then
            sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi
          if [ -f "drivers/Makefile" ] && ! grep -q 'kernelsu' drivers/Makefile; then
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          fi
          echo "[KSU] Done."

      - name: Integrate SUSFS (Pershoot susfs4ksu)
        run: |
          set -e
          cd common
          echo "[SUSFS] Cloning pershoot/susfs4ksu (gki-android14-6.1-dev)..."
          git clone -b gki-android14-6.1-dev --depth=1 https://gitlab.com/pershoot/susfs4ksu.git susfs_tmp
          echo "[SUSFS] Locating fs/susfs/Kconfig inside repo..."
          SUSFS_KCONFIG_PATH="$(find susfs_tmp -type f -path "*/fs/susfs/Kconfig" -print -quit || true)"
          if [ -z "$SUSFS_KCONFIG_PATH" ]; then
            echo "ERROR: fs/susfs/Kconfig not found in susfs4ksu repo."
            exit 1
          fi
          SUSFS_DIR="$(dirname "$SUSFS_KCONFIG_PATH")"
          echo "[SUSFS] Found module dir: $SUSFS_DIR"
          mkdir -p fs/susfs
          cp -a "$SUSFS_DIR"/. fs/susfs/
          for hdr in susfs.h susfs_def.h; do
            HDR_PATH="$(find susfs_tmp -type f -path "*/include/linux/$hdr" -print -quit || true)"
            if [ -n "$HDR_PATH" ]; then
              echo "[SUSFS] Copy header: $hdr"
              cp -f "$HDR_PATH" include/linux/
            fi
          done
          if [ -d "susfs_tmp/kernel_patches" ]; then
            echo "[SUSFS] Applying kernel patches..."
            find susfs_tmp/kernel_patches -type f -name "*.patch" ! -path "*KernelSU*" | sort | while read -r p; do
              patch -p1 -N --forward < "$p" || echo "    (skip) patch: $p"
            done
          fi
          rm -rf susfs_tmp
          if [ ! -f "fs/susfs/Kconfig" ]; then
            echo "ERROR: fs/susfs/Kconfig still missing after copy."
            exit 1
          fi
          if [ -f "fs/Kconfig" ] && ! grep -q 'source "fs/susfs/Kconfig"' fs/Kconfig; then
            if grep -q 'source "fs/overlayfs/Kconfig"' fs/Kconfig; then
              sed -i '/source "fs\/overlayfs\/Kconfig"/a source "fs/susfs/Kconfig"' fs/Kconfig
            else
              sed -i '/^endmenu/i source "fs/susfs/Kconfig"' fs/Kconfig
            fi
          fi
          if [ -f "fs/Makefile" ] && ! grep -q '^obj-$(CONFIG_KSU_SUSFS) += susfs/' fs/Makefile; then
            echo 'obj-$(CONFIG_KSU_SUSFS) += susfs/' >> fs/Makefile
          fi
          echo "[SUSFS] Done."

      - name: Integrate BBG (Baseband Guard)
        run: |
          set -e
          cd common
          git clone --depth=1 https://github.com/vc-teahouse/Baseband-guard.git bbg_tmp
          mkdir -p drivers/bbg
          if [ -d "bbg_tmp/drivers/bbg" ]; then
            cp -a bbg_tmp/drivers/bbg/. drivers/bbg/
          else
            cp -a bbg_tmp/. drivers/bbg/ || true
          fi
          rm -rf bbg_tmp
          if [ ! -f "drivers/bbg/Kconfig" ]; then
            cat > drivers/bbg/Kconfig << 'EOF'
          config BBG
            bool "Baseband Guard"
            default n
            help
              Enable Baseband Guard.
          EOF
          fi
          if [ ! -f "drivers/bbg/Makefile" ]; then
            echo 'obj-$(CONFIG_BBG) += bbg.o' > drivers/bbg/Makefile
          fi
          if [ -f "drivers/Kconfig" ] && ! grep -q 'source "drivers/bbg/Kconfig"' drivers/Kconfig; then
            sed -i '/^endmenu/i source "drivers/bbg/Kconfig"' drivers/Kconfig
          fi
          if [ -f "drivers/Makefile" ] && ! grep -q '^obj-$(CONFIG_BBG) += bbg/' drivers/Makefile; then
            echo 'obj-$(CONFIG_BBG) += bbg/' >> drivers/Makefile
          fi

      - name: Patches
        run: |
          set -e
          cd common
          curl -fLSs https://github.com/OnePlus-12-Development/android_kernel_qcom_sm8650/commit/3e0cb08.patch -o wifi.patch || true
          if [ -s wifi.patch ] && grep -q "^diff" wifi.patch; then
            patch -p1 -N --forward < wifi.patch || echo "Wi-Fi patch skipped"
          fi
          rm -f wifi.patch
          if [ -d "../patches" ]; then
            find "../patches" -type f \( -name "*.patch" -o -name "*.diff" \) | sort | while read -r pf; do
              patch -p1 -N --forward < "$pf" || echo "Skip $pf"
            done
          fi

      - name: Kernel config
        run: |
          set -e
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            gki_defconfig
          CONFIG_FILE="out/.config"
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_MODULES
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_KPROBES
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_HAVE_KPROBES
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_KPROBE_EVENTS
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_KSU
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_KSU_SUSFS || true
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_BBG || true
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_OVERLAY_FS
          ./scripts/config --file "$CONFIG_FILE" --set-val CONFIG_HZ 300
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_PREEMPT
          ./scripts/config --file "$CONFIG_FILE" --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file "$CONFIG_FILE" --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --file "$CONFIG_FILE" --set-str CONFIG_LOCALVERSION "-CG+-Yuki-KSU-SUSFS"
          ./scripts/config --file "$CONFIG_FILE" --disable CONFIG_LOCALVERSION_AUTO
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            olddefconfig
          echo "==== CONFIG CHECK ===="
          grep -E "CONFIG_KSU=|CONFIG_KSU_SUSFS=|CONFIG_BBG=" out/.config || true
          test -f fs/susfs/Kconfig

      - name: Build kernel
        run: |
          set -e
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          make -j"$(nproc --all)" O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            Image
          ls -lh out/arch/arm64/boot/Image
          echo "BOOTHASH=Yuki-$(date +%Y%m%d-%H%M)" >> "$GITHUB_ENV"

      - name: AnyKernel3 package
        run: |
          set -e
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Yuki KSU + SUSFS/' anykernel.sh || true
          cp ../common/out/arch/arm64/boot/Image .
          ZIP_NAME="CG-Yuki-KSU-SUSFS-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "../${ZIP_NAME}" ./*
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Yuki Kernel (Pershoot KSU dev-susfs + SUSFS)"
          body: |
            - KernelSU-Next: pershoot/dev-susfs
            - SUSFS: pershoot/susfs4ksu (gki-android14-6.1-dev)
            - BBG enabled (if present)
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: "*.zip"
          retention-days: 7
