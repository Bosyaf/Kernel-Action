name: Bosyaf MONOLITHIC Houji

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: bos
      KBUILD_BUILD_HOST: yaf

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build vars
        run: |
          echo "BUILD_TS=$(date +%Y%m%d-%H%M)" >> "$GITHUB_ENV"
      - name: Install deps + ZyC Clang
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip zip dwarves bc cpio wget xz-utils make \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            pkg-config zstd
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fL "$CLANG_URL" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> "$GITHUB_PATH"
      - name: Clone sources
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          git clone --depth 1 --single-branch -b monolithic-test-2 https://github.com/Bosyaf/xiaomi14.git common
      - name: Patch source for clang
        run: |
          cd common
          sed -i 's/const struct sde_pingpong_cfg \*pp_cfg;/const struct sde_pingpong_cfg *pp_cfg = NULL;/' \
            techpack/display/msm/sde/sde_rm.c
          sed -i 's/const char \*name;/const char *name = NULL;/' \
            drivers/input/misc/qcom-hv-haptics.c
          sed -i 's/struct synx_map_entry \*map_entry;/struct synx_map_entry *map_entry = NULL;/' \
            techpack/synx-kernel/msm/synx/synx.c
      - name: 4. WLAN Patch Uygula
        run: |
          cd common

          # PATCH 1: cfg80211 API fix
          WLAN_CFG="techpack/wlan/qcacld-3.0/cmn/os_if/linux/wlan_cfg80211.h"
          sed -i 's/cfg80211_ch_switch_notify(dev, chandef);/cfg80211_ch_switch_notify(dev, chandef, 0, 0);/g' "$WLAN_CFG"
          sed -i 's/cfg80211_ch_switch_started_notify(dev, chandef, count);/cfg80211_ch_switch_started_notify(dev, chandef, 0, count, false, 0);/g' "$WLAN_CFG"

          # PATCH 2: IOMMU compat
          IOMMU_FILE="techpack/wlan/qcacld-3.0/cmn/qdf/linux/src/i_qdf_mem.h"
          sed -i '1i\
          #ifndef QCOM_IOMMU_MAPPING_CONF_S1_BYPASS\
          #define QCOM_IOMMU_MAPPING_CONF_S1_BYPASS 0\
          #define QCOM_IOMMU_MAPPING_CONF_ATOMIC    1\
          #define QCOM_IOMMU_MAPPING_CONF_FAST      2\
          static inline int qcom_iommu_get_mappings_configuration(void *d) { return QCOM_IOMMU_MAPPING_CONF_FAST; }\
          #endif' "$IOMMU_FILE"

          echo "Patchler tamam"
      - name: Configure houji monolithic
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          mkdir -p out
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            KCFLAGS="-Wno-error" HOSTCFLAGS="-Wno-error" \
            houji_defconfig
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            KCFLAGS="-Wno-error" HOSTCFLAGS="-Wno-error" \
            olddefconfig
          for i in 1 2 3 4 5; do
            COUNT=$(grep -c '=m' out/.config || true)
            echo "Tur $i: $COUNT adet =m kaldi"
            [ "$COUNT" -eq 0 ] && break
            sed -i 's/=m$/=y/' out/.config
            make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
              CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
              OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
              HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
              CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
              KCFLAGS="-Wno-error" HOSTCFLAGS="-Wno-error" \
              olddefconfig
          done
          # Son zorlama, bundan sonra olddefconfig yok
          sed -i 's/=m$/=y/' out/.config
          echo "CONFIG_INTEGRATE_MODULES durum:"
          grep '^CONFIG_INTEGRATE_MODULES=' out/.config || true
          echo "CONFIG_ARCH_PINEAPPLE durum:"
          grep '^CONFIG_ARCH_PINEAPPLE=' out/.config || true
          grep '=m' out/.config > ../remaining-modules.txt || true
          cp out/.config ../final.config
          echo "Kalan =m sayisi:"
          wc -l ../remaining-modules.txt | awk '{print $1}'
      - name: Build kernel
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          make -j"$(nproc --all)" O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            KCFLAGS="-Wno-error" HOSTCFLAGS="-Wno-error" \
            Image dtbs
          test -f out/arch/arm64/boot/Image
          find out -name "*.ko" | sort > ../ko-list.txt || true
          echo "Image:"
          ls -lh out/arch/arm64/boot/Image
          echo "KO sayisi:"
          wc -l ../ko-list.txt | awk '{print $1}'
      - name: Prepare AnyKernel3
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Bosyaf MONOLITHIC/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh
      - name: Package zip
        run: |
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image .
          find ../common/out/arch/arm64/boot/dts -type f \( -name "*.dtb" -o -name "*.dtbo" \) -exec cp {} . \; 2>/dev/null || true
          zip -r9 "../Bosyaf-MONOLITHIC-Houji-${BUILD_TS}.zip" ./*
      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: houji-monolithic-debug-${{ env.BUILD_TS }}
          path: |
            remaining-modules.txt
            ko-list.txt
            final.config
            common/out/arch/arm64/boot/Image
            Bosyaf-MONOLITHIC-Houji-${{ env.BUILD_TS }}.zip
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: houji-mono-${{ env.BUILD_TS }}
          name: Bosyaf MONOLITHIC - Houji
          files: Bosyaf-MONOLITHIC-Houji-${{ env.BUILD_TS }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
