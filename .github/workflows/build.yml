name: Bosyaf GKI + Vendor DLKM Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "bos"
      KBUILD_BUILD_HOST: "yaf"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz || { echo "HATA!"; exit 1; }
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> "$GITHUB_PATH"

      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b monolithic-test-2 https://github.com/Bosyaf/xiaomi14.git --depth=1 common

      - name: 3. GKI Config (NO Consolidate - Modular)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          mkdir -p out

          # 1. Base GKI
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            gki_defconfig

          # 2. Pineapple platform (vendor modules as MODULES=m)
          scripts/kconfig/merge_config.sh -m -O out/ \
            out/.config arch/arm64/configs/vendor/pineapple_GKI.config

          # 3. Houji device config
          scripts/kconfig/merge_config.sh -m -O out/ \
            out/.config arch/arm64/configs/vendor/houji_GKI.config

          # NO CONSOLIDATE! Vendor drivers will be .ko modules

          # 4. Finalize
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: 4. Kernel + Modules Derle
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            Image modules dtbs

          if [ ! -f out/arch/arm64/boot/Image ]; then
            echo "HATA!"; exit 1
          fi
          echo "Image: $(ls -lh out/arch/arm64/boot/Image | awk '{print $5}')"
          echo "Modul sayisi: $(find out -name '*.ko' | wc -l)"

      - name: 5. Vendor DLKM Modulleri Topla
        run: |
          cd common
          mkdir -p out/vendor_dlkm/lib/modules/6.6
          
          # Vendor modulleri kopyala (techpack, qcom drivers vs)
          find out -name "*.ko" -exec cp {} out/vendor_dlkm/lib/modules/6.6/ \;
          
          # modules.load olustur
          find out/vendor_dlkm/lib/modules/6.6 -name "*.ko" -exec basename {} \; > out/vendor_dlkm/lib/modules/6.6/modules.load
          
          echo "Vendor DLKM modulleri: $(ls out/vendor_dlkm/lib/modules/6.6/*.ko | wc -l)"

      - name: 6. AnyKernel3 Paketleme
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Bosyaf GKI Houji/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh

          # Image
          cp ../common/out/arch/arm64/boot/Image .

          # DTBs
          find ../common/out/arch/arm64/boot/dts/vendor -name "*.dtb" -exec cp {} . \; 2>/dev/null || true

          # Vendor DLKM modulleri
          mkdir -p modules
          cp -r ../common/out/vendor_dlkm/* modules/

          echo "Paket:"
          ls -lh Image
          echo "Modul: $(find modules -name '*.ko' | wc -l)"

          zip -r9 "../Bosyaf-GKI-Houji-$(date +%Y%m%d-%H%M).zip" ./*

      - name: 7. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "houji-gki-$(date +%Y%m%d-%H%M)"
          name: "Bosyaf GKI + Vendor DLKM - Houji"
          body: |
            ### Mi 14 Houji - GKI + Vendor Modules
            - GKI Image + Vendor .ko modulleri
            - Cihazin vendor_boot ile uyumlu
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
