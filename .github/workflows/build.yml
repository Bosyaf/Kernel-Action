name: CG+ Yuki Gaming Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - uses: actions/checkout@v4

      # 🔥 CLANG CACHE
      - uses: actions/cache@v4
        id: clang-cache
        with:
          path: ${{ github.workspace }}/clang-yuki
          key: clang-yuki-20260124

      - name: Download Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p clang-yuki
          curl -L https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst \
          | tar --zstd -xC clang-yuki

      - name: Install Packages
        run: |
          sudo apt update -qq
          sudo apt install -y bc bison build-essential curl flex git libelf-dev \
          libncurses-dev libssl-dev lld llvm make python3 rsync zstd

      - name: Clone Sources
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      # ========================
      # 🔥 KERNELSU-NEXT (FIXED)
      # ========================
      - name: KernelSU-Next Setup (FULL FIX)
        run: |
          cd common

          git clone https://github.com/pershoot/KernelSU-Next.git -b dev-susfs --depth=1

          cd KernelSU-Next
          bash kernel/setup.sh
          cd ..

          # 🔥 CRITICAL FIX (UAPI)
          if [ ! -f "include/uapi/app_profile.h" ]; then
            cp -r KernelSU-Next/userspace/include/uapi/* include/uapi/
          fi

      # ========================
      # 🔥 SUSFS
      # ========================
      - name: SUSFS Setup
        run: |
          cd common

          git clone https://gitlab.com/simonpunk/susfs4ksu -b gki-android14-6.1 --depth=1 susfs

          cp -r susfs/kernel_patches/fs/* fs/
          cp -r susfs/kernel_patches/include/* include/

          patch -p1 < susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true

      # ========================
      # CONFIG
      # ========================
      - name: Configure Kernel
        run: |
          cd common
          export PATH=$GITHUB_WORKSPACE/clang-yuki/bin:$PATH

          make O=out ARCH=arm64 LLVM=1 gki_defconfig

          CONFIG=out/.config

          ./scripts/config --file $CONFIG --enable CONFIG_KSU
          ./scripts/config --file $CONFIG --enable CONFIG_KSU_SUSFS
          ./scripts/config --file $CONFIG --enable CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --file $CONFIG --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          ./scripts/config --file $CONFIG --enable CONFIG_KSU_SUSFS_SUS_KSTAT
          ./scripts/config --file $CONFIG --enable CONFIG_KSU_SUSFS_SUS_MAP
          ./scripts/config --file $CONFIG --enable CONFIG_KSU_SUSFS_TRY_UMOUNT
          ./scripts/config --file $CONFIG --enable CONFIG_KSU_SUSFS_SPOOF_UNAME
          ./scripts/config --file $CONFIG --enable CONFIG_KSU_SUSFS_OPEN_REDIRECT
          ./scripts/config --file $CONFIG --enable CONFIG_KSU_MULTI_MANAGER_SUPPORT

          ./scripts/config --file $CONFIG --disable CONFIG_KSU_SUSFS_ENABLE_LOG

          make O=out ARCH=arm64 LLVM=1 olddefconfig

      # ========================
      # BUILD
      # ========================
      - name: Build Kernel
        run: |
          cd common
          export PATH=$GITHUB_WORKSPACE/clang-yuki/bin:$PATH

          make -j$(nproc) O=out ARCH=arm64 LLVM=1 \
          KCFLAGS="-O2 \
          -march=armv9.2-a+crypto+sha3+crc+dotprod+rcpc+lse \
          -mcpu=cortex-x4 \
          -falign-functions=16 \
          -fomit-frame-pointer \
          -fno-unwind-tables \
          -fno-asynchronous-unwind-tables \
          -fvectorize \
          -fslp-vectorize \
          -finline-functions" \
          KLDFLAGS="-Wl,--gc-sections -Wl,--as-needed -Wl,--icf=safe -Wl,-O2" \
          Image

      # ========================
      # ZIP
      # ========================
      - name: AnyKernel
        run: |
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image .
          zip -r ../kernel.zip *

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          files: kernel.zip
