name: WLAN Hızlı Fix Testi

on:
  workflow_dispatch:

jobs:
  build-wlan:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Paketler
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip bc cpio wget xz-utils make \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            pkg-config zstd pahole dwarves

      - name: 2. Google/Xiaomi Clang r487747
        run: |
          mkdir -p "$GITHUB_WORKSPACE/clang"
          curl -fsSL "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/788f1e86014660a5230ba4e9f52c39d5b393cd2b/clang-r487747.tar.gz" -o clang.tar.gz
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang"
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang/bin" >> "$GITHUB_PATH"
          "$GITHUB_WORKSPACE/clang/bin/clang" --version

      - name: 3. Kaynakları Çek
        run: |
          git clone -b monolithic-test-2 https://github.com/Bosyaf/xiaomi14.git --depth=1 common

      - name: 4. WLAN Patch Uygula
        run: |
          cd common

          # PATCH 1: cfg80211 API fix
          WLAN_CFG="techpack/wlan/qcacld-3.0/cmn/os_if/linux/wlan_cfg80211.h"
          sed -i 's/cfg80211_ch_switch_notify(dev, chandef);/cfg80211_ch_switch_notify(dev, chandef, 0, 0);/g' "$WLAN_CFG"
          sed -i 's/cfg80211_ch_switch_started_notify(dev, chandef, count);/cfg80211_ch_switch_started_notify(dev, chandef, 0, count, false, 0);/g' "$WLAN_CFG"

          # PATCH 2: IOMMU compat
          IOMMU_FILE="techpack/wlan/qcacld-3.0/cmn/qdf/linux/src/i_qdf_mem.h"
          sed -i '1i\
          #ifndef QCOM_IOMMU_MAPPING_CONF_S1_BYPASS\
          #define QCOM_IOMMU_MAPPING_CONF_S1_BYPASS 0\
          #define QCOM_IOMMU_MAPPING_CONF_ATOMIC    1\
          #define QCOM_IOMMU_MAPPING_CONF_FAST      2\
          static inline int qcom_iommu_get_mappings_configuration(void *d) { return QCOM_IOMMU_MAPPING_CONF_FAST; }\
          #endif' "$IOMMU_FILE"

          echo "Patchler tamam"

      - name: 5. Config
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          mkdir -p out

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            HOSTCC=gcc HOSTCXX=g++ \
            houji_defconfig

          # MODULLERI AC (WLAN test icin sart)
          scripts/config --file out/.config \
            -e MODULES \
            -e MODULE_UNLOAD \
            -e MODVERSIONS

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            HOSTCC=gcc HOSTCXX=g++ \
            olddefconfig

          echo "Config hazir!"
          grep "CONFIG_MODULES=" out/.config

      - name: 6. Prepare
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"

          make -j$(nproc) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            CROSS_COMPILE=aarch64-linux-gnu- HOSTCC=gcc HOSTCXX=g++ \
            scripts prepare modules_prepare

      - name: 7. WLAN Derle
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"

          make -j$(nproc) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            CROSS_COMPILE=aarch64-linux-gnu- HOSTCC=gcc HOSTCXX=g++ \
            M=techpack/wlan modules

          echo "=== SONUC ==="
          find out/techpack/wlan -name "*.ko" 2>/dev/null | wc -l
          echo "adet .ko olustu"

      - name: 8. Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: wlan-modules
          path: common/out/techpack/wlan/**/*.ko
