name: CG+ Houji Full Pure Engineering Final

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paket Kurulumu
        run: |
          sudo apt update -qq
          sudo apt install -y --install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd pahole cmake

      - name: 2. Clang Cache
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/official-clang
          key: clang-r487747c-android14-v3

      - name: 3. Clang İndir (Sadece Cache Yoksa)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/official-clang
          git clone --depth=1 -b android14-release \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            ${{ github.workspace }}/clang-repo
          cp -r ${{ github.workspace }}/clang-repo/clang-r487747c/* ${{ github.workspace }}/official-clang/
          rm -rf ${{ github.workspace }}/clang-repo

      - name: 4. Kaynak Kodlarını Çek
        run: |
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14.git ${{ github.workspace }}/common
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14-devicetrees.git ${{ github.workspace }}/houji-dt
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ${{ github.workspace }}/AnyKernel3

      - name: 5. Donanım Haritası ve Header Lehimleme
        run: |
          COMMON="${{ github.workspace }}/common"
          HOUJI="${{ github.workspace }}/houji-dt"
          CLANG_DST="${COMMON}/prebuilts/clang/host/linux-x86/clang-r487747c"

          mkdir -p ${COMMON}/arch/arm64/boot/dts/vendor
          cp -r ${HOUJI}/* ${COMMON}/arch/arm64/boot/dts/vendor/
          
          mkdir -p ${COMMON}/include/bindings
          mkdir -p ${COMMON}/include/dt-bindings
          if [ -d "${HOUJI}/bindings" ]; then
            cp -r ${HOUJI}/bindings/* ${COMMON}/include/bindings/
            cp -r ${HOUJI}/bindings/* ${COMMON}/include/dt-bindings/
          fi

          mkdir -p ${COMMON}/arch/arm64/configs/vendor/
          cp -f ${HOUJI}/configs/* ${COMMON}/arch/arm64/configs/vendor/ 2>/dev/null || true

          DTS_MK="${COMMON}/arch/arm64/boot/dts/Makefile"
          grep -qxF 'obj-y += vendor/' "$DTS_MK" || echo "obj-y += vendor/" >> "$DTS_MK"

          mkdir -p "$(dirname ${CLANG_DST})"
          ln -sfn ${{ github.workspace }}/official-clang ${CLANG_DST}

      - name: 6. Cerrahi Stub Injection (UFS + Crypto Fix)
        run: |
          COMMON="${{ github.workspace }}/common"
          STUB_FILE="${COMMON}/drivers/soc/qcom/cg_stubs.c"
          QCOM_MK="${COMMON}/drivers/soc/qcom/Makefile"

          # Çakışmaları önlemek için modüllerdeki exportları kapatan fonksiyon
          disable_module_export() {
            local symbol="$1"
            local search_dir="${COMMON}/$2"
            echo "🔍 Devre dışı bırakılıyor: ${symbol} in ${search_dir}"
            local files=$(grep -rl "EXPORT_SYMBOL.*\b${symbol}\b" "${search_dir}" 2>/dev/null || true)
            for f in $files; do
              if echo "$f" | grep -qv "cg_stubs.c"; then
                sed -i "s|^\(EXPORT_SYMBOL.*\b${symbol}\b.*\)|// CG_DISABLED: \1|" "$f"
              fi
            done
          }

          # --- Mevcut Semboller ---
          disable_module_export "crm_write_bw_vote" "drivers"
          disable_module_export "crm_get_device" "drivers"
          disable_module_export "crm_dump_regs" "drivers"
          disable_module_export "crm_dump_drv_regs" "drivers"
          disable_module_export "qcom_icc_debug_register" "drivers"
          disable_module_export "qcom_icc_debug_unregister" "drivers"
          disable_module_export "gh_rm_get_this_vmid" "arch/arm64"
          disable_module_export "gh_get_irq" "drivers"
          disable_module_export "gh_put_irq" "drivers"
          disable_module_export "qcom_is_dma_buf_file" "drivers"
          disable_module_export "debug_symbol_lookup_name" "drivers"
          disable_module_export "debug_symbol_available" "drivers"

          # --- YENİ EKLENEN SEMBOLLER (UFS & Crypto Fix) ---
          disable_module_export "crypto_qti_disable" "drivers"
          disable_module_export "crypto_qti_debug" "drivers"
          disable_module_export "sched_set_boost" "kernel/sched/walt"
          disable_module_export "ufshcd_qti_hba_init_crypto_capabilities" "drivers/ufs"
          disable_module_export "qcom_clk_set_flags" "drivers/clk/qcom"

          cat << 'STUBEOF' > "${STUB_FILE}"
          #include <linux/module.h>
          #include <linux/types.h>
          #include <linux/kernel.h>

          /* CRM */
          void crm_write_bw_vote(void) {}
          EXPORT_SYMBOL(crm_write_bw_vote);
          void *crm_get_device(void) { return NULL; }
          EXPORT_SYMBOL(crm_get_device);
          void crm_dump_regs(void) {}
          EXPORT_SYMBOL(crm_dump_regs);
          void crm_dump_drv_regs(void) {}
          EXPORT_SYMBOL(crm_dump_drv_regs);

          /* ICC Debug */
          int qcom_icc_debug_register(void *p) { return 0; }
          EXPORT_SYMBOL(qcom_icc_debug_register);
          void qcom_icc_debug_unregister(void *p) {}
          EXPORT_SYMBOL(qcom_icc_debug_unregister);

          /* Gunyah & Debug */
          int gh_rm_get_this_vmid(void *v) { return 0; }
          EXPORT_SYMBOL(gh_rm_get_this_vmid);
          int gh_get_irq(void) { return 0; }
          EXPORT_SYMBOL(gh_get_irq);
          void gh_put_irq(void) {}
          EXPORT_SYMBOL(gh_put_irq);
          bool qcom_is_dma_buf_file(void *f) { return false; }
          EXPORT_SYMBOL(qcom_is_dma_buf_file);
          const char *debug_symbol_lookup_name(unsigned long a) { return NULL; }
          EXPORT_SYMBOL(debug_symbol_lookup_name);
          bool debug_symbol_available(void) { return false; }
          EXPORT_SYMBOL(debug_symbol_available);

          /* UFS & Crypto & WALT Fixes */
          void crypto_qti_disable(void *v) {}
          EXPORT_SYMBOL(crypto_qti_disable);
          void crypto_qti_debug(void *v) {}
          EXPORT_SYMBOL(crypto_qti_debug);
          void sched_set_boost(int i) {}
          EXPORT_SYMBOL(sched_set_boost);
          int ufshcd_qti_hba_init_crypto_capabilities(void *v) { return 0; }
          EXPORT_SYMBOL(ufshcd_qti_hba_init_crypto_capabilities);
          int qcom_clk_set_flags(void *h, unsigned int f) { return 0; }
          EXPORT_SYMBOL(qcom_clk_set_flags);

          MODULE_LICENSE("GPL");
          STUBEOF

          grep -qxF 'obj-y += cg_stubs.o' "${QCOM_MK}" || echo "obj-y += cg_stubs.o" >> "${QCOM_MK}"

      - name: 7. Config Merge ve Ayarlar
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig
          
          MERGE_CONFIGS="out/.config arch/arm64/configs/vendor/pineapple_GKI.config arch/arm64/configs/vendor/houji_GKI.config arch/arm64/configs/vendor/houji_consolidate.config"
          ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang ./scripts/kconfig/merge_config.sh -O out $MERGE_CONFIGS
          
          CONFIG_FILE="out/.config"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_MSM_MINIDUMP
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_QCOM_MINIDUMP
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_IPC_LOGGING
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEBUG_INFO_BTF
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Houji-Pure"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig

      - name: 8. Derleme - Image ve Modules
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 -D__ANDROID_COMMON_KERNEL__ -Wno-error" \
            Image modules

      - name: 8b. Derleme - DTBs
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- CC="clang" \
            DTC_FLAGS="-i ${{ github.workspace }}/common/arch/arm64/boot/dts/vendor/qcom -i ${{ github.workspace }}/common/include" \
            dtbs || echo "⚠️ DTB Hatası"

      - name: 9. Paketleme
        run: |
          cd ${{ github.workspace }}/AnyKernel3
          COMMON="${{ github.workspace }}/common"
          CLANG_BIN="${COMMON}/prebuilts/clang/host/linux-x86/clang-r487747c/bin"
          
          mkdir -p modules/vendor/lib/modules
          cp ${COMMON}/out/arch/arm64/boot/Image . || exit 1
          
          DTBO_FILES=$(find ${COMMON}/out -name "*.dtbo")
          if [ -n "$DTBO_FILES" ]; then
            if [ -f "${COMMON}/scripts/dtc/mkdtboimg.py" ]; then
              python3 ${COMMON}/scripts/dtc/mkdtboimg.py create dtbo.img $DTBO_FILES
            else
              cat $DTBO_FILES > dtbo.img
            fi
          fi
          
          find ${COMMON}/out -name "*.dtb" ! -name "*.dtbo" -exec cat {} + > dtb 2>/dev/null || true
          find ${COMMON}/out -name "*.ko" -exec ${CLANG_BIN}/llvm-strip --strip-debug {} \;
          find ${COMMON}/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \;
          
          zip -r9 "${{ github.workspace }}/CG-Houji-Official-Final.zip" ./* -x .git*

      - name: 11. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Houji-Final-${{ github.run_id }}
          name: "Xiaomi 14 (HOUJI) Final"
          files: ${{ github.workspace }}/CG-Houji-Official-Final.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
