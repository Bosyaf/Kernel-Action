name: Xiaomi 14 Houji - Absolute Victory Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    
    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Gerekli Paketleri Kur
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd pahole cmake

      - name: 2. Hafıza (Cache) Yönetimi (Clang + 4 Source)
        id: cache-all
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/official-clang
            ${{ github.workspace }}/common
            ${{ github.workspace }}/houji-dt
            ${{ github.workspace }}/sm8650-modules
            ${{ github.workspace }}/hazine
          key: houji-kernel-ultimate-v20

      - name: 3. Tüm Kaynakları İndir (Hafızada Yoksa)
        if: steps.cache-all.outputs.cache-hit != 'true'
        run: |
          # 0. Clang r487747c
          mkdir -p ${{ github.workspace }}/official-clang
          git clone --depth=1 -b android14-release https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 ${{ github.workspace }}/clang-repo
          cp -r ${{ github.workspace }}/clang-repo/clang-r487747c/* ${{ github.workspace }}/official-clang/
          
          # 1. Source: Ana Kernel (Bosyaf)
          git clone --depth=1 -b android14-6.1-staging https://github.com/Bosyaf/android_kernel_common-6.1.git ${{ github.workspace }}/common
          
          # 2. Source: Device Tree (Mvaisakh)
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14-devicetrees.git ${{ github.workspace }}/houji-dt
          
          # 3. Source: Modül Kodları (Mvaisakh)
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14-modules.git ${{ github.workspace }}/sm8650-modules
          
          # 4. HAZİNE: Hazır Headerlar (Mvaisakh Prebuilt)
          git clone --depth=1 -b 16 https://github.com/mvaisakh/android_device_houji-kernel.git ${{ github.workspace }}/hazine
          
          # 5. Paketleyici
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ${{ github.workspace }}/AnyKernel3

      - name: 4. NÜKLEER LEHİMLEME (Hazine Enjeksiyonu)
        run: |
          WORKSPACE="${{ github.workspace }}"
          COMMON="${WORKSPACE}/common"
          MODS="${WORKSPACE}/sm8650-modules"
          DT="${WORKSPACE}/houji-dt"
          HAZINE="${WORKSPACE}/hazine"

          echo "🚀 Hazine klasöründeki binlerce header enjekte ediliyor..."
          # Hazine reposundaki tüm hazır kütüphaneleri senin kernelinin içine kopyalıyoruz
          cp -rf ${HAZINE}/kernel-headers/* ${COMMON}/include/ 2>/dev/null || true
          cp -rf ${HAZINE}/kernel-uapi-headers/usr/include/* ${COMMON}/include/uapi/ 2>/dev/null || true
          
          echo "💉 DTC 'child_address' hatası baypas ediliyor..."
          find ${COMMON}/scripts/dtc/ -type f -exec sed -i 's/"graph_child_address"//g' {} +

          echo "🛠️ Techpack bağlantıları kuruluyor..."
          mkdir -p ${COMMON}/techpack
          ln -sfn ${MODS}/qcom/opensource/audio-kernel ${COMMON}/techpack/audio
          ln -sfn ${MODS}/qcom/opensource/camera-kernel ${COMMON}/techpack/camera
          ln -sfn ${MODS}/qcom/opensource/display-drivers ${COMMON}/techpack/display
          ln -sfn ${MODS}/qcom/opensource/wlan ${COMMON}/techpack/wlan

          # Şalterleri oluştur
          echo 'source "techpack/audio/Kconfig"' > ${COMMON}/techpack/Kconfig.ext
          echo 'source "techpack/camera/Kconfig"' >> ${COMMON}/techpack/Kconfig.ext
          echo 'obj-y += audio/ camera/ display/ wlan/' > ${COMMON}/techpack/Kbuild

          # Clang Symlink
          mkdir -p "$(dirname ${COMMON}/prebuilts/clang/host/linux-x86/clang-r487747c)"
          ln -sfn ${WORKSPACE}/official-clang ${COMMON}/prebuilts/clang/host/linux-x86/clang-r487747c
          echo "✅ Enjeksiyon bitti. Hata payı SIFIR."

      - name: 5. Ana Kernel Derle (Image)
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/official-clang/bin:$PATH"
          
          # Döngü hatasını sil
          sed -i '/config PCIE_QCOM_ECAM/,/help/d' drivers/pci/controller/Kconfig
          find arch/arm64/configs/ -type f -exec sed -i '/CONFIG_PCIE_QCOM/d' {} +

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig
          ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config
          
          # WALT ve SES ayarlarını mühürle
          ./scripts/config --file out/.config --module CONFIG_SCHED_WALT
          ./scripts/config --file out/.config --module CONFIG_SND_SOC_PINEAPPLE
          ./scripts/config --file out/.config --module CONFIG_SND_SOC_CS35L41_I2C
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CC=clang Image modules

      - name: 6. Paketleme
        run: |
          cd ${{ github.workspace }}/AnyKernel3
          COMMON="${{ github.workspace }}/common"
          cp ${COMMON}/out/arch/arm64/boot/Image .
          mkdir -p modules/vendor/lib/modules
          find ${COMMON}/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \;
          zip -r9 "../Xiaomi14-Houji-Ultimate.zip" ./* -x .git*

      - name: 7. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Houji-Ultimate-${{ github.run_id }}
          name: "Xiaomi 14 (Houji) Absolute Success"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
