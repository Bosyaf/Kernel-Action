name: Bosyaf (ZyC Clang 22)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd

          echo "🔥 Kusursuz Denge: ZyC Clang 22 (Eylül 2025 Sürümü - ARMv9-a Uyumlu)"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          echo "ZyC Clang 22 indiriliyor: $CLANG_URL"

          curl -fLSs "$CLANG_URL" -o clang.tar.gz || { echo "HATA: Clang URL'si patlak (404)!"; exit 1; }

          echo "Arşiv Çıkarılıyor..."
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz

          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> "$GITHUB_PATH"
          echo "✅ Clang İndirildi ve PATH'e eklendi!"

      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/Bosyaf/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/Bosyaf/android_kernel_common-6.1.git --depth=1 common

      - name: 3. KernelSU-Next Kurulumu (pershoot/dev-susfs)
        run: |
          cd common
          echo "📦 KernelSU-Next kuruluyor..."
          curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs

      - name: 3.5. Multi-Manager Desteği
        run: |
          cd common/KernelSU-Next
          echo "🔥 Multi-manager patchi uygulanıyor..."
          patch -p1 --forward < "$GITHUB_WORKSPACE/patches/ksu/ksun-add-more-managers-support.patch" || echo "⚠️ Başarısız"
          echo "✅ KowSU, MKSU, VortexSU, ReSukiSU desteği eklendi!"

      - name: 4. SUSFS4KSU Kurulumu (gki-android14-6.1-dev)
        run: |
          cd common
          echo "📦 SUSFS4KSU kuruluyor..."
          git clone --depth=1 -q https://gitlab.com/pershoot/susfs4ksu -b gki-android14-6.1-dev susfs4ksu

          echo "📦 SUSFS dosyaları kopyalanıyor..."
          cp -R susfs4ksu/kernel_patches/fs/* ./fs/
          cp -R susfs4ksu/kernel_patches/include/* ./include/

          echo "📦 Patch dosyaları listesi:"
          ls -la susfs4ksu/kernel_patches/*.patch

          echo "📦 SUSFS patch uygulanıyor..."
          SUSFS_PATCH=$(ls susfs4ksu/kernel_patches/50_add_susfs*.patch 2>/dev/null | head -1)
          if [ -n "$SUSFS_PATCH" ]; then
            echo "  → Uygulanıyor: $(basename "$SUSFS_PATCH")"
            patch -p1 < "$SUSFS_PATCH" || true
          else
            echo "  ⚠️ Patch dosyası bulunamadı, atlanıyor..."
          fi

          echo "📦 namespace.c SUSFS patch uygulanıyor..."
          wget -q "https://raw.githubusercontent.com/Bosyaf/Kernel-Action/main/fs_namespace.patch" -O fs_namespace.patch || \
          curl -LSs "https://raw.githubusercontent.com/Bosyaf/Kernel-Action/main/fs_namespace.patch" -o fs_namespace.patch

          if [ -f fs_namespace.patch ]; then
            patch -p1 < fs_namespace.patch || true
            echo "  ✅ Uygulandı"
          else
            echo "  ⚠️ Patch bulunamadı"
          fi
          rm -f fs_namespace.patch
          
          echo "🛡️ SUSFS Dentry Check Fix (Canlı Yama) Uygulanıyor..."
          sed -i 's/return (base->d_inode->i_mapping->flags & BIT_ANDROID_DATA_ROOT_DIR);/return (base \&\& !IS_ERR(base) \&\& base->d_inode \&\& (base->d_inode->i_mapping->flags \& BIT_ANDROID_DATA_ROOT_DIR));/g' fs/susfs.c
          sed -i 's/return (base->d_inode->i_mapping->flags & BIT_ANDROID_SDCARD_ROOT_DIR);/return (base \&\& !IS_ERR(base) \&\& base->d_inode \&\& (base->d_inode->i_mapping->flags \& BIT_ANDROID_SDCARD_ROOT_DIR));/g' fs/susfs.c
          echo "  ✅ Canlı Yama Başarılı!"

          find . -name "*.rej" -delete 2>/dev/null || true

      - name: 4.5. KernelSU-Next Multi Manager Patch
        run: |
          cd common
          echo "📦 Multi Manager patch'i uygulanıyor..."
          if [ -f "KernelSU-Next/ksu-add-more-managers-support.patch" ]; then
            patch -p1 < KernelSU-Next/ksu-add-more-managers-support.patch || true
          fi

          echo "📦 SUSFS symbol fix uygulanıyor..."
          if [ -f "drivers/kernelsu/supercalls.c" ]; then
            sed -i 's/#ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME/#if 0 \/\/ DISABLED to fix build \*\//' drivers/kernelsu/supercalls.c || true
          fi

          echo "📦 AVC spoof fix uygulanıyor..."
          if [ -f "drivers/kernelsu/extras.c" ]; then
            if grep -q "susfs_avc_log_spoofing_key_true" drivers/kernelsu/extras.c; then
              if ! grep -q "__attribute__((weak))" drivers/kernelsu/extras.c; then
                printf '\n#ifdef CONFIG_KSU_SUSFS\n#ifndef susfs_avc_log_spoofing_key_true\n__attribute__((weak))\nstruct static_key_true susfs_avc_log_spoofing_key_true = STATIC_KEY_TRUE_INIT;\n#endif\n#endif\n' >> drivers/kernelsu/extras.c
              fi
            fi
          fi

      - name: 5. Wi-Fi ve Asya Yamaları
        run: |
          cd common
          curl -fLSs https://github.com/OnePlus-12-Development/android_kernel_qcom_sm8650/commit/3e0cb08.patch > wifi.patch || true
          if [ -s wifi.patch ] && grep -q "diff" wifi.patch; then
            patch -p1 --forward < wifi.patch || true
          fi
          rm -f wifi.patch

          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash || true
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' security/Kconfig || true

      - name: 5.5. Özel Performans (Bosyaf Patches)
        run: |
          cd common
          echo "🔥 Repo içerisindeki özel yamalar uygulanıyor..."

          PATCH_DIR="../patches"

          if [ ! -d "$PATCH_DIR" ]; then
            echo "❌ HATA: $PATCH_DIR dizini bulunamadı!"
          else
            for patch_file in "$PATCH_DIR"/*.patch; do
              filename=$(basename "$patch_file")
              echo "----------------------------------------------------"
              echo "📦 İşleniyor: $filename"

              if [ "$filename" == "susfs_dentry_checks.patch" ]; then
                echo "⚠️ SUSFS ekstra yaması algılandı, entegre ediliyor..."
              fi

              if patch -p1 --forward < "$patch_file"; then
                echo "✅ BAŞARILI: $filename"
              else
                echo "❌ ATLANDI: $filename"
              fi
            done
            echo "----------------------------------------------------"
            echo "🎉 Özel yamalar tamamlandı!"
          fi

      - name: 6. Full Kernel Config & Derleme Hazırlığı
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          sed -i 's/^PHONY += all/  /g' Makefile || true
          touch .scmversion

          cat << 'EOF' > scripts/check-local-export
          #!/bin/sh
          exit 0
          EOF
          chmod +x scripts/check-local-export

          mkdir -p out
          [ -x ./scripts/config ] || chmod +x ./scripts/config || true

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            gki_defconfig

          CONFIG_FILE="out/.config"

          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_CMDLINE "console=ttynull stack_depot_disable=on kvm-arm.mode=protected bootconfig noirqdebug nosoftlockup nmi_watchdog=0 quiet kasan.page_alloc.sample=0 kasan.stacktrace=off kasan=off slub_debug=- page_owner=off"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CMDLINE_EXTEND
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_100
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_250
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HZ_300
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_1000
          ./scripts/config --file $CONFIG_FILE --set-val CONFIG_HZ 300
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_NONE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_VOLUNTARY
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NO_HZ_IDLE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_NO_HZ_FULL
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_SCHED_SMT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_CLUSTER
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_THERMAL_GOV_FAIR_SHARE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_GOV_STEP_WISE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_GOV_POWER_ALLOCATOR
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_THERMAL_DEFAULT_GOV_STEP_WISE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_DEFAULT_GOV_POWER_ALLOCATOR
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_NUMA_BALANCING
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LTO_CLANG_FULL
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_REDUCED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_COMPRESSED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_SPLIT
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF4
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF5
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP_NF_TARGET_TTL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP6_NF_TARGET_HL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP6_NF_MATCH_HL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_ADVANCED
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_NET_SCH "fq_codel"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_BBG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TMPFS_POSIX_ACL

          # ========== KERNELSU & SUSFS CONFIG'LERI ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_KSTAT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SPOOF_UNAME
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_OPEN_REDIRECT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_ENABLE_LOG
          # ========== KERNELSU & SUSFS CONFIG'LERI BITIS ==========

          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Bosyaf+"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCALVERSION_AUTO

          sed -i 's/check_defconfig//' build.config.gki || true

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            olddefconfig

      - name: 7. Kernel Derleme (NÜKLEER MOD - HATA TANIMAZ)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          # KCFLAGS içine '-Wno-error' ekledim.
          # Bu şu demek: "Ne hata bulursan bul, sadece uyar ama derlemeyi DURDURMA, o Zip'i bana ver!"

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 \
            -march=armv9.2-a+crypto+crc+dotprod+rcpc+lse+sha3 \
            -falign-functions=32 \
            -fomit-frame-pointer \
            -fstack-protector \
            -fno-unwind-tables \
            -fno-asynchronous-unwind-tables \
            -ftrivial-auto-var-init=uninitialized \
            -fno-semantic-interposition \
            -fno-math-errno \
            -Wno-unused-command-line-argument \
            -Wno-error \
            -Wno-format \
            -Wno-format-extra-args \
            -Wno-constant-logical-operand \
            -Wno-unused-variable \
            -Wno-address-of-packed-member" \
            KBUILD_LDFLAGS="--as-needed \
            --strip-debug \
            --hash-style=gnu \
            -O2" \
            Image || { echo "❌ Derleme HATASI!"; exit 1; }

          echo "BOOTHASH=Bosyaf-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: 8. AnyKernel3 (Sadece Image Paketleme)
        run: |
          cd ./AnyKernel3
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../Bosyaf.zip" ./*

      - name: 9. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Bosyaf Kernel (ZyC Clang 22)"
          body: |
            # ✦ Bosyaf Kernel

            **Bosyaf Kernel**, Xiaomi 14 Serisi için hazırlanmış, Android 14 GKI 6.1-staging tabanı üzerine inşa edilmiş özel bir çekirdektir.  
            Bu çalışma; kararlılık, süreklilik, termal denge, güçlü root gizleme ve yüksek günlük akıcılığı tek bir çatı altında birleştirmeyi hedefleyen, ölçülü ve seçici bir mühendislik yaklaşımının ürünüdür.

            Bu çekirdek; rastgele yama kalabalığıyla ağırlaştırılmış bir deneme yapısı değildir. Aksine, temiz bir kaynak temeli korunarak yalnızca gerçekten anlamlı görülen scheduler, termal, ağ ve root gizleme iyileştirmeleri dikkatle işlenmiştir. Nihai amaç; Xiaomi 14 Serisi üzerinde uzun süreli kullanımlarda dengesini koruyan, oyun sırasında karakterini kaybetmeyen ve günlük kullanımda rafine hissettiren bir sistem sunmaktır.

            ━━━━━━━━━━━━━━━━━━
            📱 Taban ve Desteklenen Cihazlar
            ━━━━━━━━━━━━━━━━━━
            • Taban: **Android 14 GKI 6.1-staging**  
            • Desteklenen cihazlar:
              - Xiaomi 14 (**houji**)
              - Xiaomi 14 Pro (**shennong**)
              - Xiaomi 14 Ultra (**aurora**)

            Bu çekirdek, doğrudan Xiaomi 14 serisi düşünülerek hazırlanmıştır. Hedef; çok geniş bir cihaz yelpazesine dağılmak değil, aynı donanım ailesi üzerinde daha tutarlı ve daha rafine bir davranış elde etmektir.

            ━━━━━━━━━━━━━━━━━━
            🧠 Scheduler ve Sistem Akıcılığı
            ━━━━━━━━━━━━━━━━━━
            • Çekirdek zamanlayıcısı, düşük gecikme ve yüksek genel akıcılık gözetilerek düzenlenmiştir.  
            • İşlemci üzerindeki gereksiz scheduler yükleri azaltılmış, görev yerleşim mantığı daha temiz hâle getirilmiştir.  
            • Cluster farkındalığı korunarak görevlerin uygun işlemci kümelerine yerleştirilmesi hedeflenmiştir. Bu yaklaşım, modern mobil CPU topolojisinde daha tutarlı görev dağılımı ve daha düzenli önbellek davranışı sağlar.  
            • Boş çekirdek arama yolundaki gereksiz tekrarlar azaltılmıştır. Bu küçük görünen düzenleme, yoğun görev geçişlerinde sistem davranışını daha temiz hâle getirir.  
            • IRQ tarafındaki gereksiz uyarı gürültüsü düşürülerek çalışma anındaki log karmaşası azaltılmıştır.

            Bu katmanın temel amacı; agresif ama dengesiz davranan bir yapı kurmak değil, sistemin görev yerleşimini daha ölçülü, daha verimli ve daha rafine hâle getirmektir.

            ━━━━━━━━━━━━━━━━━━
            🎮 Oyun ve Uzun Oturum Dengesi
            ━━━━━━━━━━━━━━━━━━
            Bosyaf Kernel, ilk dakikalarda etkileyici görünüp uzun kullanımda düzenini kaybeden “patlama odaklı” çekirdek yaklaşımını benimsemez.

            Bunun yerine hedeflenen yapı:
            • kısa süreli gösterişli yükselişler yerine uzun oturum kararlılığı  
            • ilk tepki kadar sürdürülebilir frametime düzeni  
            • arka planda gereksiz yük taşımayan temiz ön plan performansı  
            • ısındığında karakterini bir anda kaybetmeyen kontrollü bir sistem davranışı

            Bu nedenle scheduler, termal ve runtime tarafındaki kararlar yalnızca ilk etki için değil; cihaz yük altında kaldığında da kalitesini koruyabilmesi için alınmıştır.

            ━━━━━━━━━━━━━━━━━━
            🌡️ Termal Politika
            ━━━━━━━━━━━━━━━━━━
            Termal davranış tarafında özellikle kaba ve kör müdahalelerden kaçınılmıştır.

            • **fair_share** yaklaşımı devre dışı bırakılmıştır.  
              Bunun temel nedeni, yük altında performansı gereğinden sert ve dengesiz biçimde kesebilmesidir.

            • **step_wise** sistemde açık tutulmuştur.  
              Bu tercih performans için değil, cihaz güvenliği ve koruma tarafının tamamen terk edilmemesi içindir.

            • Varsayılan termal yapı olarak **power_allocator** tercih edilmiştir.  
              Bu, Bosyaf Kernel’in termal karakterini belirleyen başlıca kararlarından biridir. Yük altında daha akıllı güç bütçesi oluşturur, ani ve kaba performans kaybı yerine daha dengeli bir davranış hedefler.

            Özetle bu yapı:
            • gereksiz sert performans düşüşlerini azaltır  
            • koruma mekanizmasını tamamen ortadan kaldırmaz  
            • uzun yük altında daha olgun ve daha modern bir termal davranış sunar

            Bu yaklaşım özellikle uzun oyun oturumlarında önemlidir; çünkü asıl kalite, cihaz ısındığında nasıl davrandığında ortaya çıkar.

            ━━━━━━━━━━━━━━━━━━
            🌐 Ağ Yığını
            ━━━━━━━━━━━━━━━━━━
            Ağ tarafı yalnızca “çalışsın” mantığıyla bırakılmamış, bilinçli şekilde düzenlenmiştir.

            • **BBRv3** entegre edilmiştir.  
              Bu sayede özellikle dengesiz bağlantılar ve bufferbloat içeren ortamlarda daha modern bir tıkanıklık kontrolü elde edilir.

            • Varsayılan kuyruk disiplini olarak **fq_codel** tercih edilmiştir.  
              Bu tercih, gecikme sıçramalarını azaltmak ve mobil ağ trafiğini daha disiplinli yönetmek için yapılmıştır.

            • Bu çekirdek tabanı için gerekli görülen **Wi‑Fi uyumluluk düzeltmesi** de uygulanmıştır.

            Ağ yapılandırmasının hedefi:
            • yük altında daha düşük gecikme  
            • daha düzenli kuyruk davranışı  
            • çevrim içi oyunlarda daha temiz tepki  
            • günlük internet kullanımında daha kararlı bir his

            ━━━━━━━━━━━━━━━━━━
            🛡️ Root Gizleme ve Güvenlik Katmanı
            ━━━━━━━━━━━━━━━━━━
            Bosyaf Kernel’de root gizleme tarafı, sonradan iliştirilmiş yüzeysel bir ek değildir; tasarımın doğrudan parçasıdır.

            • **KernelSU-Next** entegre edilmiştir.  
            • **SUSFS4KSU** entegre edilmiştir.  
            • Çoklu manager desteği uygulanmıştır. Bu yapı aşağıdaki ekosistemlerle uyumluluk hedefler:
              - KernelSU Next
              - KowSU
            • **Baseband-Guard** güvenlik katmanı sisteme dahil edilmiştir.  
              Bu tercih, root ortamı sağlanırken kritik alanların başıboş bırakılmaması gerektiği anlayışına dayanır.

            • Derleme sürecinde ek güvenlik düzeltmeleri uygulanarak dosya yolu ve dentry kontrolleri daha güvenli hâle getirilmiştir.

            Bu bölümün amacı yalnızca root yetkisi vermek değildir. Asıl amaç:
            • güçlü root gizleme  
            • gelişmiş spoofing davranışı  
            • çoklu manager uyumluluğu  
            • daha güvenli ve daha disiplinli bir root ortamı

            Kısacası Bosyaf Kernel, root tarafını güç ile birlikte ciddiyetle ele alır.

            ━━━━━━━━━━━━━━━━━━
            🧹 Runtime Temizliği
            ━━━━━━━━━━━━━━━━━━
            Çalışma anında sisteme yük bindiren gereksiz mekanizmalar mümkün olduğunca sadeleştirilmiştir.

            • Ağır debug ve izleme davranışları günlük kullanım ve oyun senaryolarını yormayacak şekilde sınırlandırılmıştır.  
            • Konsol ve log gürültüsü temizlenerek sistemin gerçek iş yüküne daha fazla kaynak ayırması sağlanmıştır.  
            • Bellek ayırıcı ve sayfa izleme tarafındaki gereksiz yükler azaltılmıştır.  
            • Sistem, kendini sürekli raporlayan bir yapı olmaktan çıkarılıp yaptığı işe odaklanan bir yapıya yaklaştırılmıştır.

            Bu katmanın temel yaklaşımı nettir:  
            **gösteriş için çalışan bir sistem değil, doğrudan işini yapan bir sistem.**

            ━━━━━━━━━━━━━━━━━━
            🧬 Derleme Yaklaşımı (ZyC Clang 22)
            ━━━━━━━━━━━━━━━━━━
            Derleme tarafında sıradan araçlar yerine, saf performansa odaklanan modern ve özelleştirilmiş bir araç zinciri kullanılmıştır.

            • Çekirdek; standart derleyiciler yerine, `ARMv9.2-a` komut setlerinden maksimum verim alabilmek için doğrudan **ZyC Clang 22.0.0** ile derlenmiştir.  
            • Optimizasyon yaklaşımı, aşırı saldırgan ama dengesiz bir yol yerine; kararlılığı bozmadan yüksek verim üreten (-O2) bir çizgide tutulmuştur.  
            • Bağlayıcı (Linker) olarak **ld.lld** tercih edilmiş ve **ThinLTO** kullanılarak bağlantı aşamasında daha temiz, daha düzenli ve daha verimli bir yapı hedeflenmiştir.  
            • Gereksiz debug yükü nihai imajdan tamamen temizlenmiştir.

            Buradaki temel anlayış:
            • rastgele agresiflik yerine bilinçli optimizasyon  
            • nicelik yerine nitelik  
            • hız uğruna dengeyi feda etmeyen bir derleme politikası

            ━━━━━━━━━━━━━━━━━━
            ✦ Genel Yaklaşım
