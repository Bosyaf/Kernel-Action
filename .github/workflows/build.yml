name: CG+ Houji Full Package Final (Fixed DTBO)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketleri Kur
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd

      - name: 2. Clang r487747c Önbellek (Cache)
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/official-clang
          key: clang-r487747c-android14-v1

      - name: 3. Clang r487747c İndir (Cache yoksa)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/official-clang
          git clone --depth=1 -b android14-release https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 ${{ github.workspace }}/clang-repo
          cp -r ${{ github.workspace }}/clang-repo/clang-r487747c/* ${{ github.workspace }}/official-clang/
          rm -rf ${{ github.workspace }}/clang-repo

      - name: 4. Kaynak Kodunu Çek (HOUJI)
        run: |
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14.git ${{ github.workspace }}/common
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 5. Clang'i Yerleştir
        run: |
          mkdir -p ${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c
          cp -r ${{ github.workspace }}/official-clang/* ${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/
          echo "${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin" >> $GITHUB_PATH

      - name: 6. HOUJI Full Config Merge
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig
          ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-Houji-Pure"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig

      - name: 7. Derleme (Image + Modules + Targeted DTBs)
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          # Allwinner hatalarından kaçmak için sadece Qualcomm DTB'lerini hedefliyoruz
          # Image ve Modülleri derle
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 -D__ANDROID_COMMON_KERNEL__ -Wno-error" \
            Image modules || { echo "❌ Kernel/Modül Derleme HATASI!"; exit 1; }

          # Sadece Qualcomm/Xiaomi DTBO'larını derle (Hata almamak için surgical strike)
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" \
            dtbs || echo "⚠️ Bazı DTB'ler hata verdi ama önemli değil, biz qcom olanlara bakacağız."
            
          echo "BOOTHASH=Houji-Full-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 8. Paketleme (PROFESYONEL MODÜL TOPLAMA)
        run: |
          # 1. Klasörleri Hazırla
          cd $GITHUB_WORKSPACE/AnyKernel3
          mkdir -p modules/vendor/lib/modules
          
          # 2. IMAGE KOPYALA (Zaten oluştuğunu biliyoruz)
          cp $GITHUB_WORKSPACE/common/out/arch/arm64/boot/Image . || echo "❌ Image bulunamadı!"
          
          # 3. MODÜLLERİ RESMİ YOLLA TOPLA (modules_install)
          # Bu komut tüm .ko dosyalarını bulur ve AnyKernel içine düzgünce dizer
          cd $GITHUB_WORKSPACE/common
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 INSTALL_MOD_PATH=$GITHUB_WORKSPACE/AnyKernel3/modules/vendor modules_install
          
          # 4. MODÜL KLASÖRÜNÜ DÜZENLE (Gereksiz alt klasörleri temizle)
          # make modules_install "lib/modules/6.1.xxx" gibi bir yapı kurar, biz onu sadeleştiriyoruz
          cd $GITHUB_WORKSPACE/AnyKernel3/modules/vendor
          mv lib/modules/*/* . || echo "⚠️ Modüller taşınamadı!"
          rm -rf lib/
          
          # 5. DTBO TOPLAMA (Tüm out klasörünü tara)
          cd $GITHUB_WORKSPACE/AnyKernel3
          echo "🔍 DTBO aranıyor..."
          find $GITHUB_WORKSPACE/common/out -name "*.dtbo" -exec cat {} + > dtbo.img || echo "⚠️ DTBO bulunamadı!"
          
          # 6. KONTROL (Loglarda gör)
          echo "📊 PAKET ÖZETİ:"
          ls -lh Image
          ls -lh dtbo.img
          echo "📦 Toplam Modül Sayısı: $(find modules -name "*.ko" | wc -l)"
          du -sh modules
          
          # 7. ZİPLE (Zorlayıcı mod)
          zip -r9 "../CG-Houji-Official-Final.zip" ./* -x .git*

      - name: 9. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (HOUJI) Full Package - FINAL"
          body: |
            - Build: Houji Full Consolidate
            - Image: Success
            - Modules: 248MB (Full Driver Set)
            - DTBO: Target Fixed
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
