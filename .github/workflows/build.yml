name: CG+ Xiaomi 14 (HOUJI) Official Clang r584948 Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve Kaynak Kodunu Çek
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          
          # Kaynağı çek (Xiaomi 14 kplatform)
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14.git $GITHUB_WORKSPACE/common
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 2. Resmi Google Clang r584948 Kurulumu
        run: |
          echo "🔥 Resmi Google Clang r584948 indiriliyor..."
          
          # Kaynağın build.config dosyalarındaki yapıyı bozmamak için:
          # Clang r584948 sürümünü senin verdiğin mirror branch'inden çekiyoruz.
          mkdir -p $GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86
          
          git clone --depth=1 -b mirror-goog-main-llvm-toolchain-source https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 $GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-temp
          
          # Sadece r584948 klasörünü asıl yere taşıyoruz
          mv $GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-temp/clang-r584948 $GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c
          
          # Not: Source içinde CLANG_VERSION=r487747c yazdığı için klasör adını öyle yaptık 
          # ki sistem derleyiciyi otomatik bulsun.
          
          echo "$GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin" >> $GITHUB_PATH

      - name: 3. HOUJI Full (Consolidate) Config Hazırlığı
        run: |
          cd $GITHUB_WORKSPACE/common
          export PATH="$GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          # 1. Temel GKI
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            gki_defconfig
          
          # 2. Houji Consolidate Merge (Full Xiaomi Mühendisliği)
          LLVM=1 LLVM_IAS=1 ARCH=arm64 ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config
          
          # 3. İsimlendirme ve Temizlik
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-Houji-Official-r584948"
          
          # 4. Final Kontrol
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            olddefconfig

      - name: 4. Derleme (Güvenli Mod -O2)
        run: |
          cd $GITHUB_WORKSPACE/common
          export PATH="$GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          # Derlemeyi başlat (Image + DTBO)
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            CC="clang" \
            LD="ld.lld" \
            AR="llvm-ar" \
            NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" \
            OBJDUMP="llvm-objdump" \
            STRIP="llvm-strip" \
            KCFLAGS="-O2 -D__ANDROID_COMMON_KERNEL__" \
            Image dtbo.img
            
          echo "BOOTHASH=Houji-r584948-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 5. Paketleme
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Houji Official Clang 584948/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          [ -f ../common/out/arch/arm64/boot/dtbo.img ] && cp ../common/out/arch/arm64/boot/dtbo.img .
          
          zip -r "../CG-Houji-Official-r584948.zip" ./*

      - name: 6. Release (Yayınla)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (HOUJI) Clang r584948 Official Build"
          body: |
            - Build: Houji Full Consolidate
            - Compiler: Google Clang r584948 (mirror-goog-main)
            - Optimization: -O2
            - Note: Pure source build, no custom mods.
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
