name: Bosyaf Pure Test (Xiaomi 14)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "bos"
      KBUILD_BUILD_HOST: "yaf"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          echo "🔥 ZyC Clang 22 - ARMv9-a Optimized"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> "$GITHUB_PATH"
      - name: 2. Kendi Kaynağını Çek (Bosyaf/my_work)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone https://github.com/Bosyaf/my_work.git --depth=1 common
      - name: 3. Full Kernel Config & Donanım Fixleri
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          mkdir -p out
          
          # 1. GKI Defconfig oluştur
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 gki_defconfig
          
          CONFIG_FILE="out/.config"
          
          # 3. Temel Performans ve Akıcılık Ayarları (Senin Tercihlerin)
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_CMDLINE "console=ttynull stack_depot_disable=on kvm-arm.mode=protected bootconfig noirqdebug nosoftlockup nmi_watchdog=0 quiet kasan.page_alloc.sample=0 kasan.stacktrace=off kasan=off slub_debug=- page_owner=off workqueue.power_efficient=y kmemleak=off debug_guardpage_minorder=0"
          # DRM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM_MIPI_DSI
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM_KMS_HELPER
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM_TTM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM_GEM_SHMEM_HELPER
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM_PANEL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM_BRIDGE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM_PANEL_BRIDGE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM_PANEL_ORIENTATION_QUIRKS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DRM_NOMODESET
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_FB_CMDLINE

          # DRM Disable
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_DEBUG_MM
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_KUNIT_TEST
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_DEBUG_DP_MST_TOPOLOGY_REFS
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_DEBUG_MODESET_LOCK
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_LOAD_EDID_FIRMWARE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_MSM
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_TEGRA
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_CDNS_DSI
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_CHIPONE_ICN6211
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_CHRONTEL_CH7033
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_DISPLAY_CONNECTOR
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_PANEL_MIPI_DBI
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_SIMPLEDRM
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DRM_LEGACY
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_FB

          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Voronwe+"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCALVERSION_AUTO

          # Bağımlılıkları çöz ve .config'i güncelle
          yes "" | make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

          
          # 4. Final Config Hazırlığı
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig
      - name: 4. Kernel Derleme (Image Üretimi)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 -march=armv9.2-a+crypto+crc+dotprod+rcpc+lse -Wno-error" \
            Image
            
          echo "BOOTHASH=Bosyaf-Test-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV
      - name: 5. AnyKernel3 (Paketleme)
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Bosyaf Pure Test - Xiaomi 14/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          # houji (Xiaomi 14) için slot ayarı
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../Bosyaf_Pure_Image.zip" ./*
      - name: 6. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Bosyaf Pure Image (SM8650)"
          files: "Bosyaf_Pure_Image.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          
