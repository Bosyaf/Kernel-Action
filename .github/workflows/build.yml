name: Build Xiaomi MI 14 (houji) Kernel

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel (pineapple / houji)
    runs-on: ubuntu-22.04

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git curl wget python3 python3-pip \
            bc bison flex libssl-dev libelf-dev \
            libncurses-dev make gcc g++ \
            cpio zip unzip tar xz-utils \
            zlib1g-dev libc6-dev-i386 \
            binutils-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu

      # 1) Kernel source
      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            --branch kplatform \
            https://github.com/Bosyaf/xiaomi14.git \
            kernel_src

      # 2) Device trees & Audio Bindings Fix
      - name: Clone device trees
        run: |
          git clone --depth=1 \
            https://github.com/Bosyaf/xiaomi14-devicetrees.git \
            sm8650-devicetrees

          # Vendor dizinini temizle ve hazırla
          cd kernel_src/arch/arm64/boot/dts
          rm -rf vendor
          cp -a "$GITHUB_WORKSPACE/sm8650-devicetrees" vendor

          # --- AUDIO BINDINGS FIX ---
          # Hata: 'bindings/qcom,audio-ext-clk.h' bulunamıyordu.
          # Çözüm: Include dizinini 'bindings' adıyla linkliyoruz.
          if [ -d "vendor/qcom/audio" ]; then
            cd vendor/qcom/audio
            mkdir -p bindings
            # İçerideki tüm dt-bindings dosyalarını bindings klasörüne linkle veya direkt klasörü linkle
            ln -sf include/dt-bindings/* bindings/
            echo "Audio bindings fix applied."
            cd ../../../../../
          fi

      # 3) Clang toolchain
      - name: Download Clang r487747c
        run: |
          mkdir -p "$GITHUB_WORKSPACE/clang-r487747c"
          wget -q \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz" \
            -O clang.tar.gz
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-r487747c"

      # 4) Setup Path
      - name: Setup Path
        run: |
          echo "$GITHUB_WORKSPACE/clang-r487747c/bin" >> $GITHUB_PATH
          echo "/usr/aarch64-linux-gnu/bin" >> $GITHUB_PATH

      # 5) Kconfig hazırla
      - name: Prepare kernel config
        working-directory: kernel_src
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1

          # Temel GKI defconfig
          make O=out ARCH=$ARCH CC=$CC CROSS_COMPILE=$CROSS_COMPILE LLVM=1 LLVM_IAS=1 gki_defconfig

          # Merge configs
          ./scripts/kconfig/merge_config.sh -m -O out out/.config arch/arm64/configs/vendor/pineapple_GKI.config
          ./scripts/kconfig/merge_config.sh -m -O out out/.config arch/arm64/configs/vendor/houji_GKI.config
          ./scripts/kconfig/merge_config.sh -m -O out out/.config arch/arm64/configs/consolidate.fragment
          ./scripts/kconfig/merge_config.sh -m -O out out/.config arch/arm64/configs/vendor/pineapple_consolidate.config
          ./scripts/kconfig/merge_config.sh -m -O out out/.config arch/arm64/configs/vendor/houji_consolidate.config

          make O=out ARCH=$ARCH CC=$CC CROSS_COMPILE=$CROSS_COMPILE LLVM=1 LLVM_IAS=1 olddefconfig

      # 6) Kernel derle (DTC Include yolları eklendi)
      - name: Build kernel
        working-directory: kernel_src
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export LD=ld.lld
          export AR=llvm-ar

          # DTC_EXT_FLAGS: Derleyiciye eksik header dosyalarının yerini gösteriyoruz
          make -j$(nproc) \
            O=out \
            ARCH=$ARCH \
            CC=$CC \
            CROSS_COMPILE=$CROSS_COMPILE \
            LLVM=1 LLVM_IAS=1 \
            DTC_EXT_FLAGS="-i $(pwd)/arch/arm64/boot/dts/vendor/qcom/audio/include" \
            KCFLAGS="-I$(pwd)/arch/arm64/boot/dts/vendor/qcom/audio/include" \
            Image.gz \
            dtbs \
            modules \
            2>&1 | tee build.log

      # 7) Artifacts topla
      - name: Collect output artifacts
        run: |
          mkdir -p "$GITHUB_WORKSPACE/output"

          # Kernel image (Hata almamak için kontrol ekledik)
          if [ -f kernel_src/out/arch/arm64/boot/Image.gz ]; then
            cp kernel_src/out/arch/arm64/boot/Image.gz "$GITHUB_WORKSPACE/output/"
          fi

          # DTB / DTBO
          find kernel_src/out/arch/arm64/boot/dts -name "*.dtb" -o -name "*.dtbo" -exec cp {} "$GITHUB_WORKSPACE/output/" \;

          # Modüller
          if [ -d kernel_src/out/lib/modules ]; then
            mkdir -p "$GITHUB_WORKSPACE/output/modules"
            make -C kernel_src O=out ARCH=arm64 INSTALL_MOD_PATH="$GITHUB_WORKSPACE/output/modules" INSTALL_MOD_STRIP=1 modules_install || true
          fi

          cp kernel_src/build.log "$GITHUB_WORKSPACE/output/" || true

      # 8) Upload artifacts
      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi14-houji-kernel
          path: output/
          retention-days: 7
