name: Houji-Official-Source-Test

on:
  workflow_dispatch:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: 1. Paketleri Kur
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            git curl wget bc bison flex make rsync unzip zip cpio \
            libssl-dev libelf-dev zstd xz-utils python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi dwarves pahole

      - name: 2. Neutron Clang 17 İndir
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchain
          # Senin attığın SHA ve tarih bilgisine göre kesin link:
          CLANG_URL="https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/06032023/neutron-clang-06032023.tar.zst"
          curl -fLSs "$CLANG_URL" -o clang.tar.zst
          tar -I zstd -xf clang.tar.zst -C $GITHUB_WORKSPACE/toolchain
          rm clang.tar.zst
          echo "$GITHUB_WORKSPACE/toolchain/bin" >> $GITHUB_PATH

      - name: 3. Kaynakları Çek (3 Ayrı Repo)
        run: |
          mkdir -p $GITHUB_WORKSPACE/work
          cd $GITHUB_WORKSPACE/work

          # A) Kernel Source (MiCode)
          git clone --depth=1 -b shennong-u-oss https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git msm-kernel

          # B) Device Tree (Houji/Pineapple)
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14-devicetrees.git devicetrees

          # C) Vendor Modules/Headers
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14-modules.git modules

      - name: 4. Klasör Düzenini Hazırla (Xiaomi Symlink Uyumu)
        run: |
          cd $GITHUB_WORKSPACE/work
          
          # qcom/proprietary/devicetree yolunu ayarla
          mkdir -p qcom/proprietary
          # Repodaki qcom klasörünü ana qcom altına taşıyoruz
          cp -a devicetrees/qcom/proprietary/devicetree qcom/proprietary/

          # vendor/qcom/opensource yolunu ayarla
          mkdir -p vendor/qcom/opensource
          # Modules reposundaki opensource içeriğini buraya taşıyoruz
          cp -a modules/qcom/opensource/* vendor/qcom/opensource/

      - name: 5. Houji Config Merge (Pineapple Tabanlı)
        run: |
          cd $GITHUB_WORKSPACE/work/msm-kernel
          mkdir -p out
          
          # MiCode'un merge scriptini kullanarak config oluştur
          ./scripts/kconfig/merge_config.sh -m -r -y \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/consolidate.fragment \
            arch/arm64/configs/vendor/pineapple_consolidate.config \
            arch/arm64/configs/vendor/houji_consolidate.config

          mv .config out/.config
          
          # Toolchain yolunu tekrar belirtiyoruz build için
          export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            olddefconfig

      - name: 6. Derlemeyi Başlat (Image + DTBS)
        run: |
          cd $GITHUB_WORKSPACE/work/msm-kernel
          export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"
          
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            Image dtbs

      - name: 7. Çıktı Kontrolü
        run: |
          echo "=== IMAGE KONTROL ==="
          ls -lh $GITHUB_WORKSPACE/work/msm-kernel/out/arch/arm64/boot/Image || echo "❌ Image bulunamadı!"
          
          echo "=== DTB/DTBO KONTROL ==="
          find $GITHUB_WORKSPACE/work/msm-kernel/out/arch/arm64/boot/dts/vendor/qcom/ -name "*.dtb" -o -name "*.dtbo" || echo "⚠️ DTB/DTBO bulunamadı!"
