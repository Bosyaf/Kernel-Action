name: CG+ Houji Full Pure Engineering Final

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paket Kurulumu
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd pahole

      - name: 2. Clang Cache
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/official-clang
          key: clang-r487747c-android14-v3

      - name: 3. Clang İndir (Sadece Cache Yoksa)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/official-clang
          git clone --depth=1 -b android14-release https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 ${{ github.workspace }}/clang-repo
          cp -r ${{ github.workspace }}/clang-repo/clang-r487747c/* ${{ github.workspace }}/official-clang/
          rm -rf ${{ github.workspace }}/clang-repo

      - name: 4. Kaynak Kodlarını Çek
        run: |
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14.git ${{ github.workspace }}/common
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14-devicetrees.git ${{ github.workspace }}/houji-dt
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 5. Donanım Haritası ve Header Lehimleme
        run: |
          rm -rf ${{ github.workspace }}/common/arch/arm64/boot/dts/vendor
          mkdir -p ${{ github.workspace }}/common/arch/arm64/boot/dts/vendor
          cp -r ${{ github.workspace }}/houji-dt/* ${{ github.workspace }}/common/arch/arm64/boot/dts/vendor/
          
          rm -rf ${{ github.workspace }}/common/include/bindings
          rm -rf ${{ github.workspace }}/common/include/dt-bindings/bindings
          mkdir -p ${{ github.workspace }}/common/include/bindings
          mkdir -p ${{ github.workspace }}/common/include/dt-bindings
          
          cp -r ${{ github.workspace }}/houji-dt/bindings/* ${{ github.workspace }}/common/include/bindings/
          cp -r ${{ github.workspace }}/houji-dt/bindings/* ${{ github.workspace }}/common/include/dt-bindings/
          
          echo "obj-y += vendor/" >> ${{ github.workspace }}/common/arch/arm64/boot/dts/Makefile
          
          mkdir -p ${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c
          cp -r ${{ github.workspace }}/official-clang/* ${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/

      - name: 6. KÖK ÇÖZÜM - Stub Injection (Eksik Sembol Yaması)
        run: |
          echo "🔧 Eksik olan debug ve minidump fonksiyonları için içi boş köprüler (stub) oluşturuluyor..."
          
          cat << 'EOF' > ${{ github.workspace }}/common/drivers/soc/qcom/cg_stubs.c
          #include <linux/module.h>
          #include <linux/types.h>

          __attribute__((weak)) void crm_write_bw_vote(void) {}
          EXPORT_SYMBOL(crm_write_bw_vote);

          __attribute__((weak)) void *crm_get_device(void) { return NULL; }
          EXPORT_SYMBOL(crm_get_device);

          __attribute__((weak)) int gh_get_irq(void) { return 0; }
          EXPORT_SYMBOL(gh_get_irq);

          __attribute__((weak)) void gh_put_irq(void) {}
          EXPORT_SYMBOL(gh_put_irq);

          __attribute__((weak)) bool qcom_is_dma_buf_file(void *file) { return false; }
          EXPORT_SYMBOL(qcom_is_dma_buf_file);

          __attribute__((weak)) const char *debug_symbol_lookup_name(unsigned long addr) { return NULL; }
          EXPORT_SYMBOL(debug_symbol_lookup_name);

          __attribute__((weak)) bool debug_symbol_available(void) { return false; }
          EXPORT_SYMBOL(debug_symbol_available);

          __attribute__((weak)) void qcom_hwspinlock_bust(void *lock) {}
          EXPORT_SYMBOL(qcom_hwspinlock_bust);

          __attribute__((weak)) void crm_dump_regs(void) {}
          EXPORT_SYMBOL(crm_dump_regs);

          __attribute__((weak)) void crm_dump_drv_regs(void) {}
          EXPORT_SYMBOL(crm_dump_drv_regs);
          EOF
          
          # Bu sahte dosyayı kernelin derleme listesine ekliyoruz
          echo "obj-y += cg_stubs.o" >> ${{ github.workspace }}/common/drivers/soc/qcom/Makefile
          echo "✅ Bypass Yaması Tamam!"

      - name: 7. Config Merge ve Ayarlar
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig
          
          ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config
          
          CONFIG_FILE="out/.config"
          
          # --- GEREKSİZ DEBUG BİRİMLERİNİ KAPAT (Hafifletme) ---
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_MSM_MINIDUMP
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_QCOM_MINIDUMP
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_IPC_LOGGING
          
          # --- MEKANİĞİ SAĞLAMLAŞTIR ---
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_COMMAND_DB
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_RPMH
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_RPMHPD
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_SMEM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_SOCINFO
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_INTERCONNECT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HWSPINLOCK
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HWSPINLOCK_QCOM
          
          # --- SENİN KURALIN ---
          ./scripts/config --file $CONFIG_FILE --module CONFIG_SCHED_WALT
          ./scripts/config --file $CONFIG_FILE --module CONFIG_SCSI_UFS_QCOM
          ./scripts/config --file $CONFIG_FILE --module CONFIG_PHY_QCOM_UFS
          
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEBUG_INFO_BTF
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Houji-Pure"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig

      - name: 8. Derleme (Grand Finale)
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 -D__ANDROID_COMMON_KERNEL__ -Wno-error" \
            Image modules
          
          make -j$(nproc --all) -k O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" \
            DTC_FLAGS="-i ${{ github.workspace }}/common/arch/arm64/boot/dts/vendor/qcom -i ${{ github.workspace }}/common/include" \
            dtbs || echo "⚠️ Bazı DTB hataları atlandı."

      - name: 9. Paketleme
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          mkdir -p modules/vendor/lib/modules
          
          cp $GITHUB_WORKSPACE/common/out/arch/arm64/boot/Image . || exit 1
          
          find $GITHUB_WORKSPACE/common/out -name "*.dtbo" -exec cat {} + > dtbo.img
          
          find $GITHUB_WORKSPACE/common/out -name "*.ko" -exec $GITHUB_WORKSPACE/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin/llvm-strip --strip-debug {} \;
          find $GITHUB_WORKSPACE/common/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \;
          
          zip -r9 "../CG-Houji-Official-Final.zip" ./* -x .git*

      - name: 10. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Houji-Final-${{ github.run_id }}
          name: "Xiaomi 14 (HOUJI) Full Package - FINAL"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
