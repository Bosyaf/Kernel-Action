name: Xiaomi 14 Kernel Build

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Bağımlılıkları Kur
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            git git-lfs libelf-dev liblz4-tool libssl-dev \
            libxml2 lzop pngquant rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev \
            python3 python3-pip \
            libncurses5-dev libncursesw5-dev \
            cpio gzip

      - name: Git Yapılandırması
        run: |
          git config --global user.name "Kernel Builder"
          git config --global user.email "builder@github.com"

      - name: Repo Tool İndir ve Kaynak Kodları Çek
        run: |
          # Repo tool indir
          mkdir -p $HOME/bin
          curl -o $HOME/bin/repo https://storage.googleapis.com/git-repo-downloads/repo
          chmod a+x $HOME/bin/repo
          export PATH="$HOME/bin:$PATH"

          # Çalışma dizini oluştur
          mkdir -p kernel_workspace && cd kernel_workspace

          # Manifest dosyasını oluştur
          cat > default.xml << 'MANIFESTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <remote fetch="https://git.codelinaro.org/clo/la" name="clo-la"/>
            <remote fetch="https://github.com/mvaiskh" name="mv-github" revision="kplatform"/>
            <remote fetch="https://android.googlesource.com" name="aosp"/>
            <default remote="clo-la" revision="dummy_revision" sync-c="true" sync-tags="false" depth="1"/>
            <project remote="clo-la" name="abl/tianocore/edk2" path="kernel_platform/bootable/bootloader/edk2" revision="b55ddaab17afbca10235eb5d2813987aebba2ffe" upstream="refs/heads/uefi.lnx.4.0.r14-rel" depth="1">
              <linkfile dest="kernel_platform/bootable/bootloader/edk2/QcomModulePkg/build.config.msm.houji" src="QcomModulePkg/build.config.msm.pineapple"/>
            </project>
            <project remote="clo-la" name="kernel/build" path="kernel_platform/build/kernel" revision="e5889b4763e03a012cb0bef544fa2c0ca5bf537e" upstream="refs/heads/kernel.lnx.6.1.r2-rel" depth="1">
              <linkfile dest="kernel_platform/tools/bazel" src="kleaf/bazel.sh"/>
              <linkfile dest="kernel_platform/build/build.sh" src="build.sh"/>
              <linkfile dest="kernel_platform/build/build_abi.sh" src="build_abi.sh"/>
              <linkfile dest="kernel_platform/build/build_test.sh" src="build_test.sh"/>
              <linkfile dest="kernel_platform/build/build_utils.sh" src="build_utils.sh"/>
              <linkfile dest="kernel_platform/build/all-variants.sh" src="all-variants.sh"/>
              <linkfile dest="kernel_platform/build/brunch" src="brunch"/>
              <linkfile dest="kernel_platform/build/build_abl.sh" src="build_abl.sh"/>
              <linkfile dest="kernel_platform/build/build_module.sh" src="build_module.sh"/>
              <linkfile dest="kernel_platform/build/android/export_headers.py" src="android/export_headers.py"/>
              <linkfile dest="kernel_platform/build/android/merge_dtbs.py" src="android/merge_dtbs.py"/>
              <linkfile dest="kernel_platform/build/android/merge_dtbs.sh" src="android/merge_dtbs.sh"/>
              <linkfile dest="kernel_platform/build/android/prepare_vendor.sh" src="android/prepare_vendor.sh"/>
              <linkfile dest="kernel_platform/build/BUILD.bazel" src="BUILD.bazel"/>
              <linkfile dest="kernel_platform/build/build-tools/path" src="build-tools/path"/>
              <linkfile dest="kernel_platform/build/config.sh" src="config.sh"/>
              <linkfile dest="kernel_platform/build/envsetup.sh" src="envsetup.sh"/>
              <linkfile dest="kernel_platform/build/_setup_env.sh" src="_setup_env.sh"/>
              <linkfile dest="kernel_platform/build/multi-switcher.sh" src="multi-switcher.sh"/>
              <linkfile dest="kernel_platform/build/kleaf" src="kleaf"/>
              <linkfile dest="kernel_platform/build/abi" src="abi"/>
              <linkfile dest="kernel_platform/build/static_analysis" src="static_analysis"/>
              <linkfile dest="kernel_platform/build/_wrapper_common.sh" src="_wrapper_common.sh"/>
            </project>
            <project remote="aosp" name="kernel/common" path="kernel_platform/common" revision="android14-6.1" depth="1">
              <linkfile dest="kernel_platform/.source_date_epoch_dir" src="."/>
            </project>
            <project remote="clo-la" name="kernel/prebuilts/build-tools" path="kernel_platform/prebuilts/kernel-build-tools" revision="d153b7ab4a4956198957e258d4f370e875c53059" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1">
              <linkfile dest="kernel_platform/build/prebuilts/kernel-build-tools" src="."/>
            </project>
            <project remote="clo-la" name="kernel_platform/build/bazel_common_rules" path="kernel_platform/build/bazel_common_rules" revision="9ac051a42545593e4a6bda7f11511acb8476f4e2" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernel_platform/external/bazel-skylib" path="kernel_platform/external/bazel-skylib" revision="7fdbc462f5001b7e82f026aa90bd43c494e2a8d8" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernel_platform/external/bazelbuild-rules_license" path="kernel_platform/external/bazelbuild-rules_license" revision="f578df4fd057ffe2023728444759535685631548" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernel_platform/external/bazelbuild-rules_pkg" path="kernel_platform/external/bazelbuild-rules_pkg" revision="059aaa0ece0c03b731076db6300f50f83d25829a" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernel_platform/external/dtc" path="kernel_platform/external/dtc" revision="2bc3f4250c591a4519a899f0f62600834a4da693" upstream="refs/heads/kernel.build.lnx.1.0.r15-rel" depth="1"/>
            <project remote="clo-la" name="kernel_platform/external/python/absl-py" path="kernel_platform/external/python/absl-py" revision="e46584edbb247bf79c74c4f105b6fff18234cee8" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernel_platform/external/stardoc" path="kernel_platform/external/stardoc" revision="0d74fed6f8d0844f696771e71bc0b071cae99021" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernel_platform/prebuilts/asuite" path="kernel_platform/prebuilts/asuite" revision="933fe29a05b097caed99d630727cfc301f770798" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernel_platform/prebuilts/bazel/linux-x86_64" path="kernel_platform/prebuilts/bazel/linux-x86_64" revision="eee09422f02e60f28192bcb5a8ce8660baba6706" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernel_platform/prebuilts/build-tools" path="kernel_platform/prebuilts/build-tools" revision="3f7cae3e5f7b0cbbb50ececa504e959b5e1a0b1e" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1">
              <linkfile dest="kernel_platform/build/prebuilts/build-tools" src="."/>
            </project>
            <project remote="clo-la" name="kernel_platform/prebuilts/clang-tools" path="kernel_platform/prebuilts/clang-tools" revision="0613fc5443d035335a9541994607bacae03750f2" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1">
              <linkfile dest="kernel_platform/build/prebuilts/clang-tools" src="."/>
            </project>
            <project remote="clo-la" name="kernel_platform/prebuilts/jdk/jdk11" path="kernel_platform/prebuilts/jdk/jdk11" revision="ced68c9308cbc1b6ec3e602dba8d0d56df8b6d73" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernel_platform/system/tools/mkbootimg" path="kernel_platform/tools/mkbootimg" revision="b17f184a20744a7e0a421f901bdf20a23be22b07" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernel_platform/toolchain/prebuilts/ndk/r23" path="kernel_platform/prebuilts/ndk-r23" revision="269a5dc9e862f78dc2030d9262f73cb2642b8127" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernel_platform/tools/tradefederation/prebuilts" path="kernel_platform/prebuilts/tradefed" revision="47fc8dbfffc41429e87a5e76188b7707d63792f4" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernelplatform/prebuilts-master/clang/host/linux-x86" path="kernel_platform/prebuilts/clang/host/linux-x86" revision="9002aa7843a39e9b35bb2d2cbf741cdaf719b981" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1"/>
            <project remote="clo-la" name="kernelplatform/prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8" path="kernel_platform/prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8" revision="dd099b5d68822602228e2af66693e61e7b54e0a9" upstream="refs/heads/ks-kernel.lnx.3.0.r1-rel" depth="1">
              <linkfile dest="kernel_platform/build/build-tools/sysroot" src="sysroot"/>
            </project>
            <project remote="mv-github" name="xiaomi14" path="kernel_platform/msm-kernel" revision="kplatform" depth="1">
              <linkfile dest="kernel_platform/WORKSPACE" src="bazel.WORKSPACE"/>
              <linkfile dest="kernel_platform/build_with_bazel.py" src="build_with_bazel.py"/>
              <linkfile dest="kernel_platform/build/qcom_build_extensions" src="qcom_build_extensions"/>
            </project>
            <project remote="mv-github" name="xiaomi14-devicetrees" path="kernel_platform/sm8650-devicetrees" revision="kplatform" depth="1"/>
            <project remote="mv-github" name="xiaomi14-modules" path="vendor" revision="kplatform" depth="1">
              <linkfile dest="kernel_platform/vendor" src="."/>
            </project>
          </manifest>
          MANIFESTEOF

          # Repo init ve sync
          repo init -u default.xml --no-clone-bundle --no-tags
          repo sync -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Yapı Kontrolü
        run: |
          echo "=== kernel_platform dizini ==="
          ls -la kernel_workspace/kernel_platform/ || echo "Dizin yok!"
          echo ""
          echo "=== msm-kernel dizini ==="
          ls -la kernel_workspace/kernel_platform/msm-kernel/ || echo "Dizin yok!"
          echo ""
          echo "=== build_with_bazel.py ==="
          ls -la kernel_workspace/kernel_platform/build_with_bazel.py || echo "Dosya yok!"
          echo ""
          echo "=== WORKSPACE ==="
          ls -la kernel_workspace/kernel_platform/WORKSPACE || echo "Dosya yok!"
          echo ""
          echo "=== tools/bazel ==="
          ls -la kernel_workspace/kernel_platform/tools/bazel || echo "Dosya yok!"
          echo ""
          echo "=== BUILD.bazel dosyalari ==="
          find kernel_workspace/kernel_platform/msm-kernel -name "BUILD.bazel" -type f 2>/dev/null || true
          echo ""
          echo "=== build.config dosyalari ==="
          find kernel_workspace/kernel_platform -name "build.config*" -type f 2>/dev/null | head -20 || true
          echo ""
          echo "=== Disk kullanimi ==="
          df -h

      - name: Bazel Target Kesfi
        run: |
          cd kernel_workspace/kernel_platform
          chmod +x tools/bazel

          echo "=== Mevcut Bazel targetlari aranıyor ==="
          tools/bazel query --ui_event_filters=-info --noshow_progress \
            "filter('.*_dist$', attr(generator_function, define_msm_platforms, msm-kernel/...))" \
            2>/dev/null || echo "define_msm_platforms sorgusu basarisiz"

          echo ""
          echo "=== Tüm dist targetlari ==="
          tools/bazel query --ui_event_filters=-info --noshow_progress \
            "filter('.*_dist$', msm-kernel/...)" \
            2>/dev/null || echo "dist sorgusu basarisiz"

          echo ""
          echo "=== Tüm kernel_build targetlari ==="
          tools/bazel query --ui_event_filters=-info --noshow_progress \
            "kind(kernel_build, msm-kernel/...)" \
            2>/dev/null || echo "kernel_build sorgusu basarisiz"

      - name: Kernel Derleme
        run: |
          cd kernel_workspace/kernel_platform

          echo "========================================="
          echo "  Xiaomi 14 (Houji) Kernel Derlemesi"
          echo "  Build System: build_with_bazel.py (Kleaf)"
          echo "========================================="

          # build_with_bazel.py ile derleme
          # -t houji gki : target=houji, variant=gki
          python3 build_with_bazel.py -t houji gki --log info 2>&1 | tee $GITHUB_WORKSPACE/build.log

      - name: Alternatif Derleme (pineapple target)
        if: failure()
        run: |
          cd kernel_workspace/kernel_platform

          echo "houji basarisiz, pineapple deneniyor..."
          python3 build_with_bazel.py -t pineapple gki --log info 2>&1 | tee $GITHUB_WORKSPACE/build_pineapple.log

      - name: Çıktıları Topla
        if: always()
        run: |
          mkdir -p /tmp/kernel_output

          echo "=== out dizini ==="
          find kernel_workspace/kernel_platform/out -type f 2>/dev/null | head -50 || true

          # Beklenen çıktı konumu: out/msm-kernel-houji_gki/dist/
          echo ""
          echo "=== houji_gki dist ==="
          ls -la kernel_workspace/kernel_platform/out/msm-kernel-houji_gki/dist/ 2>/dev/null || echo "houji_gki dist bulunamadi"

          echo ""
          echo "=== pineapple_gki dist ==="
          ls -la kernel_workspace/kernel_platform/out/msm-kernel-pineapple_gki/dist/ 2>/dev/null || echo "pineapple_gki dist bulunamadi"

          # Tüm olası çıktı konumlarını tara
          for dir in $(find kernel_workspace/kernel_platform/out -name "dist" -type d 2>/dev/null); do
            echo "Bulundu: $dir"
            cp -rv "$dir"/* /tmp/kernel_output/ 2>/dev/null || true
          done

          # Bazel-out içinden de ara
          find kernel_workspace/kernel_platform/bazel-bin -name "Image" -o -name "Image.gz" -o -name "*.ko" 2>/dev/null | while read f; do
            cp -v "$f" /tmp/kernel_output/
          done

          echo ""
          echo "=== Toplanan Dosyalar ==="
          ls -lah /tmp/kernel_output/ 2>/dev/null || echo "Çıktı bulunamadı"

      - name: Artifact Yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Xiaomi14-Houji
          path: |
            /tmp/kernel_output/*
            build.log
            build_pineapple.log
          retention-days: 7
          if-no-files-found: warn
