name: Build Kernel - SM8650 (pineapple)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: lineage-22.2
          fetch-depth: 1

      - name: 1. Paketler ve ZyC Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
            
          echo "🔥 Kusursuz Denge: ZyC Clang 22 (Eylül 2025 Sürümü - ARMv9-a Uyumlu)"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          echo "ZyC Clang 23 indiriliyor: $CLANG_URL"
          
          curl -fLSs "$CLANG_URL" -o clang.tar.gz || { echo "HATA: Clang URL'si patlak (404)!"; exit 1; }
          
          echo "Arşiv Çıkarılıyor..."
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc
          rm -f clang.tar.gz
          
          # Clang yolunu GitHub'ın ana PATH'ine kalıcı ekliyoruz ki sistem başka bir şey kullanmasın
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> $GITHUB_PATH
          echo "✅ Clang İndirildi ve PATH'e eklendi!"

      - name: 2. Config Merge (gki_defconfig + pineapple_GKI.config)
        run: |
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          touch .scmversion
          mkdir -p out

          echo "=== Gerekli dosyalar kontrol ediliyor ==="
          test -f scripts/kconfig/merge_config.sh || { echo "HATA: merge_config.sh yok!"; exit 1; }
          test -f arch/arm64/configs/gki_defconfig || { echo "HATA: gki_defconfig yok!"; exit 1; }
          test -f arch/arm64/configs/vendor/pineapple_GKI.config || { echo "HATA: pineapple_GKI.config yok!"; exit 1; }

          chmod +x scripts/kconfig/merge_config.sh

          echo "=== Configler merge ediliyor ==="
          ARCH=arm64 ./scripts/kconfig/merge_config.sh -m -O out \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/pineapple_GKI.config

          echo "=== olddefconfig oluşturuluyor ==="
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            olddefconfig

      - name: 3. Native Build (Image + dtbs + modules)
        run: |
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LD=ld.lld HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            Image dtbs modules 2>&1 | tee build.log

      - name: 4. Output Kontrol
        run: |
          echo "=== Image ==="
          ls -lh out/arch/arm64/boot/Image || echo "⚠️ Image bulunamadı!"

          echo ""
          echo "=== DTB/DTBO ==="
          find out/arch/arm64/boot/dts \( -name "*.dtb" -o -name "*.dtbo" \) | head -50 || echo "⚠️ DTB/DTBO bulunamadı!"

          echo ""
          echo "=== Modules ==="
          find out -type f -name "*.ko" | head -50 || echo "⚠️ Modül bulunamadı!"

      - name: 5. Artifacts Hazırla
        run: |
          mkdir -p artifacts
          
          cp out/arch/arm64/boot/Image artifacts/ 2>/dev/null || true
          cp out/.config artifacts/kernel.config 2>/dev/null || true
          cp build.log artifacts/ 2>/dev/null || true

          if find out/arch/arm64/boot/dts \( -name "*.dtb" -o -name "*.dtbo" \) | grep -q .; then
            mkdir -p artifacts/dtb_pack
            find out/arch/arm64/boot/dts \( -name "*.dtb" -o -name "*.dtbo" \) -exec cp --parents {} artifacts/dtb_pack/ \;
            tar -C artifacts -czf artifacts/dtbs.tar.gz dtb_pack
            rm -rf artifacts/dtb_pack
          fi

          if find out -type f -name "*.ko" | grep -q .; then
            mkdir -p artifacts/modules_pack
            find out -type f -name "*.ko" -exec cp --parents {} artifacts/modules_pack/ \;
            tar -C artifacts -czf artifacts/modules.tar.gz modules_pack
            rm -rf artifacts/modules_pack
          fi

          echo "=== Son artifact listesi ==="
          ls -lah artifacts

      - name: 6. Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qcom-sm8650-pineapple-build
          path: artifacts/*
          retention-days: 30
