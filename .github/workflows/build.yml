name: CG+ Galadriel Mi 14 Hybrid (ZyC 22)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          mkdir -p $GITHUB_WORKSPACE/clang-zyc
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-zyc
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> $GITHUB_PATH

      - name: 2. Kaynakları ve Dünkü Taze Modülleri Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          # Senin ana kernel kaynağın
          git clone -b android14-6.1-staging https://github.com/Bosyaf/android_kernel_common-6.1.git --depth=1 common
          # Vaisakh'ın dün güncellediği houji donanım hazinesi (Yesterday Update)
          git clone https://github.com/mvaisakh/android_device_houji-kernel.git -b 16 prebuilt --depth 1

      - name: 3. KernelSU-Next & SUSFS Kurulumu
        run: |
          cd common
          curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
          git clone --depth=1 -q https://gitlab.com/pershoot/susfs4ksu -b gki-android14-6.1-dev susfs4ksu
          cp -R susfs4ksu/kernel_patches/fs/* ./fs/
          cp -R susfs4ksu/kernel_patches/include/* ./include/
          SUSFS_PATCH=$(ls susfs4ksu/kernel_patches/50_add_susfs*.patch 2>/dev/null | head -1)
          [ -n "$SUSFS_PATCH" ] && patch -p1 < "$SUSFS_PATCH" || true

      - name: 4. Özel Performans Yamaları
        run: |
          cd common
          PATCH_DIR="../patches"
          [ -d "$PATCH_DIR" ] && for patch_file in "$PATCH_DIR"/*.patch; do patch -p1 --forward < "$patch_file" || echo "❌ ATLANDI"; done

      - name: 5. Full Kernel Config (WALT Dahil)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 gki_defconfig
          CONFIG_FILE="out/.config"
          
          # WALT modülü ve standart Galadriel ayarları
          ./scripts/config --file $CONFIG_FILE --module CONFIG_SCHED_WALT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Galadriel"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCALVERSION_AUTO
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HZ_300
          ./scripts/config --file $CONFIG_FILE --set-val CONFIG_HZ 300
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: 6. Kernel Derleme (Sadece Image ve WALT)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            KCFLAGS="-O2 -march=armv9.2-a+crypto -Wno-error" \
            Image modules || exit 1
          echo "BOOTHASH=Galadriel-Hybrid-$(date +%s)" >> $GITHUB_ENV

      - name: 7. AnyKernel3 (Hibrit Paketleme: Senin Image + Vaisakh'ın Dünkü Modülleri)
        run: |
          cd ./AnyKernel3
          # Cihaz isimlerini houji olarak ayarla
          sed -i 's/kernel.string=.*/kernel.string=CG+ Galadriel Mi 14 Hybrid/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=xiaomi14' anykernel.sh
          
          # 1. Senin derlediğin Image dosyasını koy
          cp ../common/out/arch/arm64/boot/Image .
          
          # 2. Vaisakh'ın dün güncellediği TÜM modülleri (GPU, Ses, Wifi vb.) içine at
          mkdir -p modules/vendor/lib/modules
          cp ../prebuilt/*.ko modules/vendor/lib/modules/
          
          # 3. Senin derlediğin WALT modülünü Vaisakh'ınkinin üzerine yaz (Seninki daha güncel olsun)
          find ../common/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \;
          
          # 4. Donanım Haritalarını (DTBO) ekle (Mi 14 donanımı tanıması için ŞART)
          cp ../prebuilt/dtbs/*.dtbo . || true
          
          # 5. Modül yükleme listesini oluştur
          ls modules/vendor/lib/modules/*.ko | xargs -n1 basename > modules/vendor/lib/modules/modules.load
          
          zip -r "../CG-Galadriel-Hybrid.zip" ./*

      - name: 8. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Galadriel Mi 14 Hybrid (Yesterday Prebuilts)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
