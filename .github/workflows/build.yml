name: Xiaomi 14 Houji Full Stock (kplatform)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Install Dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y \
            git curl python3 python3-pip \
            build-essential bc bison flex \
            libssl-dev libelf-dev \
            rsync unzip wget xz-utils \
            zstd zip python3-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            npm openjdk-17-jdk

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: clang
          key: clang-yuki-houji-v6
          restore-keys: |
            clang-yuki-

      - name: Download Yuki Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p clang
          curl -L "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst" \
            | tar --zstd -x -C clang

      - name: Cache msm-kernel
        id: cache-msm
        uses: actions/cache@v4
        with:
          path: msm-kernel
          key: msm-kernel-v6
          restore-keys: |
            msm-kernel

      - name: Clone msm-kernel
        if: steps.cache-msm.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_msm.git msm-kernel || \
          git clone --depth=1 https://github.com/PixelExperience/kernel_xiaomi_msm.git msm-kernel || \
          echo "msm-kernel clone failed"

      - name: Cache Source
        id: cache-source
        uses: actions/cache@v4
        with:
          path: kernel_platform
          key: source-xiaomi14-kplatform-v6
          restore-keys: |
            source-xiaomi14-kplatform

      - name: Clone Xiaomi 14 kplatform Source
        if: steps.cache-source.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b kplatform \
            https://github.com/mvaisakh/xiaomi14.git kernel_platform

      - name: Setup Build Directory
        run: |
          cd kernel_platform/..
          mkdir -p build
          if [ -d "../msm-kernel" ]; then
            ln -sf ../msm-kernel build/msm-kernel
          fi
          ls -la build/

      - name: Install Bazelisk
        run: |
          sudo npm install -g @bazel/bazelisk
          # Script'in beklediği yere symlink OLUŞTUR
          sudo mkdir -p $GITHUB_WORKSPACE/tools
          sudo ln -sf $(which bazelisk) $GITHUB_WORKSPACE/tools/bazel
          # Kontrol
          ls -la $GITHUB_WORKSPACE/tools/

      - name: Build Houji Kernel (Bazel)
        run: |
          cd kernel_platform
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export CC=clang
          export CXX=clang++
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          python3 build_with_bazel.py -t houji userdebug

      - name: Collect Output
        run: |
          mkdir release
          find kernel_platform -type f \( -name "*.img" -o -name "Image*" -o -name "*.dtb" -o -name "*.dtbo" -o -name "vmlinux" -o -name "boot.img" \) -exec cp -v {} release/ \; 2>/dev/null || true
          ls -laR release/ || true

      - name: Zip Artifacts
        run: |
          cd release
          zip -r ../houji-kernel.zip *
          cd ..
          ls -lh houji-kernel.zip || true

      - name: Upload Release
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: houji-${{ github.run_number }}
          name: Xiaomi14-Houji-FullStock
          files: houji-kernel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
