name: CG+ Xiaomi 14 (HOUJI) Fragmented Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Ortam ve ZyCromerZ Clang 23 Hazırlığı
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          
          echo "🔥 ZyCromerZ Clang 23 İndiriliyor..."
          mkdir -p $GITHUB_WORKSPACE/clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/23.0.0git-20260130-release/Clang-23.0.0git-20260130.tar.gz
          tar -xf Clang-23.0.0git-20260130.tar.gz -C $GITHUB_WORKSPACE/clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: 2. Kaynak Kodunu Çek
        run: |
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14.git common
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 3. HOUJI Configlerini Birleştir (Engineering Step)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          
          # 1. Adım: Temel GKI config'i oluştur
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 gki_defconfig
          
          # 2. Adım: Sizin listedeki HOUJI dosyalarını mevcut config üzerine bindir (Merge)
          # Bu işlem Xiaomi 14'ün gerçek donanım sürücülerini (houji_GKI ve houji_consolidate) aktif eder.
          ARCH=arm64 ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config
            
          # 3. Adım: Performans İnce Ayarları
          CONFIG_FILE="out/.config"
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Houji-Cromer23"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HZ_300
          ./scripts/config --file $CONFIG_FILE --set-val CONFIG_HZ 300
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          
          # Root kapalı kalsın (KSU/SUSFS yok)
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_KSU
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_KSU_SUSFS
          
          # 4. Adım: Config'i son haline getir
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: 4. Derleme (SM8650 - Pineapple/Houji)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" \
            LD="ld.lld" \
            AR="llvm-ar" \
            NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" \
            OBJDUMP="llvm-objdump" \
            STRIP="llvm-strip" \
            KCFLAGS="-O3 \
            -march=armv9.2-a+crypto+crc+dotprod+rcpc+lse \
            -mtune=cortex-x4 \
            -falign-loops=32 \
            -fomit-frame-pointer" \
            Image dtbo.img
            
          echo "BOOTHASH=Houji-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 5. AnyKernel3 Paketleme
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Houji Performance (Xiaomi 14)/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          [ -f ../common/out/arch/arm64/boot/dtbo.img ] && cp ../common/out/arch/arm64/boot/dtbo.img .
          
          zip -r "../CG-Houji-Clang23.zip" ./*

      - name: 6. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (HOUJI) Engineering Build"
          body: |
            - Build: Houji Fragmented Merge
            - Configs: houji_GKI + houji_consolidate
            - Compiler: ZyCromerZ Clang 23
            - Root: No
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
