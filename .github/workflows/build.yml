name: CG+ Yuki Gaming Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/clang-yuki
          key: clang-yuki-bolt-20260124
          restore-keys: |
            clang-yuki-

      - name: Download Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang-yuki
          curl -L "https://usc1.contabostorage.com/ab57618a161b456a8d009c2e2de4a408:xperience/toolchains/yuki-clang-+bolt-20260124.tar.zst" | tar --zstd -xC $GITHUB_WORKSPACE/clang-yuki

      - name: 1. Paketler
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            lld llvm pkg-config zstd patch

      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      # ========================
      # 🔥 KERNELSU-NEXT + MULTI-MANAGER
      # ========================
      - name: 3. KernelSU-Next Setup
        run: |
          cd common
          rm -rf drivers/kernelsu KernelSU-Next
          sed -i '/kernelsu/d' drivers/Kconfig 2>/dev/null || true
          sed -i '/kernelsu/d' drivers/Makefile 2>/dev/null || true

          git clone https://github.com/pershoot/KernelSU-Next.git -b dev-susfs --depth=1 KernelSU-Next

          cd KernelSU-Next
          patch -p1 < $GITHUB_WORKSPACE/patches/ksu/ksun-add-more-managers-support.patch || echo "⚠️ Patch atlandı"
          cd ..

          mkdir -p drivers/kernelsu
          cp -rf KernelSU-Next/kernel/* drivers/kernelsu/

          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          echo 'obj-y += kernelsu/' >> drivers/Makefile

          cp -rf KernelSU-Next/userspace/include/uapi/* include/uapi/ 2>/dev/null || true

          echo "✅ KernelSU + Multi-Manager Hazır!"

      # ========================
      # 🔥 SUSFS + 5 HOTFIX
      # ========================
      - name: 4. SUSFS Setup
        run: |
          cd common
          SUSFS_BRANCH="gki-android14-6.1"
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b $SUSFS_BRANCH susfs

          cp -r susfs/kernel_patches/fs/* fs/
          cp -r susfs/kernel_patches/include/* include/
          patch -p1 < susfs/kernel_patches/50_add_susfs_in_${SUSFS_BRANCH}.patch || true

          # FIX 1: namespace.c
          cat > /tmp/ns_inject.txt << 'EOF'
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT
          #include <linux/susfs_def.h>
          extern bool susfs_is_current_ksu_domain(void);
          extern struct static_key_false susfs_set_sdcard_android_data_decrypted_key_false;
          #define CL_COPY_MNT_NS BIT(25)
          static DEFINE_IDA(susfs_mnt_id_ida);
          static DEFINE_IDA(susfs_mnt_group_ida);
          #define DEFAULT_KSU_MNT_ID 500000
          #define DEFAULT_KSU_MNT_GROUP_ID 5000
          #define VFSMOUNT_MNT_FLAGS_KSU_UNSHARED_MNT 0x80000000
          #endif
          EOF
          sed -i '/#include "internal.h"/r /tmp/ns_inject.txt' fs/namespace.c

          # FIX 2: statfs.c
          sed -i '/#include <linux\/susfs_def.h>/i #ifndef __GENKSYMS__' fs/statfs.c || true
          sed -i '/#include <linux\/susfs_def.h>/a #endif' fs/statfs.c || true

          # FIX 3: fs_proc_base.c
          patch -p1 < $GITHUB_WORKSPACE/patches/susfs/fs_proc_base.c-fix-k6.1.patch || true

          # FIX 4: extras.c
          if [ -f "drivers/kernelsu/extras.c" ]; then
            cat > /tmp/avc_fix.txt << 'EOF'
          #ifdef CONFIG_KSU_SUSFS
          #ifndef susfs_avc_log_spoofing_key_true
          __attribute__((weak))
          struct static_key_true susfs_avc_log_spoofing_key_true = STATIC_KEY_TRUE_INIT;
          #endif
          #endif
          EOF
            sed -i '/#include/r /tmp/avc_fix.txt' drivers/kernelsu/extras.c
          fi

          # FIX 5: supercalls.c
          if [ -f "drivers/kernelsu/supercalls.c" ]; then
            sed -i 's/#ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME/#if 0 \/\* Disabled *\//' drivers/kernelsu/supercalls.c || true
          fi

          echo "✅ SUSFS + 5 Hotfix Hazır!"

      - name: 5. Wi-Fi Yaması
        run: |
          cd common
          curl -fLSs https://github.com/OnePlus-12-Development/android_kernel_qcom_sm8650/commit/3e0cb08.patch > wifi.patch || true
          [ -s wifi.patch ] && patch -p1 < wifi.patch || true
          rm -f wifi.patch

      - name: 5.5. Özel Performans
        run: |
          cd common
          [ -d "../patches" ] && for f in ../patches/*.patch; do patch -p1 --forward < "$f" || true; done

      - name: 6. Full Kernel Config
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-yuki/bin:$PATH"

          touch .scmversion
          printf '#!/bin/sh\nexit 0\n' > scripts/check-local-export
          chmod +x scripts/check-local-export

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 gki_defconfig

          C="out/.config"

          ./scripts/config --file $C --set-str CONFIG_CMDLINE "console=ttynull stack_depot_disable=on cgroup_disable=pressure kvm-arm.mode=protected bootconfig ioremap_guard noirqdebug quiet kasan.page_alloc.sample=0 kasan.stacktrace=off kasan=off slub_debug=- page_owner=off"
          ./scripts/config --file $C --enable CONFIG_CMDLINE_EXTEND
          ./scripts/config --file $C --disable CONFIG_HZ_100
          ./scripts/config --file $C --disable CONFIG_HZ_250
          ./scripts/config --file $C --enable CONFIG_HZ_300
          ./scripts/config --file $C --disable CONFIG_HZ_1000
          ./scripts/config --file $C --set-val CONFIG_HZ 300
          ./scripts/config --file $C --disable CONFIG_PREEMPT_NONE
          ./scripts/config --file $C --disable CONFIG_PREEMPT_VOLUNTARY
          ./scripts/config --file $C --enable CONFIG_PREEMPT
          ./scripts/config --file $C --enable CONFIG_PREEMPT_BUILD
          ./scripts/config --file $C --enable CONFIG_NO_HZ_IDLE
          ./scripts/config --file $C --disable CONFIG_NO_HZ_FULL
          ./scripts/config --file $C --enable CONFIG_CPU_FREQ
          ./scripts/config --file $C --enable CONFIG_CPU_FREQ_GOV_WALT
          ./scripts/config --file $C --enable CONFIG_CPU_FREQ_DEFAULT_GOV_WALT
          ./scripts/config --file $C --set-str CONFIG_CPU_FREQ_DEFAULT_GOV "walt"
          ./scripts/config --file $C --enable CONFIG_CPU_IDLE
          ./scripts/config --file $C --enable CONFIG_ARM_PSCI_CPUIDLE
          ./scripts/config --file $C --enable CONFIG_ARM_CPUIDLE
          ./scripts/config --file $C --enable CONFIG_CPU_IDLE_GOV_MENU
          ./scripts/config --file $C --enable CONFIG_CPU_IDLE_GOV_TEO
          ./scripts/config --file $C --disable CONFIG_THERMAL_GOV_FAIR_SHARE
          ./scripts/config --file $C --enable CONFIG_THERMAL_GOV_STEP_WISE
          ./scripts/config --file $C --enable CONFIG_THERMAL_GOV_POWER_ALLOCATOR
          ./scripts/config --file $C --enable CONFIG_THERMAL_DEFAULT_GOV_STEP_WISE
          ./scripts/config --file $C --enable CONFIG_SCHED_MC
          ./scripts/config --file $C --enable CONFIG_SCHED_CLUSTER
          ./scripts/config --file $C --disable CONFIG_SCHED_SMT
          ./scripts/config --file $C --enable CONFIG_UCLAMP_TASK
          ./scripts/config --file $C --enable CONFIG_UCLAMP_TASK_GROUP
          ./scripts/config --file $C --enable CONFIG_ENERGY_MODEL
          ./scripts/config --file $C --enable CONFIG_KPROBES
          ./scripts/config --file $C --enable CONFIG_HAVE_KPROBES
          ./scripts/config --file $C --enable CONFIG_KPROBE_EVENTS
          ./scripts/config --file $C --enable CONFIG_LTO_CLANG
          ./scripts/config --file $C --enable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file $C --disable CONFIG_LTO_CLANG_FULL
          ./scripts/config --file $C --disable CONFIG_NUMA_BALANCING
          ./scripts/config --file $C --disable CONFIG_DEBUG_INFO_REDUCED
          ./scripts/config --file $C --disable CONFIG_DEBUG_INFO_COMPRESSED
          ./scripts/config --file $C --disable CONFIG_DEBUG_INFO_SPLIT
          ./scripts/config --file $C --disable CONFIG_DEBUG_INFO_DWARF4
          ./scripts/config --file $C --disable CONFIG_DEBUG_INFO_DWARF5
          ./scripts/config --file $C --enable CONFIG_IP_NF_TARGET_TTL
          ./scripts/config --file $C --enable CONFIG_IP6_NF_TARGET_HL
          ./scripts/config --file $C --enable CONFIG_IP6_NF_MATCH_HL
          ./scripts/config --file $C --enable CONFIG_TCP_CONG_ADVANCED
          ./scripts/config --file $C --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file $C --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --file $C --set-str CONFIG_DEFAULT_NET_SCH "fq_codel"
          ./scripts/config --file $C --enable CONFIG_NET_SCH_FQ_CODEL
          ./scripts/config --file $C --enable CONFIG_NET_SCH_FQ
          ./scripts/config --file $C --enable CONFIG_WIREGUARD
          ./scripts/config --file $C --enable CONFIG_OVERLAY_FS
          ./scripts/config --file $C --enable CONFIG_TMPFS_XATTR
          ./scripts/config --file $C --enable CONFIG_TMPFS_POSIX_ACL

          # ===== KSU + SUSFS + MULTI-MANAGER =====
          ./scripts/config --file $C --enable CONFIG_KSU
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SUS_KSTAT
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SUS_KSTAT_SPOOF_GENERIC
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SPOOF_UNAME
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_OPEN_REDIRECT
          ./scripts/config --file $C --enable CONFIG_KSU_SUSFS_SUS_SU
          ./scripts/config --file $C --enable CONFIG_KSU_MULTI_MANAGER_SUPPORT
          ./scripts/config --file $C --enable CONFIG_KSU_ALLOWLIST_WORKAROUND

          ./scripts/config --file $C --set-str CONFIG_LOCALVERSION "-C-G+"
          ./scripts/config --file $C --disable CONFIG_LOCALVERSION_AUTO

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

          echo "=========================================="
          grep "CONFIG_KSU" out/.config
          echo "=========================================="

      - name: 7. Kernel Derleme
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-yuki/bin:$PATH"

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            KCFLAGS="-O2 \
            -march=armv9.2-a+crypto+sha3+crc+dotprod+rcpc+lse \
            -falign-functions=64 \
            -fomit-frame-pointer \
            -ffunction-sections \
            -fdata-sections \
            -fno-delete-null-pointer-checks \
            -Wno-constant-logical-operand" \
            KLDFLAGS="-Wl,--gc-sections -Wl,--as-needed -Wl,--icf=safe -Wl,-O2" \
            Image || exit 1

          echo "BOOTHASH=Yuki-$(date +%s)" >> $GITHUB_ENV

      - name: 8. AnyKernel3
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Yuki Balanced Pro/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          echo "device.name1=houji" >> anykernel.sh
          echo "device.name2=shennong" >> anykernel.sh
          echo "device.name3=aurora" >> anykernel.sh
          echo "device.name4=xiaomi14" >> anykernel.sh
          cp ../common/out/arch/arm64/boot/Image .
          zip -r ../CG-Yuki-Balanced-Pro.zip ./*

      - name: 9. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Yuki Clang (Balanced Pro)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
