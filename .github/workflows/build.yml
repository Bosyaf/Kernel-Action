name: Bosyaf Monolithic Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "bos"
      KBUILD_BUILD_HOST: "yaf"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve ZyC Clang
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd

          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz || { echo "HATA!"; exit 1; }
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> "$GITHUB_PATH"

      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b monolithic-test-2 https://github.com/Bosyaf/xiaomi14.git --depth=1 common

      - name: 3. Config ve Derleme Hazırlığı
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"

          mkdir -p out

          # 1. Base GKI config'i oluştur
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            gki_defconfig

          # 2. Vendor fragment ile MERGE et
          scripts/kconfig/merge_config.sh -m -r -y -O out/ \
            out/.config arch/arm64/configs/vendor/pineapple_GKI.config

          # 3. Eğer cihaza özel defconfig varsa onu da merge et (opsiyonel)
          if [ -f "arch/arm64/configs/houji_defconfig" ]; then
            scripts/kconfig/merge_config.sh -m -r -y -O out/ \
              out/.config arch/arm64/configs/houji_defconfig
          fi

          # 4. Config'i son haline getir (eksikleri tamamlar)
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            olddefconfig
      - name: 4. Paketleme
        run: |
          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Bosyaf Monolithic/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh

          cp ../common/out/arch/arm64/boot/Image .

          mkdir -p modules
          find ../common/out -name "*.ko" -exec cp {} modules/ \;

          echo "📦 Modül sayısı:"
          ls modules/*.ko 2>/dev/null | wc -l
          echo "📦 Modül listesi:"
          ls modules/*.ko 2>/dev/null

          zip -r "../Bosyaf.zip" ./*

      - name: 5. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Bosyaf Monolithic"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
