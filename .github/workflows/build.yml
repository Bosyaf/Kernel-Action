name: Build Xiaomi 14 (houji) GKI 6.1 Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel kaynak branch (shennong-u-oss)'
        required: true
        default: 'shennong-u-oss'
      kernelsu:
        description: 'KernelSU/SukiSU entegre edilsin mi?'
        required: true
        type: boolean
        default: false
  push:
    branches: [ main ]
    paths:
      - 'anykernel/**'
      - '.github/workflows/build-kernel.yml'

env:
  KERNEL_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
  DEVICETREE_REPO: https://github.com/MiCode/kernel_devicetree.git
  BRANCH: ${{ github.event.inputs.kernel_branch || 'shennong-u-oss' }}
  CCACHE_DIR: /home/runner/.ccache
  DEVICE_CODENAME: houji

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Runner disk alanını genişlet
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 4096
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true

      - name: Bağımlılıkları kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git git-lfs gnupg \
            libncurses-dev libssl-dev libtinfo6 \
            libxml2-utils lz4 python3 python3-pip \
            rsync unzip zip zlib1g-dev libc6-dev \
            android-sdk-libsparse-utils \
            device-tree-compiler cpio
          pip3 install --upgrade pip

      - name: ccache önbelleğini geri yükle
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ env.DEVICE_CODENAME }}-${{ env.BRANCH }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ env.DEVICE_CODENAME }}-${{ env.BRANCH }}-

      - name: ccache yapılandır
        run: |
          ccache -M 10G
          ccache -o compression=true

      - name: Kernel kaynağını klonla
        run: |
          git clone --depth=1 -b "${BRANCH}" "${KERNEL_REPO}" kernel_platform
          cd kernel_platform
          echo "KERNEL_DIR=$(pwd)" >> "$GITHUB_ENV"

      - name: Devicetree kaynağını klonla
        run: |
          git clone --depth=1 -b "${BRANCH}" "${DEVICETREE_REPO}" devicetree || \
            echo "Devicetree branch bulunamadı, kernel_platform içindeki dts kullanılacak"

      - name: Bazel/Kleaf toolchain kontrolü
        working-directory: kernel_platform
        run: |
          if [ -f tools/bazel ]; then
            echo "BUILD_SYSTEM=bazel" >> "$GITHUB_ENV"
          elif [ -f build/build.sh ]; then
            echo "BUILD_SYSTEM=legacy" >> "$GITHUB_ENV"
          else
            echo "Build sistemi tespit edilemedi, repo yapısını manuel kontrol et" && exit 1
          fi

      - name: (Opsiyonel) KernelSU entegrasyonu
        if: ${{ github.event.inputs.kernelsu == 'true' }}
        working-directory: kernel_platform
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: Kernel derle (Bazel)
        if: env.BUILD_SYSTEM == 'bazel'
        working-directory: kernel_platform
        env:
          USE_CCACHE: "1"
          CCACHE_EXEC: /usr/bin/ccache
        run: |
          tools/bazel run --config=fast \
            --disk_cache="${CCACHE_DIR}/bazel" \
            //common:kernel_aarch64_dist -- --destdir=out/dist

      - name: Kernel derle (legacy build.sh)
        if: env.BUILD_SYSTEM == 'legacy'
        working-directory: kernel_platform
        env:
          USE_CCACHE: "1"
        run: |
          BUILD_CONFIG=build.config.gki.aarch64 build/build.sh

      - name: Boot image araçlarını indir
        run: |
          mkdir -p tools
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg tools/mkbootimg

      - name: vendor_boot.img paketle
        working-directory: kernel_platform
        run: |
          DIST=out/dist
          [ -d "$DIST" ] || DIST=out/*/dist
          ls -la $DIST || true

          # Not: vendor_ramdisk stok firmware'den elde edilmelidir.
          # Eğer repo kökünde stok vendor_boot.img varsa (örn. firmware/vendor_boot.img)
          # onu unpack edip ramdisk + cmdline'ı tekrar kullanıyoruz.
          if [ -f "../firmware/vendor_boot.img" ]; then
            python3 ../tools/mkbootimg/unpack_bootimg.py \
              --boot_img ../firmware/vendor_boot.img \
              --out out/unpacked
          else
            echo "UYARI: firmware/vendor_boot.img bulunamadı." \
                 "Stok vendor_boot.img'i repo köküne firmware/ altına koymalısın."
            exit 1
          fi

          python3 ../tools/mkbootimg/mkbootimg.py \
            --vendor_boot out/vendor_boot.img \
            --vendor_ramdisk out/unpacked/vendor_ramdisk \
            --dtb "$DIST"/*.dtb \
            --vendor_cmdline "$(cat out/unpacked/vendor_cmdline 2>/dev/null || echo '')" \
            --header_version 4 \
            --pagesize 4096

      - name: Modülleri (vendor_dlkm için) topla
        working-directory: kernel_platform
        run: |
          DIST=out/dist
          [ -d "$DIST" ] || DIST=out/*/dist
          mkdir -p out/modules
          find "$DIST" -name "*.ko" -exec cp {} out/modules/ \;
          ls out/modules | wc -l

      - name: Derleme çıktılarını artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: houji-gki-kernel-${{ github.run_number }}
          path: |
            kernel_platform/out/dist/Image*
            kernel_platform/out/dist/*.dtb
            kernel_platform/out/dist/*.dtbo
            kernel_platform/out/vendor_boot.img
            kernel_platform/out/modules/*.ko
          if-no-files-found: warn
          retention-days: 14

      - name: Özet
        run: |
          echo "### Derleme tamamlandı" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: ${BRANCH}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build sistemi: ${BUILD_SYSTEM}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cihaz: ${DEVICE_CODENAME}" >> "$GITHUB_STEP_SUMMARY"
          
