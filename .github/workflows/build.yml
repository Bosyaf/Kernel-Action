name: CG+ Houji r584948 Persistent Cache Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketleri Kur
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd

      - name: 2. Clang r584948 Önbellek (Cache) Kontrolü
        id: cache-clang
        uses: actions/cache@v4
        with:
          # Önbelleğe alınacak klasörün tam yolu
          path: ${{ github.workspace }}/clang-r584948
          # Cache anahtarı (Eğer indirme başarılı biterse bu isimle kaydedilecek)
          key: clang-r584948-mirror-v3

      - name: 3. Resmi Clang r584948 İndir (Sadece Cache Yoksa)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          echo "🔥 Cache bulunamadı, Clang r584948 indiriliyor..."
          mkdir -p ${{ github.workspace }}/clang-temp
          cd ${{ github.workspace }}/clang-temp
          
          # Senin verdiğin mirror branch'inden çekiyoruz
          git clone --depth=1 -b mirror-goog-main-llvm-toolchain-source https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-repo
          
          # Sadece r584948 klasörünü asıl cache klasörüne taşı
          mkdir -p ${{ github.workspace }}/clang-r584948
          cp -r clang-repo/clang-r584948/* ${{ github.workspace }}/clang-r584948/
          
          # Temizlik
          rm -rf ${{ github.workspace }}/clang-temp
          echo "✅ İndirme tamamlandı, bir sonraki seferde cache'ten gelecek."

      - name: 4. Kaynak Kodunu Çek (HOUJI)
        run: |
          git clone --depth=1 -b kplatform https://github.com/mvaisakh/xiaomi14.git ${{ github.workspace }}/common
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

      - name: 5. Clang'i Kaynağa Yerleştir ve Hazırla
        run: |
          # Kaynağın (common) içindeki prebuilts yoluna cache'ten gelen clang'i koyuyoruz
          # r487747c ismini kullanıyoruz çünkü build.config dosyaları bu ismi arıyor
          mkdir -p ${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c
          cp -r ${{ github.workspace }}/clang-r584948/* ${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/
          
          # PATH ayarı
          echo "${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin" >> $GITHUB_PATH

      - name: 6. HOUJI Full (Consolidate) Config Merge
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          # Temel GKI
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig
          
          # HOUJI Full (Consolidate) Merge
          ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config
          
          # Sadece LOCALVERSION (Geri kalan her şey orijinal)
          ./scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-Houji-Pure"
          
          # Final kontrol
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig

      - name: 7. Derleme (Güvenli Mod -O2)
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          
          # DTS hatalarından kaçmak için sadece Image derliyoruz
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            CC="clang" \
            LD="ld.lld" \
            AR="llvm-ar" \
            NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" \
            OBJDUMP="llvm-objdump" \
            STRIP="llvm-strip" \
            KCFLAGS="-O2 -D__ANDROID_COMMON_KERNEL__" \
            Image || { echo "❌ Derleme HATASI!"; exit 1; }
            
          echo "BOOTHASH=Houji-Official-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV

      - name: 8. Paketleme
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Houji Official Clang 584948/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          zip -r "../CG-Houji-Official-r584948.zip" ./*

      - name: 9. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (HOUJI) Clang r584948 Official"
          body: |
            - Build: Houji Full Consolidate
            - Compiler: Google Clang r584948 (Official Mirror)
            - Optimization: -O2
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
