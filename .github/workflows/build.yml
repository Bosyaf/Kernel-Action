name: Kernel Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libncurses5-dev \
          libssl-dev \
          bison \
          flex \
          libelf-dev \
          libkmod-dev \
          cpio \
          python3 \
          python3-pip \
          wget \
          curl \
          git \
          lzop \
          bc \
          kmod \
          xz-utils \
          ca-certificates \
          gnupg \
          lsb-release \
          software-properties-common

    - name: Download Android Clang
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        cd $GITHUB_WORKSPACE/toolchain
        wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
        unzip -q android-ndk-r27c-linux.zip
        mv android-ndk-r27c clang
        echo "CLANG_PATH=$GITHUB_WORKSPACE/toolchain/clang" >> $GITHUB_ENV

    - name: Setup Clang path
      run: |
        echo "$CLANG_PATH/bin" >> $GITHUB_PATH
        export CC=$CLANG_PATH/bin/clang
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CLANG_TRIPLE=aarch64-linux-gnu-

    - name: Download GCC aarch64
      run: |
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
        echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV

    - name: Check kernel configuration
      run: |
        ls -la arch/arm64/configs/
        cat arch/arm64/configs/gki_defconfig | head -50

    - name: Generate kernel configuration
      run: |
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CC=$CLANG_PATH/bin/clang \
          gki_defconfig

    - name: Build kernel
      run: |
        make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CC=$CLANG_PATH/bin/clang \
          LD=$CLANG_PATH/bin/ld.lld \
          AR=$CLANG_PATH/bin/llvm-ar \
          NM=$CLANG_PATH/bin/llvm-nm \
          OBJCOPY=$CLANG_PATH/bin/llvm-objcopy \
          OBJDUMP=$CLANG_PATH/bin/llvm-objdump \
          STRIP=$CLANG_PATH/bin/llvm-strip \
          LLVM_IAS=1 \
          2>&1 | tee build.log

    - name: Check build output
      run: |
        ls -la arch/arm64/boot/
        file arch/arm64/boot/Image
        file arch/arm64/boot/Image.gz
        file arch/arm64/boot/Image.gz-dtb

    - name: Upload kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Image
        path: arch/arm64/boot/Image
        retention-days: 7

    - name: Upload kernel Image.gz
      uses: actions/upload-artifact@v4
      with:
        name: Image.gz
        path: arch/arm64/boot/Image.gz
        retention-days: 7

    - name: Upload kernel Image.gz-dtb
      uses: actions/upload-artifact@v4
      with:
        name: Image.gz-dtb
        path: arch/arm64/boot/Image.gz-dtb
        retention-days: 7

    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 7
