name: Xiaomi 14 Monolithic Build (houji)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 24

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve Neutron Clang Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
            
          echo "🔥 Toolchain: Neutron Clang 10032024"
          CLANG_URL="https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/10032024/neutron-clang-10032024.tar.zst"
          
          mkdir -p $GITHUB_WORKSPACE/clang-17
          wget -qO clang.tar.zst "$CLANG_URL"
          tar --zstd -xf clang.tar.zst -C $GITHUB_WORKSPACE/clang-17 --strip-components=1
          
          echo "$GITHUB_WORKSPACE/clang-17/bin" >> $GITHUB_PATH
          
      - name: 2. Kaynakları Çek (MVaisakh Monolithic)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b monolithic-test-2 https://github.com/mvaisakh/xiaomi14.git --depth=1 common

      - name: 3. Kernel Config Hazırlığı (houji_defconfig)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-17/bin:$PATH"
          touch .scmversion
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            houji_defconfig

      - name: 4. Kernel Derleme (Monolithic + Neutron Clang)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-17/bin:$PATH"
          
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 -Wno-error" \
            LDFLAGS_vmlinux="--threads=1" \
            Image || { echo "❌ Derleme HATASI!"; exit 1; }
          
          echo "BOOTHASH=Houji-Mono-Neutron-$(date +%s)" >> $GITHUB_ENV
          
      - name: 5. AnyKernel3 Paketleme
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=Xiaomi 14 Monolithic (Neutron Clang)/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          
          mkdir -p modules/vendor/lib/modules
          find ../common/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \; || true
          
          zip -r "../Xiaomi14-Monolithic-Stable.zip" ./*

      - name: 6. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 Monolithic (Neutron Clang)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
