name: Build Xiaomi Mi 14 (Houji) Kernel

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        repository: Bosyaf/xiaomi14
        ref: kplatform
        path: kernel
        
    - name: Checkout Device Trees
      uses: actions/checkout@v4
      with:
        repository: Bosyaf/xiaomi14-devicetrees
        path: devicetrees
        
    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex \
          g++-multilib gcc-multilib git gnupg gperf \
          imagemagick lib32ncurses5-dev lib32readline-dev \
          lib32z1-dev libelf-dev liblz4-tool \
          libncurses5 libncurses5-dev libsdl1.2-dev \
          libssl-dev libxml2 libxml2-utils lzop \
          pngcrush rsync schedtool squashfs-tools xsltproc \
          zip zlib1g-dev python3 python-is-python3
          
    - name: Download Clang Toolchain
      run: |
        mkdir -p ~/toolchains
        cd ~/toolchains
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz
        mkdir -p clang-r487747c
        tar -xzf clang-r487747c.tar.gz -C clang-r487747c
        rm clang-r487747c.tar.gz
        
    - name: Link Device Trees to Kernel Source
      run: |
        rm -rf kernel/arch/arm64/boot/dts/vendor
        ln -sf $GITHUB_WORKSPACE/devicetrees kernel/arch/arm64/boot/dts/vendor
        
    - name: Build Kernel
      run: |
        cd kernel
        export ARCH=arm64
        export SUBARCH=arm64
        export CLANG_PATH=~/toolchains/clang-r487747c/bin
        export PATH=$CLANG_PATH:$PATH
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export LLVM=1
        export LLVM_IAS=1
        
        # Houji için uygun defconfig'i bul ve kullan
        # Önce vendor/pineapple_consolidate defconfig'i dene
        if [ -f "arch/arm64/configs/vendor/pineapple_consolidate_defconfig" ]; then
          DEFCONFIG="vendor/pineapple_consolidate_defconfig"
        elif [ -f "arch/arm64/configs/vendor/houji_consolidate_defconfig" ]; then
          DEFCONFIG="vendor/houji_consolidate_defconfig"
        elif [ -f "arch/arm64/configs/vendor/pineapple_defconfig" ]; then
          DEFCONFIG="vendor/pineapple_defconfig"
        elif [ -f "arch/arm64/configs/vendor/houji_defconfig" ]; then
          DEFCONFIG="vendor/houji_defconfig"
        else
          echo "Uygun defconfig bulunamadı!"
          ls -la arch/arm64/configs/vendor/
          exit 1
        fi
        
        echo "Kullanılan defconfig: $DEFCONFIG"
        
        # Temizlik
        make mrproper
        
        # Config oluştur
        make O=out ARCH=arm64 $DEFCONFIG
        
        # Kernel derle
        make -j$(nproc --all) \
          O=out \
          ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          LLVM=1 \
          LLVM_IAS=1
          
    - name: Prepare Kernel Artifacts
      run: |
        mkdir -p upload
        
        # Kernel Image
        if [ -f kernel/out/arch/arm64/boot/Image ]; then
          cp kernel/out/arch/arm64/boot/Image upload/
        fi
        
        if [ -f kernel/out/arch/arm64/boot/Image.gz ]; then
          cp kernel/out/arch/arm64/boot/Image.gz upload/
        fi
        
        # DTB ve DTBO
        if [ -f kernel/out/arch/arm64/boot/dtb ]; then
          cp kernel/out/arch/arm64/boot/dtb upload/
        fi
        
        if [ -f kernel/out/arch/arm64/boot/dtbo.img ]; then
          cp kernel/out/arch/arm64/boot/dtbo.img upload/
        fi
        
        # DTB dosyalarını topla
        find kernel/out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} upload/ \;
        
        # Kernel modülleri varsa
        if [ -d kernel/out/lib/modules ]; then
          mkdir -p upload/modules
          find kernel/out -name "*.ko" -exec cp {} upload/modules/ \;
        fi
        
        # Build bilgilerini kaydet
        echo "Build Date: $(date)" > upload/build_info.txt
        echo "Kernel Version: $(cat kernel/out/include/config/kernel.release 2>/dev/null || echo 'Unknown')" >> upload/build_info.txt
        echo "Compiler: Clang r487747c" >> upload/build_info.txt
        
    - name: Upload Kernel Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: xiaomi-mi14-houji-kernel-${{ github.run_number }}
        path: upload/*
        retention-days: 30
        
    - name: Create Release (Optional)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: kernel-${{ github.run_number }}
        name: Xiaomi Mi 14 Kernel Build ${{ github.run_number }}
        files: upload/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
