name: Build Xiaomi 14 (houji) Kernel

# Manuel calistirma + monolithic-3 branch push'larinda calisir.
on:
  workflow_dispatch:
    inputs:
      clang_version:
        description: 'AOSP Clang surumu (ornek: r510928, r530567)'
        required: true
        default: 'r530567'
      build_dtbo:
        description: 'dtbo.img denemesi yapilsin mi?'
        required: true
        default: 'true'
      build_bootimg:
        description: 'boot.img/vendor_boot.img denemesi yapilsin mi? (ramdisk/dtb gerekir)'
        required: true
        default: 'false'
  push:
    branches:
      - monolithic-3

env:
  DEVICE: houji
  SOC: pineapple
  OUT: out

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Kernel source'unu cek
        uses: actions/checkout@v4
        with:
          ref: monolithic-3
          fetch-depth: 1

      - name: Derleme bagimliliklarini kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential cpio device-tree-compiler flex \
            git libelf-dev libncurses5-dev libssl-dev lld llvm \
            p7zip-full python3 python3-pip unzip wget zip

      - name: AOSP Clang toolchain indir
        run: |
          mkdir -p "$GITHUB_WORKSPACE/toolchain"
          cd "$GITHUB_WORKSPACE/toolchain"
          CLANG_VER="${{ github.event.inputs.clang_version || 'r530567' }}"
          echo "Indiriliyor: clang-${CLANG_VER}"
          wget -q --show-progress \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${CLANG_VER}.tar.gz" \
            -O clang.tar.gz
          tar -xzf clang.tar.gz
          echo "TC=$GITHUB_WORKSPACE/toolchain/bin" >> "$GITHUB_ENV"

      - name: Defconfig olustur (GKI + Pineapple/SM8650 vendor)
        run: |
          export PATH="$TC:$PATH"
          make O="$OUT" ARCH=arm64 \
            CC=clang CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            gki_defconfig

          # Pineapple (SM8650) vendor configini merge et
          ./scripts/kconfig/merge_config.sh -m "$OUT/.config" \
            arch/arm64/configs/vendor/pineapple_GKI.config

          make O="$OUT" ARCH=arm64 olddefconfig

      - name: Kernel Image + DTB derle
        run: |
          export PATH="$TC:$PATH"
          make O="$OUT" ARCH=arm64 \
            CC=clang CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LLVM=1 LLVM_IAS=1 \
            -j"$(nproc)" Image dtbs

      - name: dtbo.img dene
        if: github.event.inputs.build_dtbo != 'false'
        continue-on-error: true
        run: |
          export PATH="$TC:$PATH"
          make O="$OUT" ARCH=arm64 \
            CC=clang CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            dtbo.img || echo "UYARI: dtbo.img hedefi basarisiz oldu (cihaz agaci veya overlay eksik olabilir)."

      - name: boot.img / vendor_boot.img dene
        if: github.event.inputs.build_bootimg == 'true'
        continue-on-error: true
        run: |
          echo "UYARI: boot.img/vendor_boot.img icin cihaza ozel ramdisk, DTB ve mkbootimg argumanlari gerekir."
          echo "Bu repoda yalnizca kernel source var; image olusturmak icin vendor/device tree repo'yu da entegre etmelisin."
          ls -la "$OUT/arch/arm64/boot/"

      - name: Ciktilari listele
        run: |
          echo "=== Kernel ciktilari ==="
          find "$OUT/arch/arm64/boot" -maxdepth 3 -type f -printf '%p  %s byte\\n' | sort

      - name: Artifact olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi14-${{ env.DEVICE }}-kernel-${{ github.run_number }}
          path: |
            ${{ github.workspace }}/out/arch/arm64/boot/Image
            ${{ github.workspace }}/out/arch/arm64/boot/Image.gz
            ${{ github.workspace }}/out/arch/arm64/boot/dts/**/*.dtb
            ${{ github.workspace }}/out/arch/arm64/boot/dtbo.img
          if-no-files-found: ignore
          
