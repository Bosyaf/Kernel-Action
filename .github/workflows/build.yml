name: CG+ Galadriel Mi 14 (Pure Root - KSU Next)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketler ve Google Clang 17 Çekimi
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          
          mkdir -p $GITHUB_WORKSPACE/clang-google
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz"
          curl -fLSs "$CLANG_URL" -o clang.tar.gz
          tar -xzf clang.tar.gz -C $GITHUB_WORKSPACE/clang-google
          echo "$GITHUB_WORKSPACE/clang-google/bin" >> $GITHUB_PATH

      - name: 2. Kaynakları Çek
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/Bosyaf/android_kernel_common-6.1.git --depth=1 common
          git clone https://github.com/mvaisakh/android_device_houji-kernel.git -b 16 prebuilt --depth 1

      - name: 3. KernelSU-Next Kurulumu (Sadece Root)
        run: |
          cd common
          # KernelSU-Next'in resmi kurulum scripti (SUSFS'siz düz sürüm)
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/master/kernel/setup.sh" | bash -

      - name: 4. Özel Performans Yamaları (Namespace Yaması Hariç)
        run: |
          cd common
          PATCH_DIR="../patches"
          if [ -d "$PATCH_DIR" ]; then
            for patch_file in "$PATCH_DIR"/*.patch; do
              # fs_namespace.patch dosyasını atlıyoruz çünkü SUSFS hatalarına sebep oluyor
              if [[ "$patch_file" == *"fs_namespace.patch"* ]]; then
                echo "⚠️ SUSFS içeren namespace yaması atlanıyor..."
                continue
              fi
              patch -p1 --forward < "$patch_file" || echo "❌ Yama uygulanamadı"
            done
          fi

      - name: 5. Kernel Config Hazırlığı
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-google/bin:$PATH"
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 gki_defconfig
          CONFIG_FILE="out/.config"
          
          # Root ve Sistem Ayarları
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Galadriel-Root"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCALVERSION_AUTO
          ./scripts/config --file $CONFIG_FILE --set-val CONFIG_HZ 300
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: 6. Kernel Derleme (Sadece Image)
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-google/bin:$PATH"
          export UNSAFE_GKI_IS_NOT_GENERIC=1
          rm -f android/abi_gki_protected_exports_*
          
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            KCFLAGS="-O2 -Wno-error" \
            Image modules || exit 1
          
          echo "BOOTHASH=Galadriel-Root-$(date +%s)" >> $GITHUB_ENV

      - name: 7. AnyKernel3 (Senin Kernelin + Vaisakh Modülleri)
        run: |
          cd ./AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=CG+ Galadriel Mi 14 Hybrid Root/' anykernel.sh
          sed -i '/is_slot_device=0/c\is_slot_device=auto' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=xiaomi14' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          mkdir -p modules/vendor/lib/modules
          
          # Vaisakh'ın hazır modülleri ve senin KSU modülünü birleştiriyoruz
          find ../prebuilt -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \;
          find ../common/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \;
          find ../prebuilt -name "*.dtbo" -exec cp {} . \;
          
          ls modules/vendor/lib/modules/*.ko | xargs -n1 basename > modules/vendor/lib/modules/modules.load
          zip -r "../CG-Galadriel-Root.zip" ./*

      - name: 8. Release Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Galadriel Mi 14 (Only Root - Yesterday Updates)"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
