name: CG+ Yuki Gaming Kernel (KSU+SUSFS+BBG)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space & Checkout
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          swap-size-mb: 8192
      - uses: actions/checkout@v4

      - name: Cache & Download Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/clang-zyc
          key: clang-zyc-22-20250928
      - if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          set -e
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          curl -fLSs "$CLANG_URL" | tar -xz -C "$GITHUB_WORKSPACE/clang-zyc"

      - name: Dependencies
        run: sudo apt update && sudo apt install -y --no-install-recommends python3 git curl libelf-dev build-essential flex bison libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu lld llvm pkg-config zstd jq patch

      - name: Clone Sources
        run: |
          set -e
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          git clone -b android14-6.1-staging https://github.com/ramabondanp/android_kernel_common-6.1.git --depth=1 common

      - name: Integrate KernelSU-Next
        run: |
          set -e
          cd common
          git clone -b dev-susfs --depth=1 https://github.com/pershoot/KernelSU-Next.git ksu_tmp
          mkdir -p drivers/kernelsu
          cp -a ksu_tmp/kernel/. drivers/kernelsu/
          rm -rf ksu_tmp
          sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile

      - name: Integrate SUSFS (Find & Copy - The Final Solution)
        run: |
          set -e
          cd common
          echo "[SUSFS] Cloning pershoot/susfs4ksu..."
          git clone -b gki-android14-6.1-dev --depth=1 https://gitlab.com/pershoot/susfs4ksu.git susfs_tmp
          
          # HATA ÇÖZÜMÜ: 'find' ile 'fs/susfs' klasörünü bul.
          SUSFS_SRC_DIR=$(find susfs_tmp -type d -name "susfs" -path "*/fs/susfs" | head -n 1)
          
          if [ -z "$SUSFS_SRC_DIR" ]; then
            echo "FATAL ERROR: Could not find 'fs/susfs' directory inside the susfs_tmp repo!"
            ls -R susfs_tmp  # Hata ayıklama için repo içeriğini göster
            exit 1
          fi
          
          echo "[SUSFS] Found SUSFS source at: $SUSFS_SRC_DIR"
          
          # Bulunan yoldan kopyala
          mkdir -p fs/susfs
          cp -a "$SUSFS_SRC_DIR/." fs/susfs/
          
          # Header dosyalarını ve yamaları uygula
          cp -f susfs_tmp/include/linux/susfs.h include/linux/ 2>/dev/null || true
          cp -f susfs_tmp/kernel_patches/fs/* fs/ 2>/dev/null || true
          cp -f susfs_tmp/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true

          rm -rf susfs_tmp
          
          # Kconfig/Makefile entegrasyonu
          sed -i '/^endmenu/i source "fs/susfs/Kconfig"' fs/Kconfig
          echo 'obj-$(CONFIG_KSU_SUSFS) += susfs/' >> fs/Makefile
          echo "[SUSFS] Integration complete."

      - name: Integrate BBG
        run: |
          set -e
          cd common
          git clone --depth=1 https://github.com/vc-teahouse/Baseband-guard.git bbg_tmp
          mkdir -p drivers/bbg
          cp -a bbg_tmp/drivers/bbg/. drivers/bbg/ 2>/dev/null || cp -a bbg_tmp/. drivers/bbg/
          rm -rf bbg_tmp
          echo -e 'config BBG\nbool "Baseband Guard"\ndefault n' > drivers/bbg/Kconfig
          echo 'obj-$(CONFIG_BBG) += bbg.o' > drivers/bbg/Makefile
          sed -i '/^endmenu/i source "drivers/bbg/Kconfig"' drivers/Kconfig
          echo 'obj-$(CONFIG_BBG) += bbg/' >> drivers/Makefile

      - name: Configure & Build
        run: |
          set -e
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang; export LD=ld.lld; export AR=llvm-ar; export NM=llvm-nm; export OBJCOPY=llvm-objcopy; export OBJDUMP=llvm-objdump; export STRIP=llvm-strip; export HOSTCC=clang; export HOSTCXX=clang++; export HOSTLD=ld.lld
          
          make O=out ARCH=arm64 gki_defconfig
          
          ./scripts/config -f out/.config --enable CONFIG_KSU --enable CONFIG_KSU_SUSFS --enable CONFIG_BBG
          ./scripts/config -f out/.config --set-val CONFIG_HZ 300 --enable CONFIG_PREEMPT
          ./scripts/config -f out/.config --set-str CONFIG_DEFAULT_TCP_CONG "bbr" --set-str CONFIG_LOCALVERSION "-Yuki"
          
          make O=out ARCH=arm64 olddefconfig
          make -j"$(nproc --all)" O=out ARCH=arm64 Image
          
          echo "BOOTHASH=Yuki-$(date +%Y%m%d-%H%M)" >> "$GITHUB_ENV"

      - name: Package & Release
        run: |
          set -e
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          ZIP_NAME="CG-Yuki-KSU-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "../${ZIP_NAME}" ./*
          cd ..
          ls -lh *.zip
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "CG+ Yuki Kernel"
          body: "KSU + SUSFS + BBG - Build: ${{ env.BOOTHASH }}"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
