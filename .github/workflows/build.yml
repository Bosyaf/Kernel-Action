name: Xiaomi 14 (Houji) Pure Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Build variant (consolidate = tam moduller, gki = sadece GKI)"
        required: true
        default: "consolidate"
        type: choice
        options:
          - consolidate
          - gki
      kernel_name:
        description: "Kernel isim soneki"
        required: false
        default: "Galadriel-Pure"
      include_modules:
        description: "Modulleri derle (consolidate icin onerilir)"
        required: false
        default: true
        type: boolean

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"
      # Input'ları Bash'in okuyabileceği çevre değişkenlerine aktarıyoruz
      VARIANT: ${{ github.event.inputs.variant }}
      KERNEL_NAME: ${{ github.event.inputs.kernel_name }}
      INCLUDE_MODULES: ${{ github.event.inputs.include_modules }}

    steps:
      # ──── ADIM 1: Disk alanını maksimize et ────
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 16384
          temp-reserve-mb: 2048
          swap-size-gb: 16

      # ──── ADIM 2: AnyKernel3 ────
      - name: Checkout AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          path: AnyKernel3

      # ──── ADIM 3: Bağımlılıklar ve Google Clang r487747c ────
      - name: Install Dependencies & Download Google Toolchain
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev \
            libxml2-utils rsync unzip dwarves bc cpio wget \
            xz-utils make gcc-aarch64-linux-gnu pkg-config zstd

          echo "Downloading Google Clang r487747c (Android 14 Release)"
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-release/clang-r487747c.tar.gz"
          mkdir -p $GITHUB_WORKSPACE/toolchain/clang-google
          # Google tar.gz leri genellikle düz arşive sahip olduğu için direkt klasöre açıyoruz
          curl -fLSs "$CLANG_URL" | tar -xzf - -C $GITHUB_WORKSPACE/toolchain/clang-google
          
          # Path ekle
          echo "$GITHUB_WORKSPACE/toolchain/clang-google/bin" >> $GITHUB_PATH

      # ──── ADIM 4: Kernel kaynak kodunu çek ────
      - name: Clone Kernel Source
        run: |
          echo "Cloning mvaisakh/xiaomi14 (kplatform branch)..."
          git clone -b kplatform https://github.com/mvaisakh/xiaomi14.git source --depth=1
          cd source
          git submodule update --init --recursive --depth=1 || true

      # ──── ADIM 5: Config Hazırlama ────
      - name: Prepare & Merge Kernel Config
        run: |
          cd source
          export PATH="$GITHUB_WORKSPACE/toolchain/clang-google/bin:$PATH"
          OUT_DIR="$GITHUB_WORKSPACE/out"
          mkdir -p "${OUT_DIR}"

          echo "=============================================="
          echo "Variant: $VARIANT"
          echo "Kernel Name: $KERNEL_NAME"
          echo "=============================================="

          # 1. Temel GKI config
          make O="${OUT_DIR}" ARCH=arm64 LLVM=1 gki_defconfig

          # 2. SoC GKI fragment
          scripts/kconfig/merge_config.sh -m -O "${OUT_DIR}" "${OUT_DIR}/.config" arch/arm64/configs/vendor/pineapple_GKI.config || true

          # 3. Cihaz GKI fragment
          scripts/kconfig/merge_config.sh -m -O "${OUT_DIR}" "${OUT_DIR}/.config" arch/arm64/configs/vendor/houji_GKI.config || true

          # Consolidate seçildiyse ekle
          if [ "$VARIANT" = "consolidate" ]; then
            scripts/kconfig/merge_config.sh -m -O "${OUT_DIR}" "${OUT_DIR}/.config" arch/arm64/configs/consolidate.fragment || true
            scripts/kconfig/merge_config.sh -m -O "${OUT_DIR}" "${OUT_DIR}/.config" arch/arm64/configs/vendor/pineapple_consolidate.config || true
          fi

          # Localversion ayarla
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"-${KERNEL_NAME}\"/" "${OUT_DIR}/.config"
          
          # Bağımlılıkları tamamla
          make O="${OUT_DIR}" ARCH=arm64 LLVM=1 olddefconfig

      # ──── ADIM 6: Kernel Derleme ────
      - name: Build Kernel
        run: |
          cd source
          export PATH="$GITHUB_WORKSPACE/toolchain/clang-google/bin:$PATH"
          OUT_DIR="$GITHUB_WORKSPACE/out"

          # Pineapple (SM8650) için tam LLVM araçlarını kullan
          make -j$(nproc --all) \
            O="${OUT_DIR}" \
            ARCH=arm64 \
            LLVM=1 \
            LLVM_IAS=1 \
            Image \
            dtbs

          if [ "$VARIANT" = "consolidate" ] && [ "$INCLUDE_MODULES" = "true" ]; then
            make -j$(nproc --all) O="${OUT_DIR}" ARCH=arm64 LLVM=1 LLVM_IAS=1 modules || true
          fi

          echo "BOOTHASH=Pure-Houji-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +%Y-%m-%d_%H-%M)" >> $GITHUB_ENV

      # ──── ADIM 7: Paketleme ────
      - name: Package with AnyKernel3
        run: |
          OUT_DIR="$GITHUB_WORKSPACE/out"
          
          # Kernel Image kopyala
          cp "${OUT_DIR}/arch/arm64/boot/Image" ./AnyKernel3/

          # DTB/DTBO kopyala
          mkdir -p ./AnyKernel3/dtb ./AnyKernel3/dtbo
          find "${OUT_DIR}/arch/arm64/boot/dts" -name "*.dtb" -exec cp {} ./AnyKernel3/dtb/ \; 2>/dev/null || true
          find "${OUT_DIR}/arch/arm64/boot/dts" -name "*.dtbo" -exec cp {} ./AnyKernel3/dtbo/ \; 2>/dev/null || true

          cd ./AnyKernel3
          sed -i "s/kernel.string=.*/kernel.string=CG+ $KERNEL_NAME ($VARIANT)/" anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh

          # Xiaomi 14 serisi cihaz tanımları
          sed -i '/is_slot_device=auto/a \
          device.name1=houji\
          device.name2=shennong\
          device.name3=xiaomi14' anykernel.sh

          ZIP_NAME="Houji-PureKernel-${VARIANT}-${BUILD_DATE}.zip"
          zip -r "../${ZIP_NAME}" ./*
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      # ──── ADIM 8: Release ────
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Xiaomi 14 (Houji) ${{ env.VARIANT }} - ${{ env.BUILD_DATE }}"
          body: |
            ## Galadriel Pure Kernel
            - **Variant:** ${{ env.VARIANT }}
            - **Toolchain:** Google Clang r487747c (AOSP 14)
            - **Device:** Xiaomi 14 (Houji) / Pro (Shennong)
          files: "${{ env.ZIP_NAME }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
