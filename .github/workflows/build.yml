name: Xiaomi 14 Vendor Build (LLVM 17)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 16384
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Ortam ve LLVM 17 Kurulumu
        run: |
          sudo apt update && sudo apt install -y python3 git curl bc bison flex make libssl-dev zip
          mkdir -p $GITHUB_WORKSPACE/clang
          # AOSP LLVM 17 (r498224b) indirme
          curl -fLSs https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r498224b.tar.gz -o clang.tar.gz
          tar -xf clang.tar.gz -C $GITHUB_WORKSPACE/clang
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH

      - name: 2. Kaynakları ve Araçları Çek
        run: |
          git clone -b new https://github.com/Bosyaf/xiaomi14.git --depth=1 common
          git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3
          # Magiskboot çek (Unpack/Repack için)
          wget https://github.com/tiann/KernelSU/raw/main/kernel/setup.sh -O magiskboot_setup.sh # Örnek araç

      - name: 3. Kernel ve Modülleri Derle
        run: |
          cd common
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          make O=out ARCH=arm64 vendor/pineapple-gki_defconfig
          
          # WiFi hatasını geçmek için devre dışı bırakıyoruz (İstersen enable yapabilirsin)
          scripts/config --file out/.config --disable CONFIG_QCA_CLD_WLAN
          scripts/config --file out/.config --enable CONFIG_SCHED_WALT
          
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- \
            Image modules
          
      - name: 4. Vendor Boot Paketleme (Cerrahi İşlem)
        run: |
          # NOT: Bu adım için ana dizine 'vendor_boot.img' koyman lazım
          # Eğer yoksa script hata vermesin diye sadece Image alacak şekilde ayarladım
          mkdir -p out_final
          cp common/out/arch/arm64/boot/Image out_final/
          
          # Derlenen modülleri topla
          find common/out/ -name "*.ko" -exec cp {} out_final/ \;
          
          echo "✅ Modüller ve Image hazır."

      - name: 5. AnyKernel3 Hazırlığı
        run: |
          cd AnyKernel3
          cp ../out_final/Image .
          mkdir -p modules/vendor/lib/modules
          cp ../out_final/*.ko modules/vendor/lib/modules/
          zip -r "../Xiaomi14-WALT-Build.zip" ./*

      - name: 6. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi14-Kernel-Modules
          path: "*.zip"
