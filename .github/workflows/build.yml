name: Xiaomi HOUJI Kernel - Neutron Clang 19

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: 'Kernel source repository'
        required: true
        default: 'MiCode/Xiaomi_Kernel_OpenSource'
      kernel_branch:
        description: 'Kernel branch (shennong-u-oss)'
        required: true
        default: 'shennong-u-oss'
      defconfig_name:
        description: 'Defconfig name'
        required: true
        default: 'shennong_defconfig'

jobs:
  build-houji-kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "houji-builder"
      KBUILD_BUILD_HOST: "xiaomi-14"
      DEVICE_NAME: "houji"
      DEVICE_CODENAME: "Xiaomi 14"

    steps:
      - name: ⬇️ Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: 📥 Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.kernel_source }}
          ref: ${{ github.event.inputs.kernel_branch }}
          path: kernel
          fetch-depth: 1

      - name: 📦 Install Build Dependencies
        run: |
          echo "🔧 Build dependencies kuruluyor..."
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd libfdt-dev device-tree-compiler kmod ccache
          echo "✅ Dependencies tamam!"

      - name: 🔥 Download Neutron Clang 19
        run: |
          echo "🚀 Neutron Clang 19 indiriliyor..."
          
          mkdir -p $HOME/toolchains/neutron-clang
          cd $HOME/toolchains/neutron-clang
          
          # AntMan ile Neutron Clang indir
          curl -fLSs "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman" -o antman
          chmod +x antman
          
          echo "⬇️ Toolchain sync ediliyor (bu işlem 5-10 dakika sürebilir)..."
          ./antman -S
          
          # PATH'e ekle
          echo "$HOME/toolchains/neutron-clang/bin" >> $GITHUB_PATH
          
          # Versiyonu doğrula
          echo ""
          echo "✅ Neutron Clang 19 kuruldu!"
          echo "================================================"
          clang --version | head -3
          ld.lld --version | head -2
          echo "================================================"

      - name: 🔍 Check Available Defconfigs
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "📁 Mevcut defconfig'ler aranıyor..."
          echo "================================================"
          
          # arch/arm64/configs/ dizininde ara
          echo "1️⃣ arch/arm64/configs/ dizini:"
          find arch/arm64/configs -maxdepth 1 -name "*defconfig" 2>/dev/null | sort | head -20
          
          # vendor klasörünü kontrol et
          echo ""
          echo "2️⃣ arch/arm64/configs/vendor/ dizini:"
          if [ -d "arch/arm64/configs/vendor" ]; then
            find arch/arm64/configs/vendor -name "*defconfig" -o -name "*.config" 2>/dev/null | sort | head -20
          else
            echo "   vendor klasörü bulunamadı"
          fi
          
          # shennong/houji ile ilgili olanları göster
          echo ""
          echo "3️⃣ shennong/houji ile ilgili config'ler:"
          find arch/arm64/configs -name "*shennong*" -o -name "*houji*" 2>/dev/null | sort
          
          echo "================================================"

      - name: ⚙️ Prepare Defconfig (Merge if needed)
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          DEFCONFIG="${{ github.event.inputs.defconfig_name }}"
          
          echo "🔨 HOUJI için defconfig hazırlanıyor..."
          echo "================================================"
          echo "Defconfig: ${DEFCONFIG}"
          echo ""
          
          # Önce temizle
          make -j$(nproc --all) clean O=${OUT_DIR} || true
          rm -rf ${OUT_DIR}
          mkdir -p ${OUT_DIR}
          
          # Vendor config merge kontrolü
          MERGE_SUCCESS=false
          
          # Senaryo 1: vendor/ klasöründe defconfig varsa
          if [ -f "arch/arm64/configs/vendor/${DEFCONFIG}" ]; then
            echo "✓ vendor/${DEFCONFIG} bulundu, merge ediliyor..."
            ./scripts/kconfig/merge_config.sh -O ${OUT_DIR} \
              arch/arm64/configs/vendor/${DEFCONFIG} \
              2>&1 || true
            MERGE_SUCCESS=true
          
          # Senaryo 2: vendor/xiaomi/ klasöründe houji/shennong config varsa
          elif [ -d "arch/arm64/configs/vendor/xiaomi" ]; then
            echo "✓ vendor/xiaomi/ klasörü bulundu..."
            
            # Ana defconfig + vendor config merge
            if [ -f "arch/arm64/configs/${DEFCONFIG}" ]; then
              # houji.config veya shennong.config ara
              if [ -f "arch/arm64/configs/vendor/xiaomi/houji.config" ]; then
                echo "✓ houji.config bulundu, merge ediliyor..."
                ./scripts/kconfig/merge_config.sh -O ${OUT_DIR} \
                  arch/arm64/configs/${DEFCONFIG} \
                  arch/arm64/configs/vendor/xiaomi/houji.config \
                  2>&1 || true
                MERGE_SUCCESS=true
              elif [ -f "arch/arm64/configs/vendor/xiaomi/shennong.config" ]; then
                echo "✓ shennong.config bulundu, merge ediliyor..."
                ./scripts/kconfig/merge_config.sh -O ${OUT_DIR} \
                  arch/arm64/configs/${DEFCONFIG} \
                  arch/arm64/configs/vendor/xiaomi/shennong.config \
                  2>&1 || true
                MERGE_SUCCESS=true
              elif [ -f "arch/arm64/configs/vendor/xiaomi/sm8650.config" ]; then
                echo "✓ sm8650.config bulundu, merge ediliyor..."
                ./scripts/kconfig/merge_config.sh -O ${OUT_DIR} \
                  arch/arm64/configs/${DEFCONFIG} \
                  arch/arm64/configs/vendor/xiaomi/sm8650.config \
                  2>&1 || true
                MERGE_SUCCESS=true
              fi
            fi
          fi
          
          # Merge başarısız olduysa direkt defconfig kullan
          if [ "$MERGE_SUCCESS" = false ]; then
            echo "⚠️ Vendor config bulunamadı, direkt defconfig kullanılıyor..."
            
            if [ -f "arch/arm64/configs/${DEFCONFIG}" ]; then
              echo "✓ ${DEFCONFIG} kullanılıyor"
              make O=${OUT_DIR} ${DEFCONFIG}
            elif [ -f "arch/arm64/configs/vendor/${DEFCONFIG}" ]; then
              echo "✓ vendor/${DEFCONFIG} kullanılıyor"
              make O=${OUT_DIR} vendor/${DEFCONFIG}
            else
              echo "❌ Defconfig bulunamadı: ${DEFCONFIG}"
              echo "Mevcut defconfig'ler:"
              find arch/arm64/configs -name "*defconfig" | head -10
              exit 1
            fi
          fi
          
          # DTBO ayarı (gerekliyse)
          if ! grep -q "CONFIG_BUILD_ARM64_DT_OVERLAY" ${OUT_DIR}/.config 2>/dev/null; then
            echo "📝 CONFIG_BUILD_ARM64_DT_OVERLAY=y ekleniyor..."
            echo "CONFIG_BUILD_ARM64_DT_OVERLAY=y" >> ${OUT_DIR}/.config
          fi
          
          # Config'i güncelle
          make O=${OUT_DIR} olddefconfig
          
          echo ""
          echo "✅ Defconfig hazırlandı!"
          echo "================================================"

      - name: 🚀 Build HOUJI Kernel (Neutron Clang 19)
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"
          export ARCH=arm64
          export CROSS_COMPILE=a-gnu-
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          
          echo "🔥 HOUJI KERNEL DERLENİYOR..."
          echo "================================================"
          echo "Device: Xiaomi 14 (houji)"
          echo "Source: ${{ github.event.inputs.kernel_source }}"
          echo "Branch: ${{ github.event.inputs.kernel_branch }}"
          echo "Toolchain: Neutron Clang 19"
          echo "Threads: $(nproc --all)"
          echo "================================================"
          echo ""
          
          # Kernel'i derle
          make -j$(nproc --all) \
            O=${OUT_DIR} \
            ARCH=${ARCH} \
            CROSS_COMPILE=${CROSS_COMPILE} \
            CC=${CC} \
            LLVM=${LLVM} \
            LLVM_IAS=${LLVM_IAS} \
            AR=${AR} \
            NM=${NM} \
            OBJCOPY=${OBJCOPY} \
            OBJDUMP=${OBJDUMP} \
            STRIP=${STRIP} \
            Image.gz-dtb dtbo.img modules 2>&1 | tee ${OUT_DIR}/kernel.log
          
          BUILD_STATUS=${PIPESTATUS[0]}
          
          if [ ${BUILD_STATUS} -eq 0 ]; then
            echo ""
            echo "✅ KERNEL DERLEME BAŞARILI!"
            echo "BOOTHASH=Houji-Neutron19-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV
          else
            echo ""
            echo "❌ KERNEL DERLEME BAŞARISIZ!"
            echo "Hata logları: ${OUT_DIR}/kernel.log"
            tail -100 ${OUT_DIR}/kernel.log
            exit 1
          fi
          
          echo "================================================"

      - name: 📦 Prepare Kernel Files for HOUJI
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          mkdir -p release
          
          echo "📦 Kernel dosyaları hazırlanıyor..."
          echo ""
          
          # Kernel image'ları kopyala
          if [ -f "${OUT_DIR}/arch/arm64/boot/Image.gz-dtb" ]; then
            cp ${OUT_DIR}/arch/arm64/boot/Image.gz-dtb release/
            echo "✓ Image.gz-dtb kopyalandı ($(ls -lh ${OUT_DIR}/arch/arm64/boot/Image.gz-dtb | awk '{print $5}'))"
          else
            echo "⚠️ Image.gz-dtb bulunamadı"
          fi
          
          if [ -f "${OUT_DIR}/arch/arm64/boot/dtbo.img" ]; then
            cp ${OUT_DIR}/arch/arm64/boot/dtbo.img release/
            echo "✓ dtbo.img kopyalandı ($(ls -lh ${OUT_DIR}/arch/arm64/boot/dtbo.img | awk '{print $5}'))"
          else
            echo "⚠️ dtbo.img bulunamadı"
          fi
          
          if [ -f "${OUT_DIR}/arch/arm64/boot/Image.gz" ]; then
            cp ${OUT_DIR}/arch/arm64/boot/Image.gz release/
            echo "✓ Image.gz kopyalandı"
          fi
          
          # Modules
          if [ -d "${OUT_DIR}/modules" ]; then
            cp -r ${OUT_DIR}/modules release/
            echo "✓ Modules kopyalandı ($(find ${OUT_DIR}/modules -name "*.ko" | wc -l) adet .ko dosyası)"
          fi
          
          # Build info
          cat > release/build-info.txt << EOF
          ╔═══════════════════════════════════════════════════════╗
          ║     XIAOMI HOUJI KERNEL BUILD                         ║
          ╠═══════════════════════════════════════════════════════╣
          ║  Device:        Xiaomi 14 (houji)                     ║
          ║  Source:        ${{ github.event.inputs.kernel_source }}
          ║  Branch:        ${{ github.event.inputs.kernel_branch }}
          ║  Toolchain:     Neutron Clang 19                      ║
          ║  Build Date:    $(date)                                ║
          ║  Build ID:      ${{ env.BOOTHASH }}
          ║  GitHub Run:    ${{ github.run_id }}                    ║
          ║  Builder:       ${{ env.KBUILD_BUILD_USER }}                       ║
          ╚═══════════════════════════════════════════════════════╝
          
          Files:
          - Image.gz-dtb  : Kernel + Device Tree
          - dtbo.img      : Device Tree Overlay
          - modules/      : Kernel Modules
          
          Flashing:
          fastboot flash boot boot.img
          fastboot flash dtbo dtbo.img
          EOF
          
          echo ""
          echo "📊 Release dosyaları:"
          ls -lh release/

      - name: ⬆️ Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: houji-kernel-${{ github.run_id }}
          path: kernel/release/
          retention-days: 30

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "🔥 Xiaomi HOUJI Kernel - Neutron Clang 19"
          body: |
            # 🔥 Xiaomi HOUJI Kernel Build
            
            ## 📱 Device Information
            | Property | Value |
            |----------|-------|
            | **Device** | Xiaomi 14 |
            | **Codename** | houji |
            | **Chipset** | Snapdragon 8 Gen 3 (SM8650) |
            | **Sibling** | shennong (Xiaomi 14 Pro) |
            
            ## 🔧 Build Information
            | Property | Value |
            |----------|-------|
            | **Source** | ${{ github.event.inputs.kernel_source }} |
            | **Branch** | ${{ github.event.inputs.kernel_branch }} |
            | **Toolchain** | Neutron Clang 19 |
            | **Build ID** | `${{ env.BOOTHASH }}` |
            | **GitHub Run** | ${{ github.run_id }} |
            | **Builder** | ${{ env.KBUILD_BUILD_USER }} |
            
            ## 📦 Included Files
            - ✅ `Image.gz-dtb` - Kernel + Device Tree (Ana kernel)
            - ✅ `dtbo.img` - Device Tree Overlay
            - ✅ `modules/` - Kernel Modules
            
            ## ⚠️ Flashing Guide
            
            ### Yöntem 1: AnyKernel3 (Önerilen)
            ```bash
            # AnyKernel3 zip'ini indir ve TWRP'den flash et
            ```
            
            ### Yöntem 2: Manuel (fastboot)
            ```bash
            # boot.img'yi unpack et
            magiskboot unpack boot.img
            
            # Kernel'ı değiştir
            mv release/Image.gz-dtb kernel
            
            # boot.img'yi repack et
            magiskboot repack boot.img
            
            # Flash et
            fastboot flash boot new-boot.img
            fastboot flash dtbo release/dtbo.img
            ```
            
            ### Yöntem 3: AOSP Build
            ```bash
            # Kernel'ı AOSP tree'ye kopyala
            cp release/Image.gz-dtb device/xiaomi/houji-kernel/
            make bootimage
            fastboot flash boot out/target/product/houji/boot.img
            ```
            
            ## 🐛 Known Issues
            - Bu kernel stock kernel source'dan derlenmiştir
            - WiFi ve Audio çalışmalıdır (stock config)
            - Özel yamalar eklenmemiştir
            
            ## 📝 Notes
            - Houji ve shennong aynı kernel'i paylaşır (SM8650)
            - Neutron Clang 19 ile optimize edilmiştir
            - LLVM IAS (Integrated Assembler) kullanılmıştır
            
            ---
            **Build Hash:** `${{ env.BOOTHASH }}`
            
            ⚠️ **Disclaimer:** Use at your own risk!
          files: |
            kernel/release/Image.gz-dtb
            kernel/release/dtbo.img
            kernel/release/build-info.txt
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
