name: Xiaomi 14 Houji - Full Engineering Build (Cached)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    
    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Gerekli Paketleri Kur
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd pahole cmake

      - name: 2. Clang Hafızasını Kontrol Et
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/official-clang
          key: clang-r487747c-v3

      - name: 2.1 Clang İndir (Hafızada Yoksa)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/official-clang
          git clone --depth=1 -b android14-release \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            ${{ github.workspace }}/clang-repo
          cp -r ${{ github.workspace }}/clang-repo/clang-r487747c/* ${{ github.workspace }}/official-clang/
          rm -rf ${{ github.workspace }}/clang-repo

      - name: 3. Kaynak Kod Hafızasını Kontrol Et (3 Source)
        id: cache-source
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/common
            ${{ github.workspace }}/houji-dt
            ${{ github.workspace }}/sm8650-modules
          # Bu key'i değiştirerek (örneğin v1 -> v2) hafızayı sıfırlayabilirsin
          key: kernel-sources-houji-v1

      - name: 3.1 Kaynakları İndir (Hafızada Yoksa)
        if: steps.cache-source.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14.git ${{ github.workspace }}/common
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14-devicetrees.git ${{ github.workspace }}/houji-dt
          git clone --depth=1 -b main https://github.com/lolipuru/kernel_xiaomi_sm8650-modules.git ${{ github.workspace }}/sm8650-modules
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ${{ github.workspace }}/AnyKernel3

      - name: 4. KRİTİK LEHİMLEME (Header ve DTS Yerleşimi)
        run: |
          COMMON="${{ github.workspace }}/common"
          MODS="${{ github.workspace }}/sm8650-modules"
          DT="${{ github.workspace }}/houji-dt"

          # 1. Eksik msm-camera.h dosyasını kopyala
          mkdir -p ${COMMON}/include/dt-bindings/
          cp ${MODS}/qcom/opensource/camera-kernel/dt-bindings/msm-camera.h ${COMMON}/include/dt-bindings/ 2>/dev/null || true

          # 2. Donanım Haritası (DTS) temizle ve kopyala
          rm -rf ${COMMON}/arch/arm64/boot/dts/vendor
          mkdir -p ${COMMON}/arch/arm64/boot/dts/vendor
          cp -r ${DT}/* ${COMMON}/arch/arm64/boot/dts/vendor/
          
          # DTS Makefile ekle (yoksa)
          DTS_MK="${COMMON}/arch/arm64/boot/dts/Makefile"
          grep -qxF 'obj-y += vendor/' "$DTS_MK" || echo "obj-y += vendor/" >> "$DTS_MK"

          # 3. Kamera UAPI Headerlarını kopyala
          mkdir -p ${COMMON}/include/uapi/camera
          cp -r ${MODS}/qcom/opensource/camera-kernel/include/uapi/camera/* ${COMMON}/include/uapi/camera/ 2>/dev/null || true

          # 4. Clang Symlink (Derleme sistemi için)
          mkdir -p "$(dirname ${COMMON}/prebuilts/clang/host/linux-x86/clang-r487747c)"
          ln -sfn ${{ github.workspace }}/official-clang ${COMMON}/prebuilts/clang/host/linux-x86/clang-r487747c

      - name: 5. Ana Kerneli Derle (Stage 1 - Image)
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/official-clang/bin:$PATH"
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig
          
          ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config

          # --- ÖNCEKİ HATAYI ÇÖZEN KRİTİK SATIR (Döngü hatasını kapatır) ---
          ./scripts/config --file out/.config --disable CONFIG_PCIE_QCOM_ECAM
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig

          # Image derleme (hata olursa alternatif Image hedefini dener)
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang Image.gz-dtb || make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CC=clang Image
          
          echo "✅ Ana Kernel Image hazır."

      - name: 6. MODÜLLERİ DERLE (Stage 2 - Sürücüler)
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/official-clang/bin:$PATH"
          COMMON_SRC="${{ github.workspace }}/common"
          MODS_ROOT="${{ github.workspace }}/sm8650-modules/qcom/opensource"
          
          # Sürücü derleme sırası (bağımlılıklara göre)
          MODULES=("mmrm-driver" "securemsm-kernel" "synx-kernel" "camera-kernel" "display-drivers" "audio-kernel" "video-driver" "touch-drivers")

          for mod in "${MODULES[@]}"; do
            if [ -d "${MODS_ROOT}/${mod}" ]; then
              echo "🛠️ Derleniyor: $mod"
              # KERNEL_SRC parametresi lolipuru sourcesi için kritiktir
              make -j$(nproc --all) -C $COMMON_SRC M=../sm8650-modules/qcom/opensource/$mod \
                O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CC=clang KERNEL_SRC=$COMMON_SRC modules || echo "⚠️ $mod derlenirken hata verdi, atlanıyor."
            fi
          done

      - name: 7. Paketleme
        run: |
          cd ${{ github.workspace }}/AnyKernel3
          COMMON="${{ github.workspace }}/common"
          
          # Image dosyasını bul ve kopyala
          find ${COMMON}/out/arch/arm64/boot -name "Image*" -exec cp {} . \;
          
          # .ko modüllerini topla
          mkdir -p modules/vendor/lib/modules
          find ${COMMON}/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \;
          
          # DTBO oluştur
          find ${COMMON}/out -name "*.dtbo" -exec cat {} + > dtbo.img 2>/dev/null || echo "DTBO bulunamadı."
          
          zip -r9 "../Xiaomi14-Houji-Official-Build.zip" ./* -x .git*

      - name: 8. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Houji-Cached-${{ github.run_id }}
          name: "Xiaomi 14 (Houji) Cached Build"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
