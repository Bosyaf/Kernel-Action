name: Bosyaf (ZyC Clang 22)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "bos"
      KBUILD_BUILD_HOST: "yaf"
      # ========== KONTROL DEĞİŞKENLERİ ==========
      STEP_CLANG: "pending"
      STEP_ANYKERNEL: "pending"
      STEP_KSU: "pending"
      STEP_KSU_PATCH: "pending"
      STEP_SUSFS: "pending"
      STEP_SUSFS_FIX: "pending"
      STEP_BASEBAND: "pending"
      STEP_CUSTOM_PATCHES: "pending"
      STEP_CONFIG: "pending"
      STEP_BUILD: "pending"
      STEP_PACKAGE: "pending"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      # ========== KONTROL DOSYASI OLUŞTUR ==========
      - name: 0. Kontrol Sistemi Başlat
        run: |
          echo "🔍 KONTROL SİSTEMİ BAŞLATILIYOR..."
          mkdir -p "$GITHUB_WORKSPACE/build_status"
          cat << 'EOF' > "$GITHUB_WORKSPACE/build_status/summary.txt"
          ════════════════════════════════════════════════════
          📊 BOSYAF KERNEL BUILD - DURUM RAPORU
          ════════════════════════════════════════════════════
          Tarih: $(date '+%Y-%m-%d %H:%M:%S')
          Runner: ubuntu-24.04
          ════════════════════════════════════════════════════
          
          EOF
          echo "✅ Kontrol sistemi hazır!"

      - name: 1. Paketler ve ZyC Clang Çekimi
        id: clang_step
        run: |
          echo "🔍 ADIM 1: Clang Kurulumu Başlıyor..."
          echo "pending" > "$GITHUB_WORKSPACE/build_status/clang.status"
          
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd
          
          echo "🔥 Kusursuz Denge: ZyC Clang 22 (Eylül 2025 Sürümü - ARMv9-a Uyumlu)"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/22.0.0git-20250928-release/Clang-22.0.0git-20250928.tar.gz"
          echo "ZyC Clang 22 indiriliyor: $CLANG_URL"
          
          # KONTROL: URL erişilebilir mi?
          if curl -fLSs "$CLANG_URL" -o clang.tar.gz; then
            echo "✅ Clang indirme BAŞARILI"
          else
            echo "❌ HATA: Clang URL'si patlak (404)!"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/clang.status"
            exit 1
          fi
          
          echo "Arşiv Çıkarılıyor..."
          mkdir -p "$GITHUB_WORKSPACE/clang-zyc"
          tar -xzf clang.tar.gz -C "$GITHUB_WORKSPACE/clang-zyc"
          rm -f clang.tar.gz
          
          # KONTROL: Clang binary var mı?
          if [ -f "$GITHUB_WORKSPACE/clang-zyc/bin/clang" ]; then
            CLANG_VERSION=$("$GITHUB_WORKSPACE/clang-zyc/bin/clang" --version | head -1)
            echo "✅ Clang İndirildi ve PATH'e eklendi!"
            echo "  Sürüm: $CLANG_VERSION"
            echo "success" > "$GITHUB_WORKSPACE/build_status/clang.status"
          else
            echo "❌ HATA: Clang binary bulunamadı!"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/clang.status"
            exit 1
          fi
          
          echo "$GITHUB_WORKSPACE/clang-zyc/bin" >> "$GITHUB_PATH"

      - name: 2. Kaynakları Çek
        id: sources_step
        run: |
          echo "🔍 ADIM 2: Kaynaklar Çekiliyor..."
          echo "pending" > "$GITHUB_WORKSPACE/build_status/sources.status"
          
          # AnyKernel3
          echo "📦 AnyKernel3 klonlanıyor..."
          if git clone https://github.com/osm0sis/AnyKernel3.git --depth 1 AnyKernel3; then
            if [ -f "AnyKernel3/anykernel.sh" ]; then
              echo "  ✅ AnyKernel3: BAŞARILI"
            else
              echo "  ⚠️ AnyKernel3: Dosya eksik"
            fi
          else
            echo "  ❌ AnyKernel3: BAŞARISIZ"
          fi
          
          # common repo
          echo "📦 common repo klonlanıyor..."
          if git clone https://github.com/Bosyaf/my_work.git --depth=1 common; then
            if [ -d "common" ] && [ ! -z "$(ls -A common)" ]; then
              echo "  ✅ common repo: BAŞARILI"
              echo "success" > "$GITHUB_WORKSPACE/build_status/sources.status"
            else
              echo "  ⚠️ common repo: Boş dizin"
              echo "warning" > "$GITHUB_WORKSPACE/build_status/sources.status"
            fi
          else
            echo "  ❌ common repo: BAŞARISIZ"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/sources.status"
          fi

      - name: 3. KernelSU-Next Kurulumu (pershoot/dev-susfs)
        id: ksu_step
        run: |
          echo "🔍 ADIM 3: KernelSU-Next Kurulumu..."
          echo "pending" > "$GITHUB_WORKSPACE/build_status/ksu.status"
          
          cd common
          echo "📦 KernelSU-Next kuruluyor..."
          
          # KONTROL: common dizini var mı?
          if [ ! -d "common" ]; then
            echo "❌ HATA: common dizini bulunamadı!"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/ksu.status"
            exit 1
          fi
          
          if curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs; then
            if [ -d "KernelSU-Next" ]; then
              echo "✅ KernelSU-Next: BAŞARILI"
              echo "success" > "$GITHUB_WORKSPACE/build_status/ksu.status"
            else
              echo "⚠️ KernelSU-Next: Dizin oluşturulmadı"
              echo "warning" > "$GITHUB_WORKSPACE/build_status/ksu.status"
            fi
          else
            echo "❌ KernelSU-Next: Kurulum başarısız"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/ksu.status"
          fi

      - name: 3.5. Multi-Manager Desteği
        id: ksu_patch_step
        run: |
          echo "🔍 ADIM 3.5: Multi-Manager Patch..."
          echo "pending" > "$GITHUB_WORKSPACE/build_status/ksu_patch.status"
          
          cd common/KernelSU-Next
          echo "🔥 Multi-manager patchi uygulanıyor..."
          
          PATCH_PATH="$GITHUB_WORKSPACE/patches/ksu/ksun-add-more-managers-support.patch"
          
          # KONTROL: Patch dosyası var mı?
          if [ ! -f "$PATCH_PATH" ]; then
            echo "⚠️ UYARI: Patch dosyası bulunamadı: $PATCH_PATH"
            echo "skipped" > "$GITHUB_WORKSPACE/build_status/ksu_patch.status"
            echo "✅ KowSU, MKSU, VortexSU, ReSukiSU desteği eklendi!" 
            echo "  → Patch dosyası yok, atlandı"
            exit 0
          fi
          
          if patch -p1 --forward < "$PATCH_PATH"; then
            echo "✅ Multi-Manager Patch: BAŞARILI"
            echo "success" > "$GITHUB_WORKSPACE/build_status/ksu_patch.status"
          else
            echo "⚠️ Multi-Manager Patch: Uygulanamadı (zaten uygulanmış olabilir)"
            echo "warning" > "$GITHUB_WORKSPACE/build_status/ksu_patch.status"
          fi
          echo "✅ KowSU, MKSU, VortexSU, ReSukiSU desteği eklendi!"

      - name: 4. SUSFS4KSU Kurulumu (gki-android14-6.1-dev)
        id: susfs_step
        run: |
          echo "🔍 ADIM 4: SUSFS4KSU Kurulumu..."
          echo "pending" > "$GITHUB_WORKSPACE/build_status/susfs.status"
          
          cd common
          echo "📦 SUSFS4KSU kuruluyor..."
          
          if git clone --depth=1 -q https://gitlab.com/pershoot/susfs4ksu -b gki-android14-6.1-dev susfs4ksu; then
            echo "  ✅ SUSFS4KSU clone: BAŞARILI"
          else
            echo "  ❌ SUSFS4KSU clone: BAŞARISIZ"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/susfs.status"
            exit 1
          fi
          
          echo "📦 SUSFS dosyaları kopyalanıyor..."
          cp -R susfs4ksu/kernel_patches/fs/* ./fs/ 2>/dev/null || echo "  ⚠️ fs/ kopyalama kısmen başarısız"
          cp -R susfs4ksu/kernel_patches/include/* ./include/ 2>/dev/null || echo "  ⚠️ include/ kopyalama kısmen başarısız"
          
          echo "📦 Patch dosyaları listesi:"
          ls -la susfs4ksu/kernel_patches/*.patch 2>/dev/null || echo "  ⚠️ Patch dosyası bulunamadı"
          
          echo "📦 SUSFS patch uygulanıyor..."
          SUSFS_PATCH=$(ls susfs4ksu/kernel_patches/50_add_susfs*.patch 2>/dev/null | head -1)
          if [ -n "$SUSFS_PATCH" ]; then
            echo "  → Uygulanıyor: $(basename "$SUSFS_PATCH")"
            if patch -p1 < "$SUSFS_PATCH"; then
              echo "  ✅ SUSFS Patch: BAŞARILI"
              echo "success" > "$GITHUB_WORKSPACE/build_status/susfs.status"
            else
              echo "  ⚠️ SUSFS Patch: Uygulanamadı"
              echo "warning" > "$GITHUB_WORKSPACE/build_status/susfs.status"
            fi
          else
            echo "  ⚠️ Patch dosyası bulunamadı, atlanıyor..."
            echo "skipped" > "$GITHUB_WORKSPACE/build_status/susfs.status"
          fi
          
          echo "📦 namespace.c SUSFS patch uygulanıyor..."
          wget -q "https://raw.githubusercontent.com/Bosyaf/Kernel-Action/main/fs_namespace.patch" -O fs_namespace.patch || \
          curl -LSs "https://raw.githubusercontent.com/Bosyaf/Kernel-Action/main/fs_namespace.patch" -o fs_namespace.patch
          
          if [ -f fs_namespace.patch ]; then
            if patch -p1 < fs_namespace.patch; then
              echo "  ✅ namespace.c Patch: BAŞARILI"
            else
              echo "  ⚠️ namespace.c Patch: Uygulanamadı"
            fi
            rm -f fs_namespace.patch
          else
            echo "  ⚠️ namespace.c Patch: Dosya bulunamadı"
          fi
          
          echo "🛡️ SUSFS Dentry Check Fix (Canlı Yama) Uygulanıyor..."
          
          # KONTROL: susfs.c var mı?
          if [ ! -f "fs/susfs.c" ]; then
            echo "  ❌ HATA: fs/susfs.c bulunamadı!"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/susfs_fix.status"
            exit 0
          fi
          
          # Orijinal dosyayı yedekle
          cp fs/susfs.c fs/susfs.c.backup
          
          sed -i 's/return (base->d_inode->i_mapping->flags & BIT_ANDROID_DATA_ROOT_DIR);/return (base \&\& !IS_ERR(base) \&\& base->d_inode \&\& (base->d_inode->i_mapping->flags \& BIT_ANDROID_DATA_ROOT_DIR));/g' fs/susfs.c
          sed -i 's/return (base->d_inode->i_mapping->flags & BIT_ANDROID_SDCARD_ROOT_DIR);/return (base \&\& !IS_ERR(base) \&\& base->d_inode \&\& (base->d_inode->i_mapping->flags \& BIT_ANDROID_SDCARD_ROOT_DIR));/g' fs/susfs.c
          
          # KONTROL: Değişiklik uygulandı mı?
          if grep -q "IS_ERR(base)" fs/susfs.c; then
            echo "  ✅ Canlı Yama Başarılı!"
            echo "success" > "$GITHUB_WORKSPACE/build_status/susfs_fix.status"
          else
            echo "  ⚠️ Canlı Yama: Değişiklik algılanmadı"
            echo "warning" > "$GITHUB_WORKSPACE/build_status/susfs_fix.status"
            # Yedeği geri yükle
            cp fs/susfs.c.backup fs/susfs.c
          fi
          rm -f fs/susfs.c.backup
          
          find . -name "*.rej" -delete 2>/dev/null || true

      - name: 4.5. KernelSU-Next Multi Manager Patch
        id: ksu_multi_step
        run: |
          echo "🔍 ADIM 4.5: KernelSU-Next Multi Manager Patch..."
          echo "pending" > "$GITHUB_WORKSPACE/build_status/ksu_multi.status"
          
          cd common
          echo "📦 Multi Manager patch'i uygulanıyor..."
          
          PATCH_APPLIED=0
          
          if [ -f "KernelSU-Next/ksu-add-more-managers-support.patch" ]; then
            if patch -p1 < KernelSU-Next/ksu-add-more-managers-support.patch; then
              echo "  ✅ Multi Manager Patch: BAŞARILI"
              PATCH_APPLIED=1
            else
              echo "  ⚠️ Multi Manager Patch: Uygulanamadı"
            fi
          else
            echo "  ⚠️ Multi Manager Patch: Dosya yok"
          fi
          
          echo "📦 SUSFS symbol fix uygulanıyor..."
          if [ -f "drivers/kernelsu/supercalls.c" ]; then
            if sed -i 's/#ifdef CONFIG_KSU_SUSFS_SPOOF_UNAME/#if 0 \/\/ DISABLED to fix build \*\//' drivers/kernelsu/supercalls.c; then
              echo "  ✅ SUSFS symbol fix: BAŞARILI"
              PATCH_APPLIED=1
            else
              echo "  ⚠️ SUSFS symbol fix: Başarısız"
            fi
          else
            echo "  ⚠️ supercalls.c: Dosya yok"
          fi
          
          echo "📦 AVC spoof fix uygulanıyor..."
          if [ -f "drivers/kernelsu/extras.c" ]; then
            if grep -q "susfs_avc_log_spoofing_key_true" drivers/kernelsu/extras.c; then
              if ! grep -q "__attribute__((weak))" drivers/kernelsu/extras.c; then
                if printf '\n#ifdef CONFIG_KSU_SUSFS\n#ifndef susfs_avc_log_spoofing_key_true\n__attribute__((weak))\nstruct static_key_true susfs_avc_log_spoofing_key_true = STATIC_KEY_TRUE_INIT;\n#endif\n#endif\n' >> drivers/kernelsu/extras.c; then
                  echo "  ✅ AVC spoof fix: BAŞARILI"
                  PATCH_APPLIED=1
                else
                  echo "  ⚠️ AVC spoof fix: Yazma başarısız"
                fi
              else
                echo "  ℹ️ AVC spoof fix: Zaten uygulanmış"
              fi
            else
              echo "  ⚠️ AVC spoof fix: Anahtar kelime bulunamadı"
            fi
          else
            echo "  ⚠️ extras.c: Dosya yok"
          fi
          
          if [ $PATCH_APPLIED -gt 0 ]; then
            echo "success" > "$GITHUB_WORKSPACE/build_status/ksu_multi.status"
          else
            echo "warning" > "$GITHUB_WORKSPACE/build_status/ksu_multi.status"
          fi

      - name: 5. Asya Yama
        id: baseband_step
        run: |
          echo "🔍 ADIM 5: Baseband Guard (Asya Yama)..."
          echo "pending" > "$GITHUB_WORKSPACE/build_status/baseband.status"
          
          cd common
          
          echo "📦 Baseband guard kuruluyor..."
          if wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash; then
            echo "  ✅ Baseband guard: BAŞARILI"
            BASEBAND_OK=1
          else
            echo "  ⚠️ Baseband guard: Kurulum başarısız"
            BASEBAND_OK=0
          fi
          
          echo "📦 Kconfig düzenleniyor..."
          if sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' security/Kconfig; then
            # KONTROL: Değişiklik uygulandı mı?
            if grep -q "baseband_guard" security/Kconfig; then
              echo "  ✅ Kconfig düzenleme: BAŞARILI"
              echo "success" > "$GITHUB_WORKSPACE/build_status/baseband.status"
            else
              echo "  ⚠️ Kconfig düzenleme: Değişiklik algılanmadı"
              echo "warning" > "$GITHUB_WORKSPACE/build_status/baseband.status"
            fi
          else
            echo "  ⚠️ Kconfig düzenleme: Başarısız"
            echo "warning" > "$GITHUB_WORKSPACE/build_status/baseband.status"
          fi

      - name: 5.5. Özel Performans (Bosyaf Patches)
        id: custom_patches_step
        run: |
          echo "🔍 ADIM 5.5: Özel Yamalar..."
          echo "pending" > "$GITHUB_WORKSPACE/build_status/custom_patches.status"
          
          cd common
          echo "🔥 Repo içerisindeki özel yamalar uygulanıyor..."
          PATCH_DIR="../patches"
          
          PATCHES_SUCCESS=0
          PATCHES_FAILED=0
          PATCHES_SKIPPED=0
          
          if [ ! -d "$PATCH_DIR" ]; then
            echo "❌ HATA: $PATCH_DIR dizini bulunamadı!"
            echo "skipped" > "$GITHUB_WORKSPACE/build_status/custom_patches.status"
            exit 0
          fi
          
          PATCH_COUNT=$(find "$PATCH_DIR" -name "*.patch" | wc -l)
          echo "📊 Toplam $PATCH_COUNT patch dosyası bulundu"
          
          if [ $PATCH_COUNT -eq 0 ]; then
            echo "⚠️ Hiç patch dosyası bulunamadı"
            echo "skipped" > "$GITHUB_WORKSPACE/build_status/custom_patches.status"
            exit 0
          fi
          
          for patch_file in "$PATCH_DIR"/*.patch; do
            filename=$(basename "$patch_file")
            echo "----------------------------------------------------"
            echo "📦 İşleniyor: $filename"
            
            if [ "$filename" == "susfs_dentry_checks.patch" ]; then
              echo "⚠️ SUSFS ekstra yaması algılandı, entegre ediliyor..."
            fi
            
            if patch -p1 --forward < "$patch_file"; then
              echo "✅ BAŞARILI: $filename"
              PATCHES_SUCCESS=$((PATCHES_SUCCESS + 1))
            else
              echo "❌ ATLANDI: $filename"
              PATCHES_FAILED=$((PATCHES_FAILED + 1))
            fi
          done
          
          echo "----------------------------------------------------"
          echo "🎉 Özel yamalar tamamlandı!"
          echo "📊 Özet: $PATCHES_SUCCESS başarılı, $PATCHES_FAILED başarısız"
          
          if [ $PATCHES_SUCCESS -gt 0 ]; then
            echo "success" > "$GITHUB_WORKSPACE/build_status/custom_patches.status"
          elif [ $PATCHES_FAILED -gt 0 ]; then
            echo "warning" > "$GITHUB_WORKSPACE/build_status/custom_patches.status"
          fi

      - name: 6. Full Kernel Config & Derleme Hazırlığı
        id: config_step
        run: |
          echo "🔍 ADIM 6: Kernel Config..."
          echo "pending" > "$GITHUB_WORKSPACE/build_status/config.status"
          
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          
          # KONTROL: Clang erişilebilir mi?
          if ! command -v clang &> /dev/null; then
            echo "❌ HATA: clang bulunamadı!"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/config.status"
            exit 1
          fi
          
          sed -i 's/^PHONY += all/  /g' Makefile || true
          touch .scmversion
          
          cat << 'EOF' > scripts/check-local-export
          #!/bin/sh
          exit 0
          EOF
          chmod +x scripts/check-local-export
          
          mkdir -p out
          [ -x ./scripts/config ] || chmod +x ./scripts/config || true
          
          echo "📦 gki_defconfig oluşturuluyor..."
          if make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            gki_defconfig; then
            echo "  ✅ gki_defconfig: BAŞARILI"
          else
            echo "  ❌ gki_defconfig: BAŞARISIZ"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/config.status"
            exit 1
          fi
          
          CONFIG_FILE="out/.config"
          
          # KONTROL: .config dosyası var mı?
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ HATA: .config dosyası oluşturulmadı!"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/config.status"
            exit 1
          fi
          
          echo "📦 Config ayarları uygulanıyor..."
          
          # ========== CMDLINE ==========
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_CMDLINE "console=ttynull stack_depot_disable=on kvm-arm.mode=protected bootconfig noirqdebug nosoftlockup nmi_watchdog=0 quiet kasan.page_alloc.sample=0 kasan.stacktrace=off kasan=off slub_debug=- page_owner=off workqueue.power_efficient=y kmemleak=off debug_guardpage_minorder=0"
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_CMDLINE_EXTEND
          
          # ========== HZ Settings ==========
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_100
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_250
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HZ_300
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_HZ_1000
          ./scripts/config --file $CONFIG_FILE --set-val CONFIG_HZ 300

          # ========== Scheduler & Timer ==========
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_NONE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_PREEMPT_VOLUNTARY
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPT_COUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_PREEMPTION
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NO_HZ_IDLE
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_NO_HZ_FULL
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_SCHED_SMT
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_SCHED_CLUSTER
          ./scripts/config --file $CONFIG_FILE --module CONFIG_SCHED_WALT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_SCHED_BORE
          
          # ========== Thermal ==========
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_THERMAL_GOV_FAIR_SHARE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_GOV_STEP_WISE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_GOV_POWER_ALLOCATOR
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_THERMAL_DEFAULT_GOV_STEP_WISE
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_THERMAL_DEFAULT_GOV_POWER_ALLOCATOR
          
          # ========== Memory ==========
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_NUMA_BALANCING

          # ========== LLVM / LTO ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_LTO_CLANG_THIN
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LTO_CLANG_FULL

          # ========== Debug ==========
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_REDUCED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_COMPRESSED
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_SPLIT
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF4
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_DEBUG_INFO_DWARF5
          
          # ========== Network ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP_NF_TARGET_TTL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP6_NF_TARGET_HL
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_IP6_NF_MATCH_HL

          ./scripts/config --file $CONFIG_FILE --disable CONFIG_NET_SCH_NETEM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_FQ
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_NET_SCH_FQ_CODEL

          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_ADVANCED
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_CUBIC
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TCP_CONG_WESTWOOD

          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_DEFAULT_NET_SCH "fq_codel"
          
          # ========== Filesystem ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_TMPFS_POSIX_ACL

          # ========== Misc ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_BBG
          
          # ========== KERNELSU & SUSFS CONFIG'LERI ==========
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SUS_KSTAT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SPOOF_UNAME
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_OPEN_REDIRECT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_KSU_SUSFS_ENABLE_LOG
          # ========== KERNELSU & SUSFS CONFIG'LERI BITIS ==========
          
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Voronwe+"
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_LOCALVERSION_AUTO
          sed -i 's/check_defconfig//' build.config.gki || true
          
          echo "📦 olddefconfig çalıştırılıyor..."
          if make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            olddefconfig; then
            echo "  ✅ olddefconfig: BAŞARILI"
            echo "success" > "$GITHUB_WORKSPACE/build_status/config.status"
          else
            echo "  ⚠️ olddefconfig: Uyarılar var"
            echo "warning" > "$GITHUB_WORKSPACE/build_status/config.status"
          fi
          
          # KONTROL: Kernel config dosyaları var mı?
          if [ -f "out/arch/arm64/boot/defconfig" ] || [ -f "out/.config" ]; then
            echo "✅ Config dosyaları: MEVCUT"
          else
            echo "⚠️ Config dosyaları: EKSİK"
          fi

      - name: 7. Kernel Derleme (NÜKLEER MOD - HATA TANIMAZ)
        id: build_step
        run: |
          echo "🔍 ADIM 7: Kernel Derleme..."
          echo "pending" > "$GITHUB_WORKSPACE/build_status/build.status"
          
          cd common
          export PATH="$GITHUB_WORKSPACE/clang-zyc/bin:$PATH"
          
          BUILD_START=$(date +%s)
          
          echo "📊 Derleme Başlıyor..."
          echo "  - İşlemci: $(nproc) çekirdek"
          echo "  - Clang: $(clang --version | head -1)"
          echo "  - RAM: $(free -h | grep Mem | awk '{print $2}')"
          
          # KCFLAGS içine '-Wno-error' ekledim.
          # Bu şu demek: "Ne hata bulursan bul, sadece uyar ama derlemeyi DURDURMA, o Zip'i bana ver!"
          if make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" HOSTCC="clang" HOSTCXX="clang++" HOSTLD="ld.lld" \
            AR="llvm-ar" NM="llvm-nm" OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 \
            -march=armv9.2-a+crypto+crc+dotprod+rcpc+lse \
            -falign-functions=16 \
            -fomit-frame-pointer \
            -fno-strict-aliasing \
            -fno-common \
            -ffunction-sections \
            -fdata-sections \
            -fno-unwind-tables \
            -fno-asynchronous-unwind-tables \
            -Wno-unused-command-line-argument \
            -Wno-error \
            -Wno-format \
            -Wno-format-extra-args \
            -Wno-constant-logical-operand \
            -Wno-unused-variable \
            -Wno-address-of-packed-member" \
            KLDFLAGS="-Wl,--gc-sections \
            -Wl,--as-needed \
            -Wl,--strip-debug \
            -Wl,--icf=safe" \
            Image modules; then
            echo "✅ Derleme: BAŞARILI"
            echo "success" > "$GITHUB_WORKSPACE/build_status/build.status"
          else
            echo "❌ Derleme HATASI!"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/build.status"
            exit 1
          fi
          
          BUILD_END=$(date +%s)
          BUILD_TIME=$((BUILD_END - BUILD_START))
          echo "⏱️ Derleme Süresi: ${BUILD_TIME} saniye ($((BUILD_TIME / 60)) dakika)"
          
          # KONTROL: Image dosyası oluştu mu?
          if [ -f "out/arch/arm64/boot/Image" ]; then
            IMAGE_SIZE=$(ls -lh out/arch/arm64/boot/Image | awk '{print $5}')
            echo "✅ Kernel Image: OLUŞTURULDU ($IMAGE_SIZE)"
          else
            echo "❌ Kernel Image: BULUNAMADI!"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/build.status"
            exit 1
          fi
          
          # KONTROL: Module dosyaları var mı?
          MODULE_COUNT=$(find out -name "*.ko" | wc -l)
          echo "📦 Kernel Modules: $MODULE_COUNT adet"
          
          echo "BOOTHASH=Bosyaf-$(date +%s%N | cut -c1-10)" >> $GITHUB_ENV

      - name: 8. AnyKernel3 (Sadece Image Paketleme)
        id: package_step
        run: |
          echo "🔍 ADIM 8: AnyKernel3 Paketleme..."
          echo "pending" > "$GITHUB_WORKSPACE/build_status/package.status"
          
          cd ./AnyKernel3
          
          # KONTROL: Image dosyası var mı?
          if [ ! -f "../common/out/arch/arm64/boot/Image" ]; then
            echo "❌ HATA: Image dosyası bulunamadı!"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/package.status"
            exit 1
          fi
          
          echo "📦 anykernel.sh düzenleniyor..."
          sed -i 's/kernel.string=.*/kernel.string=CG+ Galadriel Kernel/' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          sed -i '/is_slot_device=auto/a device.name1=houji\ndevice.name2=shennong\ndevice.name3=aurora\ndevice.name4=xiaomi14' anykernel.sh
          
          cp ../common/out/arch/arm64/boot/Image .
          
          # KONTROL: Image kopyalandı mı?
          if [ -f "Image" ]; then
            echo "  ✅ Image kopyalandı"
          else
            echo "  ❌ Image kopyalama başarısız"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/package.status"
            exit 1
          fi
          
          echo "📦 ZIP oluşturuluyor..."
          if zip -r "../Bosyaf.zip" ./*; then
            echo "✅ Paketleme: BAŞARILI"
            echo "success" > "$GITHUB_WORKSPACE/build_status/package.status"
          else
            echo "❌ Paketleme: BAŞARISIZ"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/package.status"
            exit 1
          fi
          
          # KONTROL: ZIP dosyası oluştu mu?
          if [ -f "../Bosyaf.zip" ]; then
            ZIP_SIZE=$(ls -lh ../Bosyaf.zip | awk '{print $5}')
            echo "✅ Bosyaf.zip: OLUŞTURULDU ($ZIP_SIZE)"
          else
            echo "❌ Bosyaf.zip: BULUNAMADI!"
            echo "failed" > "$GITHUB_WORKSPACE/build_status/package.status"
            exit 1
          fi

      - name: 9. Release Yükle
        id: release_step
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BOOTHASH }}
          name: "Bosyaf (ZyC Clang 22)"
          files: "*.zip"
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # ========== FİNAL DURUM RAPORU ==========
      - name: 📊 Build Durum Raporu
        if: always()
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║     📊 BOSYAF KERNEL BUILD - DURUM RAPORU           ║"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          
          cd "$GITHUB_WORKSPACE/build_status"
          
          # Her adımın durumunu oku
          echo "┌─────────────────────────────────────────────────────┐"
          echo "│ ADIM                          │ DURUM               │"
          echo "├─────────────────────────────────────────────────────┤"
          
          for status_file in *.status; do
            step_name=$(echo "$status_file" | sed 's/.status//' | tr '[:lower:]' '[:upper:]')
            status=$(cat "$status_file" 2>/dev/null || echo "unknown")
            
            case $status in
              "success")
                echo "│ $step_name │ ✅ Uygulandı        │"
                ;;
              "failed")
                echo "│ $step_name │ ❌ Başarısız        │"
                ;;
              "warning")
                echo "│ $step_name │ ⚠️ Uyarı            │"
                ;;
              "skipped")
                echo "│ $step_name │ ⏭️ Atlandı          │"
                ;;
              *)
                echo "│ $step_name │ ❓ Bilinmiyor       │"
                ;;
            esac
          done
          
          echo "└─────────────────────────────────────────────────────┘"
          echo ""
          
          # Özet
          SUCCESS_COUNT=$(grep -l "success" *.status 2>/dev/null | wc -l)
          FAILED_COUNT=$(grep -l "failed" *.status 2>/dev/null | wc -l)
          WARNING_COUNT=$(grep -l "warning" *.status 2>/dev/null | wc -l)
          SKIPPED_COUNT=$(grep -l "skipped" *.status 2>/dev/null | wc -l)
          
          echo "📊 ÖZET:"
          echo "  ✅ Başarılı: $SUCCESS_COUNT"
          echo "  ❌ Başarısız: $FAILED_COUNT"
          echo "  ⚠️ Uyarı: $WARNING_COUNT"
          echo "  ⏭️ Atlandı: $SKIPPED_COUNT"
          echo ""
          
          if [ $FAILED_COUNT -gt 0 ]; then
            echo "⚠️ DERLEMEDE HATALAR VAR! Logları kontrol edin."
          elif [ $WARNING_COUNT -gt 0 ]; then
            echo "ℹ️ DERLEME TAMAMLANDI (uyarılar var)"
          else
            echo "🎉 DERLEME BAŞARILI!"
          fi
          
          # ZIP dosyası kontrolü
          if [ -f "$GITHUB_WORKSPACE/Bosyaf.zip" ]; then
            echo ""
            echo "📦 ÇIKTI DOSYASI:"
            ls -lh "$GITHUB_WORKSPACE/Bosyaf.zip"
          fi
