name: Xiaomi 14 Houji - Final Stage Success

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    
    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: 1. Paketleri Kur
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd pahole cmake

      - name: 2. Clang Hafızası
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/official-clang
          key: clang-r487747c-v3

      - name: 2.1 Clang İndir (Hafızada Yoksa)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/official-clang
          git clone --depth=1 -b android14-release https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 ${{ github.workspace }}/clang-repo
          cp -r ${{ github.workspace }}/clang-repo/clang-r487747c/* ${{ github.workspace }}/official-clang/
          rm -rf ${{ github.workspace }}/clang-repo

      - name: 3. Kaynak Hafızası
        id: cache-source
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/common
            ${{ github.workspace }}/houji-dt
            ${{ github.workspace }}/sm8650-modules
          key: kernel-sources-houji-v2

      - name: 3.1 Kaynakları İndir (Hafızada Yoksa)
        if: steps.cache-source.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14.git ${{ github.workspace }}/common
          git clone --depth=1 -b kplatform https://github.com/Bosyaf/xiaomi14-devicetrees.git ${{ github.workspace }}/houji-dt
          git clone --depth=1 -b main https://github.com/lolipuru/kernel_xiaomi_sm8650-modules.git ${{ github.workspace }}/sm8650-modules
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ${{ github.workspace }}/AnyKernel3

      - name: 4. TECHPACK LEHİMLEME (Çözüm Burası)
        run: |
          COMMON="${{ github.workspace }}/common"
          MODS="${{ github.workspace }}/sm8650-modules"
          DT="${{ github.workspace }}/houji-dt"

          # --- msm-camera.h ve DT bindings yerleşimi ---
          mkdir -p ${COMMON}/include/dt-bindings/
          cp -f ${MODS}/qcom/opensource/camera-kernel/dt-bindings/msm-camera.h ${COMMON}/include/dt-bindings/ 2>/dev/null || true

          # --- Donanım Haritası Yerleşimi ---
          rm -rf ${COMMON}/arch/arm64/boot/dts/vendor
          mkdir -p ${COMMON}/arch/arm64/boot/dts/vendor
          cp -r ${DT}/* ${COMMON}/arch/arm64/boot/dts/vendor/
          grep -qxF 'obj-y += vendor/' ${COMMON}/arch/arm64/boot/dts/Makefile || echo "obj-y += vendor/" >> ${COMMON}/arch/arm64/boot/dts/Makefile

          # --- KRİTİK: MODÜLLERİ KERNEL İÇİNE LEHİMLE (Techpack Yöntemi) ---
          # Modülleri 'techpack' klasörü olarak kernel içine bağlıyoruz
          mkdir -p ${COMMON}/techpack
          ln -sfn ${MODS}/qcom/opensource ${COMMON}/techpack/opensource
          
          # Header dosyalarını ana kernelin bulabileceği yerlere kopyala
          mkdir -p ${COMMON}/include/uapi/camera/media
          cp -r ${MODS}/qcom/opensource/camera-kernel/include/uapi/camera/* ${COMMON}/include/uapi/camera/ 2>/dev/null || true
          cp -r ${MODS}/qcom/opensource/synx-kernel/include/uapi/* ${COMMON}/include/uapi/ 2>/dev/null || true

          # Clang sembolik bağ
          mkdir -p "$(dirname ${COMMON}/prebuilts/clang/host/linux-x86/clang-r487747c)"
          ln -sfn ${{ github.workspace }}/official-clang ${COMMON}/prebuilts/clang/host/linux-x86/clang-r487747c

      - name: 5. Ana Kerneli Derle (Image)
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/official-clang/bin:$PATH"
          
          # Recursive hatasını çöz
          sed -i 's/CONFIG_PCIE_QCOM_ECAM=y/# CONFIG_PCIE_QCOM_ECAM is not set/' arch/arm64/configs/vendor/pineapple_GKI.config 2>/dev/null || true
          sed -i 's/CONFIG_PCIE_QCOM_ECAM=y/# CONFIG_PCIE_QCOM_ECAM is not set/' arch/arm64/configs/vendor/houji_GKI.config 2>/dev/null || true

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig
          ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang ./scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CC=clang Image

      - name: 6. MODÜLLERİ VE DTBO'YU DERLE
        run: |
          cd ${{ github.workspace }}/common
          export PATH="${{ github.workspace }}/official-clang/bin:$PATH"
          
          # Önce DTB ve DTBO'ları derle
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CC=clang dtbs

          # Modülleri 'inline' mantığıyla derle
          # Techpack klasörlerine gidip her birini derleyeceğiz
          MODULES=("mmrm-driver" "securemsm-kernel" "synx-kernel" "camera-kernel" "display-drivers" "audio-kernel" "video-driver" "touch-drivers")
          
          for mod in "${MODULES[@]}"; do
            echo "🛠️ Derleniyor: $mod"
            # KERNEL_SRC'yi doğru tanıtarak derliyoruz
            make -j$(nproc --all) -C . O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
              CROSS_COMPILE=aarch64-linux-gnu- CC=clang \
              M=techpack/opensource/$mod modules || echo "⚠️ $mod hata verdi ama devam."
          done

      - name: 7. Paketleme
        run: |
          cd ${{ github.workspace }}/AnyKernel3
          COMMON="${{ github.workspace }}/common"
          
          # Image
          cp ${COMMON}/out/arch/arm64/boot/Image .
          
          # Modülleri bul ve topla
          mkdir -p modules/vendor/lib/modules
          find ${COMMON}/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \;
          
          # DTBO (Xiaomi 14 için Image.gz-dtb yerine bu yöntem daha sağlıklıdır)
          find ${COMMON}/out -name "*.dtbo" -exec cat {} + > dtbo.img 2>/dev/null || true
          
          zip -r9 "../Xiaomi14-Houji-Final-Build.zip" ./* -x .git*

      - name: 8. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Houji-Final-${{ github.run_id }}
          name: "Xiaomi 14 (Houji) GKI Final Build"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
