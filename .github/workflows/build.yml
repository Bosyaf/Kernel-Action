name: CG+ Houji Full Pure Engineering Final

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      KBUILD_BUILD_USER: "caglar"
      KBUILD_BUILD_HOST: "guvenc"

    steps:
      - name: Maximize Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 16

      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - Disk ve Workspace Kontrolü
        run: |
          echo "📁 Workspace: ${{ github.workspace }}"
          pwd && df -h

      - name: 1. Paket Kurulumu
        run: |
          sudo apt update -qq
          sudo apt install -y --no-install-recommends \
            python3 git curl libelf-dev build-essential flex bison \
            libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils \
            rsync unzip dwarves bc cpio wget xz-utils make gcc-aarch64-linux-gnu \
            pkg-config zstd pahole cmake
          echo "✅ Pahole versiyonu: $(pahole --version)"

      - name: 2. Clang Cache
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/official-clang
          key: clang-r487747c-android14-v3

      - name: 3. Clang İndir (Sadece Cache Yoksa)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/official-clang
          git clone --depth=1 -b android14-release \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            ${{ github.workspace }}/clang-repo
          cp -r ${{ github.workspace }}/clang-repo/clang-r487747c/* ${{ github.workspace }}/official-clang/
          rm -rf ${{ github.workspace }}/clang-repo

      - name: 4. Kaynak Kodlarını Çek
        run: |
          git clone --depth=1 -b kplatform \
            https://github.com/Bosyaf/xiaomi14.git \
            ${{ github.workspace }}/common

          git clone --depth=1 -b kplatform \
            https://github.com/Bosyaf/xiaomi14-devicetrees.git \
            ${{ github.workspace }}/houji-dt

          git clone --depth=1 \
            https://github.com/osm0sis/AnyKernel3.git \
            ${{ github.workspace }}/AnyKernel3

      - name: 5. Donanım Haritası ve Header Lehimleme
        run: |
          COMMON="${{ github.workspace }}/common"
          HOUJI="${{ github.workspace }}/houji-dt"
          CLANG_DST="${COMMON}/prebuilts/clang/host/linux-x86/clang-r487747c"

          rm -rf ${COMMON}/arch/arm64/boot/dts/vendor
          mkdir -p ${COMMON}/arch/arm64/boot/dts/vendor
          cp -r ${HOUJI}/* ${COMMON}/arch/arm64/boot/dts/vendor/

          rm -rf ${COMMON}/include/bindings
          rm -rf ${COMMON}/include/dt-bindings/bindings
          mkdir -p ${COMMON}/include/bindings
          mkdir -p ${COMMON}/include/dt-bindings

          if [ -d "${HOUJI}/bindings" ]; then
            cp -r ${HOUJI}/bindings/* ${COMMON}/include/bindings/
            cp -r ${HOUJI}/bindings/* ${COMMON}/include/dt-bindings/
          fi

          if [ -d "${HOUJI}/configs" ]; then
            mkdir -p ${COMMON}/arch/arm64/configs/vendor/
            cp -f ${HOUJI}/configs/* ${COMMON}/arch/arm64/configs/vendor/
          elif [ -d "${HOUJI}/arch/arm64/configs/vendor" ]; then
            mkdir -p ${COMMON}/arch/arm64/configs/vendor/
            cp -f ${HOUJI}/arch/arm64/configs/vendor/* ${COMMON}/arch/arm64/configs/vendor/
          fi

          DTS_MK="${COMMON}/arch/arm64/boot/dts/Makefile"
          grep -qxF 'obj-y += vendor/' "$DTS_MK" \
            || echo "obj-y += vendor/" >> "$DTS_MK"

          mkdir -p "$(dirname ${CLANG_DST})"
          ln -sfn ${{ github.workspace }}/official-clang ${CLANG_DST}

          echo "✅ Lehimleme tamamlandı"

      - name: 6. Cerrahi Stub Injection + Çakışma Önleme
        run: |
          COMMON="${{ github.workspace }}/common"
          STUB_FILE="${COMMON}/drivers/soc/qcom/cg_stubs.c"
          QCOM_MK="${COMMON}/drivers/soc/qcom/Makefile"

          echo "🔧 ADIM A: Hangi semboller built-in, hangileri modülde — tespit et"

          # ============================================================
          # Fonksiyon: Belirli bir sembolün EXPORT_SYMBOL satirini
          # kaynak agacinda bulup yorum satirina cevir.
          # Sadece stub'da tanimlanacak semboller icin calistirilir.
          # ============================================================
          disable_module_export() {
            local symbol="$1"
            shift
            for search_dir in "$@"; do
              local files=$(grep -rl "EXPORT_SYMBOL.*\b${symbol}\b" "${search_dir}" 2>/dev/null || true)
              for f in $files; do
                if echo "$f" | grep -q "cg_stubs.c"; then continue; fi
                sed -i "s|^\(EXPORT_SYMBOL.*\b${symbol}\b.*\)|// CG_DISABLED: \1|" "$f"
                echo "    ✅ Devre disi: $f -> ${symbol}"
              done
            done
          }

          echo "🔧 ADIM B: Config sonrasi built-in olan sembollerin stub gerektirip gerekmedigini kontrol et"

          # qcom_hwspinlock_bust → qcom_hwspinlock.c'de BUILT-IN olarak var
          # CONFIG_HWSPINLOCK_QCOM=y oldugu icin stub'a GEREK YOK
          # Bu sembol icin hicbir sey yapma!

          # gh_get_irq, gh_put_irq → gunyah modülde, built-in kodlar referans veriyor
          disable_module_export "gh_get_irq" "${COMMON}/arch/arm64" "${COMMON}/drivers"
          disable_module_export "gh_put_irq" "${COMMON}/arch/arm64" "${COMMON}/drivers"

          # crm_* → crm modülde, bcm-voter ve rpmh-rsc built-in
          disable_module_export "crm_write_bw_vote" "${COMMON}/drivers"
          disable_module_export "crm_get_device" "${COMMON}/drivers"
          disable_module_export "crm_dump_regs" "${COMMON}/drivers"
          disable_module_export "crm_dump_drv_regs" "${COMMON}/drivers"

          # icc debug → icc-rpmh built-in, debug modülde
          disable_module_export "qcom_icc_debug_register" "${COMMON}/drivers"
          disable_module_export "qcom_icc_debug_unregister" "${COMMON}/drivers"

          # gunyah rm → qtee_shmbridge built-in, gh modülde
          disable_module_export "gh_rm_get_this_vmid" "${COMMON}/arch/arm64" "${COMMON}/drivers"

          # dma buf → built-in referans, modülde tanim
          disable_module_export "qcom_is_dma_buf_file" "${COMMON}/drivers"

          # debug symbol → built-in referans, modülde tanim
          disable_module_export "debug_symbol_lookup_name" "${COMMON}/drivers"
          disable_module_export "debug_symbol_available" "${COMMON}/drivers"

          echo ""
          echo "🔧 ADIM C: Stub dosyasi (qcom_hwspinlock_bust HARIC — o zaten built-in)"

          cat << 'STUBEOF' > "${STUB_FILE}"
          #include <linux/module.h>
          #include <linux/types.h>
          #include <linux/kernel.h>

          /* CG+ Stub: Built-in kodlarin ihtiyac duydugu ama
             sadece modullerde tanimlanan semboller.
             NOT: qcom_hwspinlock_bust BURADA YOK cunku
             qcom_hwspinlock.c'de built-in olarak zaten var. */

          /* --- CRM --- */
          void crm_write_bw_vote(void) {}
          EXPORT_SYMBOL(crm_write_bw_vote);

          void *crm_get_device(void) { return NULL; }
          EXPORT_SYMBOL(crm_get_device);

          void crm_dump_regs(void) {}
          EXPORT_SYMBOL(crm_dump_regs);

          void crm_dump_drv_regs(void) {}
          EXPORT_SYMBOL(crm_dump_drv_regs);

          /* --- ICC Debug --- */
          int qcom_icc_debug_register(void *provider) { return 0; }
          EXPORT_SYMBOL(qcom_icc_debug_register);

          void qcom_icc_debug_unregister(void *provider) {}
          EXPORT_SYMBOL(qcom_icc_debug_unregister);

          /* --- Gunyah --- */
          int gh_rm_get_this_vmid(void *vmid) { return 0; }
          EXPORT_SYMBOL(gh_rm_get_this_vmid);

          int gh_get_irq(void) { return 0; }
          EXPORT_SYMBOL(gh_get_irq);

          void gh_put_irq(void) {}
          EXPORT_SYMBOL(gh_put_irq);

          /* --- DMA buf --- */
          bool qcom_is_dma_buf_file(void *file) { return false; }
          EXPORT_SYMBOL(qcom_is_dma_buf_file);

          /* --- Debug symbol --- */
          const char *debug_symbol_lookup_name(unsigned long addr) { return NULL; }
          EXPORT_SYMBOL(debug_symbol_lookup_name);

          bool debug_symbol_available(void) { return false; }
          EXPORT_SYMBOL(debug_symbol_available);

          MODULE_LICENSE("GPL");
          MODULE_DESCRIPTION("CG+ stub symbols for built-in references");
          STUBEOF

          grep -qxF 'obj-y += cg_stubs.o' "${QCOM_MK}" \
            || echo "obj-y += cg_stubs.o" >> "${QCOM_MK}"

          echo "✅ Cerrahi stub yaması tamamlandı (qcom_hwspinlock_bust hariç)"

      - name: 7. Config Merge ve Ayarlar
        run: |
          cd ${{ github.workspace }}/common
          CLANG_BIN="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin"
          export PATH="${CLANG_BIN}:$PATH"

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang gki_defconfig

          MERGE_CONFIGS="out/.config"
          for cfg in \
            arch/arm64/configs/vendor/pineapple_GKI.config \
            arch/arm64/configs/vendor/houji_GKI.config \
            arch/arm64/configs/vendor/houji_consolidate.config; do
            if [ -f "$cfg" ]; then
              MERGE_CONFIGS="$MERGE_CONFIGS $cfg"
              echo "✅ Merge edilecek: $cfg"
            else
              echo "⚠️ Config bulunamadı, atlanıyor: $cfg"
            fi
          done

          ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang \
            ./scripts/kconfig/merge_config.sh -O out $MERGE_CONFIGS

          CONFIG_FILE="out/.config"

          ./scripts/config --file $CONFIG_FILE --disable CONFIG_MSM_MINIDUMP
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_QCOM_MINIDUMP
          ./scripts/config --file $CONFIG_FILE --disable CONFIG_IPC_LOGGING

          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_COMMAND_DB
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_RPMH
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_RPMHPD
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_SMEM
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_QCOM_SOCINFO
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_INTERCONNECT
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HWSPINLOCK
          ./scripts/config --file $CONFIG_FILE --enable CONFIG_HWSPINLOCK_QCOM

          ./scripts/config --file $CONFIG_FILE --enable CONFIG_DEBUG_INFO_BTF
          ./scripts/config --file $CONFIG_FILE --set-str CONFIG_LOCALVERSION "-Houji-Pure"

          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang olddefconfig

          echo "✅ Final config hazır"
          grep "CONFIG_LOCALVERSION" out/.config

      - name: 8. Derleme - Image ve Modules
        run: |
          cd ${{ github.workspace }}/common
          CLANG_BIN="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin"
          export PATH="${CLANG_BIN}:$PATH"

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" AR="llvm-ar" NM="llvm-nm" \
            OBJCOPY="llvm-objcopy" OBJDUMP="llvm-objdump" STRIP="llvm-strip" \
            KCFLAGS="-O2 -D__ANDROID_COMMON_KERNEL__ -Wno-error" \
            Image modules

          echo "✅ Image ve modüller derlendi"
          ls -lh out/arch/arm64/boot/Image

      - name: 8b. Derleme - DTBs
        run: |
          cd ${{ github.workspace }}/common
          CLANG_BIN="${{ github.workspace }}/common/prebuilts/clang/host/linux-x86/clang-r487747c/bin"
          export PATH="${CLANG_BIN}:$PATH"

          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" \
            DTC_FLAGS="-i ${{ github.workspace }}/common/arch/arm64/boot/dts/vendor/qcom -i ${{ github.workspace }}/common/include" \
            dtbs 2>&1 | tee ${{ github.workspace }}/dtbs_build.log

          DTB_ERRORS=$(grep -ci "error:" ${{ github.workspace }}/dtbs_build.log || true)
          if [ "$DTB_ERRORS" -gt 0 ]; then
            echo "⚠️ ${DTB_ERRORS} DTB hatası tespit edildi"
            grep -i "error:" ${{ github.workspace }}/dtbs_build.log | head -20
          else
            echo "✅ DTB derleme başarılı"
          fi

      - name: 9. Paketleme
        run: |
          cd ${{ github.workspace }}/AnyKernel3
          COMMON="${{ github.workspace }}/common"
          CLANG_BIN="${COMMON}/prebuilts/clang/host/linux-x86/clang-r487747c/bin"

          mkdir -p modules/vendor/lib/modules

          if [ -f "${COMMON}/out/arch/arm64/boot/Image" ]; then
            cp ${COMMON}/out/arch/arm64/boot/Image .
            echo "✅ Image kopyalandı ($(ls -lh Image | awk '{print $5}'))"
          else
            echo "❌ Image bulunamadı!" && exit 1
          fi

          DTBO_COUNT=$(find ${COMMON}/out -name "*.dtbo" 2>/dev/null | wc -l)
          if [ "$DTBO_COUNT" -gt 0 ]; then
            if [ -f "${COMMON}/scripts/dtc/mkdtboimg.py" ]; then
              python3 ${COMMON}/scripts/dtc/mkdtboimg.py create dtbo.img \
                $(find ${COMMON}/out -name "*.dtbo" | sort)
              echo "✅ dtbo.img oluşturuldu (mkdtboimg, ${DTBO_COUNT} overlay)"
            else
              find ${COMMON}/out -name "*.dtbo" | sort | xargs cat > dtbo.img
              echo "⚠️ dtbo.img oluşturuldu (cat fallback, ${DTBO_COUNT} overlay)"
            fi
          else
            echo "⚠️ DTBO dosyası bulunamadı"
          fi

          DTB_COUNT=$(find ${COMMON}/out -name "*.dtb" ! -name "*.dtbo" 2>/dev/null | wc -l)
          if [ "$DTB_COUNT" -gt 0 ]; then
            find ${COMMON}/out -name "*.dtb" ! -name "*.dtbo" | sort | xargs cat > dtb
            echo "✅ DTB birleştirildi (${DTB_COUNT} dosya)"
          fi

          find ${COMMON}/out -name "*.ko" -exec ${CLANG_BIN}/llvm-strip --strip-debug {} \;
          find ${COMMON}/out -name "*.ko" -exec cp {} modules/vendor/lib/modules/ \;
          KO_COUNT=$(find modules/vendor/lib/modules/ -name "*.ko" | wc -l)
          echo "✅ ${KO_COUNT} modül kopyalandı"

          zip -r9 "${{ github.workspace }}/CG-Houji-Official-Final.zip" ./* -x .git*
          ls -lh ${{ github.workspace }}/CG-Houji-Official-Final.zip
          echo "✅ Paketleme tamamlandı"

      - name: 10. DTB Build Log (Debug Artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dtbs-build-log
          path: ${{ github.workspace }}/dtbs_build.log
          if-no-files-found: ignore

      - name: 11. Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Houji-Final-${{ github.run_id }}
          name: "Xiaomi 14 (HOUJI) Full Package - FINAL"
          files: ${{ github.workspace }}/CG-Houji-Official-Final.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
