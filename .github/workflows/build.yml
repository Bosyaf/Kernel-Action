name: Xiaomi 14 Houji - Clean Build

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-gb: 8

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bc bison build-essential flex git libssl-dev \
            libelf-dev python3 wget zip cpio curl dwarves which pahole
          pahole --version

      - name: Setup Neutron Clang
        run: |
          mkdir -p "$HOME/toolchains/neutron-clang"
          cd "$HOME/toolchains/neutron-clang"
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S
          echo "$HOME/toolchains/neutron-clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        run: |
          git clone -b monolithic-test-2 https://github.com/mvaisakh/xiaomi14.git --depth=1 kernel

      - name: Clone AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 AnyKernel3

      # ==========================================================
      # WLAN'I ATLAYAN CERRAHİ ADIM
      # ==========================================================
      - name: Skip WLAN Techpack
        run: |
          cd kernel
          echo "🚀 WLAN klasörü derleme listesinden çıkarılıyor..."
          
          # 1. Kbuild içindeki otomatik bulma komutuna 'wlan' klasörünü hariç tut diyoruz
          sed -i 's/-not -name "\.\*"/-not -name ".*" -not -name "wlan"/g' techpack/Kbuild
          
          # 2. Kconfig.ext içindeki tüm wlan girişlerini yorum satırı yapıp etkisiz hale getiriyoruz
          if [ -f "techpack/Kconfig.ext" ]; then
            sed -i 's|source "techpack/wlan|# source "techpack/wlan|g' techpack/Kconfig.ext
            sed -i 's|source "techpack/datarmnet-ext/wlan|# source "techpack/datarmnet-ext/wlan|g' techpack/Kconfig.ext
          fi
          echo "✅ WLAN artık görünmez."

      - name: Build Kernel
        run: |
          cd kernel
          export PATH="$HOME/toolchains/neutron-clang/bin:$PATH"
          
          # defconfig oluştur
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 houji_defconfig
          
          # Derleme (WLAN atlandığı için hata vermeden devam edecek)
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 -j$(nproc --all)

      - name: Package Kernel
        run: |
          cd AnyKernel3
          cp ../kernel/out/arch/arm64/boot/Image .
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/g' anykernel.sh
          zip -r9 ../Houji-Kernel.zip * -x .git README.md *placeholder

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: houji-${{ github.run_number }}
          name: Xiaomi 14 Houji Kernel (WLAN-Disabled)
          files: Houji-Kernel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
